<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Contact ReadySetPrep.">
<title>Contact — ReadySetPrep</title>
<style>
:root{
  --blue:#315fba;
  --blue-dark:#244b94;
  --page:#f7f9fc;
  --card:#fff;
  --text:#182230;
  --muted:#667085;
  --line:#d8dee8;
}
*{box-sizing:border-box}
body{
  min-height:100vh;
  margin:0;
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 84% 8%,rgba(49,95,186,.10),transparent 28%),
    var(--page);
}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font:inherit}
.wrap{width:min(760px,calc(100% - 28px));margin:0 auto;padding:32px 0 48px}
.brand{
  display:inline-block;
  margin-bottom:25px;
  color:var(--blue);
  font-size:22px;
  font-weight:900;
  letter-spacing:-.03em;
}
.card{
  padding:30px;
  border:1px solid var(--line);
  border-radius:20px;
  background:var(--card);
  box-shadow:0 16px 44px rgba(24,49,83,.08);
}
h1{margin:0 0 8px;font-size:36px;letter-spacing:-.035em}
.intro{margin:0 0 24px;color:var(--muted);line-height:1.6}
.field{margin-bottom:15px}
.field label{display:block;margin-bottom:6px;font-size:13px;font-weight:850}
.field input,.field select,.field textarea{
  width:100%;
  padding:11px 12px;
  border:1px solid var(--line);
  border-radius:10px;
  color:var(--text);
  background:#fff;
}
.field input,.field select{min-height:48px}
.field textarea{min-height:150px;resize:vertical;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:3px solid rgba(49,95,186,.13);
  border-color:var(--blue);
}
.btn{
  min-height:48px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 18px;
  border:1px solid transparent;
  border-radius:11px;
  font-weight:900;
  cursor:pointer;
}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:#fff;border-color:var(--line)}
.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:18px}
.note{
  margin-top:20px;
  padding:13px 14px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#f8fafc;
  color:var(--muted);
  font-size:12px;
  line-height:1.55;
}
.message{min-height:18px;margin:7px 0 0;color:#b42318;font-size:13px}
@media(max-width:560px){
  .wrap{width:min(100% - 20px,760px);padding-top:22px}
  .card{padding:22px}
  h1{font-size:32px}
  .actions{display:grid}
  .actions .btn{width:100%}
}
</style>
</head>
<body>
<main class="wrap">
  <a class="brand" href="index.html">ReadySetPrep</a>

  <section class="card">
    <h1>Contact us</h1>
    <p class="intro">Questions about ReadySetPrep, access, billing, tests, or practice materials? Send us a message.</p>

    <form id="contactForm" novalidate>
      <div class="field">
        <label for="name">Name</label>
        <input id="name" autocomplete="name" maxlength="80" required>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="topic">Topic</label>
        <select id="topic">
          <option>General question</option>
          <option>Access or login</option>
          <option>Payment or billing</option>
          <option>Practice tests</option>
          <option>Technical issue</option>
          <option>Feedback</option>
        </select>
      </div>

      <div class="field">
        <label for="messageText">Message</label>
        <textarea id="messageText" required></textarea>
      </div>

      <p class="message" id="formMessage" role="alert"></p>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Send email</button>
        <a class="btn btn-secondary" href="index.html">Back to home</a>
      </div>
    </form>

    <div class="note"><b>Privacy:</b> Your message is sent directly to ReadySetPrep. The destination email address is not shown on this page.</div>
  </section>
</main>

<script>
const PROFILE_KEY='readysetprep:user:v1';

function readProfile(){
  try{return JSON.parse(localStorage.getItem(PROFILE_KEY))}
  catch(error){return null}
}

const profile=readProfile();
if(profile){
  document.getElementById('name').value=profile.name||'';
  document.getElementById('email').value=profile.email||'';
}

document.getElementById('contactForm').addEventListener('submit',async event=>{
  event.preventDefault();

  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim().toLowerCase();
  const topic=document.getElementById('topic').value;
  const message=document.getElementById('messageText').value.trim();
  const feedback=document.getElementById('formMessage');
  const submit=event.currentTarget.querySelector('button[type="submit"]');

  if(name.length<2){
    feedback.textContent='Enter your name.';
    return;
  }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    feedback.textContent='Enter a valid email address.';
    return;
  }
  if(message.length<5){
    feedback.textContent='Enter a message.';
    return;
  }

  feedback.textContent='';
  submit.disabled=true;
  const originalLabel=submit.textContent;
  submit.textContent='Sending…';

  try{
    const response=await fetch('/api/contact',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,email,topic,message})
    });

    const result=await response.json().catch(()=>({}));
    if(!response.ok){
      throw new Error(result.error||'Unable to send your message right now.');
    }

    document.getElementById('messageText').value='';
    feedback.style.color='#118b7e';
    feedback.textContent='Message sent. ReadySetPrep will receive it directly.';
  }catch(error){
    feedback.style.color='#b42318';
    feedback.textContent=error.message||'Unable to send your message right now.';
  }finally{
    submit.disabled=false;
    submit.textContent=originalLabel;
  }
});
</script>
</body>
</html>
