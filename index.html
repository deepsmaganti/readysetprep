<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ReadySetPrep — ISEE Practice</title>
<style>
:root{--ink:#182230;--muted:#667085;--line:#d0d5dd;--panel:#fff;--page:#f3f6fb;--brand:#3056a3;--brand2:#e9effb;--ok:#067647;--bad:#b42318;--warn:#b54708;--shadow:0 8px 30px rgba(16,24,40,.10);--teal:#0f8a83;--teal-soft:#e7f7f5;--green:#2f8f62;--green-soft:#eaf7ef;--purple:#7455c3;--purple-soft:#f0ebff;--gold:#b7791f;--gold-soft:#fff7df;--coral:#d95f4f;--coral-soft:#fff0ed}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:var(--ink);background:var(--page);font-size:17px;line-height:1.5}
button,input{font:inherit}.app{min-height:100vh}.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
.topbar-inner{max-width:1180px;margin:auto;padding:12px 20px;display:flex;align-items:center;gap:16px}.brand{font-weight:800;color:var(--brand);font-size:18px;white-space:nowrap}.section-title{font-weight:700;flex:1;text-align:center}.timer{font-variant-numeric:tabular-nums;font-weight:800;border:1px solid var(--line);border-radius:999px;padding:5px 12px;min-width:84px;text-align:center}.timer.warn{color:var(--bad);border-color:#fda29b;background:#fef3f2}.hidden{display:none!important}
.container{max-width:1180px;margin:0 auto;padding:28px 20px 70px}.card{background:var(--panel);border:1px solid #e4e7ec;border-radius:18px;box-shadow:var(--shadow);padding:28px}.hero{max-width:860px;margin:24px auto}.hero h1{font-size:36px;line-height:1.15;margin:0 0 12px}.hero p{color:var(--muted)}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}.mode-card{border:2px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;background:#fff;transition:.15s}.mode-card:hover{border-color:#98a2b3;transform:translateY(-1px)}.mode-card.selected{border-color:var(--brand);background:var(--brand2)}.mode-card h3{margin:0 0 6px;font-size:20px}.mode-card p{font-size:15px;margin:0}.badge{display:inline-block;font-size:13px;font-weight:800;padding:3px 8px;border-radius:99px;background:#eef4ff;color:#3538cd;margin-bottom:8px}
.input-row{display:flex;gap:12px;align-items:center;margin:18px 0}.input-row label{font-weight:700}.input-row input{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px 12px;max-width:360px}.btn{border:0;border-radius:11px;padding:12px 18px;font-weight:800;cursor:pointer}.btn-primary{background:var(--brand);color:#fff}.btn-secondary{background:#fff;border:1px solid var(--line);color:var(--ink)}.btn-ghost{background:transparent;color:var(--brand)}.btn-danger{background:#fff0ee;color:var(--bad);border:1px solid #fda29b}.btn:disabled{opacity:.45;cursor:not-allowed}
.test-layout{display:grid;grid-template-columns:280px minmax(0,1fr);gap:20px}.sidebar{position:sticky;top:74px;align-self:start}.progress-track{height:10px;background:#e4e7ec;border-radius:999px;overflow:hidden}.progress-fill{height:100%;background:var(--brand);width:0}.q-palette{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px}.q-dot{height:38px;border-radius:9px;border:1px solid var(--line);background:white;font-weight:700;cursor:pointer}.q-dot.answered{background:#e7f6ec;border-color:#75c99b;color:#05603a}.q-dot.flagged::after{content:'★';font-size:9px;color:#f79009;position:absolute;margin:-7px 0 0 2px}.q-dot.current{outline:3px solid #b2c5ed;border-color:var(--brand)}
.question-card{min-height:560px}.question-meta{display:flex;justify-content:space-between;color:var(--muted);font-weight:700;margin-bottom:10px}.question-prompt{font-size:23px;font-weight:800;line-height:1.35;margin:12px 0 18px}.visual{border:1px solid #e4e7ec;background:#fbfcfe;border-radius:14px;padding:18px;margin:10px 0 20px;overflow:auto}.choices{display:grid;gap:11px}.choice{display:flex;gap:13px;align-items:flex-start;border:2px solid var(--line);border-radius:13px;padding:14px 16px;cursor:pointer;background:white;transition:.12s}.choice:hover{border-color:#98a2b3}.choice.selected{border-color:var(--brand);background:#f1f5fd}.choice-letter{flex:0 0 34px;height:34px;border:1px solid #98a2b3;border-radius:50%;display:grid;place-items:center;font-weight:900;background:white}.choice-content{flex:1;min-width:0}.nav-row{display:flex;justify-content:space-between;gap:12px;margin-top:24px}.nav-left,.nav-right{display:flex;gap:10px}.flag-btn.flagged{color:var(--warn);background:#fff7ed;border-color:#fed7aa}
.passage-layout{display:grid;grid-template-columns:minmax(300px,46%) minmax(0,1fr);gap:20px}.passage-card{max-height:calc(100vh - 130px);overflow:auto;position:sticky;top:74px;align-self:start}.passage-card h2{margin-top:0}.passage-text{white-space:pre-line;font-size:17px;line-height:1.68}.audio-panel{text-align:center;padding:26px}.audio-icon{font-size:54px}.audio-controls{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:18px 0}.play-count{color:var(--muted);font-weight:700}.note{background:#fffaeb;border:1px solid #fedf89;color:#7a2e0e;border-radius:12px;padding:13px 15px}.success-note{background:#ecfdf3;border:1px solid #abefc6;color:#05603a;border-radius:12px;padding:13px 15px}
.review-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0}.score-box{border:1px solid var(--line);border-radius:14px;padding:18px;text-align:center}.score-box b{display:block;font-size:30px}.review-item{border:1px solid var(--line);border-radius:14px;padding:18px;margin:12px 0}.review-item.correct{border-left:6px solid #12b76a}.review-item.incorrect{border-left:6px solid #f04438}.review-item h3{margin:0 0 8px;font-size:19px}.answer-line{font-weight:700}.answer-line.good{color:var(--ok)}.answer-line.bad{color:var(--bad)}.transcript{white-space:pre-line;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:18px}
.footer-note{color:var(--muted);font-size:14px;margin-top:16px}.section-intro{max-width:760px;margin:30px auto}.section-intro h1{font-size:32px}.section-list{display:grid;gap:10px;margin:18px 0}.section-list div{display:flex;justify-content:space-between;border-bottom:1px solid #eaecf0;padding:8px 0}
.mini-table{display:grid;grid-template-columns:90px repeat(5,minmax(80px,1fr));border:1px solid var(--line);border-radius:10px;overflow:hidden;min-width:600px}.mini-table.four{grid-template-columns:repeat(4,1fr);min-width:440px}.mini-table>div{padding:10px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);text-align:center}.mini-table .head{font-weight:800;background:#eef2f8}.number-grid{display:grid;grid-template-columns:repeat(3,70px);gap:8px;justify-content:center}.number-grid span{display:grid;place-items:center;height:54px;border:1px solid var(--line);border-radius:8px;background:white;font-weight:800}.number-grid .mystery{color:var(--bad);background:#fff0ee;border:2px dashed #f97066}.icon-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}.kids span{font-size:24px;color:#5073b8}.visual-caption{text-align:center;color:var(--muted)}
.bar-chart{height:240px;display:flex;align-items:flex-end;justify-content:center;gap:28px;border-left:2px solid #667085;border-bottom:2px solid #667085;padding:16px 20px 0;margin:0 auto;max-width:560px}.bar-col{height:100%;width:72px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center}.bar{width:54px;background:#b8c9e8;border:2px solid #385a9b;border-bottom:0;display:flex;align-items:flex-start;justify-content:center;min-height:15px}.bar b{transform:translateY(-28px)}.bar-col span{height:34px;padding-top:7px;font-size:14px}.shape-pair,.svg-wrap{max-width:520px;margin:auto}.shape-pair svg,.svg-wrap svg{width:100%;height:auto}.coin-row{display:flex;gap:6px;flex-wrap:wrap}.coin{display:inline-grid;place-items:center;border-radius:50%;width:36px;height:36px;font-size:12px;font-weight:900}.ten-coin{background:#6b7280;color:white}.one-coin{background:#fff;border:2px solid #98a2b3}.cherry-row{display:flex;gap:3px;flex-wrap:wrap;align-items:center}.single-cherry{width:19px;height:19px;border-radius:50%;background:#d94841;border:2px solid #9b2c26;display:inline-block;position:relative;margin:4px}.single-cherry:before{content:'';position:absolute;width:9px;height:10px;border-left:2px solid #2f855a;left:9px;top:-9px;transform:rotate(24deg)}.cherry-row small{width:100%;color:var(--muted)}.tool-choice{display:flex;align-items:center;gap:10px}.tool-choice span{font-size:30px}.base-ten{display:flex;gap:24px;align-items:flex-end;justify-content:center;flex-wrap:wrap}.hundreds,.tens,.ones{display:flex;gap:7px;align-items:flex-end}.hundred{width:62px;height:62px;border:2px solid #385a9b;background:repeating-linear-gradient(0deg,#d8e2f4 0 5px,#b8c9e8 6px 7px),repeating-linear-gradient(90deg,transparent 0 5px,#b8c9e8 6px 7px)}.ten{width:14px;height:70px;border:2px solid #385a9b;background:repeating-linear-gradient(0deg,#d8e2f4 0 5px,#b8c9e8 6px 7px)}.one{width:18px;height:18px;border:2px solid #385a9b;background:#d8e2f4}.shape-choice svg{width:90px;height:60px}.shape-choice.wide svg{width:180px;height:75px}.array-pair{display:flex;gap:50px;justify-content:center;align-items:flex-start;flex-wrap:wrap}.array{display:grid;gap:5px;margin-bottom:8px}.array.square3{grid-template-columns:repeat(3,22px)}.array.rect4{grid-template-columns:repeat(4,22px)}.array span{width:22px;height:22px;border-radius:50%;background:#5977b6}.gem-row{display:flex;gap:7px}.gem{font-size:30px}.gem.blue{color:#3d63ad}.gem.pink{color:#db61a2}.marble-bag{max-width:420px;margin:auto;border:4px solid #8b6c4c;border-radius:16px 16px 45px 45px;padding:15px;background:#fffaf2}.bag-label{text-align:center;font-weight:800;margin-bottom:12px}.marbles{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}.marbles span{width:28px;height:28px;border-radius:50%;border:2px solid #344054}.marbles .green{background:#32a86d}.marbles .red{background:#d94841}.ruler{min-width:700px;padding:30px 30px 10px}.pencil-line{height:20px;margin-left:20%;width:60%;position:relative;border-top:8px solid #f1b33b}.pencil-line:after{content:'';position:absolute;right:-18px;top:-13px;border-left:18px solid #d1a070;border-top:9px solid transparent;border-bottom:9px solid transparent}.ticks{display:grid;grid-template-columns:repeat(11,1fr);border-top:3px solid #344054}.tick{text-align:center}.tick i{display:block;height:18px;border-left:2px solid #344054;margin:auto;width:1px}.tick b{font-size:13px}
@media(max-width:900px){.mode-grid{grid-template-columns:1fr}.test-layout{grid-template-columns:1fr}.sidebar{position:static}.passage-layout{grid-template-columns:1fr}.passage-card{position:static;max-height:none}.q-palette{grid-template-columns:repeat(8,1fr)}.hero h1{font-size:30px}}
@media(max-width:600px){body{font-size:16px}.container{padding:16px 10px 50px}.card{padding:18px;border-radius:14px}.topbar-inner{padding:10px}.brand{display:none}.section-title{text-align:left;font-size:15px}.question-prompt{font-size:20px}.q-palette{grid-template-columns:repeat(6,1fr)}.nav-row{flex-direction:column}.nav-left,.nav-right{justify-content:space-between}.review-grid{grid-template-columns:1fr}.choice{padding:12px}.mode-card{padding:16px}}
@media print{.topbar,.sidebar,.nav-row,.audio-controls,.result-actions{display:none!important}.container{max-width:none;padding:0}.card{box-shadow:none;border:0}.review-item{break-inside:avoid}.app{background:white}}

/* ReadySetPrep multi-level additions — original test navigation preserved */
.site-brand-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.site-mark{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;
  background:linear-gradient(145deg,var(--brand),var(--teal));color:#fff;font-weight:900;
  font-size:22px;box-shadow:0 8px 20px rgba(48,86,163,.22)}
.site-name{font-size:24px;font-weight:900;color:var(--brand);line-height:1}
.site-tagline{font-size:13px;color:var(--muted);margin-top:4px}
.home-hero{position:relative;overflow:hidden}
.home-hero:before{content:"";position:absolute;right:-70px;top:-85px;width:230px;height:230px;
  border-radius:50%;background:linear-gradient(145deg,rgba(48,86,163,.08),rgba(15,138,131,.10));pointer-events:none}
.level-heading{font-size:14px;font-weight:900;color:#344054;margin:22px 0 10px;text-transform:uppercase;letter-spacing:.05em}
.level-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:0 0 25px}
.level-card{border:2px solid var(--line);border-radius:14px;background:#fff;padding:13px 8px;text-align:center;
  cursor:pointer;transition:.14s;min-height:88px;color:var(--ink)}
.level-card:hover{transform:translateY(-1px);border-color:var(--level-accent);background:var(--level-soft)}
.level-card.active{border-color:var(--level-accent);background:var(--level-soft);box-shadow:0 0 0 3px color-mix(in srgb,var(--level-accent) 14%,transparent)}
.level-card strong{display:block;font-size:14px}
.level-card small{display:block;font-size:11px;color:var(--muted);margin-top:3px;line-height:1.25}
.level-dot{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;margin:0 auto 7px;
  background:var(--level-accent);color:#fff;font-size:12px;font-weight:900}
.mode-card{position:relative;overflow:hidden}
.mode-card:before{content:"";position:absolute;left:0;right:0;top:0;height:5px;background:var(--card-accent,var(--brand))}
.mode-card.timed-card{--card-accent:var(--brand);background:linear-gradient(180deg,#fff 0%,#f7f9ff 100%)}
.mode-card.untimed-card{--card-accent:var(--green);background:linear-gradient(180deg,#fff 0%,var(--green-soft) 160%)}
.mode-card.section-card{--card-accent:var(--purple);background:linear-gradient(180deg,#fff 0%,var(--purple-soft) 160%)}
.mode-card.timed-card.selected{border-color:var(--brand);background:#eef3ff}
.mode-card.untimed-card.selected{border-color:var(--green);background:var(--green-soft)}
.mode-card.section-card.selected{border-color:var(--purple);background:var(--purple-soft)}
.level-overview{background:linear-gradient(135deg,#f8fbff,#f6fcfb);border:1px solid #dfe8f1;
  border-radius:16px;padding:22px;margin-top:8px}
.level-overview h2{margin:0 0 6px;font-size:28px}
.level-overview p{margin:0;color:var(--muted)}
.blueprint-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
.blueprint-item{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px}
.blueprint-item b{display:block;margin-bottom:4px}
.blueprint-item span{font-size:13px;color:var(--muted)}
.coming-soon{background:var(--gold-soft);border:1px solid #f1d58a;color:#684611;border-radius:12px;padding:14px 16px}
.home-footer{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-top:18px;flex-wrap:wrap}
.home-footer a{font-size:14px;color:var(--brand)}
.topbar-home{border:1px solid var(--line);background:#fff;color:var(--brand);border-radius:999px;
  padding:6px 12px;font-weight:800;cursor:pointer;white-space:nowrap}
.topbar-home:hover{background:var(--brand2)}
.home-floating{position:fixed;right:18px;bottom:18px;z-index:30;border:0;border-radius:999px;
  padding:11px 16px;background:var(--brand);color:#fff;font-weight:900;box-shadow:0 8px 22px rgba(48,86,163,.28);cursor:pointer}
.home-floating:hover{background:#244789}
@media(max-width:900px){
  .level-picker{grid-template-columns:repeat(3,1fr)}
  .blueprint-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  .level-picker{grid-template-columns:repeat(2,1fr)}
  .blueprint-grid{grid-template-columns:1fr}
  .site-name{font-size:21px}
  .topbar-home{padding:6px 9px;font-size:13px}
  .home-floating{right:12px;bottom:12px}
}


/* Multiple Primary 2 practice tests */
.test-heading{
  font-size:14px;font-weight:900;color:#344054;margin:4px 0 10px;
  text-transform:uppercase;letter-spacing:.05em
}
.test-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 24px}
.test-option{
  position:relative;text-align:left;border:2px solid var(--line);border-radius:15px;
  background:#fff;padding:16px 17px;cursor:pointer;color:var(--ink);transition:.14s
}
.test-option:hover{border-color:#79a997;transform:translateY(-1px);background:#f8fcfa}
.test-option.active{border-color:var(--green);background:var(--green-soft);box-shadow:0 0 0 3px rgba(47,143,98,.10)}
.test-option strong{display:block;font-size:18px;margin-bottom:4px}
.test-option small{display:block;color:var(--muted);font-size:13px}
.test-option .test-check{
  position:absolute;right:13px;top:12px;width:24px;height:24px;border-radius:50%;
  display:grid;place-items:center;background:var(--green);color:#fff;font-size:13px;font-weight:900
}
@media(max-width:900px){.test-picker{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.test-picker{grid-template-columns:1fr}}


/* Answer-choice elimination */
.choice-row{display:grid;grid-template-columns:42px minmax(0,1fr);gap:9px;align-items:stretch}
.choice-row + .choice-row{margin-top:11px}
.choice-row .choice{margin:0}
.eliminate-btn{
  appearance:none;width:42px;min-height:62px;border:1px solid var(--line);
  border-radius:11px;background:#fff;color:#667085;font-size:23px;line-height:1;
  font-weight:900;cursor:pointer;display:grid;place-items:center;transition:.12s
}
.eliminate-btn:hover{border-color:#98a2b3;background:#f8fafc;color:#344054}
.choice-row.eliminated .choice{opacity:.55;background:#f8fafc;border-color:#d0d5dd}
.choice-row.eliminated .choice-content{
  text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:#667085
}
.choice-row.eliminated .choice-letter{color:#98a2b3;background:#f2f4f7}
.choice-row.eliminated .eliminate-btn{background:#fff0ee;color:var(--bad);border-color:#fda29b}
.elimination-note{margin:0 0 13px;color:var(--muted);font-size:13px}
@media(max-width:600px){
  .choice-row{grid-template-columns:38px minmax(0,1fr);gap:7px}
  .eliminate-btn{width:38px;min-height:58px}
}


/* Enhanced practice modes and difficulty progression */
.practice-mode-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
.mode-card.timed-section-card{--card-accent:var(--gold);background:linear-gradient(180deg,#fff 0%,var(--gold-soft) 160%)}
.mode-card.timed-section-card.selected{border-color:var(--gold);background:var(--gold-soft)}
.difficulty-pill{
  display:inline-flex;margin:2px 0 7px;padding:3px 8px;border-radius:999px;
  background:#edf7f1;color:#216b58;font-size:11px;font-weight:900
}
.difficulty-note{margin:-2px 0 4px;color:#557267;font-size:14px}
.question-only-layout{max-width:900px;margin:0 auto}
.minute-alert{
  position:fixed;z-index:1000;left:50%;top:78px;transform:translateX(-50%);
  background:#fff7df;color:#684611;border:1px solid #e8c96a;border-radius:999px;
  padding:11px 18px;box-shadow:0 8px 26px rgba(16,24,40,.18);font-size:14px
}
.compact-audio-controls{flex-wrap:wrap}
.score-box small{line-height:1.35}
@media(max-width:1100px){.practice-mode-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:650px){.practice-mode-grid{grid-template-columns:1fr}.minute-alert{top:70px;width:calc(100% - 28px);text-align:center}}


/* Compact test selector tabs */
.test-heading{margin:2px 0 8px;font-size:12px}
.test-picker{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin:0 0 18px
}
.test-option{
  min-width:78px;
  width:auto;
  min-height:38px;
  padding:8px 13px;
  border-width:1px;
  border-radius:10px;
  text-align:center;
  display:inline-flex;
  align-items:center;
  justify-content:center
}
.test-option:hover{transform:none}
.test-option.active{
  border-width:2px;
  box-shadow:0 0 0 2px rgba(47,143,98,.09)
}
.test-option strong{
  display:block;
  margin:0;
  font-size:14px;
  line-height:1.1;
  white-space:nowrap
}
.test-option .test-check{
  right:5px;
  top:4px;
  width:16px;
  height:16px;
  font-size:9px
}
.test-option small,
.difficulty-pill,
.difficulty-note{display:none!important}
@media(max-width:600px){
  .test-picker{gap:6px}
  .test-option{min-width:70px;padding:7px 10px}
  .test-option strong{font-size:13px}
}


/* Practice exercises */
.practice-launch-bar{
  display:flex;justify-content:space-between;align-items:center;gap:14px;
  margin:4px 0 18px;padding:13px 15px;border:1px solid #b7dfcf;
  border-radius:13px;background:linear-gradient(135deg,#f2fbf6,#f8fcfa)
}
.practice-launch-bar b{display:block;font-size:17px}
.practice-launch-bar span{display:block;color:var(--muted);font-size:13px;margin-top:2px}
.practice-hub{max-width:1040px;margin:18px auto}
.practice-header{display:flex;align-items:flex-start;gap:18px}
.practice-header h1{margin:4px 0 4px}.practice-header p{margin:0;color:var(--muted)}
.practice-level-tabs{display:flex;flex-wrap:wrap;gap:7px;margin:22px 0}
.practice-level-tab{
  border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 12px;
  font-weight:800;font-size:13px;cursor:pointer
}
.practice-level-tab:hover,.practice-level-tab.active{border-color:var(--level-accent);background:var(--level-soft);color:var(--level-accent)}
.practice-hub-title{display:flex;align-items:flex-end;justify-content:space-between;gap:15px;margin-bottom:14px}
.practice-hub-title h2{margin:0}.practice-hub-title p{margin:2px 0 0;color:var(--muted)}
.concept-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.concept-card{
  border:1px solid var(--line);border-top:4px solid var(--concept-accent);
  border-radius:14px;background:#fff;padding:16px;text-align:left;cursor:pointer;
  color:var(--ink);transition:.13s
}
.concept-card:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(16,24,40,.09)}
.concept-card h3{font-size:18px;margin:5px 0}.concept-card p{font-size:14px;color:var(--muted);margin:0 0 14px}
.concept-category{
  display:inline-flex;padding:3px 8px;border-radius:999px;background:#eef4ff;
  color:#3538cd;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.03em
}
.concept-meta{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.mastery{font-weight:800}.mastery.mastered{color:#067647}.mastery.strong{color:#175cd3}
.mastery.developing{color:#b54708}.mastery.practice-more{color:#b42318}
.practice-footer-actions{margin-top:18px;text-align:right}
.practice-question-card{max-width:820px;margin:22px auto}
.practice-question-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:15px}
.practice-question-top>div{display:flex;gap:12px;align-items:center}.practice-question-top span{color:var(--muted)}
.mixed-label{margin-top:18px}
.practice-passage{
  margin:18px 0 12px;padding:18px;border-left:5px solid #8bb8a6;
  border-radius:10px;background:#f7faf9;line-height:1.7
}
.practice-prompt{font-size:23px;font-weight:850;line-height:1.35;margin:20px 0}
.practice-answers{display:grid;gap:10px}
.practice-answer{
  display:flex;align-items:flex-start;gap:12px;border:2px solid var(--line);
  border-radius:12px;background:#fff;padding:13px 15px;text-align:left;cursor:pointer;color:var(--ink)
}
.practice-answer:hover:not(:disabled){border-color:#98a2b3}
.practice-answer span{
  flex:0 0 31px;height:31px;border:1px solid #98a2b3;border-radius:50%;
  display:grid;place-items:center;background:#fff
}
.practice-answer b{font-weight:650;line-height:1.45}
.practice-answer.correct{border-color:#12b76a;background:#ecfdf3}
.practice-answer.incorrect{border-color:#f04438;background:#fef3f2}
.practice-feedback{margin-top:16px;border-radius:12px;padding:14px 16px}
.practice-feedback h3{margin:0 0 3px}.practice-feedback p{margin:0}
.practice-feedback.correct{background:#ecfdf3;color:#05603a}
.practice-feedback.incorrect{background:#fff5f3;color:#912018}
.practice-question-actions{display:flex;justify-content:flex-end;align-items:center;margin-top:18px;color:var(--muted)}
.practice-results{max-width:720px;margin:28px auto;text-align:center}
.practice-result-score{margin:20px auto 12px}.practice-result-score b{display:block;font-size:54px;line-height:1}
.practice-result-score span{font-size:18px;color:var(--muted)}
.mastery-banner{display:inline-flex;padding:7px 14px;border-radius:999px;font-weight:900;margin:8px 0}
.mastery-banner.mastered{background:#ecfdf3;color:#067647}.mastery-banner.strong{background:#eff8ff;color:#175cd3}
.mastery-banner.developing{background:#fff7ed;color:#b54708}.mastery-banner.practice-more{background:#fef3f2;color:#b42318}
.practice-result-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:20px 0}
.missed-review{text-align:left;margin-top:24px}.missed-review article{border-top:1px solid var(--line);padding:12px 0}
.missed-review article h3{font-size:16px;margin:0 0 4px}.missed-review article p{margin:0;color:var(--muted)}
@media(max-width:720px){
 .concept-grid{grid-template-columns:1fr}
 .practice-header{flex-direction:column}
 .practice-hub-title{align-items:flex-start;flex-direction:column}
 .practice-launch-bar{align-items:flex-start;flex-direction:column}
 .practice-question-top{align-items:flex-start;flex-direction:column}
 .practice-prompt{font-size:20px}
}


.linked-test-picker a{text-decoration:none;color:var(--ink);box-sizing:border-box}.available-tests-note{border-color:#86d3c6;background:#eefaf8;margin-top:12px}

const TESTS = {"primary2-test1":{"title":"ISEE Primary 2 Practice Test #1","auditory":{"title":"The Family Night Model","passage":"On Wednesday afternoon, Ms. Lewis pointed to the model bridge on the science table. “Family Science Night is tomorrow,” she said. “This bridge needs to be carried to the library and explained to our visitors. I need a volunteer who will handle it carefully.”\n\nNoah raised his hand. He had helped build the bridge from craft sticks, and he knew why the class had used triangle shapes. Ms. Lewis was pleased that he wanted to help, but she reminded him that the model was fragile. One quick grab by the roof could break it. Noah would also need to arrive before the event began.\n\nThat evening, Noah made a checklist. First, he asked his aunt to drive him to school early. Next, he found a sturdy box and lined it with folded towels so the bridge would not slide. He wrote three note cards about the bridge and practiced explaining them to his little brother. Before bed, he checked the list one more time.\n\nThe next morning, Noah showed Ms. Lewis the box and his note cards. He demonstrated how he would lift the model by holding its strong base. Ms. Lewis nodded. “You have planned for the trip and the presentation,” she said. “I believe you are ready.”\n\nAt Family Science Night, the bridge arrived safely. Noah answered questions and showed visitors how triangles helped make the bridge strong. At the end of the evening, Ms. Lewis thanked him. Noah’s face glowed with pride. He had learned that being eager was a good start, but careful preparation made him dependable.","questions":[{"num":1,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"Noah prepares carefully so he can carry and explain the class bridge."},{"label":"B","text":"Noah builds a new bridge by himself for Family Science Night."},{"label":"C","text":"Ms. Lewis asks families to repair a broken science model."},{"label":"D","text":"Noah decides that he does not want to speak to visitors."}],"answer":"A","explanation":"The passage centers on Noah making and following a careful plan to transport and present the bridge.","visual":null},{"num":2,"prompt":"Which is true about Noah?","choices":[{"label":"A","text":"He would rather work alone than help his class."},{"label":"B","text":"He often loses the materials he needs."},{"label":"C","text":"He is afraid to explain how the bridge works."},{"label":"D","text":"He is eager to help and willing to prepare carefully."}],"answer":"D","explanation":"Noah volunteers, makes a checklist, prepares a box, and practices his explanation.","visual":null},{"num":3,"prompt":"Why did Ms. Lewis not choose Noah immediately?","choices":[{"label":"A","text":"Noah had never seen the bridge before."},{"label":"B","text":"The library was closed for the evening."},{"label":"C","text":"The model was fragile and needed to be handled responsibly."},{"label":"D","text":"Another student had already promised to take it."}],"answer":"C","explanation":"Ms. Lewis explains that the bridge could break if it was carried the wrong way.","visual":null},{"num":4,"prompt":"Why did Noah make a checklist?","choices":[{"label":"A","text":"To count how many visitors came to the event."},{"label":"B","text":"To make sure he remembered every part of his plan."},{"label":"C","text":"To show his brother how to build a bridge."},{"label":"D","text":"To decide which craft sticks should be painted."}],"answer":"B","explanation":"The checklist helped Noah organize transportation, packing, and practice.","visual":null},{"num":5,"prompt":"Noah’s face “glowed with pride.” What does that mean?","choices":[{"label":"A","text":"He looked very happy and pleased with what he had done."},{"label":"B","text":"A bright light was shining on his face."},{"label":"C","text":"He was embarrassed to speak in front of people."},{"label":"D","text":"He was tired and ready to go home."}],"answer":"A","explanation":"The phrase means Noah looked very happy and proud.","visual":null},{"num":6,"prompt":"Based on the passage, which is true about Ms. Lewis?","choices":[{"label":"A","text":"She wanted to carry the bridge without any help."},{"label":"B","text":"She believed the bridge should stay in the classroom."},{"label":"C","text":"She cared more about arriving early than protecting the model."},{"label":"D","text":"She trusted Noah after he showed that he had prepared responsibly."}],"answer":"D","explanation":"Ms. Lewis approves Noah after seeing his box, note cards, and safe way of lifting the model.","visual":null}],"minutes":7},"reading":{"passages":[{"title":"Snowshoe Hares Through the Seasons","text":"Snowshoe hares live in forests where winters can be long and snowy. Their large back feet spread out when they step. The wide feet help the hares move across soft snow without sinking deeply. Because the feet work a little like snowshoes, the animals are called snowshoe hares.\n\nA snowshoe hare’s coat changes with the seasons. In winter, most of its fur is white. The white color helps the hare blend in with snow. In warmer months, the fur becomes brown, which matches soil, tree bark, and dry leaves. Blending into the surroundings is a kind of camouflage. Camouflage makes an animal harder for predators to notice.\n\nSnowshoe hares also have long ears that can pick up quiet sounds. If a hare hears danger, its powerful back legs help it leap away quickly. Hares often rest beneath bushes during the day and search for grass, leaves, and twigs in the evening.\n\nScientists study when the hares’ coats begin to change color. If snow melts earlier than usual, a white hare may stand out against brown ground. By watching the hares, scientists can learn how changes in the seasons may affect animals that depend on camouflage.","questions":[{"num":1,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Snowshoe hares eat only during winter."},{"label":"B","text":"Snowshoe hares are faster than every forest animal."},{"label":"C","text":"Scientists teach snowshoe hares how to change color."},{"label":"D","text":"Snowshoe hares have features that help them move, hide, and escape in their habitat."}],"answer":"D","explanation":"The passage describes the hares’ wide feet, changing fur, hearing, and strong legs.","visual":null},{"num":2,"prompt":"Why are these animals called snowshoe hares?","choices":[{"label":"A","text":"They build snowshoes from sticks."},{"label":"B","text":"Their wide back feet help them walk on snow like snowshoes."},{"label":"C","text":"They sleep inside snowshoe-shaped holes."},{"label":"D","text":"Their ears leave snowshoe-shaped tracks."}],"answer":"B","explanation":"Their large back feet spread out and help them move over snow.","visual":null},{"num":3,"prompt":"What do a snowshoe hare’s long ears help it do?","choices":[{"label":"A","text":"Hear quiet sounds that may warn of danger."},{"label":"B","text":"Change the color of its coat."},{"label":"C","text":"Dig beneath deep snow."},{"label":"D","text":"Carry food back to its resting place."}],"answer":"A","explanation":"The passage says the long ears can pick up quiet sounds.","visual":null},{"num":4,"prompt":"How does the hare’s changing fur help it?","choices":[{"label":"A","text":"It keeps the hare from needing food."},{"label":"B","text":"It makes the hare’s feet wider."},{"label":"C","text":"It helps the hare match the colors around it."},{"label":"D","text":"It helps the hare grow longer ears."}],"answer":"C","explanation":"White fur matches snow, while brown fur matches soil, bark, and leaves.","visual":null},{"num":5,"prompt":"In the passage, what does “camouflage” most nearly mean?","choices":[{"label":"A","text":"A way of making loud warning sounds."},{"label":"B","text":"Colors or patterns that help something blend in."},{"label":"C","text":"A place where an animal stores food."},{"label":"D","text":"A path through a snowy forest."}],"answer":"B","explanation":"The passage explains that camouflage helps the hare blend into its surroundings.","visual":null},{"num":6,"prompt":"What is the purpose of the last paragraph?","choices":[{"label":"A","text":"To explain how people can keep hares as pets."},{"label":"B","text":"To prove that every winter has the same amount of snow."},{"label":"C","text":"To describe the foods that hares eat in summer."},{"label":"D","text":"To explain why scientists study the timing of the hares’ color changes."}],"answer":"D","explanation":"The last paragraph explains how changing snow seasons may affect the hares’ camouflage.","visual":null}]},{"title":"The Little Raft","text":"Jalen wanted to build a small raft for his toy frog. He placed six craft sticks side by side and taped them together. He worked quickly because he wanted to test the raft before dinner. When he set it in a tub of water, the sticks separated and the toy frog slipped into the water.\n\nJalen felt disappointed, but his sister asked, “What did the water show you?” Jalen looked closely and saw that the tape had become loose. For his second raft, he tied the sticks together with string. The raft stayed in one piece, but it leaned to one side and the frog fell off again.\n\nJalen noticed that he had tied two extra sticks on only one side. He moved the sticks so the weight was even. The raft floated straight, but its thin string began to stretch. For his final try, Jalen used a sturdier cord that would not loosen easily.\n\nThis time, the raft carried the toy frog from one end of the tub to the other. Jalen did not finish as quickly as he had hoped. Still, he smiled because every failed test had acted like a sign, showing him what to change next.","questions":[{"num":7,"prompt":"What is this passage mostly about?","choices":[{"label":"A","text":"Jalen improves a toy raft by learning from each problem."},{"label":"B","text":"Jalen’s sister builds a raft that wins a contest."},{"label":"C","text":"A toy frog teaches Jalen how to swim."},{"label":"D","text":"Jalen decides that craft sticks cannot float."}],"answer":"A","explanation":"Jalen tests the raft several times and uses each problem to improve the design.","visual":null},{"num":8,"prompt":"Which happened first?","choices":[{"label":"A","text":"Jalen used a sturdier cord."},{"label":"B","text":"The tape loosened and the first raft came apart."},{"label":"C","text":"Jalen moved the extra sticks to balance the raft."},{"label":"D","text":"The raft carried the frog across the tub."}],"answer":"B","explanation":"The first problem was that the taped sticks separated.","visual":null},{"num":9,"prompt":"Why did the second raft lean to one side?","choices":[{"label":"A","text":"The toy frog was too small."},{"label":"B","text":"The water in the tub was too cold."},{"label":"C","text":"Two extra sticks made one side heavier."},{"label":"D","text":"The cord was tied around the frog."}],"answer":"C","explanation":"The passage says Jalen had placed two extra sticks on only one side.","visual":null},{"num":10,"prompt":"In the passage, what does “sturdier” mean?","choices":[{"label":"A","text":"Stronger and less likely to loosen."},{"label":"B","text":"Brighter and easier to see."},{"label":"C","text":"Shorter and easier to cut."},{"label":"D","text":"Softer and more likely to stretch."}],"answer":"A","explanation":"A sturdier cord is stronger and holds the raft together better.","visual":null},{"num":11,"prompt":"Why does the author say each failed test acted “like a sign”?","choices":[{"label":"A","text":"The tests showed Jalen where to place a warning sign."},{"label":"B","text":"The tests told Jalen when dinner was ready."},{"label":"C","text":"Each test showed Jalen what he should change next."},{"label":"D","text":"Each test gave the toy frog a new name."}],"answer":"C","explanation":"Each problem pointed Jalen toward the next improvement.","visual":null},{"num":12,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To show that testing and correcting mistakes can improve a design."},{"label":"B","text":"To explain why every raft should be made with string."},{"label":"C","text":"To warn children never to put toys in water."},{"label":"D","text":"To prove that finishing quickly is most important."}],"answer":"A","explanation":"The story shows that patient testing and learning from problems lead to improvement.","visual":null}]},{"title":"Practice Biography: Rina Das","text":"Rina Das loved collecting sounds when she was young. She used a small recorder to capture birds calling, rain tapping on windows, and bicycle bells ringing. After each recording, she wrote the date and place in a notebook. Soon, she had a sound collection instead of a collection of toys.\n\nRina grew up near a wet forest filled with frogs and insects. When her family moved to a busy city, she missed the nighttime forest sounds. She began visiting parks and recording whatever she heard there. She arranged the recordings on a hand-drawn map, so listeners could follow a sound journey through the city.\n\nYears later, Rina studied music and worked at a radio station. A director from a nature center heard one of her school projects. He liked the way Rina mixed clear explanations with real outdoor sounds. He asked her to create a listening trail for children visiting the nature center.\n\nRina recorded wind, running water, bird wings, and animal footsteps. She matched each sound with a sign along the trail. After that project, she began creating audio stories for children. During her career, she produced more than thirty stories. Her distinctive style—combining narration with real sounds from nature—helped listeners imagine that they were standing inside each story.","questions":[{"num":13,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Rina wanted every child to work at a radio station."},{"label":"B","text":"Rina collected toys from forests and city parks."},{"label":"C","text":"Rina became known for creating sound journeys and audio stories from real nature recordings."},{"label":"D","text":"A nature center taught Rina how to draw maps."}],"answer":"C","explanation":"The passage explains how Rina’s interest in recording sounds grew into a career creating listening experiences.","visual":null},{"num":14,"prompt":"After Rina made a recording when she was young, what did she do next?","choices":[{"label":"A","text":"She erased the sound from the recorder."},{"label":"B","text":"She mailed the recording to a radio station."},{"label":"C","text":"She added a picture of the sound to a toy box."},{"label":"D","text":"She wrote the date and place in a notebook."}],"answer":"D","explanation":"The first paragraph says she labeled each recording with its date and place.","visual":null},{"num":15,"prompt":"Why did the nature center director ask Rina to create a listening trail?","choices":[{"label":"A","text":"He needed someone to repair the trail signs."},{"label":"B","text":"He liked how she combined explanations with real outdoor sounds."},{"label":"C","text":"He wanted her to move back near the wet forest."},{"label":"D","text":"He had heard that she collected many toys."}],"answer":"B","explanation":"The director was impressed by the style of Rina’s school project.","visual":null},{"num":16,"prompt":"What is the purpose of the second paragraph?","choices":[{"label":"A","text":"To give instructions for drawing a city map."},{"label":"B","text":"To explain how to use a small recorder."},{"label":"C","text":"To give background about Rina’s childhood and how her sound-map idea began."},{"label":"D","text":"To compare city parks with radio stations."}],"answer":"C","explanation":"The paragraph explains her move, what she missed, and how she created a sound map.","visual":null},{"num":17,"prompt":"In the passage, what does “distinctive” most nearly mean?","choices":[{"label":"A","text":"Special and easy to recognize."},{"label":"B","text":"Quiet and difficult to hear."},{"label":"C","text":"Old and no longer useful."},{"label":"D","text":"Simple and made very quickly."}],"answer":"A","explanation":"Distinctive means having a special quality that makes something recognizable.","visual":null},{"num":18,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To persuade readers to buy a sound recorder."},{"label":"B","text":"To describe every animal that lives in a wet forest."},{"label":"C","text":"To explain why maps should include sounds."},{"label":"D","text":"To explain how Rina developed her unusual style and turned it into a career."}],"answer":"D","explanation":"The passage follows Rina’s interest from childhood through her work creating audio stories.","visual":null}]}],"minutes":20},"math":{"questions":[{"num":1,"prompt":"The table shows the number of shells collected on five days. Which two days combined have a total of 15 shells?","choices":[{"label":"A","text":"Monday and Tuesday"},{"label":"B","text":"Wednesday and Thursday"},{"label":"C","text":"Tuesday and Friday"},{"label":"D","text":"Monday and Thursday"}],"answer":"A","explanation":"Monday has 6 shells and Tuesday has 9. 6 + 9 = 15.","visual":"<div class=\"mini-table\"><div class=\"head\">Day</div><div>Monday</div><div>Tuesday</div><div>Wednesday</div><div>Thursday</div><div>Friday</div><div class=\"head\">Shells</div><div>6</div><div>9</div><div>12</div><div>7</div><div>8</div></div>"},{"num":2,"prompt":"Some numbers are arranged in a pattern. What number belongs in the box with the question mark?","choices":[{"label":"A","text":"21"},{"label":"B","text":"22"},{"label":"C","text":"24"},{"label":"D","text":"25"}],"answer":"C","explanation":"The numbers increase by 3: 21, 24, 27.","visual":"<div class=\"number-grid\"><span>3</span><span>6</span><span>9</span><span>12</span><span>15</span><span>18</span><span>21</span><span class=\"mystery\">?</span><span>27</span><span>30</span><span>33</span><span>36</span></div>"},{"num":3,"prompt":"A gray coin is worth 10. A white coin is worth 1. Which group of coins has a value of 34?","choices":[{"label":"A","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"B","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"C","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"D","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"}],"answer":"B","explanation":"Three tens and four ones make 34.","visual":null},{"num":4,"prompt":"Which number sentence has the same value as 9 + 6?","choices":[{"label":"A","text":"7 + 7"},{"label":"B","text":"8 + 6"},{"label":"C","text":"10 + 6"},{"label":"D","text":"8 + 7"}],"answer":"D","explanation":"9 + 6 = 15, and 8 + 7 also equals 15.","visual":null},{"num":5,"prompt":"The picture shows 15 children. One-fifth of the children go to the swings. The rest go to the slide. How many children go to the slide?","choices":[{"label":"A","text":"3"},{"label":"B","text":"10"},{"label":"C","text":"12"},{"label":"D","text":"15"}],"answer":"C","explanation":"One-fifth of 15 is 3. The remaining 15 − 3 = 12 children go to the slide.","visual":"<div class=\"icon-row kids\"><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span></div><div class=\"visual-caption\">15 children</div>"},{"num":6,"prompt":"Mila wants to measure the temperature of water. Which tool should she use?","choices":[{"label":"A","html":"<div class=\"tool-choice\"><span>📏</span><b>ruler</b></div>"},{"label":"B","html":"<div class=\"tool-choice\"><span>🌡️</span><b>thermometer</b></div>"},{"label":"C","html":"<div class=\"tool-choice\"><span>⚖️</span><b>scale</b></div>"},{"label":"D","html":"<div class=\"tool-choice\"><span>🥛</span><b>measuring cup</b></div>"}],"answer":"B","explanation":"A thermometer measures temperature.","visual":null},{"num":7,"prompt":"The graph shows how many pencils four students have. Which statement is true?","choices":[{"label":"A","text":"Liam has 5 pencils."},{"label":"B","text":"Owen has fewer pencils than Priya."},{"label":"C","text":"Priya has the most pencils."},{"label":"D","text":"Nora has the fewest pencils."}],"answer":"D","explanation":"Nora has 5 pencils, fewer than the other students.","visual":"<div class=\"bar-chart\" aria-label=\"Number of pencils\"><div class=\"bar-col\"><div class=\"bar\" style=\"height:70%\"><b>7</b></div><span>Liam</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:50%\"><b>5</b></div><span>Nora</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:90%\"><b>9</b></div><span>Owen</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:60%\">
