/* ReadySetPrep multi-level additions — original test navigation preserved */
.site-brand-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.site-mark{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;
  background:linear-gradient(145deg,var(--brand),var(--teal));color:#fff;font-weight:900;
  font-size:22px;box-shadow:0 8px 20px rgba(48,86,163,.22)}
.site-name{font-size:24px;font-weight:900;color:var(--brand);line-height:1}
.site-tagline{font-size:13px;color:var(--muted);margin-top:4px}
.home-hero{position:relative;overflow:hidden}
.home-hero:before{content:"";position:absolute;right:-70px;top:-85px;width:230px;height:230px;
  border-radius:50%;background:linear-gradient(145deg,rgba(48,86,163,.08),rgba(15,138,131,.10));pointer-events:none}
.level-heading{font-size:14px;font-weight:900;color:#344054;margin:22px 0 10px;text-transform:uppercase;letter-spacing:.05em}
.level-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:0 0 25px}
.level-card{border:2px solid var(--line);border-radius:14px;background:#fff;padding:13px 8px;text-align:center;
  cursor:pointer;transition:.14s;min-height:88px;color:var(--ink)}
.level-card:hover{transform:translateY(-1px);border-color:var(--level-accent);background:var(--level-soft)}
.level-card.active{border-color:var(--level-accent);background:var(--level-soft);box-shadow:0 0 0 3px color-mix(in srgb,var(--level-accent) 14%,transparent)}
.level-card strong{display:block;font-size:14px}
.level-card small{display:block;font-size:11px;color:var(--muted);margin-top:3px;line-height:1.25}
.level-dot{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;margin:0 auto 7px;
  background:var(--level-accent);color:#fff;font-size:12px;font-weight:900}
.mode-card{position:relative;overflow:hidden}
.mode-card:before{content:"";position:absolute;left:0;right:0;top:0;height:5px;background:var(--card-accent,var(--brand))}
.mode-card.timed-card{--card-accent:var(--brand);background:linear-gradient(180deg,#fff 0%,#f7f9ff 100%)}
.mode-card.untimed-card{--card-accent:var(--green);background:linear-gradient(180deg,#fff 0%,var(--green-soft) 160%)}
.mode-card.section-card{--card-accent:var(--purple);background:linear-gradient(180deg,#fff 0%,var(--purple-soft) 160%)}
.mode-card.timed-card.selected{border-color:var(--brand);background:#eef3ff}
.mode-card.untimed-card.selected{border-color:var(--green);background:var(--green-soft)}
.mode-card.section-card.selected{border-color:var(--purple);background:var(--purple-soft)}
.level-overview{background:linear-gradient(135deg,#f8fbff,#f6fcfb);border:1px solid #dfe8f1;
  border-radius:16px;padding:22px;margin-top:8px}
.level-overview h2{margin:0 0 6px;font-size:28px}
.level-overview p{margin:0;color:var(--muted)}
.blueprint-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0}
.blueprint-item{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px}
.blueprint-item b{display:block;margin-bottom:4px}
.blueprint-item span{font-size:13px;color:var(--muted)}
.coming-soon{background:var(--gold-soft);border:1px solid #f1d58a;color:#684611;border-radius:12px;padding:14px 16px}
.home-footer{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-top:18px;flex-wrap:wrap}
.home-footer a{font-size:14px;color:var(--brand)}
.topbar-home{border:1px solid var(--line);background:#fff;color:var(--brand);border-radius:999px;
  padding:6px 12px;font-weight:800;cursor:pointer;white-space:nowrap}
.topbar-home:hover{background:var(--brand2)}
.home-floating{position:fixed;right:18px;bottom:18px;z-index:30;border:0;border-radius:999px;
  padding:11px 16px;background:var(--brand);color:#fff;font-weight:900;box-shadow:0 8px 22px rgba(48,86,163,.28);cursor:pointer}
.home-floating:hover{background:#244789}
@media(max-width:900px){
  .level-picker{grid-template-columns:repeat(3,1fr)}
  .blueprint-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  .level-picker{grid-template-columns:repeat(2,1fr)}
  .blueprint-grid{grid-template-columns:1fr}
  .site-name{font-size:21px}
  .topbar-home{padding:6px 9px;font-size:13px}
  .home-floating{right:12px;bottom:12px}
}


/* Multiple Primary 2 practice tests */
.test-heading{
  font-size:14px;font-weight:900;color:#344054;margin:4px 0 10px;
  text-transform:uppercase;letter-spacing:.05em
}
.test-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 24px}
.test-option{
  position:relative;text-align:left;border:2px solid var(--line);border-radius:15px;
  background:#fff;padding:16px 17px;cursor:pointer;color:var(--ink);transition:.14s
}
.test-option:hover{border-color:#79a997;transform:translateY(-1px);background:#f8fcfa}
.test-option.active{border-color:var(--green);background:var(--green-soft);box-shadow:0 0 0 3px rgba(47,143,98,.10)}
.test-option strong{display:block;font-size:18px;margin-bottom:4px}
.test-option small{display:block;color:var(--muted);font-size:13px}
.test-option .test-check{
  position:absolute;right:13px;top:12px;width:24px;height:24px;border-radius:50%;
  display:grid;place-items:center;background:var(--green);color:#fff;font-size:13px;font-weight:900
}
@media(max-width:900px){.test-picker{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.test-picker{grid-template-columns:1fr}}


/* Answer-choice elimination */
.choice-row{display:grid;grid-template-columns:42px minmax(0,1fr);gap:9px;align-items:stretch}
.choice-row + .choice-row{margin-top:11px}
.choice-row .choice{margin:0}
.eliminate-btn{
  appearance:none;width:42px;min-height:62px;border:1px solid var(--line);
  border-radius:11px;background:#fff;color:#667085;font-size:23px;line-height:1;
  font-weight:900;cursor:pointer;display:grid;place-items:center;transition:.12s
}
.eliminate-btn:hover{border-color:#98a2b3;background:#f8fafc;color:#344054}
.choice-row.eliminated .choice{opacity:.55;background:#f8fafc;border-color:#d0d5dd}
.choice-row.eliminated .choice-content{
  text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:#667085
}
.choice-row.eliminated .choice-letter{color:#98a2b3;background:#f2f4f7}
.choice-row.eliminated .eliminate-btn{background:#fff0ee;color:var(--bad);border-color:#fda29b}
.elimination-note{margin:0 0 13px;color:var(--muted);font-size:13px}
@media(max-width:600px){
  .choice-row{grid-template-columns:38px minmax(0,1fr);gap:7px}
  .eliminate-btn{width:38px;min-height:58px}
}

const TESTS = {"primary2-test1":{"title":"ISEE Primary 2 Practice Test #1","auditory":{"title":"The Family Night Model","passage":"On Wednesday afternoon, Ms. Lewis pointed to the model bridge on the science table. “Family Science Night is tomorrow,” she said. “This bridge needs to be carried to the library and explained to our visitors. I need a volunteer who will handle it carefully.”\n\nNoah raised his hand. He had helped build the bridge from craft sticks, and he knew why the class had used triangle shapes. Ms. Lewis was pleased that he wanted to help, but she reminded him that the model was fragile. One quick grab by the roof could break it. Noah would also need to arrive before the event began.\n\nThat evening, Noah made a checklist. First, he asked his aunt to drive him to school early. Next, he found a sturdy box and lined it with folded towels so the bridge would not slide. He wrote three note cards about the bridge and practiced explaining them to his little brother. Before bed, he checked the list one more time.\n\nThe next morning, Noah showed Ms. Lewis the box and his note cards. He demonstrated how he would lift the model by holding its strong base. Ms. Lewis nodded. “You have planned for the trip and the presentation,” she said. “I believe you are ready.”\n\nAt Family Science Night, the bridge arrived safely. Noah answered questions and showed visitors how triangles helped make the bridge strong. At the end of the evening, Ms. Lewis thanked him. Noah’s face glowed with pride. He had learned that being eager was a good start, but careful preparation made him dependable.","questions":[{"num":1,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"Noah prepares carefully so he can carry and explain the class bridge."},{"label":"B","text":"Noah builds a new bridge by himself for Family Science Night."},{"label":"C","text":"Ms. Lewis asks families to repair a broken science model."},{"label":"D","text":"Noah decides that he does not want to speak to visitors."}],"answer":"A","explanation":"The passage centers on Noah making and following a careful plan to transport and present the bridge.","visual":null},{"num":2,"prompt":"Which is true about Noah?","choices":[{"label":"A","text":"He would rather work alone than help his class."},{"label":"B","text":"He often loses the materials he needs."},{"label":"C","text":"He is afraid to explain how the bridge works."},{"label":"D","text":"He is eager to help and willing to prepare carefully."}],"answer":"D","explanation":"Noah volunteers, makes a checklist, prepares a box, and practices his explanation.","visual":null},{"num":3,"prompt":"Why did Ms. Lewis not choose Noah immediately?","choices":[{"label":"A","text":"Noah had never seen the bridge before."},{"label":"B","text":"The library was closed for the evening."},{"label":"C","text":"The model was fragile and needed to be handled responsibly."},{"label":"D","text":"Another student had already promised to take it."}],"answer":"C","explanation":"Ms. Lewis explains that the bridge could break if it was carried the wrong way.","visual":null},{"num":4,"prompt":"Why did Noah make a checklist?","choices":[{"label":"A","text":"To count how many visitors came to the event."},{"label":"B","text":"To make sure he remembered every part of his plan."},{"label":"C","text":"To show his brother how to build a bridge."},{"label":"D","text":"To decide which craft sticks should be painted."}],"answer":"B","explanation":"The checklist helped Noah organize transportation, packing, and practice.","visual":null},{"num":5,"prompt":"Noah’s face “glowed with pride.” What does that mean?","choices":[{"label":"A","text":"He looked very happy and pleased with what he had done."},{"label":"B","text":"A bright light was shining on his face."},{"label":"C","text":"He was embarrassed to speak in front of people."},{"label":"D","text":"He was tired and ready to go home."}],"answer":"A","explanation":"The phrase means Noah looked very happy and proud.","visual":null},{"num":6,"prompt":"Based on the passage, which is true about Ms. Lewis?","choices":[{"label":"A","text":"She wanted to carry the bridge without any help."},{"label":"B","text":"She believed the bridge should stay in the classroom."},{"label":"C","text":"She cared more about arriving early than protecting the model."},{"label":"D","text":"She trusted Noah after he showed that he had prepared responsibly."}],"answer":"D","explanation":"Ms. Lewis approves Noah after seeing his box, note cards, and safe way of lifting the model.","visual":null}],"minutes":7},"reading":{"passages":[{"title":"Snowshoe Hares Through the Seasons","text":"Snowshoe hares live in forests where winters can be long and snowy. Their large back feet spread out when they step. The wide feet help the hares move across soft snow without sinking deeply. Because the feet work a little like snowshoes, the animals are called snowshoe hares.\n\nA snowshoe hare’s coat changes with the seasons. In winter, most of its fur is white. The white color helps the hare blend in with snow. In warmer months, the fur becomes brown, which matches soil, tree bark, and dry leaves. Blending into the surroundings is a kind of camouflage. Camouflage makes an animal harder for predators to notice.\n\nSnowshoe hares also have long ears that can pick up quiet sounds. If a hare hears danger, its powerful back legs help it leap away quickly. Hares often rest beneath bushes during the day and search for grass, leaves, and twigs in the evening.\n\nScientists study when the hares’ coats begin to change color. If snow melts earlier than usual, a white hare may stand out against brown ground. By watching the hares, scientists can learn how changes in the seasons may affect animals that depend on camouflage.","questions":[{"num":1,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Snowshoe hares eat only during winter."},{"label":"B","text":"Snowshoe hares are faster than every forest animal."},{"label":"C","text":"Scientists teach snowshoe hares how to change color."},{"label":"D","text":"Snowshoe hares have features that help them move, hide, and escape in their habitat."}],"answer":"D","explanation":"The passage describes the hares’ wide feet, changing fur, hearing, and strong legs.","visual":null},{"num":2,"prompt":"Why are these animals called snowshoe hares?","choices":[{"label":"A","text":"They build snowshoes from sticks."},{"label":"B","text":"Their wide back feet help them walk on snow like snowshoes."},{"label":"C","text":"They sleep inside snowshoe-shaped holes."},{"label":"D","text":"Their ears leave snowshoe-shaped tracks."}],"answer":"B","explanation":"Their large back feet spread out and help them move over snow.","visual":null},{"num":3,"prompt":"What do a snowshoe hare’s long ears help it do?","choices":[{"label":"A","text":"Hear quiet sounds that may warn of danger."},{"label":"B","text":"Change the color of its coat."},{"label":"C","text":"Dig beneath deep snow."},{"label":"D","text":"Carry food back to its resting place."}],"answer":"A","explanation":"The passage says the long ears can pick up quiet sounds.","visual":null},{"num":4,"prompt":"How does the hare’s changing fur help it?","choices":[{"label":"A","text":"It keeps the hare from needing food."},{"label":"B","text":"It makes the hare’s feet wider."},{"label":"C","text":"It helps the hare match the colors around it."},{"label":"D","text":"It helps the hare grow longer ears."}],"answer":"C","explanation":"White fur matches snow, while brown fur matches soil, bark, and leaves.","visual":null},{"num":5,"prompt":"In the passage, what does “camouflage” most nearly mean?","choices":[{"label":"A","text":"A way of making loud warning sounds."},{"label":"B","text":"Colors or patterns that help something blend in."},{"label":"C","text":"A place where an animal stores food."},{"label":"D","text":"A path through a snowy forest."}],"answer":"B","explanation":"The passage explains that camouflage helps the hare blend into its surroundings.","visual":null},{"num":6,"prompt":"What is the purpose of the last paragraph?","choices":[{"label":"A","text":"To explain how people can keep hares as pets."},{"label":"B","text":"To prove that every winter has the same amount of snow."},{"label":"C","text":"To describe the foods that hares eat in summer."},{"label":"D","text":"To explain why scientists study the timing of the hares’ color changes."}],"answer":"D","explanation":"The last paragraph explains how changing snow seasons may affect the hares’ camouflage.","visual":null}]},{"title":"The Little Raft","text":"Jalen wanted to build a small raft for his toy frog. He placed six craft sticks side by side and taped them together. He worked quickly because he wanted to test the raft before dinner. When he set it in a tub of water, the sticks separated and the toy frog slipped into the water.\n\nJalen felt disappointed, but his sister asked, “What did the water show you?” Jalen looked closely and saw that the tape had become loose. For his second raft, he tied the sticks together with string. The raft stayed in one piece, but it leaned to one side and the frog fell off again.\n\nJalen noticed that he had tied two extra sticks on only one side. He moved the sticks so the weight was even. The raft floated straight, but its thin string began to stretch. For his final try, Jalen used a sturdier cord that would not loosen easily.\n\nThis time, the raft carried the toy frog from one end of the tub to the other. Jalen did not finish as quickly as he had hoped. Still, he smiled because every failed test had acted like a sign, showing him what to change next.","questions":[{"num":7,"prompt":"What is this passage mostly about?","choices":[{"label":"A","text":"Jalen improves a toy raft by learning from each problem."},{"label":"B","text":"Jalen’s sister builds a raft that wins a contest."},{"label":"C","text":"A toy frog teaches Jalen how to swim."},{"label":"D","text":"Jalen decides that craft sticks cannot float."}],"answer":"A","explanation":"Jalen tests the raft several times and uses each problem to improve the design.","visual":null},{"num":8,"prompt":"Which happened first?","choices":[{"label":"A","text":"Jalen used a sturdier cord."},{"label":"B","text":"The tape loosened and the first raft came apart."},{"label":"C","text":"Jalen moved the extra sticks to balance the raft."},{"label":"D","text":"The raft carried the frog across the tub."}],"answer":"B","explanation":"The first problem was that the taped sticks separated.","visual":null},{"num":9,"prompt":"Why did the second raft lean to one side?","choices":[{"label":"A","text":"The toy frog was too small."},{"label":"B","text":"The water in the tub was too cold."},{"label":"C","text":"Two extra sticks made one side heavier."},{"label":"D","text":"The cord was tied around the frog."}],"answer":"C","explanation":"The passage says Jalen had placed two extra sticks on only one side.","visual":null},{"num":10,"prompt":"In the passage, what does “sturdier” mean?","choices":[{"label":"A","text":"Stronger and less likely to loosen."},{"label":"B","text":"Brighter and easier to see."},{"label":"C","text":"Shorter and easier to cut."},{"label":"D","text":"Softer and more likely to stretch."}],"answer":"A","explanation":"A sturdier cord is stronger and holds the raft together better.","visual":null},{"num":11,"prompt":"Why does the author say each failed test acted “like a sign”?","choices":[{"label":"A","text":"The tests showed Jalen where to place a warning sign."},{"label":"B","text":"The tests told Jalen when dinner was ready."},{"label":"C","text":"Each test showed Jalen what he should change next."},{"label":"D","text":"Each test gave the toy frog a new name."}],"answer":"C","explanation":"Each problem pointed Jalen toward the next improvement.","visual":null},{"num":12,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To show that testing and correcting mistakes can improve a design."},{"label":"B","text":"To explain why every raft should be made with string."},{"label":"C","text":"To warn children never to put toys in water."},{"label":"D","text":"To prove that finishing quickly is most important."}],"answer":"A","explanation":"The story shows that patient testing and learning from problems lead to improvement.","visual":null}]},{"title":"Practice Biography: Rina Das","text":"Rina Das loved collecting sounds when she was young. She used a small recorder to capture birds calling, rain tapping on windows, and bicycle bells ringing. After each recording, she wrote the date and place in a notebook. Soon, she had a sound collection instead of a collection of toys.\n\nRina grew up near a wet forest filled with frogs and insects. When her family moved to a busy city, she missed the nighttime forest sounds. She began visiting parks and recording whatever she heard there. She arranged the recordings on a hand-drawn map, so listeners could follow a sound journey through the city.\n\nYears later, Rina studied music and worked at a radio station. A director from a nature center heard one of her school projects. He liked the way Rina mixed clear explanations with real outdoor sounds. He asked her to create a listening trail for children visiting the nature center.\n\nRina recorded wind, running water, bird wings, and animal footsteps. She matched each sound with a sign along the trail. After that project, she began creating audio stories for children. During her career, she produced more than thirty stories. Her distinctive style—combining narration with real sounds from nature—helped listeners imagine that they were standing inside each story.","questions":[{"num":13,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Rina wanted every child to work at a radio station."},{"label":"B","text":"Rina collected toys from forests and city parks."},{"label":"C","text":"Rina became known for creating sound journeys and audio stories from real nature recordings."},{"label":"D","text":"A nature center taught Rina how to draw maps."}],"answer":"C","explanation":"The passage explains how Rina’s interest in recording sounds grew into a career creating listening experiences.","visual":null},{"num":14,"prompt":"After Rina made a recording when she was young, what did she do next?","choices":[{"label":"A","text":"She erased the sound from the recorder."},{"label":"B","text":"She mailed the recording to a radio station."},{"label":"C","text":"She added a picture of the sound to a toy box."},{"label":"D","text":"She wrote the date and place in a notebook."}],"answer":"D","explanation":"The first paragraph says she labeled each recording with its date and place.","visual":null},{"num":15,"prompt":"Why did the nature center director ask Rina to create a listening trail?","choices":[{"label":"A","text":"He needed someone to repair the trail signs."},{"label":"B","text":"He liked how she combined explanations with real outdoor sounds."},{"label":"C","text":"He wanted her to move back near the wet forest."},{"label":"D","text":"He had heard that she collected many toys."}],"answer":"B","explanation":"The director was impressed by the style of Rina’s school project.","visual":null},{"num":16,"prompt":"What is the purpose of the second paragraph?","choices":[{"label":"A","text":"To give instructions for drawing a city map."},{"label":"B","text":"To explain how to use a small recorder."},{"label":"C","text":"To give background about Rina’s childhood and how her sound-map idea began."},{"label":"D","text":"To compare city parks with radio stations."}],"answer":"C","explanation":"The paragraph explains her move, what she missed, and how she created a sound map.","visual":null},{"num":17,"prompt":"In the passage, what does “distinctive” most nearly mean?","choices":[{"label":"A","text":"Special and easy to recognize."},{"label":"B","text":"Quiet and difficult to hear."},{"label":"C","text":"Old and no longer useful."},{"label":"D","text":"Simple and made very quickly."}],"answer":"A","explanation":"Distinctive means having a special quality that makes something recognizable.","visual":null},{"num":18,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To persuade readers to buy a sound recorder."},{"label":"B","text":"To describe every animal that lives in a wet forest."},{"label":"C","text":"To explain why maps should include sounds."},{"label":"D","text":"To explain how Rina developed her unusual style and turned it into a career."}],"answer":"D","explanation":"The passage follows Rina’s interest from childhood through her work creating audio stories.","visual":null}]}],"minutes":20},"math":{"questions":[{"num":1,"prompt":"The table shows the number of shells collected on five days. Which two days combined have a total of 15 shells?","choices":[{"label":"A","text":"Monday and Tuesday"},{"label":"B","text":"Wednesday and Thursday"},{"label":"C","text":"Tuesday and Friday"},{"label":"D","text":"Monday and Thursday"}],"answer":"A","explanation":"Monday has 6 shells and Tuesday has 9. 6 + 9 = 15.","visual":"<div class=\"mini-table\"><div class=\"head\">Day</div><div>Monday</div><div>Tuesday</div><div>Wednesday</div><div>Thursday</div><div>Friday</div><div class=\"head\">Shells</div><div>6</div><div>9</div><div>12</div><div>7</div><div>8</div></div>"},{"num":2,"prompt":"Some numbers are arranged in a pattern. What number belongs in the box with the question mark?","choices":[{"label":"A","text":"21"},{"label":"B","text":"22"},{"label":"C","text":"24"},{"label":"D","text":"25"}],"answer":"C","explanation":"The numbers increase by 3: 21, 24, 27.","visual":"<div class=\"number-grid\"><span>3</span><span>6</span><span>9</span><span>12</span><span>15</span><span>18</span><span>21</span><span class=\"mystery\">?</span><span>27</span><span>30</span><span>33</span><span>36</span></div>"},{"num":3,"prompt":"A gray coin is worth 10. A white coin is worth 1. Which group of coins has a value of 34?","choices":[{"label":"A","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"B","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"C","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"D","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"}],"answer":"B","explanation":"Three tens and four ones make 34.","visual":null},{"num":4,"prompt":"Which number sentence has the same value as 9 + 6?","choices":[{"label":"A","text":"7 + 7"},{"label":"B","text":"8 + 6"},{"label":"C","text":"10 + 6"},{"label":"D","text":"8 + 7"}],"answer":"D","explanation":"9 + 6 = 15, and 8 + 7 also equals 15.","visual":null},{"num":5,"prompt":"The picture shows 15 children. One-fifth of the children go to the swings. The rest go to the slide. How many children go to the slide?","choices":[{"label":"A","text":"3"},{"label":"B","text":"10"},{"label":"C","text":"12"},{"label":"D","text":"15"}],"answer":"C","explanation":"One-fifth of 15 is 3. The remaining 15 − 3 = 12 children go to the slide.","visual":"<div class=\"icon-row kids\"><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span></div><div class=\"visual-caption\">15 children</div>"},{"num":6,"prompt":"Mila wants to measure the temperature of water. Which tool should she use?","choices":[{"label":"A","html":"<div class=\"tool-choice\"><span>📏</span><b>ruler</b></div>"},{"label":"B","html":"<div class=\"tool-choice\"><span>🌡️</span><b>thermometer</b></div>"},{"label":"C","html":"<div class=\"tool-choice\"><span>⚖️</span><b>scale</b></div>"},{"label":"D","html":"<div class=\"tool-choice\"><span>🥛</span><b>measuring cup</b></div>"}],"answer":"B","explanation":"A thermometer measures temperature.","visual":null},{"num":7,"prompt":"The graph shows how many pencils four students have. Which statement is true?","choices":[{"label":"A","text":"Liam has 5 pencils."},{"label":"B","text":"Owen has fewer pencils than Priya."},{"label":"C","text":"Priya has the most pencils."},{"label":"D","text":"Nora has the fewest pencils."}],"answer":"D","explanation":"Nora has 5 pencils, fewer than the other students.","visual":"<div class=\"bar-chart\" aria-label=\"Number of pencils\"><div class=\"bar-col\"><div class=\"bar\" style=\"height:70%\"><b>7</b></div><span>Liam</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:50%\"><b>5</b></div><span>Nora</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:90%\"><b>9</b></div><span>Owen</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:60%\"><b>6</b></div><span>Priya</span></div></div>"},{"num":8,"prompt":"The picture shows a cube and a rectangular prism. How are these shapes alike?","choices":[{"label":"A","text":"They both have flat faces and corners."},{"label":"B","text":"They both have a circular base."},{"label":"C","text":"They are always the same size."},{"label":"D","text":"They both roll smoothly."}],"answer":"A","explanation":"A cube and a rectangular prism both have flat faces, edges, and corners.","visual":"<div class=\"shape-pair\"><svg viewBox=\"0 0 360 170\" role=\"img\" aria-label=\"A cube and rectangular prism\"><g transform=\"translate(35,30)\"><path d=\"M20 35 L75 10 L125 38 L70 65 Z\" fill=\"#dce8f7\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M20 35 V95 L70 125 V65 Z\" fill=\"#eef3fa\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M70 65 L125 38 V98 L70 125 Z\" fill=\"#c8d8ef\" stroke=\"#344054\" stroke-width=\"3\"/><text x=\"72\" y=\"150\" text-anchor=\"middle\">cube</text></g><g transform=\"translate(190,35)\"><path d=\"M15 30 L85 10 L145 35 L75 55 Z\" fill=\"#dce8f7\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M15 30 V85 L75 112 V55 Z\" fill=\"#eef3fa\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M75 55 L145 35 V90 L75 112 Z\" fill=\"#c8d8ef\" stroke=\"#344054\" stroke-width=\"3\"/><text x=\"82\" y=\"145\" text-anchor=\"middle\">rectangular prism</text></g></svg></div>"},{"num":9,"prompt":"Four friends want to share apples equally. Which group can be divided so that everyone gets the same number of whole apples?","choices":[{"label":"A","html":"<div class=\"icon-row\" style=\"font-size:25px\"><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span></div><div class=\"visual-caption\">10 apples</div>"},{"label":"B","html":"<div class=\"icon-row\" style=\"font-size:25px\"><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span></div><div class=\"visual-caption\">14 apples</div>"},{"label":"C","html":"<div class=\"icon-row\" style=\"font-size:25px\"><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span></div><div class=\"visual-caption\">16 apples</div>"},{"label":"D","html":"<div class=\"icon-row\" style=\"font-size:25px\"><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span><span>🍎</span></div><div class=\"visual-caption\">18 apples</div>"}],"answer":"C","explanation":"16 can be divided equally among 4 friends. Each friend gets 4 apples.","visual":null},{"num":10,"prompt":"How many legs do a cow, a duck, and a snake have altogether?","choices":[{"label":"A","text":"4"},{"label":"B","text":"6"},{"label":"C","text":"8"},{"label":"D","text":"10"}],"answer":"B","explanation":"A cow has 4 legs, a duck has 2, and a snake has 0. 4 + 2 = 6.","visual":null},{"num":11,"prompt":"Mina made an ABBA pattern using numbers. Which could be Mina’s pattern?","choices":[{"label":"A","text":"2, 6, 2, 6, 2, 6, 2, 6"},{"label":"B","text":"1, 2, 3, 4, 1, 2, 3, 4"},{"label":"C","text":"9, 7, 5, 9, 7, 5, 9, 7"},{"label":"D","text":"5, 8, 8, 5, 5, 8, 8, 5"}],"answer":"D","explanation":"ABBA repeats first, second, second, first: 5, 8, 8, 5.","visual":null},{"num":12,"prompt":"Four students counted how many jumps they made. How many more jumps did Chloe make than Ben?","choices":[{"label":"A","text":"6"},{"label":"B","text":"5"},{"label":"C","text":"4"},{"label":"D","text":"3"}],"answer":"A","explanation":"Chloe made 11 jumps and Ben made 5. 11 − 5 = 6.","visual":"<div class=\"bar-chart\" aria-label=\"Jumps made\"><div class=\"bar-col\"><div class=\"bar\" style=\"height:65%\"><b>8</b></div><span>Ava</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:40%\"><b>5</b></div><span>Ben</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:90%\"><b>11</b></div><span>Chloe</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:56%\"><b>7</b></div><span>Diego</span></div></div>"},{"num":13,"prompt":"Tara wants to measure how much juice can fit in a pitcher. Which tool is best to use?","choices":[{"label":"A","text":"scale"},{"label":"B","text":"thermometer"},{"label":"C","text":"measuring cup"},{"label":"D","text":"measuring tape"}],"answer":"C","explanation":"A measuring cup measures liquid capacity.","visual":null},{"num":14,"prompt":"Four bags hold different numbers of crayons. Kai wants to keep two bags that contain exactly 16 crayons altogether. Which two bags should he keep?","choices":[{"label":"A","text":"green and blue"},{"label":"B","text":"white and pink"},{"label":"C","text":"white and green"},{"label":"D","text":"green and pink"}],"answer":"B","explanation":"The white bag has 6 crayons and the pink bag has 10. 6 + 10 = 16.","visual":"<div class=\"mini-table four\"><div class=\"head\">White</div><div class=\"head\">Green</div><div class=\"head\">Pink</div><div class=\"head\">Blue</div><div>6 crayons</div><div>8 crayons</div><div>10 crayons</div><div>5 crayons</div></div>"},{"num":15,"prompt":"What number is shown by the base-ten blocks?","choices":[{"label":"A","text":"347"},{"label":"B","text":"407"},{"label":"C","text":"473"},{"label":"D","text":"437"}],"answer":"D","explanation":"There are 4 hundreds, 3 tens, and 7 ones: 437.","visual":"<div class=\"base-ten\" aria-label=\"4 hundreds, 3 tens, and 7 ones\"><div class=\"hundreds\"><span class=\"hundred\"></span><span class=\"hundred\"></span><span class=\"hundred\"></span><span class=\"hundred\"></span></div><div class=\"tens\"><span class=\"ten\"></span><span class=\"ten\"></span><span class=\"ten\"></span></div><div class=\"ones\"><span class=\"one\"></span><span class=\"one\"></span><span class=\"one\"></span><span class=\"one\"></span><span class=\"one\"></span><span class=\"one\"></span><span class=\"one\"></span></div></div>"},{"num":16,"prompt":"Three pieces are already inside the square. Which piece is missing to complete the square?","choices":[{"label":"A","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M15 10 L75 10 L75 50 Z\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"B","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><circle cx=\"45\" cy=\"30\" r=\"22\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"C","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><rect x=\"18\" y=\"15\" width=\"54\" height=\"30\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"D","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M15 50 L75 50 L15 10 Z\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"}],"answer":"A","explanation":"The missing space is the matching right triangle in the upper-right part of the square.","visual":"<div class=\"svg-wrap\"><svg viewBox=\"0 0 260 190\" role=\"img\" aria-label=\"Square puzzle with upper-right triangle missing\"><rect x=\"35\" y=\"15\" width=\"160\" height=\"160\" fill=\"white\" stroke=\"#344054\" stroke-width=\"4\"/><path d=\"M35 15 L115 95 L35 175 Z\" fill=\"#e7edf8\" stroke=\"#344054\" stroke-width=\"2\"/><path d=\"M35 175 L115 95 L195 175 Z\" fill=\"#b8c9e8\" stroke=\"#344054\" stroke-width=\"2\"/><path d=\"M35 15 L195 15 L115 95 Z\" fill=\"#cddaf2\" stroke=\"#344054\" stroke-width=\"2\"/><path d=\"M195 15 L195 175 L115 95 Z\" fill=\"white\" stroke=\"#d92d20\" stroke-width=\"3\" stroke-dasharray=\"7 5\"/><text x=\"216\" y=\"98\" font-size=\"14\" fill=\"#d92d20\">missing</text></svg></div>"},{"num":17,"prompt":"Eli has 31 stickers. He gives 8 stickers to his cousin. Then his friend gives him 6 stickers. How many stickers does Eli have now?","choices":[{"label":"A","text":"23"},{"label":"B","text":"25"},{"label":"C","text":"29"},{"label":"D","text":"37"}],"answer":"C","explanation":"31 − 8 + 6 = 23 + 6 = 29.","visual":null},{"num":18,"prompt":"The arrow is flipped across the dotted vertical line. Which option shows the correct reflection?","choices":[{"label":"A","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M12 20 H50 V8 L78 30 L50 52 V40 H12 Z\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"B","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M78 20 H40 V8 L12 30 L40 52 V40 H78 Z\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"C","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M35 52 V30 H20 L45 7 L70 30 H55 V52 Z\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"D","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M35 8 V30 H20 L45 53 L70 30 H55 V8 Z\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"}],"answer":"B","explanation":"A vertical reflection changes the arrow from pointing right to pointing left.","visual":"<div class=\"svg-wrap\"><svg viewBox=\"0 0 420 180\" role=\"img\" aria-label=\"Right-pointing arrow reflected across a vertical line\"><line x1=\"210\" y1=\"10\" x2=\"210\" y2=\"170\" stroke=\"#667085\" stroke-width=\"3\" stroke-dasharray=\"7 7\"/><path d=\"M55 58 H120 V35 L175 90 L120 145 V122 H55 Z\" fill=\"#bfd0ee\" stroke=\"#344054\" stroke-width=\"3\"/><text x=\"95\" y=\"165\" font-size=\"14\">original</text></svg></div>"},{"num":19,"prompt":"The top half of a design is shown above the dotted line. Which option shows the bottom half after the design is flipped over the line?","choices":[{"label":"A","html":"<div class=\"shape-choice wide\"><svg viewBox=\"0 0 180 75\"><path d=\"M10 60 Q35 0 60 60 Q85 0 110 60 Q135 0 160 60\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/></svg></div>"},{"label":"B","html":"<div class=\"shape-choice wide\"><svg viewBox=\"0 0 180 75\"><path d=\"M10 15 L45 55 L80 15 L115 55 L150 15\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/></svg></div>"},{"label":"C","html":"<div class=\"shape-choice wide\"><svg viewBox=\"0 0 180 75\"><path d=\"M20 10 Q45 70 70 10 Q95 70 120 10\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/></svg></div>"},{"label":"D","html":"<div class=\"shape-choice wide\"><svg viewBox=\"0 0 180 75\"><path d=\"M10 10 Q35 70 60 10 Q85 70 110 10 Q135 70 160 10\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/></svg></div>"}],"answer":"D","explanation":"The correct bottom half is the exact upside-down reflection of the curve above the line.","visual":"<div class=\"svg-wrap\"><svg viewBox=\"0 0 420 190\" role=\"img\" aria-label=\"Curved top half above a horizontal line\"><line x1=\"20\" y1=\"105\" x2=\"400\" y2=\"105\" stroke=\"#667085\" stroke-width=\"3\" stroke-dasharray=\"7 7\"/><path d=\"M120 95 Q145 35 170 95 Q195 35 220 95 Q245 35 270 95\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/><text x=\"25\" y=\"96\" font-size=\"14\">top half</text></svg></div>"},{"num":20,"prompt":"Nina arranged 8 buttons in a rectangle. Sam arranged 15 buttons in another rectangle. Sam gives away 5 buttons. Which number sentence shows how many buttons they have left altogether?","choices":[{"label":"A","text":"8 + 15 = 23"},{"label":"B","text":"15 − 8 − 5 = 2"},{"label":"C","text":"8 + 15 − 5 = 18"},{"label":"D","text":"8 + 15 + 5 = 28"}],"answer":"C","explanation":"Add both groups, then subtract the 5 buttons Sam gives away.","visual":"<div class=\"array-pair\"><div><div class=\"array rect4\" style=\"grid-template-columns:repeat(4,22px)\"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><b>Nina: 8</b></div><div><div class=\"array\" style=\"grid-template-columns:repeat(5,22px)\"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><b>Sam: 15, then gives away 5</b></div></div>"},{"num":21,"prompt":"A blue gem is worth $6. A pink gem is worth $2. Which group is worth the most?","choices":[{"label":"A","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem blue\">◆</span><span class=\"gem pink\">◆</span></div>"},{"label":"B","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span></div>"},{"label":"C","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span></div>"},{"label":"D","html":"<div class=\"gem-row\"><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span></div>"}],"answer":"B","explanation":"One blue gem and five pink gems are worth $6 + $10 = $16, which is the greatest value.","visual":null},{"num":22,"prompt":"Four books have different numbers of pages. Red: 63 pages. Yellow: 48 pages. Blue: 72 pages. Green: 55 pages. Which list orders the books from fewest pages to most pages?","choices":[{"label":"A","text":"blue, red, green, yellow"},{"label":"B","text":"green, yellow, red, blue"},{"label":"C","text":"yellow, red, green, blue"},{"label":"D","text":"yellow, green, red, blue"}],"answer":"D","explanation":"The page counts in order are 48, 55, 63, and 72.","visual":null},{"num":23,"prompt":"A bag contains 6 orange marbles and 2 blue marbles. If Sam closes his eyes and pulls out one marble, which statement is true?","choices":[{"label":"A","text":"It is more likely that Sam will pull an orange marble than a blue marble."},{"label":"B","text":"It is certain that Sam will pull a blue marble."},{"label":"C","text":"It is impossible for Sam to pull an orange marble."},{"label":"D","text":"It is possible for Sam to pull a green marble."}],"answer":"A","explanation":"There are more orange marbles than blue marbles, so orange is more likely.","visual":"<div class=\"marble-bag\"><div class=\"bag-label\">Bag of marbles</div><div class=\"marbles\"><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#4d75c9\"></span><span style=\"background:#4d75c9\"></span></div></div>"},{"num":24,"prompt":"The pencil begins at 1 inch and ends at 7 inches on the ruler. How long is the pencil?","choices":[{"label":"A","text":"5 inches"},{"label":"B","text":"7 inches"},{"label":"C","text":"6 inches"},{"label":"D","text":"8 inches"}],"answer":"C","explanation":"The pencil length is 7 − 1 = 6 inches.","visual":"<div class=\"ruler\"><div class=\"pencil-line\" style=\"margin-left:10%;width:60%\"><span></span></div><div class=\"ticks\"><div class=\"tick\"><i></i><b>0</b></div><div class=\"tick\"><i></i><b>1</b></div><div class=\"tick\"><i></i><b>2</b></div><div class=\"tick\"><i></i><b>3</b></div><div class=\"tick\"><i></i><b>4</b></div><div class=\"tick\"><i></i><b>5</b></div><div class=\"tick\"><i></i><b>6</b></div><div class=\"tick\"><i></i><b>7</b></div><div class=\"tick\"><i></i><b>8</b></div><div class=\"tick\"><i></i><b>9</b></div><div class=\"tick\"><i></i><b>10</b></div></div></div>"}],"minutes":26}},"primary2-test2":{"title":"ISEE Primary 2 Practice Test #2","auditory":{"passage":"On Friday afternoon, Mrs. Chen looked at the class garden and said, “The school will be closed for the long weekend. These plants still need water every day. I need a dependable volunteer.”\n\nMaya’s hand shot into the air. She loved the marigolds and bean plants, and she wanted to be in charge. Mrs. Chen smiled, but she did not choose Maya right away. “Caring for the garden means coming back to school on Saturday and Sunday,” she explained. “The plants cannot wait if you forget.”\n\nMaya nodded. That evening, she made a chart with one box for each day. She wrote down when she would water the plants and how much water each row needed. She asked her father whether he could drive her to school on Saturday. On Sunday, the family would walk there after breakfast. Maya even checked the weather report. Her friend Ben said rain might do the job, but Maya packed a rain jacket because she knew a forecast could change.\n\nThe next morning, Maya showed the chart to Mrs. Chen. She also demonstrated how she would measure the water. Mrs. Chen studied the plan and said, “You have thought about every day. I believe you are ready.”\n\nMaya followed her schedule all weekend. On Monday, the bean plants stood tall, and three new marigolds had opened. Mrs. Chen thanked her in front of the class. Maya’s smile stretched from ear to ear. She had not only cared for the garden; she had shown that a careful plan could turn a promise into action.","questions":[{"num":1,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"Maya learns how to grow marigolds from seeds."},{"label":"B","text":"Maya makes a careful plan so she can care for the class garden."},{"label":"C","text":"Mrs. Chen asks the class to build a new garden."},{"label":"D","text":"Ben and Maya disagree about whether it will rain."}],"answer":"B","explanation":"The whole passage focuses on Maya making and following a plan so she can care for the garden.","visual":null},{"num":2,"prompt":"Which is true about Maya?","choices":[{"label":"A","text":"She often forgets what she promises to do."},{"label":"B","text":"She wants Ben to do the work for her."},{"label":"C","text":"She plans ahead and is willing to work hard."},{"label":"D","text":"She is afraid to visit the school on Saturday."}],"answer":"C","explanation":"Maya checks the weather, arranges transportation, and makes a schedule. These details show planning and hard work.","visual":null},{"num":3,"prompt":"Why was Mrs. Chen unsure about choosing Maya at first?","choices":[{"label":"A","text":"Maya did not know the names of the flowers."},{"label":"B","text":"The garden was too far from Maya’s house."},{"label":"C","text":"Mrs. Chen wanted Ben to do the job instead."},{"label":"D","text":"The plants needed dependable care every day."}],"answer":"D","explanation":"Mrs. Chen explains that the plants need water every day and cannot wait if Maya forgets.","visual":null},{"num":4,"prompt":"Why did Maya show Mrs. Chen her chart?","choices":[{"label":"A","text":"She wanted to prove that she had a responsible plan."},{"label":"B","text":"She wanted to teach the class how to draw a chart."},{"label":"C","text":"She wanted to count how many flowers were blooming."},{"label":"D","text":"She wanted permission to take the plants home."}],"answer":"A","explanation":"The chart shows exactly when and how Maya will care for the plants, proving that she has a responsible plan.","visual":null},{"num":5,"prompt":"Maya’s smile “stretched from ear to ear.” What does that mean?","choices":[{"label":"A","text":"She was trying not to laugh."},{"label":"B","text":"She was surprised by a loud sound."},{"label":"C","text":"She had a very big, happy smile."},{"label":"D","text":"She was tired from carrying water."}],"answer":"C","explanation":"A smile that stretches from ear to ear is a very large, happy smile.","visual":null},{"num":6,"prompt":"Based on the passage, which is true about Mrs. Chen?","choices":[{"label":"A","text":"She was willing to trust Maya after seeing her careful plan."},{"label":"B","text":"She did not want any student to help with the garden."},{"label":"C","text":"She thought the flowers needed too much water."},{"label":"D","text":"She planned to remove the garden after the weekend."}],"answer":"A","explanation":"Mrs. Chen chooses Maya after she sees that Maya has carefully planned the work.","visual":null}],"minutes":7,"title":"The Class Garden"},"reading":{"passages":[{"title":"Sea Otters: Floating and Finding Food","text":"Sea otters spend much of their lives in the ocean. They can swim and dive, but they also rest on the water’s surface. A group of resting sea otters is sometimes called a raft because the animals float close together, almost like a small raft made of boats. Some otters even hold paws so they do not drift apart while they sleep.\n\nUnlike seals and whales, sea otters do not have a thick layer of fat to keep them warm. Instead, they have extremely dense fur. Dense means that many hairs grow close together. Air gets trapped between the hairs and helps keep cold ocean water away from the otter’s skin. Sea otters spend a lot of time cleaning and fluffing their fur so it continues to protect them.\n\nSea otters are also skillful hunters. Their sensitive whiskers help them feel tiny movements in dark or cloudy water. They eat animals such as clams, crabs, and sea urchins. Sometimes an otter carries a stone on its belly and uses it like a tool to crack open a hard shell.\n\nSea otters do more than look playful. By eating sea urchins, they help protect underwater forests of kelp. Too many sea urchins can eat large amounts of kelp. When otters keep the number of urchins under control, fish and other ocean animals have more places to live. Scientists continue to study the important part sea otters play in ocean habitats.","questions":[{"num":1,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Sea otters sleep all day and hunt only at night."},{"label":"B","text":"Sea otters are the only ocean animals that use tools."},{"label":"C","text":"Sea otters have thick fat that keeps them warm in cold water."},{"label":"D","text":"Sea otters have special features and behaviors that help them live in the ocean and support their habitat."}],"answer":"D","explanation":"The passage describes sea otters’ fur, whiskers, tools, group behavior, and role in the ocean habitat.","visual":null},{"num":2,"prompt":"Why is a group of resting sea otters sometimes called a “raft”?","choices":[{"label":"A","text":"The otters build a wooden raft to sleep on."},{"label":"B","text":"The otters float close together like a group of small boats."},{"label":"C","text":"The otters travel down rivers to reach the ocean."},{"label":"D","text":"The otters carry stones that look like tiny rafts."}],"answer":"B","explanation":"The otters float close together, which makes the group look like a raft made of small boats.","visual":null},{"num":3,"prompt":"According to the passage, what do an otter’s whiskers help it do?","choices":[{"label":"A","text":"Feel small movements in the water."},{"label":"B","text":"Keep its body warm."},{"label":"C","text":"Crack open hard shells."},{"label":"D","text":"Hold another otter’s paw."}],"answer":"A","explanation":"The passage says sensitive whiskers help otters feel tiny movements in dark or cloudy water.","visual":null},{"num":4,"prompt":"How does a sea otter’s fur help it stay warm?","choices":[{"label":"A","text":"The fur makes the otter swim faster."},{"label":"B","text":"The fur changes color in cold water."},{"label":"C","text":"Air trapped in the thick fur helps keep water away from its skin."},{"label":"D","text":"The fur grows into a layer of fat during winter."}],"answer":"C","explanation":"Air trapped inside dense fur helps keep cold water away from the otter’s skin.","visual":null},{"num":5,"prompt":"In the passage, what does “dense” most nearly mean?","choices":[{"label":"A","text":"Wet and shiny."},{"label":"B","text":"Thick and closely packed."},{"label":"C","text":"Soft and colorful."},{"label":"D","text":"Long and tangled."}],"answer":"B","explanation":"The passage explains that dense fur has many hairs growing close together.","visual":null},{"num":6,"prompt":"What is the purpose of the last paragraph?","choices":[{"label":"A","text":"To explain why sea otters are difficult to see."},{"label":"B","text":"To tell readers how to grow kelp at home."},{"label":"C","text":"To compare sea otters with seals and whales."},{"label":"D","text":"To explain how sea otters help other living things in the ocean."}],"answer":"D","explanation":"The last paragraph explains how otters protect kelp forests and help other ocean animals.","visual":null}]},{"title":"The Crooked Kite","text":"Darius wanted to build a kite for the spring festival. He found two thin sticks, bright blue paper, tape, and a long piece of string. He rushed through the work because he wanted to be the first person at the park. When he lifted the kite, one corner folded over and the kite fell to the ground.\n\nDarius felt disappointed, but his grandfather asked, “What did the kite teach you?” Darius looked closely and noticed that the paper was too loose. He carefully stretched a new sheet across the sticks and taped each edge. This time the kite rose into the air, but it spun in fast circles and soon crashed again.\n\nAfter watching another kite, Darius realized that his own kite needed a longer tail. He tied several strips of cloth to the bottom. The tail helped the kite balance, but a strong wind bent one of the thin sticks. For his final try, Darius replaced the sticks with sturdier ones that would not bend so easily.\n\nAt the festival, the blue kite climbed higher than the trees. Darius did not win the prize for finishing first. Instead, he won a ribbon for the kite that stayed in the air the longest. As he held the ribbon, he understood his grandfather’s question. Each mistake had been like a clue, pointing him toward a better design.","questions":[{"num":7,"prompt":"What is this passage mostly about?","choices":[{"label":"A","text":"Darius learns that careful changes after mistakes can help him improve his kite."},{"label":"B","text":"Darius’s grandfather builds a kite that wins the spring festival."},{"label":"C","text":"The spring festival gives prizes only to the fastest kite builders."},{"label":"D","text":"A strong wind ruins every kite at the park."}],"answer":"A","explanation":"Darius learns from each failed attempt and uses what he learns to improve the kite.","visual":null},{"num":8,"prompt":"Which happened first?","choices":[{"label":"A","text":"Darius added a longer tail."},{"label":"B","text":"One corner of the first kite folded over."},{"label":"C","text":"Darius won a ribbon."},{"label":"D","text":"Darius replaced the thin sticks."}],"answer":"B","explanation":"The first problem described is a folded corner on the first kite.","visual":null},{"num":9,"prompt":"Why did the second kite spin in circles?","choices":[{"label":"A","text":"Its paper was too loose."},{"label":"B","text":"Its string was too short."},{"label":"C","text":"It needed a longer tail to help it balance."},{"label":"D","text":"It was made from paper that was too heavy."}],"answer":"C","explanation":"Darius notices that a longer tail is needed to help the kite balance.","visual":null},{"num":10,"prompt":"In the passage, what does “sturdier” mean?","choices":[{"label":"A","text":"Stronger and less likely to bend."},{"label":"B","text":"Brighter and more colorful."},{"label":"C","text":"Longer and easier to carry."},{"label":"D","text":"Softer and easier to cut."}],"answer":"A","explanation":"Sturdier sticks are stronger and do not bend as easily.","visual":null},{"num":11,"prompt":"Why does the author say that each mistake was “like a clue”?","choices":[{"label":"A","text":"The mistakes told Darius where the festival was held."},{"label":"B","text":"The mistakes showed Darius that kites should be blue."},{"label":"C","text":"Each mistake helped Darius understand what to fix next."},{"label":"D","text":"Each mistake helped Darius find his missing tools."}],"answer":"C","explanation":"Each mistake points to the next part of the kite that needs to be fixed.","visual":null},{"num":12,"prompt":"What is the most likely reason the author wrote this story?","choices":[{"label":"A","text":"To show that mistakes can help people learn and improve."},{"label":"B","text":"To teach the exact steps for making every kind of kite."},{"label":"C","text":"To prove that winning a ribbon is more important than having fun."},{"label":"D","text":"To warn children not to fly kites when it is windy."}],"answer":"A","explanation":"The story’s lesson is that mistakes can provide useful information and lead to improvement.","visual":null}]},{"title":"Practice Biography: Nia Santos","text":"Nia Santos loved making pictures from the time she was young. She collected scraps of wrapping paper, ticket stubs, and old maps. Instead of throwing them away, she cut the pieces into shapes and arranged them into animals, houses, and imaginary lands. The layers of paper gave her artwork a textured look that people could recognize right away.\n\nNia was born in a small town near the ocean. When she was twelve, her family moved to a busy city. At first, she missed the waves and quiet beaches. She began creating pictures of sea turtles, boats, and shells to remember her old home. Years later, she studied art and became a designer for a children’s museum.\n\nOne day, a librarian saw a poster Nia had made for the museum. The librarian liked the bold shapes and tiny details. She asked Nia to illustrate a story about a child who explores an underwater city. Nia had never illustrated a book before, but she accepted the challenge. She spent weeks cutting, arranging, and gluing hundreds of paper pieces.\n\nThe book became popular with young readers. After that, Nia began writing and illustrating stories of her own. During her career, she created more than forty books. Children enjoyed searching her detailed pictures for hidden objects, and teachers often used her art to inspire classroom projects. Nia’s recognizable paper style turned ordinary scraps into worlds full of adventure.","questions":[{"num":13,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Nia preferred living in a small town near the ocean."},{"label":"B","text":"A librarian taught Nia how to cut and glue paper."},{"label":"C","text":"Nia became a children’s author and illustrator known for her special paper artwork."},{"label":"D","text":"Children’s museums are the best places for artists to work."}],"answer":"C","explanation":"The passage explains Nia’s paper art style and how she became a successful children’s book creator.","visual":null},{"num":14,"prompt":"After Nia cut paper into shapes, what did she do next?","choices":[{"label":"A","text":"She painted the pieces blue."},{"label":"B","text":"She mailed the pieces to a library."},{"label":"C","text":"She threw away the pieces she did not use."},{"label":"D","text":"She arranged the shapes to create pictures."}],"answer":"D","explanation":"The first paragraph says she cut the paper and then arranged the shapes into pictures.","visual":null},{"num":15,"prompt":"Why did the librarian ask Nia to illustrate a book?","choices":[{"label":"A","text":"The librarian had known Nia since she was a child."},{"label":"B","text":"The librarian liked the style of a poster Nia had created."},{"label":"C","text":"The librarian needed someone who lived near the ocean."},{"label":"D","text":"The librarian wanted Nia to teach at the museum."}],"answer":"B","explanation":"The librarian noticed and liked the style of Nia’s museum poster.","visual":null},{"num":16,"prompt":"What is the purpose of the second paragraph?","choices":[{"label":"A","text":"To explain how to make art from old maps."},{"label":"B","text":"To describe every job Nia had at the museum."},{"label":"C","text":"To give background about Nia’s childhood and early path as an artist."},{"label":"D","text":"To persuade readers to move from a small town to a city."}],"answer":"C","explanation":"The second paragraph gives childhood and early-career information that explains Nia’s path as an artist.","visual":null},{"num":17,"prompt":"In the passage, what does “recognizable” most nearly mean?","choices":[{"label":"A","text":"Easy to identify or know."},{"label":"B","text":"Difficult to finish."},{"label":"C","text":"Made only for children."},{"label":"D","text":"Hidden from view."}],"answer":"A","explanation":"Recognizable means easy to identify because it has a familiar or special look.","visual":null},{"num":18,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To explain why all book illustrations should be made from paper."},{"label":"B","text":"To compare life near the ocean with life in a city."},{"label":"C","text":"To teach readers how to become museum designers."},{"label":"D","text":"To explain how Nia developed her unusual art style and became a successful book creator."}],"answer":"D","explanation":"The passage explains both how Nia’s style developed and how she became known for books.","visual":null}]}],"minutes":20},"math":{"questions":[{"num":1,"prompt":"The table shows the number of books read by a class on five days. Which two days combined have a total of 14 books?","choices":[{"label":"A","text":"Monday and Tuesday"},{"label":"B","text":"Tuesday and Thursday"},{"label":"C","text":"Wednesday and Friday"},{"label":"D","text":"Monday and Thursday"}],"answer":"B","explanation":"Tuesday has 8 books and Thursday has 6. 8 + 6 = 14.","visual":"<div class=\"mini-table\"><div class=\"head\">Day</div><div>Monday</div><div>Tuesday</div><div>Wednesday</div><div>Thursday</div><div>Friday</div><div class=\"head\">Books</div><div>5</div><div>8</div><div>11</div><div>6</div><div>9</div></div>"},{"num":2,"prompt":"Some numbers are put in a pattern in the grid. What number belongs in the box with the question mark?","choices":[{"label":"A","text":"15"},{"label":"B","text":"16"},{"label":"C","text":"17"},{"label":"D","text":"19"}],"answer":"B","explanation":"The numbers increase by 2: 14, 16, 18.","visual":"<div class=\"number-grid\"><span>2</span><span>4</span><span>6</span><span>8</span><span>10</span><span>12</span><span>14</span><span class=\"mystery\">?</span><span>18</span><span>20</span><span>22</span><span>24</span></div>"},{"num":3,"prompt":"A gray coin is worth 10. A white coin is worth 1. Which group of coins has a value of 43?","choices":[{"label":"A","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"B","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"C","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"D","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"}],"answer":"A","explanation":"Four tens and three ones make 43.","visual":null},{"num":4,"prompt":"Which number sentence has the same value as 8 + 7?","choices":[{"label":"A","text":"9 + 6"},{"label":"B","text":"10 + 4"},{"label":"C","text":"7 + 7"},{"label":"D","text":"6 + 8"}],"answer":"A","explanation":"8 + 7 = 15, and 9 + 6 also equals 15.","visual":null},{"num":5,"prompt":"The picture shows 12 children at a playground. One-third of the children go to the swings. The rest go to the slide. How many children go to the slide?","choices":[{"label":"A","text":"4"},{"label":"B","text":"6"},{"label":"C","text":"8"},{"label":"D","text":"9"}],"answer":"C","explanation":"One-third of 12 is 4. The remaining 12 − 4 = 8 children go to the slide.","visual":"<div class=\"icon-row kids\"><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span></div><div class=\"visual-caption\">12 children</div>"},{"num":6,"prompt":"Victor wants to measure how heavy his backpack is. Which tool should he use?","choices":[{"label":"A","html":"<div class=\"tool-choice\"><span>📏</span><b>ruler</b></div>"},{"label":"B","html":"<div class=\"tool-choice\"><span>⚖️</span><b>scale</b></div>"},{"label":"C","html":"<div class=\"tool-choice\"><span>🌡️</span><b>thermometer</b></div>"},{"label":"D","html":"<div class=\"tool-choice\"><span>🕒</span><b>clock</b></div>"}],"answer":"B","explanation":"A scale measures how heavy something is.","visual":null},{"num":7,"prompt":"The graph shows how many stickers four students have. Which statement is true?","choices":[{"label":"A","text":"Ana has 7 stickers."},{"label":"B","text":"Brooke has an odd number of stickers."},{"label":"C","text":"Cara has the fewest stickers."},{"label":"D","text":"Dani has the most stickers."}],"answer":"C","explanation":"Cara has 3 stickers, fewer than Ana, Brooke, or Dani.","visual":"<div class=\"bar-chart\" aria-label=\"Number of stickers\"><div class=\"bar-col\"><div class=\"bar\" style=\"height:50%\"><b>5</b></div><span>Ana</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:80%\"><b>8</b></div><span>Brooke</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:30%\"><b>3</b></div><span>Cara</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:60%\"><b>6</b></div><span>Dani</span></div></div>"},{"num":8,"prompt":"The picture shows a cone and a cylinder. How are these two shapes alike?","choices":[{"label":"A","text":"They both have a corner."},{"label":"B","text":"They both have only one face."},{"label":"C","text":"They both have a circle for a base."},{"label":"D","text":"They both have a triangle-shaped face."}],"answer":"C","explanation":"A cone and a cylinder both have a circular base.","visual":"<div class=\"shape-pair\"><svg viewBox=\"0 0 320 160\" role=\"img\" aria-label=\"A cone and a cylinder\"><ellipse cx=\"75\" cy=\"120\" rx=\"50\" ry=\"16\" fill=\"#e8eef8\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M25 120 L75 28 L125 120\" fill=\"#f6f8fc\" stroke=\"#344054\" stroke-width=\"3\"/><text x=\"75\" y=\"151\" text-anchor=\"middle\">cone</text><ellipse cx=\"235\" cy=\"42\" rx=\"45\" ry=\"15\" fill=\"#e8eef8\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M190 42 V118 M280 42 V118\" stroke=\"#344054\" stroke-width=\"3\"/><ellipse cx=\"235\" cy=\"118\" rx=\"45\" ry=\"15\" fill=\"#f6f8fc\" stroke=\"#344054\" stroke-width=\"3\"/><text x=\"235\" y=\"151\" text-anchor=\"middle\">cylinder</text></svg></div>"},{"num":9,"prompt":"Three friends want to share cherries equally. Which group can be divided so tha erries.","visual":null},{"num":10,"prompt":"How many legs do a horse, a duck, and a fish have altogether?","choices":[{"label":"A","text":"4"},{"label":"B","text":"5"},{"label":"C","text":"6"},{"label":"D","text":"8"}],"answer":"C","explanation":"A horse has 4 legs, a duck has 2, and a fish has 0. 4 + 2 + 0 = 6.","visual":null},{"num":11,"prompt":"Jamal made an ABBA pattern using numbers. Which could be Jamal’s pattern?","choices":[{"label":"A","text":"2, 5, 2, 5, 2, 5, 2, 5"},{"label":"B","text":"3, 7, 7, 3, 3, 7, 7, 3"},{"label":"C","text":"1, 2, 3, 4, 1, 2, 3, 4"},{"label":"D","text":"8, 6, 4, 8, 6, 4, 8, 6"}],"answer":"B","explanation":"ABBA repeats as first, second, second, first: 3, 7, 7, 3.","visual":null},{"num":12,"prompt":"Four friends counted how many baskets they made. How many more baskets did Chloe make than Ben?","choices":[{"label":"A","text":"3"},{"label":"B","text":"4"},{"label":"C","text":"5"},{"label":"D","text":"6"}],"answer":"D","explanation":"Chloe made 9 baskets and Ben made 3. 9 − 3 = 6.","visual":"<div class=\"bar-chart\" aria-label=\"Baskets made\"><div class=\"bar-col\"><div class=\"bar\" style=\"height:70%\"><b>7</b></div><span>Ava</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:30%\"><b>3</b></div><span>Ben</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:90%\"><b>9</b></div><span>Chloe</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:60%\"><b>6</b></div><span>Diego</span></div></div>"},{"num":13,"prompt":"Rachel wants to measure how much water can fit in her bottle. Which tool is best to use?","choices":[{"label":"A","text":"scale"},{"label":"B","text":"thermometer"},{"label":"C","text":"measuring cup"},{"label":"D","text":"measuring tape"}],"answer":"C","explanation":"A measuring cup measures liquid capacity.","visual":null},{"num":14,"prompt":"Four bags hold different numbers of markers. Nora wants to keep two bags that contain exactly 14 markers altogether. Which two bags g viewBox=\"0 0 90 60\"><path d=\"M15 10 L75 50 L15 50 Z\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"}],"answer":"D","explanation":"The open space is a right triangle with the matching orientation.","visual":"<div class=\"svg-wrap\"><svg viewBox=\"0 0 260 190\" role=\"img\" aria-label=\"A square puzzle with a triangular piece missing\"><rect x=\"35\" y=\"15\" width=\"160\" height=\"160\" fill=\"white\" stroke=\"#344054\" stroke-width=\"4\"/><path d=\"M35 15 L195 15 L115 95 Z\" fill=\"#cddaf2\" stroke=\"#344054\" stroke-width=\"2\"/><path d=\"M35 15 L115 95 L35 175 Z\" fill=\"#e7edf8\" stroke=\"#344054\" stroke-width=\"2\"/><path d=\"M35 175 L115 95 L195 175 Z\" fill=\"#b8c9e8\" stroke=\"#344054\" stroke-width=\"2\"/><path d=\"M195 15 L195 175 L115 95 Z\" fill=\"white\" stroke=\"#d92d20\" stroke-width=\"3\" stroke-dasharray=\"7 5\"/><text x=\"215\" y=\"98\" font-size=\"14\" fill=\"#d92d20\">missing</text></svg></div>"},{"num":17,"prompt":"Maya has 24 beads. She gives 7 beads to her brother. Then her friend gives her 5 beads. How many beads does Maya have now?","choices":[{"label":"A","text":"12"},{"label":"B","text":"17"},{"label":"C","text":"22"},{"label":"D","text":"36"}],"answer":"C","explanation":"24 − 7 + 5 = 17 + 5 = 22.","visual":null},{"num":18,"prompt":"The shape is flipped across the dotted vertical line. Which option shows the correct reflection?","choices":[{"label":"A","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M12 20 H50 V8 L78 30 L50 52 V40 H12 Z\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"B","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M78 20 H40 V8 L12 30 L40 52 V40 H78 Z\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"C","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M35 52 V30 H20 L45 7 L70 30 H55 V52 Z\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg>
