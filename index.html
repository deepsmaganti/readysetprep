 her grandfather loved birds. For his birthday, she drew a picture of the cardinals that visited his feeder and placed it in a handmade frame."},{"prompt":"Which detail tells how the puppy felt?","choices":["The gate was blue.","Its tail wagged quickly.","The bowl was beside the wall.","The leash was long."],"answer":1,"explanation":"A quickly wagging tail shows that the puppy was excited or happy.","passage":"When Mia entered the yard, the puppy raced toward her. Its tail wagged quickly, and it bounced around her feet."}]},{"id":"vocabulary-sequence","name":"Vocabulary & Sequence","category":"Reading","description":"Use context clues and put events in the correct order.","questions":[{"prompt":"In the sentence, what does “enormous” mean? “The enormous pumpkin was too heavy for one person to lift.”","choices":["Very large","Very soft","Bright orange","Almost empty"],"answer":0,"explanation":"The clue that one person could not lift it shows that enormous means very large."},{"prompt":"What should happen first when making a fruit salad?","choices":["Put the salad in bowls.","Mix the cut fruit.","Wash the fruit.","Eat the salad."],"answer":2,"explanation":"Fruit should be washed before it is cut, mixed, or eaten."},{"prompt":"In the sentence, what does “sturdy” mean? “The sturdy chair did not wobble when Sam sat down.”","choices":["Tiny","Colorful","Noisy","Strong"],"answer":3,"explanation":"A chair that does not wobble is strong and stable."},{"prompt":"Which word best completes the sentence? “After the race, Jay was _____ and drank a full bottle of water.”","choices":["sleepy","thirsty","angry","surprised"],"answer":1,"explanation":"Drinking a full bottle of water after running is evidence that Jay was thirsty."},{"prompt":"What happens after a caterpillar forms a chrysalis?","choices":["It becomes an egg.","It turns back into a caterpillar.","It changes and later comes out as a butterfly.","It immediately begins flying."],"answer":2,"explanation":"The butterfly develops inside the chrysalis before emerging."}]},{"id":"number-place-value","name":"Number Sense & Place Value","category":"Mathematics","description":"Practice tens, ones, comparing numbers, and simple number relationships.","questions":[{"prompt":"Which number has 4 tens and 7 ones?","choices":["47","74","407","11"],"answer":0,"explanation":"Four tens are 40, and seven ones make 47."},{"prompt":"Which number is greatest?","choices":["58","61","66","68"],"answer":3,"explanation":"All have six or fewer tens; 68 has six tens and the greatest ones digit."},{"prompt":"What is 10 more than 34?","choices":["24","44","35","43"],"answer":1,"explanation":"Adding one ten to 34 gives 44."},{"prompt":"Which number is between 52 and 54?","choices":["51","55","53","45"],"answer":2,"explanation":"53 comes after 52 and before 54."},{"prompt":"What number is shown by 2 hundreds, 3 tens, and 5 ones?","choices":["253","235","325","205"],"answer":1,"explanation":"Two hundreds, three tens, and five ones make 235."}]},{"id":"operations-word-problems","name":"Addition, Subtraction & Word Problems","category":"Mathematics","description":"Choose operations and solve one- and two-step Grade 2 problems.","questions":[{"prompt":"Lina has 8 red beads and 7 blue beads. How many beads does she have altogether?","choices":["1","14","15","16"],"answer":2,"explanation":"Altogether means add: 8 + 7 = 15."},{"prompt":"There were 19 birds. Six flew away. How many birds remained?","choices":["13","12","14","25"],"answer":0,"explanation":"Subtract the birds that flew away: 19 - 6 = 13."},{"prompt":"Omar had 12 stickers. He received 5 more and gave away 3. How many stickers does he have now?","choices":["10","17","20","14"],"answer":3,"explanation":"12 + 5 - 3 = 14."},{"prompt":"Which number makes the equation true? 9 + □ = 16","choices":["6","7","8","9"],"answer":1,"explanation":"16 - 9 = 7."},{"prompt":"Four children share 16 crackers equally. How many crackers does each child receive?","choices":["2","3","4","8"],"answer":2,"explanation":"Sixteen split into four equal groups gives four in each group."}]},{"id":"patterns-data-measurement","name":"Patterns, Data & Measurement","category":"Mathematics","description":"Work with patterns, simple graphs, shapes, length, weight, and capacity.","questions":[{"prompt":"What number comes next? 5, 10, 15, 20, ___","choices":["25","21","24","30"],"answer":0,"explanation":"The pattern adds 5 each time."},{"prompt":"A graph shows 7 apples, 4 pears, and 6 oranges. Which fruit has the fewest?","choices":["Apples","Pears","Oranges","They are equal"],"answer":1,"explanation":"Four pears is fewer than seven apples or six oranges."},{"prompt":"Which tool is best for measuring how heavy a backpack is?","choices":["A ruler","A clock","A scale","A measuring cup"],"answer":2,"explanation":"A scale measures weight."},{"prompt":"How are a cone and a cylinder alike?","choices":["Both have a point.","Both have only flat surfaces.","Both have eight corners.","Both have a circular base."],"answer":3,"explanation":"A cone and a cylinder each include a circular base."},{"prompt":"A ribbon begins at 2 inches and ends at 8 inches on a ruler. How long is it?","choices":["5 inches","6 inches","8 inches","10 inches"],"answer":1,"explanation":"Subtract the starting point from the ending point: 8 - 2 = 6."}]}]},"primary3":{"label":"Primary 3","concepts":[{"id":"reading-understanding","name":"Main Idea, Details & Inference","category":"Reading","description":"Understand short passages, sequence events, and make supported inferences.","questions":[{"prompt":"What is the main idea?","choices":["Ants are larger than most insects.","Every ant has the same job.","Ants work together to build and protect their colony.","Ant colonies are always underground."],"answer":2,"explanation":"The passage focuses on the different ways ants cooperate.","passage":"An ant colony may contain thousands of ants. Some gather food, some care for young ants, and others protect the nest. By doing different jobs, the ants help the whole colony survive."},{"prompt":"Why did Carlos reread the directions?","choices":["His model did not look like the picture.","He had finished the model.","He wanted to throw away the pieces.","His friend asked him to stop."],"answer":0,"explanation":"The mismatch between the model and picture caused Carlos to check the directions.","passage":"Carlos connected the model pieces, but the finished shape leaned to one side. It did not look like the picture on the box, so he reread the directions and found that two pieces were reversed."},{"prompt":"What can the reader infer about the library?","choices":["It was about to close forever.","It had no books.","It was crowded with musicians.","It was unusually quiet."],"answer":3,"explanation":"Hearing the clock and pages turn suggests very little other noise.","passage":"Nia could hear the soft tick of the wall clock and the quiet turn of every page. Even the librarian whispered when she answered a question."},{"prompt":"Which happened immediately before the seedlings were moved outside?","choices":["The seeds were purchased.","They grew several leaves.","The soil was watered.","The vegetables were harvested."],"answer":1,"explanation":"The passage states that the plants developed leaves before being moved.","passage":"Students planted seeds in small cups and kept the soil moist. Tiny stems appeared, and several leaves grew. The class then moved the seedlings to the garden."},{"prompt":"Which detail best supports the idea that the fox is well adapted to winter?","choices":["It lives near a river.","It sleeps during the afternoon.","Its thick coat keeps it warm.","It has four legs."],"answer":2,"explanation":"A thick coat directly helps an animal handle cold weather.","passage":"The red fox grows a thick winter coat. Its furry tail can wrap around its body, and its sharp hearing helps it locate mice beneath snow."}]},{"id":"vocabulary-text-features","name":"Vocabulary & Text Features","category":"Reading","description":"Use context clues, headings, captions, and word relationships.","questions":[{"prompt":"What does “scarce” mean in this sentence? “During the dry summer, fresh water became scarce.”","choices":["Very cold","Hard to find","Easy to carry","Unsafe to drink"],"answer":1,"explanation":"A dry summer can make fresh water limited or hard to find."},{"prompt":"Which heading best fits a paragraph explaining how bees carry pollen from flower to flower?","choices":["How Bees Help Plants","Kinds of Honey","Building a Beehive","Why Flowers Need Rain"],"answer":0,"explanation":"The heading should state the paragraph's main topic."},{"prompt":"What does “examine” mean? “The scientist used a magnifying glass to examine the leaf.”","choices":["Cut into pieces","Carry outside","Look at carefully","Draw from memory"],"answer":2,"explanation":"A magnifying glass helps someone look closely."},{"prompt":"Why would an author include a caption under a photograph?","choices":["To hide the main idea","To make the photograph larger","To replace the entire passage","To explain what the photograph shows"],"answer":3,"explanation":"Captions give information about an image."},{"prompt":"Which word is the opposite of “ancient”?","choices":["Old","Modern","Broken","Valuable"],"answer":1,"explanation":"Ancient means very old; modern means current or recent."}]},{"id":"place-value-operations","name":"Place Value & Operations","category":"Mathematics","description":"Practice three-digit numbers, addition, subtraction, and missing values.","questions":[{"prompt":"What is the value of the 6 in 462?","choices":["6","600","60","2"],"answer":2,"explanation":"The 6 is in the tens place."},{"prompt":"Which is 100 more than 735?","choices":["835","745","635","836"],"answer":0,"explanation":"Adding one hundred changes the hundreds digit from 7 to 8."},{"prompt":"What is 248 + 35?","choices":["273","282","293","283"],"answer":3,"explanation":"248 + 30 = 278, and 278 + 5 = 283."},{"prompt":"What is 500 - 176?","choices":["224","324","334","376"],"answer":1,"explanation":"500 - 176 = 324."},{"prompt":"What number makes 145 + □ = 200 true?","choices":["45","65","55","155"],"answer":2,"explanation":"200 - 145 = 55."}]},{"id":"fractions-word-problems","name":"Fractions & Word Problems","category":"Mathematics","description":"Recognize simple fractions and solve one- and two-step problems.","questions":[{"prompt":"A pizza is cut into 8 equal slices. Three are eaten. What fraction is eaten?","choices":["3/8","5/8","3/5","8/3"],"answer":0,"explanation":"Three of the eight equal pieces were eaten."},{"prompt":"Which fraction is equal to one-half?","choices":["1/3","3/4","2/4","2/3"],"answer":2,"explanation":"Two of four equal parts is the same amount as one of two equal parts."},{"prompt":"A class collected 24 cans on Monday and 18 on Tuesday. They used 10 for a display. How many cans remained?","choices":["22","32","42","52"],"answer":1,"explanation":"24 + 18 - 10 = 32."},{"prompt":"One-fourth of 20 students wore hats. How many students wore hats?","choices":["4","10","16","5"],"answer":3,"explanation":"Twenty divided into four equal groups gives five in each group."},{"prompt":"Luca read 15 pages in the morning and twice as many in the afternoon. How many pages did he read altogether?","choices":["30","35","45","60"],"answer":2,"explanation":"Twice 15 is 30; 15 + 30 = 45."}]},{"id":"data-geometry-measurement","name":"Data, Geometry & Measurement","category":"Mathematics","description":"Interpret data and practice time, perimeter, shapes, and measurement.","questions":[{"prompt":"A bar graph shows 9 votes for blue, 6 for green, and 4 for red. How many more votes did blue receive than red?","choices":["3","5","4","13"],"answer":1,"explanation":"9 - 4 = 5."},{"prompt":"A rectangle has sides of 5 units and 3 units. What is its perimeter?","choices":["16 units","8 units","15 units","25 units"],"answer":0,"explanation":"5 + 3 + 5 + 3 = 16."},{"prompt":"School begins at 8:10 and lunch begins at 11:10. How much time passes?","choices":["2 hours","3 hours 10 minutes","11 hours","3 hours"],"answer":3,"explanation":"The minutes are the same, so count three hours."},{"prompt":"Which solid has six equal square faces?","choices":["A cone","A cylinder","A cube","A sphere"],"answer":2,"explanation":"A cube is made of six congruent square faces."},{"prompt":"Which unit is best for measuring the length of a classroom?","choices":["Grams","Meters","Milliliters","Degrees"],"answer":1,"explanation":"Meters measure a room-sized length."}]}]},"primary4":{"label":"Primary 4","concepts":[{"id":"reading-analysis","name":"Main Idea, Inference & Author Purpose","category":"Reading","description":"Use evidence to understand ideas, characters, and why a passage was written.","questions":[{"prompt":"Why did the author most likely write the passage?","choices":["To tell a fictional story about a mangrove tree.","To persuade readers to build houses in wetlands.","To compare every kind of ocean plant.","To explain how mangrove roots protect coastlines and provide animal habitats."],"answer":3,"explanation":"The passage gives factual explanations about the roles of mangroves.","passage":"Mangrove trees grow where land meets salty water. Their tangled roots slow waves and hold soil in place. Small fish hide among the roots, and birds nest in the branches."},{"prompt":"What can be inferred about Hana?","choices":["She dislikes working with others.","She values accuracy.","She wants to finish as quickly as possible.","She has never created a map."],"answer":1,"explanation":"Hana checks the trail twice and corrects a missing turn.","passage":"Hana walked the nature trail twice before finishing her map. On the second trip, she noticed that she had left out a turn near the pond and corrected it."},{"prompt":"Which statement best summarizes the passage?","choices":["A community garden changed an empty lot into a useful shared space.","Neighbors argued about which vegetables to plant.","The city built a parking lot beside several homes.","Children preferred flowers to vegetables."],"answer":0,"explanation":"The passage describes the lot's transformation and benefits.","passage":"An empty lot collected trash for years. Neighbors cleared it, built garden beds, and planted vegetables and flowers. Families now share the harvest, and students visit to study insects."},{"prompt":"Which detail best supports the idea that the inventor tested the design carefully?","choices":["She used bright paper.","She showed the design to a friend.","She changed one part at a time and recorded each result.","She finished before lunch."],"answer":2,"explanation":"Changing one variable and recording results is careful testing."},{"prompt":"What is the author's point of view about mistakes?","choices":["Mistakes should always be hidden.","Mistakes are caused by poor materials.","Mistakes make improvement impossible.","Mistakes can provide useful information."],"answer":3,"explanation":"The author describes mistakes as clues for the next revision.","passage":"A failed test does not always mean an idea is bad. It can show which part needs improvement. Engineers often treat mistakes as information for the next design."}]},{"id":"vocabulary-language","name":"Vocabulary & Figurative Language","category":"Reading","description":"Use context, roots, and figurative comparisons to understand words and phrases.","questions":[{"prompt":"What does “reluctant” mean? “Tariq was reluctant to step onto the shaky bridge.”","choices":["Unwilling or unsure","Excited and eager","Unable to see","Ready to run"],"answer":0,"explanation":"The shaky bridge makes Tariq hesitant."},{"prompt":"What does the phrase “the classroom was a beehive” suggest?","choices":["Bees had entered the classroom.","The classroom was silent.","The classroom was busy and full of activity.","Every student was eating honey."],"answer":2,"explanation":"A beehive is used as a comparison for a busy place."},{"prompt":"The prefix “re-” in “rebuild” means—","choices":["not","again","before","small"],"answer":1,"explanation":"To rebuild is to build again."},{"prompt":"What does “conserve” mean in a passage about water?","choices":["Make warmer","Move quickly","Measure exactly","Use carefully and avoid waste"],"answer":3,"explanation":"Conserving a resource means protecting it by reducing waste."},{"prompt":"Which word is closest in meaning to “brief”?","choices":["Short","Loud","Difficult","Exact"],"answer":0,"explanation":"Brief means lasting a short time or using few words."}]},{"id":"multi-digit-operations","name":"Multi-Digit Operations","category":"Mathematics","description":"Practice multiplication, division, addition, subtraction, and missing values.","questions":[{"prompt":"What is 36 × 4?","choices":["120","144","134","164"],"answer":1,"explanation":"30 × 4 = 120 and 6 × 4 = 24; total 144."},{"prompt":"What is 168 ÷ 6?","choices":["22","26","32","28"],"answer":3,"explanation":"Six groups of 28 make 168."},{"prompt":"What is 3,405 + 786?","choices":["4,191","4,081","4,181","4,291"],"answer":0,"explanation":"Add by place value to get 4,191."},{"prompt":"What is 2,000 - 638?","choices":["1,262","1,372","1,362","1,462"],"answer":2,"explanation":"2,000 - 638 = 1,362."},{"prompt":"What number makes 7 × □ = 91 true?","choices":["11","13","12","14"],"answer":1,"explanation":"91 divided by 7 is 13."}]},{"id":"fractions-decimals","name":"Fractions & Decimals","category":"Mathematics","description":"Compare fractions, find equivalents, and connect fractions with decimals.","questions":[{"prompt":"Which fraction is greatest?","choices":["1/2","2/3","5/8","3/4"],"answer":3,"explanation":"Three-fourths is 0.75, greater than the other choices."},{"prompt":"Which fraction is equivalent to 2/3?","choices":["6/9","4/9","6/8","8/9"],"answer":0,"explanation":"Multiplying both numerator and denominator of 2/3 by 3 gives 6/9."},{"prompt":"What is 1/4 of 36?","choices":["4","8","9","12"],"answer":2,"explanation":"36 divided by 4 is 9."},{"prompt":"Which decimal is equal to 7/10?","choices":["0.07","0.7","7.0","0.17"],"answer":1,"explanation":"Seven tenths is written 0.7."},{"prompt":"Maya drank 3/8 of a bottle in the morning and 2/8 in the afternoon. How much did she drink altogether?","choices":["5/16","1/8","6/8","5/8"],"answer":3,"explanation":"The denominators are the same, so add the numerators: 3 + 2 = 5."}]},{"id":"data-geometry-measurement","name":"Data, Geometry & Measurement","category":"Mathematics","description":"Practice area, perimeter, angles, data, elapsed time, and measurement.","questions":[{"prompt":"A rectangle is 8 units long and 5 units wide. What is its area?","choices":["40 square units","13 square units","26 square units","80 square units"],"answer":0,"explanation":"Area equals length times width: 8 × 5 = 40."},{"prompt":"Which angle is greater than 90° but less than 180°?","choices":["An acute angle","A right angle","An obtuse angle","A straight angle"],"answer":2,"explanation":"An obtuse angle is between a right and straight angle."},{"prompt":"A table shows 12 books Monday, 9 Tuesday, and 15 Wednesday. What is the total?","choices":["24","36","34","38"],"answer":1,"explanation":"12 + 9 + 15 = 36."},{"prompt":"A movie starts at 2:35 and ends at 4:05. How long is it?","choices":["1 hour","1 hour 20 minutes","2 hours 30 minutes","1 hour 30 minutes"],"answer":3,"explanation":"From 2:35 to 3:35 is one hour, then 30 more minutes."},{"prompt":"Which unit is best for measuring the amount of water in a bathtub?","choices":["Liters","Centimeters","Kilograms","Degrees"],"answer":0,"explanation":"Liters measure liquid capacity."}]}]},"lower":{"label":"Lower","concepts":[{"id":"verbal-reasoning","name":"Synonyms & Sentence Completion","category":"Verbal Reasoning","description":"Build vocabulary and use sentence clues to select precise words.","questions":[{"prompt":"Which word is closest in meaning to “abundant”?","choices":["Hidden","Plentiful","Narrow","Doubtful"],"answer":1,"explanation":"Abundant means existing in a large amount."},{"prompt":"Which word is closest in meaning to “cautious”?","choices":["Careful","Cheerful","Curious","Confused"],"answer":0,"explanation":"A cautious person acts carefully to avoid danger or mistakes."},{"prompt":"Although the trail looked easy at first, the steep final hill made the hike surprisingly _____.","choices":["ordinary","silent","brief","demanding"],"answer":3,"explanation":"The steep hill made the hike difficult or demanding."},{"prompt":"The scientist repeated the experiment to _____ that the first result was accurate.","choices":["ignore","replace","confirm","announce"],"answer":2,"explanation":"Repeating a test can confirm, or verify, a result."},{"prompt":"Which word is the opposite of “expand”?","choices":["Explain","Contract","Explore","Exchange"],"answer":1,"explanation":"To contract is to become smaller; to expand is to become larger."}]},{"id":"reading-comprehension","name":"Main Idea, Inference & Tone","category":"Reading Comprehension","description":"Analyze short passages and support answers with evidence.","questions":[{"prompt":"What is the main idea?","choices":["Only trained scientists can identify birds.","Bird counts are held only during winter.","Citizen scientists can help researchers collect large amounts of useful information.","Researchers no longer study animal populations."],"answer":2,"explanation":"The passage explains how public observations add to scientific data.","passage":"During an annual bird count, volunteers record every bird they see. Researchers combine thousands of reports to study changes in bird populations across wide areas."},{"prompt":"What can be inferred about the speaker?","choices":["The speaker was nervous but became more confident.","The speaker had forgotten the presentation.","The speaker disliked the audience.","The speaker wanted to leave immediately."],"answer":0,"explanation":"A shaking voice followed by steadier speech shows growing confidence.","passage":"My voice shook during the first sentence. Then I noticed my teacher smiling from the back row. I took a breath, looked at my notes, and spoke more steadily."},{"prompt":"What is the tone of the passage?","choices":["Humorous","Celebratory","Carefree","Concerned"],"answer":3,"explanation":"The author emphasizes threats and the need for protection.","passage":"Sea turtles cross busy beaches to lay eggs. Bright lights can confuse newly hatched turtles, and plastic waste may block their path to the ocean. Communities are working to reduce these dangers."},{"prompt":"Why does the author mention both benefits and risks of drones?","choices":["To prove drones should be banned","To present a balanced explanation","To entertain with a fictional story","To give instructions for building a drone"],"answer":1,"explanation":"Discussing advantages and concerns creates a balanced treatment."},{"prompt":"Which detail best supports the claim that the old bridge was important to the town?","choices":["The bridge crossed a narrow stream.","The bridge was painted gray.","Residents raised money to repair it instead of replacing it.","Cars used another road during repairs."],"answer":2,"explanation":"Choosing to preserve the bridge shows its value to residents."}]},{"id":"number-relationships","name":"Number Relationships & Algebraic Thinking","category":"Quantitative Reasoning","description":"Recognize patterns, relationships, unknowns, and efficient solution paths.","questions":[{"prompt":"What number comes next? 3, 7, 15, 31, ___","choices":["47","61","64","63"],"answer":3,"explanation":"Each term is doubled and then 1 is added."},{"prompt":"If 5n = 45, what is n?","choices":["9","5","8","10"],"answer":0,"explanation":"Divide both sides by 5."},{"prompt":"A number is 12 more than twice 9. What is the number?","choices":["21","27","30","42"],"answer":2,"explanation":"Twice 9 is 18; 18 + 12 = 30."},{"prompt":"Which expression is equivalent to 4(x + 3)?","choices":["4x + 3","4x + 12","x + 12","7x"],"answer":1,"explanation":"Use the distributive property."},{"prompt":"The ratio of red to blue tiles is 3:5. If there are 15 red tiles, how many blue tiles are there?","choices":["9","20","30","25"],"answer":3,"explanation":"The scale factor is 5, so 5 × 5 = 25 blue tiles."}]},{"id":"fractions-decimals-percents","name":"Fractions, Decimals & Percents","category":"Mathematics Achievement","description":"Compute with rational numbers and translate among forms.","questions":[{"prompt":"What is 3/4 + 1/8?","choices":["7/8","4/12","1","5/8"],"answer":0,"explanation":"Three-fourths is 6/8; 6/8 + 1/8 = 7/8."},{"prompt":"Which decimal is equal to 35%?","choices":["3.5","0.035","0.35","35.0"],"answer":2,"explanation":"Percent means per hundred, so 35% is 0.35."},{"prompt":"What is 2.4 × 5?","choices":["7.4","12","10","120"],"answer":1,"explanation":"24 tenths × 5 = 120 tenths = 12."},{"prompt":"What is 5/6 ÷ 5?","choices":["5/30","1/5","5/11","1/6"],"answer":3,"explanation":"Dividing by 5 is multiplying by 1/5: 5/6 × 1/5 = 1/6."},{"prompt":"A $40 item is discounted by 25%. What is the sale price?","choices":["$30","$10","$25","$35"],"answer":0,"explanation":"Twenty-five percent of $40 is $10; $40 - $10 = $30."}]},{"id":"geometry-data-probability","name":"Geometry, Data & Probability","category":"Quantitative & Mathematics","description":"Practice geometry, statistics, probability, and measurement.","questions":[{"prompt":"What is the area of a triangle with base 10 and height 6?","choices":["16 square units","30 square units","60 square units","120 square units"],"answer":1,"explanation":"Triangle area is one-half × base × height."},{"prompt":"The mean of 6, 8, 10, and 12 is—","choices":["9","8","10","36"],"answer":0,"explanation":"The sum is 36; divide by 4 to get 9."},{"prompt":"A bag contains 3 red, 5 blue, and 2 green marbles. What is the probability of blue?","choices":["1/5","3/10","5/8","1/2"],"answer":3,"explanation":"Five of ten marbles are blue."},{"prompt":"A rectangular prism is 4 by 3 by 5. What is its volume?","choices":["12 cubic units","20 cubic units","60 cubic units","47 cubic units"],"answer":2,"explanation":"Volume is 4 × 3 × 5 = 60."},{"prompt":"Two angles of a triangle are 45° and 65°. What is the third angle?","choices":["60°","70°","80°","110°"],"answer":1,"explanation":"Triangle angles total 180°; 180 - 110 = 70."}]}]},"middle":{"label":"Middle","concepts":[{"id":"verbal-reasoning","name":"Synonyms & Sentence Completion","category":"Verbal Reasoning","description":"Practice nuanced vocabulary and logical sentence relationships.","questions":[{"prompt":"Which word is closest in meaning to “meticulous”?","choices":["Ordinary","Hesitant","Careful","Wasteful"],"answer":2,"explanation":"Meticulous means showing very careful attention to detail."},{"prompt":"Which word is closest in meaning to “obsolete”?","choices":["Outdated","Flexible","Expensive","Uncertain"],"answer":0,"explanation":"Something obsolete is no longer current or useful."},{"prompt":"The evidence was so _____ that even the strongest critic accepted the conclusion.","choices":["scarce","casual","ambiguous","compelling"],"answer":3,"explanation":"Compelling evidence is convincing."},{"prompt":"Because the two reports seemed to _____ one another, the committee requested more data.","choices":["imitate","contradict","complete","announce"],"answer":1,"explanation":"Reports that disagree contradict each other."},{"prompt":"Which word is the opposite of “restrained”?","choices":["Controlled","Moderate","Excessive","Quiet"],"answer":2,"explanation":"Restrained means limited or controlled; excessive means beyond reasonable limits."}]},{"id":"reading-analysis","name":"Inference, Tone & Structure","category":"Reading Comprehension","description":"Analyze evidence, tone, organization, and the role of details.","questions":[{"prompt":"What is the function stopTimer(){if(timerId){clearInterval(timerId);timerId=null;}}
function playOneMinuteAlert(sec){
 if(state.oneMinuteAlerted?.[sec])return;
 state.oneMinuteAlerted=state.oneMinuteAlerted||{auditory:false,reading:false,math:false};
 state.oneMinuteAlerted[sec]=true;
 try{
  const AudioContextClass=window.AudioContext||window.webkitAudioContext;
  if(AudioContextClass){
   const ctx=new AudioContextClass();
   const ring=(start,frequency)=>{
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.type='sine';
    osc.frequency.value=frequency;
    gain.gain.setValueAtTime(.0001,ctx.currentTime+start);
    gain.gain.exponentialRampToValueAtTime(.22,ctx.currentTime+start+.02);
    gain.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+start+.22);
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start(ctx.currentTime+start);osc.stop(ctx.currentTime+start+.24);
   };
   ring(0,880);ring(.28,1046);
   setTimeout(()=>ctx.close().catch(()=>{}),900);
  }
 }catch(e){console.warn('One-minute alert sound unavailable',e)}
 const old=document.getElementById('minuteAlert');
 if(old)old.remove();
 const notice=document.createElement('div');
 notice.id='minuteAlert';
 notice.className='minute-alert';
 notice.innerHTML=`🔔 <b>1 minute remaining</b> in ${labels[sec]}`;
 document.body.appendChild(notice);
 setTimeout(()=>notice.remove(),5000);
 save();
}
function maybePlayOneMinuteAlert(sec){
 if(state.timed&&state.timeLeft[sec]===60&&!state.oneMinuteAlerted?.[sec])playOneMinuteAlert(sec);
}
function startTimer(){
 stopTimer(); if(!state.timed||!['audio','test'].includes(state.screen)) return;
 const sec=currentSection();
 maybePlayOneMinuteAlert(sec);
 timerId=setInterval(()=>{
   state.timeLeft[sec]--;
   const el=document.querySelector('.timer'); if(el){el.textContent=fmtTime(state.timeLeft[sec]);el.classList.toggle('warn',state.timeLeft[sec]<=60)}
   maybePlayOneMinuteAlert(sec);
   if(state.timeLeft[sec]<=0){stopTimer(); state.sectionSubmitted[sec]=true; save(); alert('Time is up for this section. Your saved answers will be submitted.'); finishSection(true);}
   save();
 },1000);
}
function totalAnswered(sec){return Object.keys(state.answers[sec]||{}).length}
function sectionScore(sec){const qs=sectionQuestions(sec);return qs.reduce((n,x)=>n+(state.answers[sec]?.[x.num]===x.answer?1:0),0)}
function allScores(){return sections.map(sec=>({sec,score:sectionScore(sec),total:sectionQuestions(sec).length}))}

function estimatedPracticeStanine(percent){
 if(percent>=96)return 9;
 if(percent>=90)return 8;
 if(percent>=83)return 7;
 if(percent>=75)return 6;
 if(percent>=65)return 5;
 if(percent>=55)return 4;
 if(percent>=45)return 3;
 if(percent>=35)return 2;
 return 1;
}

}

let practiceSession=null;

function loadPracticeProgress(){
 try{return JSON.parse(localStorage.getItem(PRACTICE_PROGRESS_KEY))||{}}catch(e){return{}}
}
function savePracticeProgress(progress){
 try{localStorage.setItem(PRACTICE_PROGRESS_KEY,JSON.stringify(progress))}catch(e){}
}
function practiceMastery(score,total){
 const pct=total?Math.round(score/total*100):0;
 if(pct===100)return {label:'Mastered',className:'mastered'};
 if(pct>=80)return {label:'Strong',className:'strong'};
 if(pct>=60)return {label:'Developing',className:'developing'};
 return {label:'Keep practicing',className:'practice-more'};
}
function practiceLevelCards(){
 return LEVEL_ORDER.map(id=>{
  const l=LEVELS[id];
  return `<button class="practice-level-tab ${id===selectedLevelId?'active':''}" data-practice-level="${id}" style="--level-accent:${l.accent};--level-soft:${l.soft}">${escapeHtml(l.label)}</button>`;
 }).join('');
}
function showPracticeExercises(){
 stopTimer();stopAudio();
 const level=selectedLevel();
 const bank=PRACTICE_EXERCISES[selectedLevelId];
 const progress=loadPracticeProgress();
 const levelProgress=progress[selectedLevelId]||{};
 const cards=bank.concepts.map(module=>{
  const saved=levelProgress[module.id]||{};
  const best=Number(saved.best||0);
  const attempts=Number(saved.attempts||0);
  const mastery=practiceMastery(best,module.questions.length);
  return `<button class="concept-card" data-concept="${module.id}" style="--concept-accent:${level.accent}">
   <span class="concept-category">${escapeHtml(module.category)}</span>
   <h3>${escapeHtml(module.name)}</h3>
   <p>${escapeHtml(module.description)}</p>
   <div class="concept-meta"><span>${module.questions.length} questions</span><span class="mastery ${attempts?mastery.className:''}">${attempts?`${mastery.label} · Best ${best}/${module.questions.length}`:'Not started'}</span></div>
  </button>`;
 }).join('');
 document.getElementById('app').innerHTML=`<main class="container"><section class="card practice-hub">
  <div class="practice-header">
   <button class="btn btn-secondary" id="practiceHome">← Home</button>
   <div><span class="badge">Skill building</span><h1>Practice Exercises</h1><p>Choose a level and practice one concept at a time. Every answer includes an explanation.</p></div>
  </div>
  <div class="practice-level-tabs">${practiceLevelCards()}</div>
  <div class="practice-hub-title"><div><h2>${escapeHtml(level.label)} concepts</h2><p>${escapeHtml(level.subtitle)}</p></div><button class="btn btn-primary" id="mixedPractice">Mixed practice</button></div>
  <div class="concept-grid">${cards}</div>
  <div class="practice-footer-actions"><button class="btn btn-secondary" id="clearPracticeProgress">Clear ${escapeHtml(level.label)} progress</button></div>
 </section></main>`;
 document.getElementById('practiceHome').onclick=goHome;
 document.querySelectorAll('[data-practice-level]').forEach(el=>el.onclick=()=>{
  selectedLevelId=el.dataset.practiceLevel;
  localStorage.setItem(LEVEL_STORAGE_KEY,selectedLevelId);
  showPracticeExercises();
 });
 document.querySelectorAll('[data-concept]').forEach(el=>el.onclick=()=>startConceptPractice(el.dataset.concept));
 document.getElementById('mixedPractice').onclick=startMixedPractice;
 document.getElementById('clearPracticeProgress').onclick=()=>{
  if(!confirm(`Clear saved practice progress for ${level.label}?`))return;
  const all=loadPracticeProgress();delete all[selectedLevelId];savePracticeProgress(all);showPracticeExercises();
 };
}
function shuffledCopy(items){
 const result=items.map(item=>JSON.parse(JSON.stringify(item)));
 for(let i=result.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[result[i],result[j]]=[result[j],result[i]]}
 return result;
}
function startConceptPractice(conceptId){
 const bank=PRACTICE_EXERCISES[selectedLevelId];
 const module=bank.concepts.find(item=>item.id===conceptId);
 if(!module)return;
 practiceSession={
  levelId:selectedLevelId,conceptId,moduleName:module.name,mixed:false,
  questions:shuffledCopy(module.questions),index:0,score:0,answered:false,selected:null,
  results:[]
 };
 renderPracticeQuestion();
}
function startMixedPractice(){
 const bank=PRACTICE_EXERCISES[selectedLevelId];
 const selected=bank.concepts.map(module=>{
  const q=module.questions[Math.floor(Math.random()*module.questions.length)];
  const copy=JSON.parse(JSON.stringify(q));copy.conceptName=module.name;return copy;
 });
 practiceSession={
  levelId:selectedLevelId,conceptId:'mixed',moduleName:'Mixed Practice',mixed:true,
  questions:shuffledCopy(selected),index:0,score:0,answered:false,selected:null,
  results:[]
 };
 renderPracticeQuestion();
}
function renderPracticeQuestion(){
 const s=practiceSession;if(!s)return showPracticeExercises();
 const item=s.questions[s.index];
 const choices=item.choices.map((choice,index)=>{
  let cls='';
  if(s.answered){
   if(index===item.answer)cls='correct';
   else if(index===s.selected)cls='incorrect';
  }
  return `<button class="practice-answer ${cls}" data-practice-answer="${index}" ${s.answered?'disabled':''}><span>${String.fromCharCode(65+index)}</span><b>${escapeHtml(choice)}</b></button>`;
 }).join('');
 const feedback=s.answered?(()=>{
  const correct=s.selected===item.answer;
  return `<div class="practice-feedback ${correct?'correct':'incorrect'}"><h3>${correct?'✓ Correct':'✗ Not quite'}</h3><p>${escapeHtml(item.explanation)}</p></div>`;
 })():'';
 document.getElementById('app').innerHTML=`<button class="home-floating" id="practiceExit">⌂ Home</button><main class="container"><section class="card practice-question-card">
  <div class="practice-question-top"><button class="btn btn-secondary" id="backToConcepts">← Concepts</button><div><b>${escapeHtml(s.moduleName)}</b><span>${s.index+1} of ${s.questions.length}</span></div></div>
  <div class="progress-track"><div class="progress-fill" style="width:${Math.round((s.index+(s.answered?1:0))/s.questions.length*100)}%"></div></div>
  ${item.conceptName?`<span class="concept-category mixed-label">${escapeHtml(item.conceptName)}</span>`:''}
  ${item.passage?`<div class="practice-passage">${escapeHtml(item.passage)}</div>`:''}
  <div class="practice-prompt">${escapeHtml(item.prompt)}</div>
  <div class="practice-answers">${choices}</div>
  ${feedback}
  <div class="practice-question-actions">${s.answered?`<button class="btn btn-primary" id="practiceNext">${s.index===s.questions.length-1?'See results':'Next question →'}</button>`:'<span>Choose the best answer.</span>'}</div>
 </section></main>`;
 document.getElementById('practiceExit').onclick=goHome;
 document.getElementById('backToConcepts').onclick=showPracticeExercises;
 document.querySelectorAll('[data-practice-answer]').forEach(el=>el.onclick=()=>answerPracticeQuestion(Number(el.dataset.practiceAnswer)));
 const next=document.getElementById('practiceNext');
 if(next)next.onclick=()=>{
  if(s.index===s.questions.length-1)finishPracticeSession();
  else{s.index++;s.answered=false;s.selected=null;renderPracticeQuestion()}
 };
}
function answerPracticeQuestion(index){
 const s=practiceSession;if(!s||s.answered)return;
 const item=s.questions[s.index];
 s.selected=index;s.answered=true;
 const correct=index===item.answer;
 if(correct)s.score++;
 s.results.push({prompt:item.prompt,selected:index,answer:item.answer,correct,explanation:item.explanation});
 renderPracticeQuestion();
}
function finishPracticeSession(){
 const s=practiceSession;if(!s)return;
 if(!s.mixed){
  const progress=loadPracticeProgress();
  progress[s.levelId]=progress[s.levelId]||{};
  const current=progress[s.levelId][s.conceptId]||{best:0,attempts:0};
  current.best=Math.max(Number(current.best||0),s.score);
  current.attempts=Number(current.attempts||0)+1;
  current.last=s.score;
  current.updated=new Date().toISOString();
  progress[s.levelId][s.conceptId]=current;savePracticeProgress(progress);
 }
 const mastery=practiceMastery(s.score,s.questions.length);
 const missed=s.results.filter(result=>!result.correct);
 document.getElementById('app').innerHTML=`<main class="container"><section class="card practice-results">
  <span class="badge">${s.mixed?'Mixed practice':'Concept practice'}</span>
  <h1>${escapeHtml(s.moduleName)}</h1>
  <div class="practice-result-score"><b>${s.score}/${s.questions.length}</b><span>${Math.round(s.score/s.questions.length*100)}%</span></div>
  <div class="mastery-banner ${mastery.className}">${mastery.label}</div>
  <p>${s.score===s.questions.length?'Excellent work. You answered every question correctly.':`${missed.length} question${missed.length===1?'':'s'} can be practiced again.`}</p>
  <div class="practice-result-actions"><button class="btn btn-primary" id="retryPractice">Practice again</button><button class="btn btn-secondary" id="returnConcepts">Choose another concept</button><button class="btn btn-ghost" id="resultHome">Home</button></div>
  ${missed.length?`<details class="missed-review"><summary><b>Review missed questions</b></summary>${missed.map(result=>`<article><h3>${escapeHtml(result.prompt)}</h3><p>${escapeHtml(result.explanation)}</p></article>`).join('')}</details>`:''}
 </section></main>`;
 document.getElementById('retryPractice').onclick=()=>s.mixed?startMixedPractice():startConceptPractice(s.conceptId);
 document.getElementById('returnConcepts').onclick=showPracticeExercises;
 document.getElementById('resultHome').onclick=goHome;
}

function selectLevel(id){
 if(!LEVELS[id]) return;
 selectedLevelId=id;
 localStorage.setItem(LEVEL_STORAGE_KEY,id);
 home();
}
function bindLevelNavigation(){
 document.querySelectorAll('[data-level]').forEach(el=>el.onclick=()=>selectLevel(el.dataset.level));
}
function goHome(){
 stopTimer();
 stopAudio();
 state.screen='home';
 save();
 home();
}

function intro(){
 stopTimer(); const sec=currentSection(); const timed=state.timed; const qn=sectionQuestions(sec).length;
 const details={auditory:'Listen to and read one passage, then answer 6 questions. You may replay the passage as many times as you need.',reading:'Read three passages and answer 18 questions. You may look back at each passage.',math:'Answer 24 questions. You may use scratch paper, but no calculator is needed.'};
 document.getElementById('app').innerHTML=`<button class="home-floating" onclick="goHome()">⌂ Home</button><main class="container"><section class="card section-intro"><span class="badge">${state.sectionPractice?'Section practice':`Section ${state.sectionIndex+1} of 3`}</span><h1>${labels[sec]}</h1><p>${details[sec]}</p>
 <div class="section-list"><div><b>Questions</b><span>${qn}</span></div><div><b>Timing</b><span>${timed?`${TEST[sec].minutes} minutes`:'Untimed'}</span></div>${sec==='auditory'?'<div><b>Audio replays</b><span>Unlimited</span></div>':''}</div>
 <div class="note">Choose the best answer for every question. You can go back, change answers, and flag questions for review.</div>
 <div style="margin-top:22px;display:flex;gap:10px"><button class="btn btn-primary" id="beginSection">Begin ${labels[sec]}</button><button class="btn btn-secondary" id="backHome">Back to start</button></div></section></main>`;
 document.getElementById('beginSection').onclick=()=>{state.screen=sec==='auditory'?'audio':'test';state.qIndex=0;save();render()};
 document.getElementById('backHome').onclick=goHome;
}

function topbar(sec){return `<header class="topbar"><div class="topbar-inner"><button class="topbar-home" onclick="goHome()" aria-label="Return to ReadySetPrep home">⌂ Home</button><div class="brand">ReadySetPrep · ${currentTestInfo().label}</div><div class="section-title">${labels[sec]}</div><div class="timer ${state.timed&&state.timeLeft[sec]<=60?'warn':''}">${state.timed?fmtTime(state.timeLeft[sec]):'Untimed'}</div></div></header>`}

function audioScreen(){
 stopTimer(); const sec='auditory';
 document.getElementById('app').innerHTML=`${topbar(sec)}<main class="container"><div class="passage-layout">
 <section class="card audio-panel passage-card"><div class="audio-icon">🔊</div><h1>Listen to the passage</h1><p>You may listen while reading the passage, and you may replay it as many times as needed.</p>
 <div class="audio-controls"><button class="btn btn-primary" id="playAudio">▶ Play / Resume</button><button class="btn btn-secondary" id="pauseAudio">⏸ Pause</button><button class="btn btn-secondary" id="restartAudio">↻ Restart</button><button class="btn btn-secondary" id="stopAudio">■ Stop</button></div>
 <div class="play-count" id="playCount">Played ${state.audioPlays} time${state.audioPlays===1?'':'s'}</div>
 <div class="success-note" style="margin-top:20px">The passage and every auditory question with all four answer choices can be read aloud. Each question plays automatically when opened.</div>
 <div style="margin-top:24px"><button class="btn btn-primary" id="beginQuestions">Begin Questions</button></div></section>
 <section class="card"><span class="badge">Auditory Passage</span><h2 style="margin-top:14px">${escapeHtml(TEST.auditory.title||'Auditory Passage')}</h2><div class="passage-text">${escapeHtml(TEST.auditory.passage)}</div></section>
 </div></main>`;
 bindAudioControls();
 document.getElementById('beginQuestions').onclick=()=>{stopAudio();lastAutoReadQuestionKey='';state.screen='test';save();render()};
 startTimer();
}
let speechPaused=false;
let activeUtterance=null;
let activeSpeechText='';
let activeSpeechMode='passage';
let lastAutoReadQuestionKey='';

function htmlToSpeechText(value){
 const holder=document.createElement('div');
 holder.innerHTML=value||'';
 return holder.textContent||holder.innerText||'';
}
function choiceSpeechText(choice){return choice.text||htmlToSpeechText(choice.html||'')}
function auditoryQuestionSpeech(item){
 return `Question ${item.num}. ${htmlToSpeechText(item.prompt)}. `+
  item.choices.map(choice=>`Answer ${choice.label}. ${choiceSpeechText(choice)}.`).join(' ');
}
function updateAudioControls(){
 const passagePlay=document.getElementById('playAudio');
 const questionPlay=document.getElementById('playQuestionAudio');
 const pause=document.getElementById('pauseAudio');
 if(passagePlay)passagePlay.textContent=(speechPaused&&activeSpeechMode==='passage')?'▶ Resume passage':'▶ Play / Resume';
 if(questionPlay)questionPlay.textContent=(speechPaused&&activeSpeechMode==='question')?'▶ Resume question':'🔊 Read question';
 if(pause)pause.disabled=!('speechSynthesis' in window)||!speechSynthesis.speaking||speechSynthesis.paused;
}
function speakText(text,mode,countPassage=false){
 if(!('speechSynthesis' in window)){alert('Audio is not available in this browser. Try opening the page in Chrome.');return}
 speechSynthesis.cancel();
 activeSpeechText=text;activeSpeechMode=mode;
 activeUtterance=new SpeechSynthesisUtterance(text);
 activeUtterance.rate=.88;activeUtterance.pitch=1;activeUtterance.volume=1;
 const voices=speechSynthesis.getVoices();
 const preferred=voices.find(v=>/Samantha|Google US English|Microsoft Aria|English.*United States/i.test(v.name));
 if(preferred)activeUtterance.voice=preferred;
 activeUtterance.onend=()=>{speechPaused=false;activeUtterance=null;updateAudioControls()};
 activeUtterance.onerror=()=>{speechPaused=false;activeUtterance=null;updateAudioControls()};
 if(countPassage){
  state.audioPlays++;save();
  const count=document.getElementById('playCount');
  if(count)count.textContent=`Passage played ${state.audioPlays} time${state.audioPlays===1?'':'s'}`;
 }
 speechSynthesis.speak(activeUtterance);speechPaused=false;updateAudioControls();
}
function playAudio(){
 if(speechSynthesis.paused&&activeSpeechMode==='passage'){speechSynthesis.resume();speechPaused=false;updateAudioControls();return}
 if(speechSynthesis.speaking&&activeSpeechMode==='passage'){return}
 speakText(TEST.auditory.passage,'passage',true);
}
function readAuditoryQuestion(item){
 if(speechSynthesis.paused&&activeSpeechMode==='question'){speechSynthesis.resume();speechPaused=false;updateAudioControls();return}
 if(speechSynthesis.speaking&&activeSpeechMode==='question'){return}
 speakText(auditoryQuestionSpeech(item),'question',false);
}
function pauseAudio(){
 if('speechSynthesis' in window&&speechSynthesis.speaking&&!speechSynthesis.paused){
  speechSynthesis.pause();speechPaused=true;updateAudioControls();
 }
}
function restartAudio(){
 const text=activeSpeechText||TEST.auditory.passage;
 const mode=activeSpeechText?activeSpeechMode:'passage';
 speakText(text,mode,mode==='passage');
}
function restartQuestionAudio(item){speakText(auditoryQuestionSpeech(item),'question',false)}
function readPassageFromQuestion(){speakText(TEST.auditory.passage,'passage',true)}
function stopAudio(){
 if('speechSynthesis' in window)speechSynthesis.cancel();
 speechPaused=false;activeUtterance=null;activeSpeechText='';updateAudioControls();
}
function bindAudioControls(){
 const play=document.getElementById('playAudio');if(play)play.onclick=playAudio;
 const pause=document.getElementById('pauseAudio');if(pause)pause.onclick=pauseAudio;
 const restart=document.getElementById('restartAudio');if(restart)restart.onclick=restartAudio;
 const stop=document.getElementById('stopAudio');if(stop)stop.onclick=stopAudio;
 updateAudioControls();
}
function bindAuditoryQuestionControls(item){
 const read=document.getElementById('playQuestionAudio');if(read)read.onclick=()=>readAuditoryQuestion(item);
 const pause=document.getElementById('pauseAudio');if(pause)pause.onclick=pauseAudio;
 const restart=document.getElementById('restartQuestionAudio');if(restart)restart.onclick=()=>restartQuestionAudio(item);
 const passage=document.getElementById('playPassageAudio');if(passage)passage.onclick=readPassageFromQuestion;
 const stop=document.getElementById('stopAudio');if(stop)stop.onclick=stopAudio;
 updateAudioControls();
}

function renderTest(){
 const sec=currentSection(),qs=currentQuestions(),item=qs[state.qIndex],ans=state.answers[sec]?.[item.num],flag=!!state.flags[sec]?.[item.num];
 state.eliminations=state.eliminations||{auditory:{},reading:{},math:{}};
 state.eliminations[sec]=state.eliminations[sec]||{};
 const eliminated=state.eliminations[sec][item.num]||[];
 const isReading=sec==='reading',isAuditory=sec==='auditory';
 const auditoryBar=isAuditory?`<div class="audio-controls compact-audio-controls" style="justify-content:flex-start;margin:0 0 15px">
 <button class="btn btn-primary" id="playQuestionAudio">🔊 Read question</button>
 <button class="btn btn-secondary" id="pauseAudio">⏸ Pause</button>
 <button class="btn btn-secondary" id="restartQuestionAudio">↻ Restart question</button>
 <button class="btn btn-secondary" id="playPassageAudio">📖 Read passage</button>
 <button class="btn btn-secondary" id="stopAudio">■ Stop</button>
 <span class="play-count" id="playCount">Passage played ${state.audioPlays} time${state.audioPlays===1?'':'s'}</span>
 </div>`:'';
 const choicesHtml=item.choices.map(c=>{
  const isEliminated=eliminated.includes(c.label);
  return `<div class="choice-row ${isEliminated?'eliminated':''}">
   <button class="eliminate-btn" data-eliminate="${c.label}" title="${isEliminated?'Restore':'Eliminate'} answer ${c.label}" aria-label="${isEliminated?'Restore':'Eliminate'} answer ${c.label}">×</button>
   <div class="choice ${ans===c.label?'selected':''}" data-choice="${c.label}" role="button" tabindex="0" aria-label="Choose answer ${c.label}">
    <span class="choice-letter">${c.label}</span>
    <div class="choice-content">${c.html||escapeHtml(c.text)}</div>
   </div>
  </div>`;
 }).join('');
 const questionHtml=`<section class="card question-card"><div class="question-meta"><span>Question ${item.num}</span><span>${state.qIndex+1} of ${qs.length}</span></div>${auditoryBar}<div class="question-prompt">${item.prompt}</div>${item.visual?`<div class="visual">${item.visual}</div>`:''}<p class="elimination-note">Select an answer, or use × to eliminate a choice.</p><div class="choices">${choicesHtml}</div><div class="nav-row"><div class="nav-left"><button class="btn btn-secondary" id="prevBtn" ${state.qIndex===0?'disabled':''}>← Previous</button><button class="btn btn-secondary flag-btn ${flag?'flagged':''}" id="flagBtn">${flag?'★ Flagged':'☆ Flag for review'}</button></div><div class="nav-right"><button class="btn btn-secondary" id="reviewBtn">Review section</button><button class="btn btn-primary" id="nextBtn">${state.qIndex===qs.length-1?'Finish section':'Next →'}</button></div></div></section>`;
 let main;
 if(isReading){main=`<div class="passage-layout"><section class="card passage-card"><span class="badge">Passage for Questions ${Math.floor((item.num-1)/6)*6+1}–${Math.floor((item.num-1)/6)*6+6}</span><h2>${escapeHtml(item.passageTitle)}</h2><div class="passage-text">${escapeHtml(item.passageText)}</div></section>${questionHtml}</div>`}
 else if(isAuditory){main=`<div class="passage-layout"><section class="card passage-card"><span class="badge">Auditory Passage — Questions 1–6</span><h2>${escapeHtml(TEST.auditory.title||'Auditory Passage')}</h2><div class="passage-text">${escapeHtml(TEST.auditory.passage)}</div><hr style="border:0;border-top:1px solid #e4e7ec;margin:22px 0">${sidebar(sec,qs)}</section>${questionHtml}</div>`}
 else main=`<div class="question-only-layout">${questionHtml}</div>`;
 document.getElementById('app').innerHTML=`${topbar(sec)}<main class="container">${main}</main>`;
 bindTestEvents(sec,qs,item);
 startTimer();
}
function sidebar(sec,qs){
 const pct=Math.round(totalAnswered(sec)/qs.length*100);
 return `<b>${totalAnswered(sec)} of ${qs.length} answered</b><div class="progress-track" style="margin-top:10px"><div class="progress-fill" style="width:${pct}%"></div></div><div class="q-palette">${qs.map((x,i)=>`<button class="q-dot ${state.answers[sec]?.[x.num]?'answered':''} ${state.flags[sec]?.[x.num]?'flagged':''} ${i===state.qIndex?'current':''}" data-jump="${i}">${x.num}</button>`).join('')}</div><p class="footer-note">Green = answered<br>★ = flagged</p>`
}
function bindTestEvents(sec,qs,item){
 document.querySelectorAll('[data-choice]').forEach(el=>{
  const choose=()=>{
   const label=el.dataset.choice;
   state.eliminations=state.eliminations||{auditory:{},reading:{},math:{}};
   state.eliminations[sec]=state.eliminations[sec]||{};
   const current=state.eliminations[sec][item.num]||[];
   state.eliminations[sec][item.num]=current.filter(x=>x!==label);
   state.answers[sec][item.num]=label;
   save();renderTest();
  };
  el.onclick=choose;
  el.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();choose()}};
 });
 document.querySelectorAll('[data-eliminate]').forEach(btn=>{
  btn.onclick=e=>{
   e.preventDefault();e.stopPropagation();
   const label=btn.dataset.eliminate;
   state.eliminations=state.eliminations||{auditory:{},reading:{},math:{}};
   state.eliminations[sec]=state.eliminations[sec]||{};
   const current=state.eliminations[sec][item.num]||[];
   if(current.includes(label)){
    state.eliminations[sec][item.num]=current.filter(x=>x!==label);
   }else{
    state.eliminations[sec][item.num]=[...current,label];
    if(state.answers[sec][item.num]===label)delete state.answers[sec][item.num];
   }
   save();renderTest();
  };
 });
 document.querySelectorAll('[data-jump]').forEach(el=>el.onclick=()=>{state.qIndex=Number(el.dataset.jump);save();renderTest()});
 const prev=document.getElementById('prevBtn');if(prev)prev.onclick=()=>{if(state.qIndex>0){state.qIndex--;save();renderTest()}};
 document.getElementById('flagBtn').onclick=()=>{state.flags[sec][item.num]=!state.flags[sec][item.num];save();renderTest()};
 document.getElementById('reviewBtn').onclick=()=>{state.screen='sectionReview';save();render()};
 document.getElementById('nextBtn').onclick=()=>{if(state.qIndex<qs.length-1){state.qIndex++;save();renderTest()}else{state.screen='sectionReview';save();render()}};
 if(sec==='auditory'){
  bindAuditoryQuestionControls(item);
  const questionKey=`${selectedTestId}:${item.num}`;
  if(lastAutoReadQuestionKey!==questionKey){
   lastAutoReadQuestionKey=questionKey;
   setTimeout(()=>readAuditoryQuestion(item),250);
  }
 }
}

function sectionReview(){
 stopTimer(); const sec=currentSection(),qs=currentQuestions(); const missing=qs.filter(x=>!state.answers[sec]?.[x.num]); const flagged=qs.filter(x=>state.flags[sec]?.[x.num]);
 document.getElementById('app').innerHTML=`${topbar(sec)}<main class="container"><section class="card section-intro"><h1>Review ${labels[sec]}</h1><div class="review-grid"><div class="score-box"><span>Answered</span><b>${qs.length-missing.length}/${qs.length}</b></div><div class="score-box"><span>Not answered</span><b>${missing.length}</b></div><div class="score-box"><span>Flagged</span><b>${flagged.length}</b></div></div>
 ${missing.length?`<div class="note"><b>Not answered:</b> ${missing.map(x=>x.num).join(', ')}</div>`:'<div class="success-note">Every question has an answer.</div>'}
 ${flagged.length?`<p><b>Flagged for review:</b> ${flagged.map(x=>x.num).join(', ')}</p>`:''}
 <div class="q-palette" style="max-width:520px">${qs.map((x,i)=>`<button class="q-dot ${state.answers[sec]?.[x.num]?'answered':''} ${state.flags[sec]?.[x.num]?'flagged':''}" data-jump="${i}">${x.num}</button>`).join('')}</div>
 <div style="margin-top:24px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-secondary" id="returnQuestions">Return to questions</button><button class="btn btn-primary" id="submitSection">Submit section</button></div></section></main>`;
 document.querySelectorAll('[data-jump]').forEach(el=>el.onclick=()=>{state.qIndex=Number(el.dataset.jump);state.screen='test';save();render()});
 document.getElementById('returnQuestions').onclick=()=>{state.screen='test';save();render()};
 document.getElementById('submitSection').onclick=()=>{if(missing.length&&!confirm(`There are ${missing.length} unanswered questions. Submit anyway?`))return;state.sectionSubmitted[sec]=true;finishSection(false)};
}
function finishSection(fromTimer){
 stopAudio(); stopTimer(); const sec=currentSection();
 if(state.sectionPractice){state.completed=true;state.screen='results';save();render();return;}
 if(state.sectionIndex<2){state.sectionIndex++;state.qIndex=0;state.screen='intro';save();render()}else{state.completed=true;state.screen='results';save();render()}
}
function results(){
 stopTimer();stopAudio();
 const completedSecs=state.sectionPractice?[state.sectionPractice]:sections;
 const scores=completedSecs.map(sec=>{
  const score=sectionScore(sec),total=sectionQuestions(sec).length;
  const percent=Math.round(score/total*100);
  return {sec,score,total,percent,stanine:estimatedPracticeStanine(percent)};
 });
 const total=scores.reduce((n,x)=>n+x.score,0),max=scores.reduce((n,x)=>n+x.total,0);
 const percent=Math.round(total/max*100);
 const fullTest=!state.sectionPractice&&completedSecs.length===3&&max===48;
 let review='';
 for(const sec of completedSecs){
  for(const item of sectionQuestions(sec)){
   const ua=state.answers[sec]?.[item.num]||'—';
   const ok=ua===item.answer;
   review+=`<article class="review-item ${ok?'correct':'incorrect'}"><h3>${labels[sec]} ${item.num}: ${escapeHtml(item.prompt)}</h3><div class="answer-line ${ok?'good':'bad'}">Your answer: ${ua}${ok?' ✓':' ✗'}</div>${!ok?`<div class="answer-line good">Correct answer: ${item.answer}</div>`:''}<p>${escapeHtml(item.explanation)}</p></article>`;
  }
 }
 const totalCard=fullTest?`<div class="score-box"><span>Total score</span><b>${total}/${max}</b><small>${percent}%</small></div>`:'';
 const stanineNote=`<div class="success-note" style="margin:18px 0">
  <b>About the section stanines:</b> Each Auditory, Reading, and Mathematics stanine shown here is a practice-only estimate based on the percentage correct in that section. No overall full-test stanine is calculated. These are not official ISEE stanines; official results use grade-level scaled scores and normative data.
  <details style="margin-top:10px"><summary><b>Show practice stanine score bands</b></summary>
   <div style="margin-top:10px;line-height:1.7">
    Stanine 1: below 35% &nbsp;•&nbsp; 2: 35–44% &nbsp;•&nbsp; 3: 45–54% &nbsp;•&nbsp; 4: 55–64%<br>
    Stanine 5: 65–74% &nbsp;•&nbsp; 6: 75–82% &nbsp;•&nbsp; 7: 83–89% &nbsp;•&nbsp; 8: 90–95% &nbsp;•&nbsp; 9: 96–100%
   </div>
  </details>
 </div>`;
 document.getElementById('app').innerHTML=`<button class="home-floating" onclick="goHome()">⌂ Home</button><main class="container"><section class="card"><span class="badge">Completed</span><h1>${escapeHtml(state.student)}’s Results</h1>
 <div class="review-grid">${scores.map(x=>`<div class="score-box"><span>${labels[x.sec]}</span><b>${x.score}/${x.total}</b><small>${x.percent}% · Est. stanine ${x.stanine}</small></div>`).join('')}${totalCard}</div>
 ${stanineNote}
 <div class="result-actions" style="display:flex;gap:10px;flex-wrap:wrap;margin:18px 0"><button class="btn btn-primary" onclick="window.print()">Print results</button><button class="btn btn-secondary" id="retakeBtn">Retake test</button><button class="btn btn-secondary" id="homeBtn">Back to start</button></div>
 ${completedSecs.includes('auditory')?`<details><summary><b>Show auditory passage transcript</b></summary><div class="transcript">${escapeHtml(TEST.auditory.passage)}</div></details>`:''}
 <h2 style="margin-top:28px">Answer review</h2>${review}</section></main>`;
 document.getElementById('retakeBtn').onclick=()=>{const student=state.student||'Student';localStorage.removeItem(STORAGE_KEY);state=freshState(student);home()};
 document.getElementById('homeBtn').onclick=goHome;
}
function render(){
 if(state.screen==='home')home(); else if(state.screen==='intro')intro(); else if(state.screen==='audio')audioScreen(); else if(state.screen==='test')renderTest(); else if(state.screen==='sectionReview')sectionReview(); else if(state.screen==='results')results(); else home();
}
window.addEventListener('beforeunload',save);
state.screen='home';home();
</script>
</body></html>
