<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ReadySetPrep — ISEE Practice, All Levels</title>
<style>
:root{--ink:#182230;--muted:#667085;--line:#d0d5dd;--panel:#fff;--page:#f3f6fb;--brand:#3056a3;--brand2:#e9effb;--ok:#067647;--bad:#b42318;--warn:#b54708;--shadow:0 8px 30px rgba(16,24,40,.10)}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:var(--ink);background:var(--page);font-size:17px;line-height:1.5}
button,input,textarea{font:inherit}
.app{min-height:100vh}
.topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
.topbar-inner{max-width:1180px;margin:auto;padding:12px 20px;display:flex;align-items:center;gap:16px}
.brand{font-weight:800;color:var(--brand);font-size:18px;white-space:nowrap}
.section-title{font-weight:700;flex:1;text-align:center}
.timer{font-variant-numeric:tabular-nums;font-weight:800;border:1px solid var(--line);border-radius:999px;padding:5px 12px;min-width:84px;text-align:center}
.timer.warn{color:var(--bad);border-color:#fda29b;background:#fef3f2}
.hidden{display:none!important}

.container{max-width:1180px;margin:0 auto;padding:28px 20px 70px}
.card{background:var(--panel);border:1px solid #e4e7ec;border-radius:18px;box-shadow:var(--shadow);padding:28px}
.hero{max-width:900px;margin:24px auto}
.hero h1{font-size:34px;line-height:1.15;margin:0 0 12px}
.hero p{color:var(--muted)}

.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:22px 0}
.mode-card{border:2px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;background:#fff;transition:.15s}
.mode-card:hover{border-color:#98a2b3;transform:translateY(-1px)}
.mode-card.selected{border-color:var(--brand);background:var(--brand2)}
.mode-card h3{margin:0 0 6px;font-size:19px}
.mode-card p{font-size:14px;margin:0;color:var(--muted)}
.badge{display:inline-block;font-size:12px;font-weight:800;padding:3px 8px;border-radius:99px;background:#eef4ff;color:#3538cd;margin-bottom:8px}

.input-row{display:flex;gap:12px;align-items:center;margin:16px 0;flex-wrap:wrap}
.input-row label{font-weight:700}
.input-row input{flex:1;border:1px solid var(--line);border-radius:10px;padding:11px 12px;max-width:320px}
.btn{border:0;border-radius:11px;padding:12px 18px;font-weight:800;cursor:pointer}
.btn-primary{background:var(--brand);color:#fff}
.btn-secondary{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn-ghost{background:transparent;color:var(--brand)}
.btn-danger{background:#fff0ee;color:var(--bad);border:1px solid #fda29b}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-sm{padding:8px 14px;font-size:13px}
.btn-block{width:100%}
.action-row{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}

.test-layout{display:grid;grid-template-columns:280px minmax(0,1fr);gap:20px}
.sidebar{position:sticky;top:74px;align-self:start}
.progress-track{height:10px;background:#e4e7ec;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:var(--brand);width:0}
.q-palette{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px}
.q-dot{position:relative;height:38px;border-radius:9px;border:1px solid var(--line);background:white;font-weight:700;cursor:pointer}
.q-dot.answered{background:#e7f6ec;border-color:#75c99b;color:#05603a}
.q-dot.flagged::after{content:'★';font-size:9px;color:#f79009;position:absolute;top:-6px;right:-4px}
.q-dot.current{outline:3px solid #b2c5ed;border-color:var(--brand)}
.palette-legend{color:var(--muted);font-size:13px;margin-top:10px;line-height:1.6}

.question-card{min-height:420px}
.question-meta{display:flex;justify-content:space-between;color:var(--muted);font-weight:700;margin-bottom:10px;font-size:14px}
.question-prompt{font-size:22px;font-weight:800;line-height:1.35;margin:10px 0 18px}
.visual{border:1px solid #e4e7ec;background:#fbfcfe;border-radius:14px;padding:18px;margin:10px 0 20px;overflow:auto}
.choices{display:grid;gap:11px}
.choice{display:flex;gap:13px;align-items:flex-start;border:2px solid var(--line);border-radius:13px;padding:14px 16px;cursor:pointer;background:white;transition:.12s}
.choice:hover{border-color:#98a2b3}
.choice.selected{border-color:var(--brand);background:#f1f5fd}
.choice-letter{flex:0 0 32px;height:32px;border:1px solid #98a2b3;border-radius:50%;display:grid;place-items:center;font-weight:900;background:white;font-size:14px}
.choice-content{flex:1;min-width:0}
.nav-row{display:flex;justify-content:space-between;gap:12px;margin-top:22px;flex-wrap:wrap}
.nav-left,.nav-right{display:flex;gap:10px;flex-wrap:wrap}
.flag-btn.flagged{color:var(--warn);background:#fff7ed;border-color:#fed7aa}

.passage-layout{display:grid;grid-template-columns:minmax(280px,44%) minmax(0,1fr);gap:20px}
.passage-card{max-height:calc(100vh - 130px);overflow:auto;position:sticky;top:74px;align-self:start}
.passage-card h2{margin-top:0;font-size:20px}
.passage-text{white-space:pre-line;font-size:16px;line-height:1.68}
.audio-panel{text-align:center;padding:22px}
.audio-icon{font-size:48px}
.audio-controls{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:16px 0}
.play-count{color:var(--muted);font-weight:700;font-size:14px}
.note{background:#fffaeb;border:1px solid #fedf89;color:#7a2e0e;border-radius:12px;padding:13px 15px}
.success-note{background:#ecfdf3;border:1px solid #abefc6;color:#05603a;border-radius:12px;padding:13px 15px}
.script-box{background:#fffaeb;border:2px dashed #fedf89;color:#7a2e0e;border-radius:12px;padding:14px 16px;margin-top:12px;text-align:left}
.script-box h5{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.03em}

.review-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:18px 0}
.score-box{border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
.score-box span{color:var(--muted);font-size:13px}
.score-box b{display:block;font-size:26px;margin-top:4px}
.review-item{border:1px solid var(--line);border-radius:14px;padding:16px;margin:12px 0}
.review-item.correct{border-left:6px solid #12b76a}
.review-item.incorrect{border-left:6px solid #f04438}
.review-item.skipped{border-left:6px solid #98a2b3}
.review-item h3{margin:0 0 8px;font-size:17px}
.answer-line{font-weight:700;font-size:14px}
.answer-line.good{color:var(--ok)}
.answer-line.bad{color:var(--bad)}
.transcript{white-space:pre-line;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:18px}

.footer-note{color:var(--muted);font-size:13px;margin-top:16px}
.footer-links{text-align:center;margin-top:18px}
.footer-links a{color:var(--muted);font-size:13px}
.section-intro{max-width:760px;margin:30px auto}
.section-intro h1{font-size:30px}
.section-list{display:grid;gap:10px;margin:18px 0}
.section-list div{display:flex;justify-content:space-between;border-bottom:1px solid #eaecf0;padding:8px 0}

.mini-table{border-collapse:collapse;width:100%;overflow:auto;display:block}
.mini-table table{border-collapse:collapse;width:100%}
.mini-table th,.mini-table td{border:1px solid var(--line);padding:10px;text-align:center}
.mini-table th{background:#eef2f8;font-weight:800}
.number-grid{display:grid;grid-template-columns:repeat(3,70px);gap:8px;justify-content:center}
.number-grid span{display:grid;place-items:center;height:54px;border:1px solid var(--line);border-radius:8px;background:white;font-weight:800}
.number-grid .mystery{color:var(--bad);background:#fff0ee;border:2px dashed #f97066}
.icon-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.visual-caption{text-align:center;color:var(--muted);margin-top:8px}

.bar-chart{height:220px;display:flex;align-items:flex-end;justify-content:center;gap:26px;border-left:2px solid #667085;border-bottom:2px solid #667085;padding:16px 20px 0;margin:0 auto;max-width:560px}
.bar-col{height:100%;width:66px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center}
.bar{width:50px;background:#b8c9e8;border:2px solid #385a9b;border-bottom:0;display:flex;align-items:flex-start;justify-content:center;min-height:15px}
.bar b{transform:translateY(-26px);font-size:14px}
.bar-col span{height:32px;padding-top:7px;font-size:13px}
.svg-wrap{max-width:480px;margin:auto}
.svg-wrap svg{width:100%;height:auto}

.cherry-row{display:flex;gap:3px;flex-wrap:wrap;align-items:center;justify-content:center}
.single-cherry{width:18px;height:18px;border-radius:50%;background:#d94841;border:2px solid #9b2c26;display:inline-block;position:relative;margin:5px}
.single-cherry:before{content:'';position:absolute;width:8px;height:9px;border-left:2px solid #2f855a;left:8px;top:-8px;transform:rotate(24deg)}

.tool-choice{display:flex;align-items:center;gap:10px}
.tool-choice span{font-size:26px}

.base-ten{display:flex;gap:22px;align-items:flex-end;justify-content:center;flex-wrap:wrap}
.hundreds,.tens,.ones{display:flex;gap:6px;align-items:flex-end}
.hundred{width:58px;height:58px;border:2px solid #385a9b;background:repeating-linear-gradient(0deg,#d8e2f4 0 5px,#b8c9e8 6px 7px),repeating-linear-gradient(90deg,transparent 0 5px,#b8c9e8 6px 7px)}
.ten{width:13px;height:64px;border:2px solid #385a9b;background:repeating-linear-gradient(0deg,#d8e2f4 0 5px,#b8c9e8 6px 7px)}
.one{width:16px;height:16px;border:2px solid #385a9b;background:#d8e2f4}

.marble-bag{max-width:400px;margin:auto;border:4px solid #8b6c4c;border-radius:16px 16px 45px 45px;padding:15px;background:#fffaf2}
.bag-label{text-align:center;font-weight:800;margin-bottom:12px;font-size:13px;color:var(--muted)}
.marbles{display:flex;gap:11px;flex-wrap:wrap;justify-content:center}
.marbles span{width:26px;height:26px;border-radius:50%;border:2px solid #344054;display:inline-block}
.marbles .green{background:#32a86d}
.marbles .red{background:#d94841}

.ruler-wrap{padding:20px 20px 6px;max-width:600px;margin:auto}
.pencil-line{height:18px;position:relative;border-top:8px solid #f1b33b}
.pencil-line:after{content:'';position:absolute;right:-16px;top:-12px;border-left:16px solid #d1a070;border-top:8px solid transparent;border-bottom:8px solid transparent}
.ticks{display:grid;border-top:3px solid #344054}
.tick{text-align:center}
.tick i{display:block;height:16px;border-left:2px solid #344054;margin:auto;width:1px}
.tick b{font-size:12px;font-weight:700}

.shape-choice svg{width:74px;height:50px}

/* --- ReadySetPrep additions on top of the base theme --- */
.level-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}
.level-card{border:2px solid var(--line);border-radius:16px;padding:16px 12px;text-align:center;cursor:pointer;background:#fff;transition:.15s}
.level-card:hover{border-color:#98a2b3}
.level-card.active{border-color:var(--brand);background:var(--brand2)}
.level-card .icon{font-size:24px}
.level-card h4{margin:6px 0 2px;font-size:14px}
.level-card p{margin:0;font-size:11px;color:var(--muted)}

.score-hero-stats{display:flex;gap:28px;flex-wrap:wrap;margin:18px 0}
.score-stat .big{font-weight:800;font-size:30px;line-height:1}
.score-stat .lbl{font-size:12px;color:var(--muted);margin-top:4px}
.stanine-details{margin-top:12px}
.stanine-details summary{cursor:pointer;font-weight:700;font-size:13px;color:var(--brand)}
.stanine-band-table{margin-top:10px;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:6px 14px}
.stanine-band-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #eaecf0;font-variant-numeric:tabular-nums}
.stanine-band-row:last-child{border-bottom:none}
.stanine-band-row.current{font-weight:800;color:var(--brand)}

.essay-textarea{width:100%;min-height:240px;border:1px solid var(--line);border-radius:14px;padding:16px;font-size:16px;line-height:1.6;resize:vertical}
.essay-meta{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-top:8px}
.essay-tag{display:inline-block;font-size:12px;font-weight:800;padding:3px 8px;border-radius:99px;background:#fffaeb;color:#7a2e0e;margin-bottom:10px}

.empty-state{text-align:center;padding:20px}
.empty-state .icon{font-size:34px;margin-bottom:8px}
.empty-state p{color:var(--muted);max-width:44ch;margin:6px auto 0}

.log-entry{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #eaecf0;font-size:14px;gap:10px;flex-wrap:wrap}
.log-entry:last-child{border-bottom:none}
.log-stamp{font-weight:800}
.empty-log{color:var(--muted);font-size:14px;padding:8px 0}

@media(max-width:900px){.mode-grid{grid-template-columns:1fr}.level-picker{grid-template-columns:repeat(2,1fr)}.test-layout{grid-template-columns:1fr}.sidebar{position:static}.passage-layout{grid-template-columns:1fr}.passage-card{position:static;max-height:none}.q-palette{grid-template-columns:repeat(8,1fr)}.hero h1{font-size:28px}}
@media(max-width:600px){body{font-size:16px}.container{padding:16px 10px 50px}.card{padding:18px;border-radius:14px}.topbar-inner{padding:10px}.brand{display:none}.section-title{text-align:left;font-size:15px}.question-prompt{font-size:19px}.q-palette{grid-template-columns:repeat(6,1fr)}.nav-row{flex-direction:column}.nav-left,.nav-right{justify-content:space-between}.review-grid{grid-template-columns:1fr}.choice{padding:12px}.mode-card{padding:16px}.score-hero-stats{gap:18px}}
@media print{.topbar,.sidebar,.nav-row,.audio-controls,.action-row,.footer-links{display:none!important}.container{max-width:none;padding:0}.card{box-shadow:none;border:0}.review-item{break-inside:avoid}.app{background:white}}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
