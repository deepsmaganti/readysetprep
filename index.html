an><span></span><span></span></div><b>Nina: 8</b></div><div><div class=\"array\" style=\"grid-template-columns:repeat(5,22px)\"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><b>Sam: 15, then gives away 5</b></div></div>"},{"num":21,"prompt":"A blue gem is worth $6. A pink gem is worth $2. Which group is worth the most?","choices":[{"label":"A","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem blue\">◆</span><span class=\"gem pink\">◆</span></div>"},{"label":"B","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span></div>"},{"label":"C","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span></div>"},{"label":"D","html":"<div class=\"gem-row\"><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span></div>"}],"answer":"B","explanation":"One blue gem and five pink gems are worth $6 + $10 = $16, which is the greatest value.","visual":null},{"num":22,"prompt":"Four books have different numbers of pages. Red: 63 pages. Yellow: 48 pages. Blue: 72 pages. Green: 55 pages. Which list orders the books from fewest pages to most pages?","choices":[{"label":"A","text":"blue, red, green, yellow"},{"label":"B","text":"green, yellow, red, blue"},{"label":"C","text":"yellow, red, green, blue"},{"label":"D","text":"yellow, green, red, blue"}],"answer":"D","explanation":"The page counts in order are 48, 55, 63, and 72.","visual":null},{"num":23,"prompt":"A bag contains 6 orange marbles and 2 blue marbles. If Sam closes his eyes and pulls out one marble, which statement is true?","choices":[{"label":"A","text":"It is more likely that Sam will pull an orange marble than a blue marble."},{"label":"B","text":"It is certain that Sam will pull a blue marble."},{"label":"C","text":"It is impossible for Sam to pull an orange marble."},{"label":"D","text":"It is possible for Sam to pull a green marble."}],"answer":"A","explanation":"There are more orange marbles than blue marbles, so orange is more likely.","visual":"<div class=\"marble-bag\"><div class=\"bag-label\">Bag of marbles</div><div class=\"marbles\"><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#4d75c9\"></span><span style=\"background:#4d75c9\"></span></div></div>"},{"num":24,"prompt":"The pencil begins at 1 inch and ends at 7 inches on the ruler. How long is the pencil?","choices":[{"label":"A","text":"5 inches"},{"label":"B","text":"7 inches"},{"label":"C","text":"6 inches"},{"label":"D","text":"8 inches"}],"answer":"C","explanation":"The pencil length is 7 − 1 = 6 inches.","visual":"<div class=\"ruler\"><div class=\"pencil-line\" style=\"margin-left:10%;width:60%\"><span></span></div><div class=\"ticks\"><div class=\"tick\"><i></i><b>0</b></div><div class=\"tick\"><i></i><b>1</b></div><div class=\"tick\"><i></i><b>2</b></div><div class=\"tick\"><i></i><b>3</b></div><div class=\"tick\"><i></i><b>4</b></div><div class=\"tick\"><i></i><b>5</b></div><div class=\"tick\"><i></i><b>6</b></div><div class=\"tick\"><i></i><b>7</b></div><div class=\"tick\"><i></i><b>8</b></div><div class=\"tick\"><i></i><b>9</b></div><div class=\"tick\"><i></i><b>10</b></div></div></div>"}],"minutes":26}},"primary2-test2":{"title":"ISEE Primary 2 Practice Test #2","auditory":{"passage":"On Friday afternoon, Mrs. Chen looked at the class garden and said, “The school will be closed for the long weekend. These plants still need water every day. I need a dependable volunteer.”\n\nMaya’s hand shot into the air. She loved the marigolds and bean plants, and she wanted to be in charge. Mrs. Chen smiled, but she did not choose Maya right away. “Caring for the garden means coming back to school on Saturday and Sunday,” she explained. “The plants cannot wait if you forget.”\n\nMaya nodded. That evening, she made a chart with one box for each day. She wrote down when she would water the plants and how much water each row needed. She asked her father whether he could drive her to school on Saturday. On Sunday, the family would walk there after breakfast. Maya even checked the weather report. Her friend Ben said rain might do the job, but Maya packed a rain jacket because she knew a forecast could change.\n\nThe next morning, Maya showed the chart to Mrs. Chen. She also demonstrated how she would measure the water. Mrs. Chen studied the plan and said, “You have thought about every day. I believe you are ready.”\n\nMaya followed her schedule all weekend. On Monday, the bean plants stood tall, and three new marigolds had opened. Mrs. Chen thanked her in front of the class. Maya’s smile stretched from ear to ear. She had not only cared for the garden; she had shown that a careful plan could turn a promise into action.","questions":[{"num":1,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"Maya learns how to grow marigolds from seeds."},{"label":"B","text":"Maya makes a careful plan so she can care for the class garden."},{"label":"C","text":"Mrs. Chen asks the class to build a new garden."},{"label":"D","text":"Ben and Maya disagree about whether it will rain."}],"answer":"B","explanation":"The whole passage focuses on Maya making and following a plan so she can care for the garden.","visual":null},{"num":2,"prompt":"Which is true about Maya?","choices":[{"label":"A","text":"She often forgets what she promises to do."},{"label":"B","text":"She wants Ben to do the work for her."},{"label":"C","text":"She plans ahead and is willing to work hard."},{"label":"D","text":"She is afraid to visit the school on Saturday."}],"answer":"C","explanation":"Maya checks the weather, arranges transportation, and makes a schedule. These details show planning and hard work.","visual":null},{"num":3,"prompt":"Why was Mrs. Chen unsure about choosing Maya at first?","choices":[{"label":"A","text":"Maya did not know the names of the flowers."},{"label":"B","text":"The garden was too far from Maya’s house."},{"label":"C","text":"Mrs. Chen wanted Ben to do the job instead."},{"label":"D","text":"The plants needed dependable care every day."}],"answer":"D","explanation":"Mrs. Chen explains that the plants need water every day and cannot wait if Maya forgets.","visual":null},{"num":4,"prompt":"Why did Maya show Mrs. Chen her chart?","choices":[{"label":"A","text":"She wanted to prove that she had a responsible plan."},{"label":"B","text":"She wanted to teach the class how to draw a chart."},{"label":"C","text":"She wanted to count how many flowers were blooming."},{"label":"D","text":"She wanted permission to take the plants home."}],"answer":"A","explanation":"The chart shows exactly when and how Maya will care for the plants, proving that she has a responsible plan.","visual":null},{"num":5,"prompt":"Maya’s smile “stretched from ear to ear.” What does that mean?","choices":[{"label":"A","text":"She was trying not to laugh."},{"label":"B","text":"She was surprised by a loud sound."},{"label":"C","text":"She had a very big, happy smile."},{"label":"D","text":"She was tired from carrying water."}],"answer":"C","explanation":"A smile that stretches from ear to ear is a very large, happy smile.","visual":null},{"num":6,"prompt":"Based on the passage, which is true about Mrs. Chen?","choices":[{"label":"A","text":"She was willing to trust Maya after seeing her careful plan."},{"label":"B","text":"She did not want any student to help with the garden."},{"label":"C","text":"She thought the flowers needed too much water."},{"label":"D","text":"She planned to remove the garden after the weekend."}],"answer":"A","explanation":"Mrs. Chen chooses Maya after she sees that Maya has carefully planned the work.","visual":null}],"minutes":7,"title":"The Class Garden"},"reading":{"passages":[{"title":"Sea Otters: Floating and Finding Food","text":"Sea otters spend much of their lives in the ocean. They can swim and dive, but they also rest on the water’s surface. A group of resting sea otters is sometimes called a raft because the animals float close together, almost like a small raft made of boats. Some otters even hold paws so they do not drift apart while they sleep.\n\nUnlike seals and whales, sea otters do not have a thick layer of fat to keep them warm. Instead, they have extremely dense fur. Dense means that many hairs grow close together. Air gets trapped between the hairs and helps keep cold ocean water away from the otter’s skin. Sea otters spend a lot of time cleaning and fluffing their fur so it continues to protect them.\n\nSea otters are also skillful hunters. Their sensitive whiskers help them feel tiny movements in dark or cloudy water. They eat animals such as clams, crabs, and sea urchins. Sometimes an otter carries a stone on its belly and uses it like a tool to crack open a hard shell.\n\nSea otters do more than look playful. By eating sea urchins, they help protect underwater forests of kelp. Too many sea urchins can eat large amounts of kelp. When otters keep the number of urchins under control, fish and other ocean animals have more places to live. Scientists continue to study the important part sea otters play in ocean habitats.","questions":[{"num":1,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Sea otters sleep all day and hunt only at night."},{"label":"B","text":"Sea otters are the only ocean animals that use tools."},{"label":"C","text":"Sea otters have thick fat that keeps them warm in cold water."},{"label":"D","text":"Sea otters have special features and behaviors that help them live in the ocean and support their habitat."}],"answer":"D","explanation":"The passage describes sea otters’ fur, whiskers, tools, group behavior, and role in the ocean habitat.","visual":null},{"num":2,"prompt":"Why is a group of resting sea otters sometimes called a “raft”?","choices":[{"label":"A","text":"The otters build a wooden raft to sleep on."},{"label":"B","text":"The otters float close together like a group of small boats."},{"label":"C","text":"The otters travel down rivers to reach the ocean."},{"label":"D","text":"The otters carry stones that look like tiny rafts."}],"answer":"B","explanation":"The otters float close together, which makes the group look like a raft made of small boats.","visual":null},{"num":3,"prompt":"According to the passage, what do an otter’s whiskers help it do?","choices":[{"label":"A","text":"Feel small movements in the water."},{"label":"B","text":"Keep its body warm."},{"label":"C","text":"Crack open hard shells."},{"label":"D","text":"Hold another otter’s paw."}],"answer":"A","explanation":"The passage says sensitive whiskers help otters feel tiny movements in dark or cloudy water.","visual":null},{"num":4,"prompt":"How does a sea otter’s fur help it stay warm?","choices":[{"label":"A","text":"The fur makes the otter swim faster."},{"label":"B","text":"The fur changes color in cold water."},{"label":"C","text":"Air trapped in the thick fur helps keep water away from its skin."},{"label":"D","text":"The fur grows into a layer of fat during winter."}],"answer":"C","explanation":"Air trapped inside dense fur helps keep cold water away from the otter’s skin.","visual":null},{"num":5,"prompt":"In the passage, what does “dense” most nearly mean?","choices":[{"label":"A","text":"Wet and shiny."},{"label":"B","text":"Thick and closely packed."},{"label":"C","text":"Soft and colorful."},{"label":"D","text":"Long and tangled."}],"answer":"B","explanation":"The passage explains that dense fur has many hairs growing close together.","visual":null},{"num":6,"prompt":"What is the purpose of the last paragraph?","choices":[{"label":"A","text":"To explain why sea otters are difficult to see."},{"label":"B","text":"To tell readers how to grow kelp at home."},{"label":"C","text":"To compare sea otters with seals and whales."},{"label":"D","text":"To explain how sea otters help other living things in the ocean."}],"answer":"D","explanation":"The last paragraph explains how otters protect kelp forests and help other ocean animals.","visual":null}]},{"title":"The Crooked Kite","text":"Darius wanted to build a kite for the spring festival. He found two thin sticks, bright blue paper, tape, and a long piece of string. He rushed through the work because he wanted to be the first person at the park. When he lifted the kite, one corner folded over and the kite fell to the ground.\n\nDarius felt disappointed, but his grandfather asked, “What did the kite teach you?” Darius looked closely and noticed that the paper was too loose. He carefully stretched a new sheet across the sticks and taped each edge. This time the kite rose into the air, but it spun in fast circles and soon crashed again.\n\nAfter watching another kite, Darius realized that his own kite needed a longer tail. He tied several strips of cloth to the bottom. The tail helped the kite balance, but a strong wind bent one of the thin sticks. For his final try, Darius replaced the sticks with sturdier ones that would not bend so easily.\n\nAt the festival, the blue kite climbed higher than the trees. Darius did not win the prize for finishing first. Instead, he won a ribbon for the kite that stayed in the air the longest. As he held the ribbon, he understood his grandfather’s question. Each mistake had been like a clue, pointing him toward a better design.","questions":[{"num":7,"prompt":"What is this passage mostly about?","choices":[{"label":"A","text":"Darius learns that careful changes after mistakes can help him improve his kite."},{"label":"B","text":"Darius’s grandfather builds a kite that wins the spring festival."},{"label":"C","text":"The spring festival gives prizes only to the fastest kite builders."},{"label":"D","text":"A strong wind ruins every kite at the park."}],"answer":"A","explanation":"Darius learns from each failed attempt and uses what he learns to improve the kite.","visual":null},{"num":8,"prompt":"Which happened first?","choices":[{"label":"A","text":"Darius added a longer tail."},{"label":"B","text":"One corner of the first kite folded over."},{"label":"C","text":"Darius won a ribbon."},{"label":"D","text":"Darius replaced the thin sticks."}],"answer":"B","explanation":"The first problem described is a folded corner on the first kite.","visual":null},{"num":9,"prompt":"Why did the second kite spin in circles?","choices":[{"label":"A","text":"Its paper was too loose."},{"label":"B","text":"Its string was too short."},{"label":"C","text":"It needed a longer tail to help it balance."},{"label":"D","text":"It was made from paper that was too heavy."}],"answer":"C","explanation":"Darius notices that a longer tail is needed to help the kite balance.","visual":null},{"num":10,"prompt":"In the passage, what does “sturdier” mean?","choices":[{"label":"A","text":"Stronger and less likely to bend."},{"label":"B","text":"Brighter and more colorful."},{"label":"C","text":"Longer and easier to carry."},{"label":"D","text":"Softer and easier to cut."}],"answer":"A","explanation":"Sturdier sticks are stronger and do not bend as easily.","visual":null},{"num":11,"prompt":"Why does the author say that each mistake was “like a clue”?","choices":[{"label":"A","text":"The mistakes told Darius where the festival was held."},{"label":"B","text":"The mistakes showed Darius that kites should be blue."},{"label":"C","text":"Each mistake helped Darius understand what to fix next."},{"label":"D","text":"Each mistake helped Darius find his missing tools."}],"answer":"C","explanation":"Each mistake points to the next part of the kite that needs to be fixed.","visual":null},{"num":12,"prompt":"What is the most likely reason the author wrote this story?","choices":[{"label":"A","text":"To show that mistakes can help people learn and improve."},{"label":"B","text":"To teach the exact steps for making every kind of kite."},{"label":"C","text":"To prove that winning a ribbon is more important than having fun."},{"label":"D","text":"To warn children not to fly kites when it is windy."}],"answer":"A","explanation":"The story’s lesson is that mistakes can provide useful information and lead to improvement.","visual":null}]},{"title":"Practice Biography: Nia Santos","text":"Nia Santos loved making pictures from the time she was young. She collected scraps of wrapping paper, ticket stubs, and old maps. Instead of throwing them away, she cut the pieces into shapes and arranged them into animals, houses, and imaginary lands. The layers of paper gave her artwork a textured look that people could recognize right away.\n\nNia was born in a small town near the ocean. When she was twelve, her family moved to a busy city. At first, she missed the waves and quiet beaches. She began creating pictures of sea turtles, boats, and shells to remember her old home. Years later, she studied art and became a designer for a children’s museum.\n\nOne day, a librarian saw a poster Nia had made for the museum. The librarian liked the bold shapes and tiny details. She asked Nia to illustrate a story about a child who explores an underwater city. Nia had never illustrated a book before, but she accepted the challenge. She spent weeks cutting, arranging, and gluing hundreds of paper pieces.\n\nThe book became popular with young readers. After that, Nia began writing and illustrating stories of her own. During her career, she created more than forty books. Children enjoyed searching her detailed pictures for hidden objects, and teachers often used her art to inspire classroom projects. Nia’s recognizable paper style turned ordinary scraps into worlds full of adventure.","questions":[{"num":13,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Nia preferred living in a small town near the ocean."},{"label":"B","text":"A librarian taught Nia how to cut and glue paper."},{"label":"C","text":"Nia became a children’s author and illustrator known for her special paper artwork."},{"label":"D","text":"Children’s museums are the best places for artists to work."}],"answer":"C","explanation":"The passage explains Nia’s paper art style and how she became a successful children’s book creator.","visual":null},{"num":14,"prompt":"After Nia cut paper into shapes, what did she do next?","choices":[{"label":"A","text":"She painted the pieces blue."},{"label":"B","text":"She mailed the pieces to a library."},{"label":"C","text":"She threw away the pieces she did not use."},{"label":"D","text":"She arranged the shapes to create pictures."}],"answer":"D","explanation":"The first paragraph says she cut the paper and then arranged the shapes into pictures.","visual":null},{"num":15,"prompt":"Why did the librarian ask Nia to illustrate a book?","choices":[{"label":"A","text":"The librarian had known Nia since she was a child."},{"label":"B","text":"The librarian liked the style of a poster Nia had created."},{"label":"C","text":"The librarian needed someone who lived near the ocean."},{"label":"D","text":"The librarian wanted Nia to teach at the museum."}],"answer":"B","explanation":"The librarian noticed and liked the style of Nia’s museum poster.","visual":null},{"num":16,"prompt":"What is the purpose of the second paragraph?","choices":[{"label":"A","text":"To explain how to make art from old maps."},{"label":"B","text":"To describe every job Nia had at the museum."},{"label":"C","text":"To give background about Nia’s childhood and early path as an artist."},{"label":"D","text":"To persuade readers to move from a small town to a city."}],"answer":"C","explanation":"The second paragraph gives childhood and early-career information that explains Nia’s path as an artist.","visual":null},{"num":17,"prompt":"In the passage, what does “recognizable” most nearly mean?","choices":[{"label":"A","text":"Easy to identify or know."},{"label":"B","text":"Difficult to finish."},{"label":"C","text":"Made only for children."},{"label":"D","text":"Hidden from view."}],"answer":"A","explanation":"Recognizable means easy to identify because it has a familiar or special look.","visual":null},{"num":18,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To explain why all book illustrations should be made from paper."},{"label":"B","text":"To compare life near the ocean with life in a city."},{"label":"C","text":"To teach readers how to become museum designers."},{"label":"D","text":"To explain how Nia developed her unusual art style and became a successful book creator."}],"answer":"D","explanation":"The passage explains both how Nia’s style developed and how she became known for books.","visual":null}]}],"minutes":20},"math":{"questions":[{"num":1,"prompt":"The table shows the number of books read by a class on five days. Which two days combined have a total of 14 books?","choices":[{"label":"A","text":"Monday and Tuesday"},{"label":"B","text":"Tuesday and Thursday"},{"label":"C","text":"Wednesday and Friday"},{"label":"D","text":"Monday and Thursday"}],"answer":"B","explanation":"Tuesday has 8 books and Thursday has 6. 8 + 6 = 14.","visual":"<div class=\"mini-table\"><div class=\"head\">Day</div><div>Monday</div><div>Tuesday</div><div>Wednesday</div><div>Thursday</div><div>Friday</div><div class=\"head\">Books</div><div>5</div><div>8</div><div>11</div><div>6</div><div>9</div></div>"},{"num":2,"prompt":"Some numbers are put in a pattern in the grid. What number belongs in the box with the question mark?","choices":[{"label":"A","text":"15"},{"label":"B","text":"16"},{"label":"C","text":"17"},{"label":"D","text":"19"}],"answer":"B","explanation":"The numbers increase by 2: 14, 16, 18.","visual":"<div class=\"number-grid\"><span>2</span><span>4</span><span>6</span><span>8</span><span>10</span><span>12</span><span>14</span><span class=\"mystery\">?</span><span>18</span><span>20</span><span>22</span><span>24</span></div>"},{"num":3,"prompt":"A gray coin is worth 10. A white coin is worth 1. Which group of coins has a value of 43?","choices":[{"label":"A","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"B","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"C","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"D","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"}],"answer":"A","explanation":"Four tens and three ones make 43.","visual":null},{"num":4,"prompt":"Which number sentence has the same value as 8 + 7?","choices":[{"label":"A","text":"9 + 6"},{"label":"B","text":"10 + 4"},{"label":"C","text":"7 + 7"},{"label":"D","text":"6 + 8"}],"answer":"A","explanation":"8 + 7 = 15, and 9 + 6 also equals 15.","visual":null},{"num":5,"prompt":"The picture shows 12 children at a playground. One-third of the children go to the swings. The rest go to the slide. How many children go to the slide?","choices":[{"label":"A","text":"4"},{"label":"B","text":"6"},{"label":"C","text":"8"},{"label":"D","text":"9"}],"answer":"C","explanation":"One-third of 12 is 4. The remaining 12 − 4 = 8 children go to the slide.","visual":"<div class=\"icon-row kids\"><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span></div><div class=\"visual-caption\">12 children</div>"},{"num":6,"prompt":"Victor wants to measure how heavy his backpack is. Which tool should he use?","choices":[{"label":"A","html":"<div class=\"tool-choice\"><span>📏</span><b>ruler</b></div>"},{"label":"B","html":"<div class=\"tool-choice\"><span>⚖️</span><b>scale</b></div>"},{"label":"C","html":"<div class=\"tool-choice\"><span>🌡️</span><b>thermometer</b></div>"},{"label":"D","html":"<div class=\"tool-choice\"><span>🕒</span><b>clock</b></div>"}],"answer":"B","explanation":"A scale measures how heavy something is.","visual":null},{"num":7,"prompt":"The graph shows how many stickers four students have. Which statement is true?","choices":[{"label":"A","text":"Ana has 7 stickers."},{"label":"B","text":"Brooke has an odd number of stickers."},{"label":"C","text":"Cara has the fewest stickers."},{"label":"D","text":"Dani has the most stickers."}],"answer":"C","explanation":"Cara has 3 stickers, fewer than Ana, Brooke, or Dani.","visual":"<div class=\"bar-chart\" aria-label=\"Number of stickers\"><div class=\"bar-col\"><div class=\"bar\" style=\"height:50%\"><b>5</b></div><span>Ana</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:80%\"><b>8</b></div><span>Brooke</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:30%\"><b>3</b></div><span>Cara</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:60%\"><b>6</b></div><span>Dani</span></div></div>"},{"num":8,"prompt":"The picture shows a cone and a cylinder. How are these two shapes alike?","choices":[{"label":"A","text":"They both have a corner."},{"label":"B","text":"They both have only one face."},{"label":"C","text":"They both have a circle for a base."},{"label":"D","text":"They both have a triangle-shaped face."}],"answer":"C","explanation":"A cone and a cylinder both have a circular base.","visual":"<div class=\"shape-pair\"><svg viewBox=\"0 0 320 160\" role=\"img\" aria-label=\"A cone and a cylinder\"><ellipse cx=\"75\" cy=\"120\" rx=\"50\" ry=\"16\" fill=\"#e8eef8\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M25 120 L75 28 L125 120\" fill=\"#f6f8fc\" stroke=\"#344054\" stroke-width=\"3\"/><text x=\"75\" y=\"151\" text-anchor=\"middle\">cone</text><ellipse cx=\"235\" cy=\"42\" rx=\"45\" ry=\"15\" fill=\"#e8eef8\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M190 42 V118 M280 42 V118\" stroke=\"#344054\" stroke-width=\"3\"/><ellipse cx=\"235\" cy=\"118\" rx=\"45\" ry=\"15\" fill=\"#f6f8fc\" stroke=\"#344054\" stroke-width=\"3\"/><text x=\"235\" y=\"151\" text-anchor=\"middle\">cylinder</text></svg></div>"},{"num":9,"prompt":"Three friends want to share cherries equally. Which group can be divided so that everyone gets the same number of whole cherries?","choices":[{"label":"A","html":"<div class=\"cherry-row\"><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><small>12 cherries</small></div>"},{"label":"B","html":"<div class=\"cherry-row\"><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><small>10 cherries</small></div>"},{"label":"C","html":"<div class=\"cherry-row\"><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><small>8 cherries</small></div>"},{"label":"D","html":"<div class=\"cherry-row\"><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><span class=\"single-cherry\"></span><small>11 cherries</small></div>"}],"answer":"A","explanation":"12 can be divided equally among 3 friends. Each friend gets 4 cherries.","visual":null},{"num":10,"prompt":"How many legs do a horse, a duck, and a fish have altogether?","choices":[{"label":"A","text":"4"},{"label":"B","text":"5"},{"label":"C","text":"6"},{"label":"D","text":"8"}],"answer":"C","explanation":"A horse has 4 legs, a duck has 2, and a fish has 0. 4 + 2 + 0 = 6.","visual":null},{"num":11,"prompt":"Jamal made an ABBA pattern using numbers. Which could be Jamal’s pattern?","choices":[{"label":"A","text":"2, 5, 2, 5, 2, 5, 2, 5"},{"label":"B","text":"3, 7, 7, 3, 3, 7, 7, 3"},{"label":"C","text":"1, 2, 3, 4, 1, 2, 3, 4"},{"label":"D","text":"8, 6, 4, 8, 6, 4, 8, 6"}],"answer":"B","explanation":"ABBA repeats as first, second, second, first: 3, 7, 7, 3.","visual":null},{"num":12,"prompt":"Four friends counted how many baskets they made. How many more baskets did Chloe make than Ben?","choices":[{"label":"A","text":"3"},{"label":"B","text":"4"},{"label":"C","text":"5"},{"label":"D","text":"6"}],"answer":"D","explanation":"Chloe made 9 baskets and Ben made 3. 9 − 3 = 6.","visual":"<div class=\"bar-chart\" aria-label=\"Baskets made\"><div class=\"bar-col\"><div class=\"bar\" style=\"height:70%\"><b>7</b></div><span>Ava</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:30%\"><b>3</b></div><span>Ben</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:90%\"><b>9</b></div><span>Chloe</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:60%\"><b>6</b></div><span>Diego</span></div></div>"},{"num":13,"prompt":"Rachel wants to measure how much water can fit in her bottle. Which tool is best to use?","choices":[{"label":"A","text":"scale"},{"label":"B","text":"thermometer"},{"label":"C","text":"measuring cup"},{"label":"D","text":"measuring tape"}],"answer":"C","explanation":"A measuring cup measures liquid capacity.","visual":null},{"num":14,"prompt":"Four bags hold different numbers of markers. Nora wants to keep two bags that contain exactly 14 markers altogether. Which two bags should she keep?","choices":[{"label":"A","text":"green and blue"},{"label":"B","text":"white and pink"},{"label":"C","text":"white and green"},{"label":"D","text":"green and pink"}],"answer":"B","explanation":"The white bag has 5 and the pink bag has 9. 5 + 9 = 14.","visual":"<div class=\"mini-table four\"><div class=\"head\">White</div><div class=\"head\">Green</div><div class=\"head\">Pink</div><div class=\"head\">Blue</div><div>5 markers</div><div>7 markers</div><div>9 markers</div><div>4 markers</div></div>"},{"num":15,"prompt":"What number is shown by the base-ten blocks?","choices":[{"label":"A","text":"326"},{"label":"B","text":"236"},{"label":"C","text":"306"},{"label":"D","text":"362"}],"answer":"A","explanation":"There are 3 hundreds, 2 tens, and 6 ones: 326.","visual":"<div class=\"base-ten\" aria-label=\"3 hundreds, 2 tens, and 6 ones\"><div class=\"hundreds\"><span class=\"hundred\"></span><span class=\"hundred\"></span><span class=\"hundred\"></span></div><div class=\"tens\"><span class=\"ten\"></span><span class=\"ten\"></span></div><div class=\"ones\"><span class=\"one\"></span><span class=\"one\"></span><span class=\"one\"></span><span class=\"one\"></span><span class=\"one\"></span><span class=\"one\"></span></div></div>"},{"num":16,"prompt":"Three pieces are already inside the square. Which piece is missing to complete the square?","choices":[{"label":"A","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><circle cx=\"45\" cy=\"30\" r=\"22\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"B","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><rect x=\"18\" y=\"15\" width=\"54\" height=\"30\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"C","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M45 8 L78 50 L12 50 Z\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"D","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M15 10 L75 50 L15 50 Z\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"}],"answer":"D","explanation":"The open space is a right triangle with the matching orientation.","visual":"<div class=\"svg-wrap\"><svg viewBox=\"0 0 260 190\" role=\"img\" aria-label=\"A square puzzle with a triangular piece missing\"><rect x=\"35\" y=\"15\" width=\"160\" height=\"160\" fill=\"white\" stroke=\"#344054\" stroke-width=\"4\"/><path d=\"M35 15 L195 15 L115 95 Z\" fill=\"#cddaf2\" stroke=\"#344054\" stroke-width=\"2\"/><path d=\"M35 15 L115 95 L35 175 Z\" fill=\"#e7edf8\" stroke=\"#344054\" stroke-width=\"2\"/><path d=\"M35 175 L115 95 L195 175 Z\" fill=\"#b8c9e8\" stroke=\"#344054\" stroke-width=\"2\"/><path d=\"M195 15 L195 175 L115 95 Z\" fill=\"white\" stroke=\"#d92d20\" stroke-width=\"3\" stroke-dasharray=\"7 5\"/><text x=\"215\" y=\"98\" font-size=\"14\" fill=\"#d92d20\">missing</text></svg></div>"},{"num":17,"prompt":"Maya has 24 beads. She gives 7 beads to her brother. Then her friend gives her 5 beads. How many beads does Maya have now?","choices":[{"label":"A","text":"12"},{"label":"B","text":"17"},{"label":"C","text":"22"},{"label":"D","text":"36"}],"answer":"C","explanation":"24 − 7 + 5 = 17 + 5 = 22.","visual":null},{"num":18,"prompt":"The shape is flipped across the dotted vertical line. Which option shows the correct reflection?","choices":[{"label":"A","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M12 20 H50 V8 L78 30 L50 52 V40 H12 Z\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"B","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M78 20 H40 V8 L12 30 L40 52 V40 H78 Z\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"C","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M35 52 V30 H20 L45 7 L70 30 H55 V52 Z\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"D","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M35 8 V30 H20 L45 53 L70 30 H55 V8 Z\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"}],"answer":"B","explanation":"A vertical reflection makes the right-pointing arrow face left on the other side of the line.","visual":"<div class=\"svg-wrap\"><svg viewBox=\"0 0 420 180\" role=\"img\" aria-label=\"Arrow shape reflected across a vertical line\"><line x1=\"210\" y1=\"10\" x2=\"210\" y2=\"170\" stroke=\"#667085\" stroke-width=\"3\" stroke-dasharray=\"7 7\"/><path d=\"M55 58 H120 V35 L175 90 L120 145 V122 H55 Z\" fill=\"#bfd0ee\" stroke=\"#344054\" stroke-width=\"3\"/><text x=\"95\" y=\"165\" font-size=\"14\">original</text><text x=\"222\" y=\"25\" font-size=\"13\">flip across this line</text></svg></div>"},{"num":19,"prompt":"The top half of a design is shown above the dotted line. Which option shows the bottom half after the design is flipped over the line?","choices":[{"label":"A","html":"<div class=\"shape-choice wide\"><svg viewBox=\"0 0 180 75\"><path d=\"M10 10 Q35 70 60 10 Q85 70 110 10 Q135 70 160 10\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/></svg></div>"},{"label":"B","html":"<div class=\"shape-choice wide\"><svg viewBox=\"0 0 180 75\"><path d=\"M10 60 Q35 0 60 60 Q85 0 110 60 Q135 0 160 60\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/></svg></div>"},{"label":"C","html":"<div class=\"shape-choice wide\"><svg viewBox=\"0 0 180 75\"><path d=\"M20 10 Q45 70 70 10 Q95 70 120 10\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/></svg></div>"},{"label":"D","html":"<div class=\"shape-choice wide\"><svg viewBox=\"0 0 180 75\"><path d=\"M10 15 L45 55 L80 15 L115 55 L150 15\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/></svg></div>"}],"answer":"A","explanation":"The correct answer is the exact upside-down reflection directly below the line.","visual":"<div class=\"svg-wrap\"><svg viewBox=\"0 0 420 190\" role=\"img\" aria-label=\"Top half of a design above a horizontal line\"><line x1=\"20\" y1=\"105\" x2=\"400\" y2=\"105\" stroke=\"#667085\" stroke-width=\"3\" stroke-dasharray=\"7 7\"/><path d=\"M120 95 Q145 35 170 95 Q195 35 220 95 Q245 35 270 95\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/><circle cx=\"155\" cy=\"63\" r=\"6\" fill=\"#344054\"/><circle cx=\"235\" cy=\"63\" r=\"6\" fill=\"#344054\"/><text x=\"25\" y=\"96\" font-size=\"14\">top half</text></svg></div>"},{"num":20,"prompt":"Lila arranged 9 buttons in a square. Omar arranged 12 buttons in a rectangle. Omar gives away 4 buttons. Which number sentence shows how many buttons they have left altogether?","choices":[{"label":"A","text":"9 + 12 = 21"},{"label":"B","text":"12 − 9 − 4 = −1"},{"label":"C","text":"9 + 12 − 4 = 17"},{"label":"D","text":"9 + 12 + 4 = 25"}],"answer":"C","explanation":"Start with all 9 + 12 buttons, then subtract the 4 Omar gives away.","visual":"<div class=\"array-pair\"><div><div class=\"array square3\"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><b>Lila: 9</b></div><div><div class=\"array rect4\"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><b>Omar: 12, then gives away 4</b></div></div>"},{"num":21,"prompt":"A blue gem is worth $4. A pink gem is worth $2. Which group is worth the most?","choices":[{"label":"A","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem blue\">◆</span><span class=\"gem pink\">◆</span></div>"},{"label":"B","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem blue\">◆</span><span class=\"gem blue\">◆</span></div>"},{"label":"C","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span></div>"},{"label":"D","html":"<div class=\"gem-row\"><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span></div>"}],"answer":"B","explanation":"Three blue gems are worth 3 × $4 = $12. The other groups are worth $10.","visual":null},{"num":22,"prompt":"Four books have different numbers of pages. Blue: 74 pages. Orange: 59 pages. Black: 86 pages. Green: 68 pages. Which list orders the books from fewest pages to most pages?","choices":[{"label":"A","text":"black, blue, green, orange"},{"label":"B","text":"green, orange, blue, black"},{"label":"C","text":"orange, blue, green, black"},{"label":"D","text":"orange, green, blue, black"}],"answer":"D","explanation":"The page counts in order are 59, 68, 74, and 86.","visual":null},{"num":23,"prompt":"A bag contains 3 green marbles and 7 red marbles. If Henry closes his eyes and pulls out one marble, which statement is true?","choices":[{"label":"A","text":"It is certain that Henry will pull a green marble."},{"label":"B","text":"It is impossible for Henry to pull a red marble."},{"label":"C","text":"It is possible for Henry to pull a yellow marble."},{"label":"D","text":"It is more likely that Henry will pull a red marble than a green marble."}],"answer":"D","explanation":"There are more red marbles than green marbles, so red is more likely.","visual":"<div class=\"marble-bag\"><div class=\"bag-label\">Bag of marbles</div><div class=\"marbles\"><span class=\"green\"></span><span class=\"green\"></span><span class=\"green\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span></div></div>"},{"num":24,"prompt":"The pencil begins at 2 inches and ends at 8 inches on the ruler. How long is the pencil?","choices":[{"label":"A","text":"5 inches"},{"label":"B","text":"6 inches"},{"label":"C","text":"8 inches"},{"label":"D","text":"10 inches"}],"answer":"B","explanation":"The pencil length is 8 − 2 = 6 inches.","visual":"<div class=\"ruler\"><div class=\"pencil-line\"><span></span></div><div class=\"ticks\"><div class=\"tick\"><i></i><b>0</b></div><div class=\"tick\"><i></i><b>1</b></div><div class=\"tick\"><i></i><b>2</b></div><div class=\"tick\"><i></i><b>3</b></div><div class=\"tick\"><i></i><b>4</b></div><div class=\"tick\"><i></i><b>5</b></div><div class=\"tick\"><i></i><b>6</b></div><div class=\"tick\"><i></i><b>7</b></div><div class=\"tick\"><i></i><b>8</b></div><div class=\"tick\"><i></i><b>9</b></div><div class=\"tick\"><i></i><b>10</b></div></div></div>"}],"minutes":26}},"primary2-test3":{"title":"ISEE Primary 2 Practice Test #3","auditory":{"title":"The Traveling Art Box","passage":"On Monday, Mrs. Rivera placed a large art-supply box beside the classroom door. “The kindergarten class needs these supplies for its family project tomorrow,” she said. “I need someone who can deliver the box safely and explain what is inside.”\n\nPriya raised her hand. She enjoyed helping younger students and had used many of the supplies before. Mrs. Rivera smiled, but she explained that the box held jars of paint, scissors, brushes, and small beads. If the box tipped, the materials could spill or break. The volunteer also needed to remember which supplies belonged at each table.\n\nThat afternoon, Priya made a plan. She counted every item and wrote the totals on a checklist. She placed the paint jars in a smaller tray so they could not roll. She put labels on three paper bags: “cutting,” “painting,” and “decorating.” Then she practiced describing the supplies to her older brother.\n\nThe next morning, Priya showed Mrs. Rivera the organized box. She lifted it from the bottom with both hands and explained how she would place each bag at the correct table. Mrs. Rivera nodded. “You have prepared for both the delivery and the directions,” she said.\n\nPriya carried the box carefully to the kindergarten room. Nothing spilled, and the younger students quickly found what they needed. When their teacher thanked Priya, she beamed. Priya had learned that being helpful meant more than volunteering—it meant making a careful plan and following it.\n\nPriya also placed a clean cloth beside the paint tray in case a small drop escaped. She wrote the kindergarten teacher's room number at the top of her checklist and asked what time the supplies were needed. These extra details were not required, but they showed that Priya was thinking about the entire job, not only the part she found exciting.","questions":[{"num":1,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"Priya teaches kindergarten students how to paint a picture."},{"label":"B","text":"Priya prepares carefully to deliver and organize art supplies."},{"label":"C","text":"Mrs. Rivera buys new supplies for Priya’s classroom."},{"label":"D","text":"Priya decides that the art box is too heavy to carry."}],"answer":"B","explanation":"The passage focuses on Priya planning, organizing, and safely delivering the supplies.","visual":null},{"num":2,"prompt":"Which is true about Priya?","choices":[{"label":"A","text":"She does not enjoy helping younger children."},{"label":"B","text":"She forgets which supplies belong at each table."},{"label":"C","text":"She asks her brother to deliver the supplies for her."},{"label":"D","text":"She volunteers and then prepares carefully for the job."}],"answer":"D","explanation":"Priya volunteers, makes a checklist, labels the bags, and practices her explanation.","visual":null},{"num":3,"prompt":"Why did Mrs. Rivera not choose Priya immediately?","choices":[{"label":"A","text":"The kindergarten room was closed."},{"label":"B","text":"Priya had never used art supplies."},{"label":"C","text":"The box contained items that could spill or break."},{"label":"D","text":"Another student had already delivered the box."}],"answer":"C","explanation":"Mrs. Rivera explains that the supplies need to be carried and organized responsibly.","visual":null},{"num":4,"prompt":"Which did Priya do before she practiced explaining the supplies?","choices":[{"label":"A","text":"She counted the items and organized them into labeled groups."},{"label":"B","text":"She carried the box to the kindergarten room."},{"label":"C","text":"She asked Mrs. Rivera to remove the paint."},{"label":"D","text":"She thanked the kindergarten teacher."}],"answer":"A","explanation":"Priya counted and organized the supplies before practicing her directions.","visual":null},{"num":5,"prompt":"The passage says Priya “beamed.” What does that mean?","choices":[{"label":"A","text":"She looked confused."},{"label":"B","text":"She smiled with happiness and pride."},{"label":"C","text":"She spoke in a very quiet voice."},{"label":"D","text":"She hurried out of the room."}],"answer":"B","explanation":"To beam means to smile brightly because one is happy or proud.","visual":null},{"num":6,"prompt":"What lesson does Priya learn from the experience?","choices":[{"label":"A","text":"Art supplies should always be carried by adults."},{"label":"B","text":"Younger students should organize every activity themselves."},{"label":"C","text":"A checklist is useful only when something has already gone wrong."},{"label":"D","text":"Volunteering is most helpful when it is followed by careful preparation."}],"answer":"D","explanation":"The ending explains that being helpful means thinking ahead and following a plan.","visual":null}],"minutes":7},"reading":{"passages":[{"title":"Monarch Butterflies on the Move","text":"Monarch butterflies are famous for their long journeys. Each fall, millions of monarchs leave cooler parts of the United States and Canada. They fly south to warmer places where they can rest during winter. Some monarchs travel more than two thousand miles.\n\nOne unusual part of the journey is that a single butterfly does not make the entire round trip. Several generations complete the trip together. A generation is a group of living things born around the same time. Some monarchs fly south, while later generations begin the trip north in spring.\n\nMonarchs have bright orange-and-black wings. The colors help warn birds that monarchs do not taste good. Their wings are also strong enough for long flights. Scientists believe monarchs use the position of the sun and clues from the wind to help guide them.\n\nResearchers place tiny tags on some monarchs before releasing them. When another person finds a tagged butterfly, the information helps scientists learn where the monarch traveled. Scientists also study milkweed, the plant monarch caterpillars need for food. Protecting milkweed and resting places can help monarchs complete their remarkable migration.\n\nDuring the journey, monarchs sometimes gather by the thousands in sheltered trees. These resting groups are called roosts. The butterflies may remain there overnight, then continue flying when sunlight warms their wings. By recording where roosts form and when monarchs arrive, researchers can compare one year's migration with another.","questions":[{"num":1,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Monarchs are the only butterflies with orange wings."},{"label":"B","text":"Every monarch butterfly completes the same round trip alone."},{"label":"C","text":"Monarch caterpillars can eat many different garden plants."},{"label":"D","text":"Monarchs make a long migration using special features, and scientists study their journey."}],"answer":"D","explanation":"The passage describes the migration, the butterflies’ features, and how scientists study and protect them.","visual":null},{"num":2,"prompt":"Why do monarchs have bright orange-and-black wings?","choices":[{"label":"A","text":"The colors help monarchs stay warm in winter."},{"label":"B","text":"The colors show scientists where to place a tag."},{"label":"C","text":"The colors help warn birds that monarchs taste bad."},{"label":"D","text":"The colors help caterpillars find milkweed."}],"answer":"C","explanation":"The passage says the bright colors warn birds that monarchs do not taste good.","visual":null},{"num":3,"prompt":"Which detail best explains why several generations are needed for the monarch journey?","choices":[{"label":"A","text":"One butterfly does not live long enough to complete the entire round trip."},{"label":"B","text":"Monarchs can fly only when they are in a large group."},{"label":"C","text":"Young monarchs are unable to fly north."},{"label":"D","text":"Every generation travels to a different country."}],"answer":"A","explanation":"The passage explains that different generations complete different parts of the migration.","visual":null},{"num":4,"prompt":"In the passage, what does “generation” mean?","choices":[{"label":"A","text":"A place where butterflies rest."},{"label":"B","text":"A group born around the same time."},{"label":"C","text":"A pattern on a butterfly wing."},{"label":"D","text":"A very long flight."}],"answer":"B","explanation":"The passage directly defines a generation as a group born around the same time.","visual":null},{"num":5,"prompt":"How do the tiny tags help researchers?","choices":[{"label":"A","text":"They keep the butterfly warm during cold weather."},{"label":"B","text":"They tell the butterfly which direction to fly."},{"label":"C","text":"They protect the wings from birds."},{"label":"D","text":"They connect a found butterfly with information about where it was released."}],"answer":"D","explanation":"A numbered tag allows scientists to trace part of a butterfly's route.","visual":null},{"num":6,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To tell a funny story about a lost butterfly."},{"label":"B","text":"To persuade readers to travel south for winter."},{"label":"C","text":"To give information about monarch migration and survival."},{"label":"D","text":"To teach readers how to draw a monarch."}],"answer":"C","explanation":"The passage is informational and explains how monarchs travel and what helps them survive.","visual":null}]},{"title":"The Wobbly Bird Feeder","text":"Eli wanted to build a bird feeder for the tree outside his window. He cut a wide opening in an empty milk carton, filled the bottom with seeds, and tied one string to the top. When he hung it outside, the carton leaned sideways and most of the seeds slid out.\n\nEli felt discouraged, but his grandmother asked, “What did the feeder show you?” Eli looked closely. The single string pulled from only one spot. He added a second string on the opposite side. The feeder hung straight, but a strong breeze made it twist in circles.\n\nNext, Eli tied the two strings together above the carton so the feeder would stay steady. That change worked until it rained. Water entered through the opening and soaked the seeds. Eli cut a small roof from a plastic lid and attached it above the opening.\n\nThe following morning, two sparrows landed on the dry feeder. Eli watched them eat while the carton stayed level. His first plan had not worked, but each problem had pointed toward the next improvement.\n\nEli wrote each problem and solution in a notebook: leaning feeder, second string; spinning feeder, tied strings; wet seeds, small roof and drain holes. The notes helped him see that successful designs often grow from several small changes rather than one perfect first idea.","questions":[{"num":7,"prompt":"What is this passage mostly about?","choices":[{"label":"A","text":"Eli improves a bird feeder by learning from each problem."},{"label":"B","text":"Eli’s grandmother builds a feeder for him."},{"label":"C","text":"Two sparrows carry seeds away from Eli’s window."},{"label":"D","text":"A milk carton cannot be used outdoors."}],"answer":"A","explanation":"Eli tests the feeder and makes a new improvement after each problem.","visual":null},{"num":8,"prompt":"Which happened first?","choices":[{"label":"A","text":"Eli added a plastic roof."},{"label":"B","text":"The feeder twisted in the wind."},{"label":"C","text":"Two sparrows landed on the feeder."},{"label":"D","text":"The single string made the feeder lean."}],"answer":"D","explanation":"The first problem was that the feeder leaned and spilled seeds.","visual":null},{"num":9,"prompt":"Why did Eli add a second string?","choices":[{"label":"A","text":"To make the opening wider."},{"label":"B","text":"To help the feeder hang straight."},{"label":"C","text":"To keep the seeds dry."},{"label":"D","text":"To attract more birds."}],"answer":"B","explanation":"The second string balanced the pull on the carton.","visual":null},{"num":10,"prompt":"In the passage, what does “steady” most nearly mean?","choices":[{"label":"A","text":"Brightly colored."},{"label":"B","text":"Filled to the top."},{"label":"C","text":"Not moving or shaking much."},{"label":"D","text":"Easy to open."}],"answer":"C","explanation":"Eli wanted the feeder to remain stable instead of twisting.","visual":null},{"num":11,"prompt":"What can the reader infer about Eli after the first feeder failed?","choices":[{"label":"A","text":"He became more observant instead of simply repeating the same design."},{"label":"B","text":"He decided that birds did not need food."},{"label":"C","text":"He wanted his grandmother to complete the project."},{"label":"D","text":"He believed the wind was the only problem."}],"answer":"A","explanation":"Eli examines each failure and changes a specific part.","visual":null},{"num":12,"prompt":"What is the most likely lesson of the story?","choices":[{"label":"A","text":"Outdoor projects should always be made from wood."},{"label":"B","text":"Testing and revising can make a design better."},{"label":"C","text":"Stopping after the first mistake saves time."},{"label":"D","text":"Bird feeders should be used only on sunny days."}],"answer":"B","explanation":"Eli succeeds because he studies each problem and revises his design.","visual":null}]},{"title":"Practice Biography: Elena Marquez","text":"Elena Marquez became interested in seeds when she was a child. Her grandfather kept jars filled with bean, corn, sunflower, and squash seeds. Elena sorted them by shape and color, drew them in a notebook, and recorded how long each kind took to sprout.\n\nIn college, Elena studied plant science. She learned that seeds need the right amount of water, warmth, and air before they begin growing. She also discovered that some seeds can remain dormant, or asleep, for a long time until conditions are right.\n\nAfter college, Elena worked at a science museum. She wanted children to see plant growth instead of only reading about it. Elena designed a clear seed viewer using cups, moist paper towels, and bean seeds. Visitors could watch a root grow downward and a stem grow upward without digging the seed out of soil.\n\nElena tested the viewer with many school groups. She noticed that children understood the changes better when they could compare seeds planted on different days. She added date labels and observation cards so visitors could draw what they saw.\n\nLater, Elena created seed exhibits for museums and gardens in several cities. Her distinctive teaching style combined real experiments with simple explanations. Because of her work, thousands of children learned that even a tiny seed can reveal a remarkable growing process.","questions":[{"num":13,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Elena collected only sunflower seeds."},{"label":"B","text":"Elena wanted every museum to build an outdoor farm."},{"label":"C","text":"Elena turned her childhood interest in seeds into a career creating hands-on science exhibits."},{"label":"D","text":"Elena stopped studying plants after college."}],"answer":"C","explanation":"The passage follows Elena from childhood observations to her museum career.","visual":null},{"num":14,"prompt":"What did Elena do after sorting seeds as a child?","choices":[{"label":"A","text":"She drew them and recorded how long they took to sprout."},{"label":"B","text":"She cooked the seeds for her family."},{"label":"C","text":"She mailed the seeds to a museum."},{"label":"D","text":"She planted every seed in the same jar."}],"answer":"A","explanation":"The first paragraph gives these details.","visual":null},{"num":15,"prompt":"Why did Elena design a clear seed viewer?","choices":[{"label":"A","text":"She wanted seeds to grow without water."},{"label":"B","text":"She needed a place to store dry seeds."},{"label":"C","text":"She wanted every seed to remain dormant."},{"label":"D","text":"She wanted children to watch roots and stems grow without digging up the seed."}],"answer":"D","explanation":"The clear viewer made growth visible.","visual":null},{"num":16,"prompt":"What is the purpose of the fourth paragraph?","choices":[{"label":"A","text":"To describe foods made from beans."},{"label":"B","text":"To explain how Elena improved the exhibit after observing children use it."},{"label":"C","text":"To explain why museums close in summer."},{"label":"D","text":"To compare corn seeds with sunflower seeds."}],"answer":"B","explanation":"The paragraph describes testing and improving the exhibit.","visual":null},{"num":17,"prompt":"In the passage, what does “distinctive” most nearly mean?","choices":[{"label":"A","text":"Quiet and difficult to notice."},{"label":"B","text":"Old and no longer useful."},{"label":"C","text":"Special and easy to recognize."},{"label":"D","text":"Complicated and impossible to explain."}],"answer":"C","explanation":"Her teaching style was recognizable.","visual":null},{"num":18,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To explain how Elena developed her interest and became a science educator."},{"label":"B","text":"To teach the exact steps for growing every seed."},{"la
