 document.getElementById('backHome').onclick=goHome;
}

function topbar(sec){return `<header class="topbar"><div class="topbar-inner"><button class="topbar-home" onclick="goHome()" aria-label="Return to ReadySetPrep home">⌂ Home</button><div class="brand">ReadySetPrep · ${currentTestInfo().label}</div><div class="section-title">${labels[sec]}</div><div class="timer ${state.timed&&state.timeLeft[sec]<=60?'warn':''}">${state.timed?fmtTime(state.timeLeft[sec]):'Untimed'}</div></div></header>`}

function audioScreen(){
 stopTimer(); const sec='auditory';
 document.getElementById('app').innerHTML=`${topbar(sec)}<main class="container"><div class="passage-layout">
 <section class="card audio-panel passage-card"><div class="audio-icon">🔊</div><h1>Listen to the passage</h1><p>You may listen while reading the passage, and you may replay it as many times as needed.</p>
 <div class="audio-controls"><button class="btn btn-primary" id="playAudio">▶ Play passage</button><button class="btn btn-secondary" id="pauseAudio">⏸ Pause / Resume</button><button class="btn btn-secondary" id="stopAudio">■ Stop</button></div>
 <div class="play-count" id="playCount">Played ${state.audioPlays} time${state.audioPlays===1?'':'s'}</div>
 <div class="success-note" style="margin-top:20px">The passage will also remain visible while answering the questions.</div>
 <div style="margin-top:24px"><button class="btn btn-primary" id="beginQuestions">Begin Questions</button></div></section>
 <section class="card"><span class="badge">Auditory Passage</span><h2 style="margin-top:14px">${escapeHtml(TEST.auditory.title||'Auditory Passage')}</h2><div class="passage-text">${escapeHtml(TEST.auditory.passage)}</div></section>
 </div></main>`;
 document.getElementById('playAudio').onclick=playAudio;
 document.getElementById('pauseAudio').onclick=pauseAudio;
 document.getElementById('stopAudio').onclick=stopAudio;
 document.getElementById('beginQuestions').onclick=()=>{stopAudio();state.screen='test';save();render()};
 startTimer();
}
let speechPaused=false;
function playAudio(){
 if(!('speechSynthesis' in window)){alert('Audio is not available in this browser. Try opening the file in Chrome.');return;}
 speechSynthesis.cancel();
 const u=new SpeechSynthesisUtterance(TEST.auditory.passage);u.rate=.88;u.pitch=1;u.volume=1;
 const voices=speechSynthesis.getVoices(); const preferred=voices.find(v=>/Samantha|Google US English|Microsoft Aria|English.*United States/i.test(v.name)); if(preferred)u.voice=preferred;
 state.audioPlays++;save();const el=document.getElementById('playCount');if(el)el.textContent=`Played ${state.audioPlays} time${state.audioPlays===1?'':'s'}`;
 speechSynthesis.speak(u);speechPaused=false;
}
function pauseAudio(){if(!('speechSynthesis' in window))return;if(speechSynthesis.speaking){if(speechSynthesis.paused){speechSynthesis.resume();speechPaused=false}else{speechSynthesis.pause();speechPaused=true}}}
function stopAudio(){if('speechSynthesis' in window)speechSynthesis.cancel();speechPaused=false}

function renderTest(){
 const sec=currentSection(),qs=currentQuestions(),item=qs[state.qIndex],ans=state.answers[sec]?.[item.num],flag=!!state.flags[sec]?.[item.num];
 state.eliminations=state.eliminations||{auditory:{},reading:{},math:{}};
 state.eliminations[sec]=state.eliminations[sec]||{};
 const eliminated=state.eliminations[sec][item.num]||[];
 const isReading=sec==='reading',isAuditory=sec==='auditory';
 const auditoryBar=isAuditory?`<div class="audio-controls" style="justify-content:flex-start;margin:0 0 15px"><button class="btn btn-secondary" id="replayAudio">🔊 Play passage again</button><span class="play-count" id="playCount">Played ${state.audioPlays} time${state.audioPlays===1?'':'s'}</span></div>`:'';
 const choicesHtml=item.choices.map(c=>{
  const isEliminated=eliminated.includes(c.label);
  return `<div class="choice-row ${isEliminated?'eliminated':''}">
   <button class="eliminate-btn" data-eliminate="${c.label}" title="${isEliminated?'Restore':'Eliminate'} answer ${c.label}" aria-label="${isEliminated?'Restore':'Eliminate'} answer ${c.label}">×</button>
   <div class="choice ${ans===c.label?'selected':''}" data-choice="${c.label}" role="button" tabindex="0" aria-label="Choose answer ${c.label}">
    <span class="choice-letter">${c.label}</span>
    <div class="choice-content">${c.html||escapeHtml(c.text)}</div>
   </div>
  </div>`;
 }).join('');
 const questionHtml=`<section class="card question-card"><div class="question-meta"><span>Question ${item.num}</span><span>${state.qIndex+1} of ${qs.length}</span></div>${auditoryBar}<div class="question-prompt">${item.prompt}</div>${item.visual?`<div class="visual">${item.visual}</div>`:''}<p class="elimination-note">Select an answer, or use × to eliminate a choice.</p><div class="choices">${choicesHtml}</div><div class="nav-row"><div class="nav-left"><button class="btn btn-secondary" id="prevBtn" ${state.qIndex===0?'disabled':''}>← Previous</button><button class="btn btn-secondary flag-btn ${flag?'flagged':''}" id="flagBtn">${flag?'★ Flagged':'☆ Flag for review'}</button></div><div class="nav-right"><button class="btn btn-secondary" id="reviewBtn">Review section</button><button class="btn btn-primary" id="nextBtn">${state.qIndex===qs.length-1?'Finish section':'Next →'}</button></div></div></section>`;
 let main;
 if(isReading){main=`<div class="passage-layout"><section class="card passage-card"><span class="badge">Passage for Questions ${Math.floor((item.num-1)/6)*6+1}–${Math.floor((item.num-1)/6)*6+6}</span><h2>${escapeHtml(item.passageTitle)}</h2><div class="passage-text">${escapeHtml(item.passageText)}</div></section>${questionHtml}</div>`}
 else if(isAuditory){main=`<div class="passage-layout"><section class="card passage-card"><span class="badge">Auditory Passage — Questions 1–6</span><h2>${escapeHtml(TEST.auditory.title||'Auditory Passage')}</h2><div class="passage-text">${escapeHtml(TEST.auditory.passage)}</div><hr style="border:0;border-top:1px solid #e4e7ec;margin:22px 0">${sidebar(sec,qs)}</section>${questionHtml}</div>`}
 else main=`<div class="test-layout"><aside class="card sidebar">${sidebar(sec,qs)}</aside>${questionHtml}</div>`;
 document.getElementById('app').innerHTML=`${topbar(sec)}<main class="container">${main}</main>`;
 bindTestEvents(sec,qs,item);
 startTimer();
}
function sidebar(sec,qs){
 const pct=Math.round(totalAnswered(sec)/qs.length*100);
 return `<b>${totalAnswered(sec)} of ${qs.length} answered</b><div class="progress-track" style="margin-top:10px"><div class="progress-fill" style="width:${pct}%"></div></div><div class="q-palette">${qs.map((x,i)=>`<button class="q-dot ${state.answers[sec]?.[x.num]?'answered':''} ${state.flags[sec]?.[x.num]?'flagged':''} ${i===state.qIndex?'current':''}" data-jump="${i}">${x.num}</button>`).join('')}</div><p class="footer-note">Green = answered<br>★ = flagged</p>`
}
function bindTestEvents(sec,qs,item){
 document.querySelectorAll('[data-choice]').forEach(el=>{
  const choose=()=>{
   const label=el.dataset.choice;
   state.eliminations=state.eliminations||{auditory:{},reading:{},math:{}};
   state.eliminations[sec]=state.eliminations[sec]||{};
   const current=state.eliminations[sec][item.num]||[];
   state.eliminations[sec][item.num]=current.filter(x=>x!==label);
   state.answers[sec][item.num]=label;
   save();renderTest();
  };
  el.onclick=choose;
  el.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();choose()}};
 });
 document.querySelectorAll('[data-eliminate]').forEach(btn=>{
  btn.onclick=e=>{
   e.preventDefault();e.stopPropagation();
   const label=btn.dataset.eliminate;
   state.eliminations=state.eliminations||{auditory:{},reading:{},math:{}};
   state.eliminations[sec]=state.eliminations[sec]||{};
   const current=state.eliminations[sec][item.num]||[];
   if(current.includes(label)){
    state.eliminations[sec][item.num]=current.filter(x=>x!==label);
   }else{
    state.eliminations[sec][item.num]=[...current,label];
    if(state.answers[sec][item.num]===label)delete state.answers[sec][item.num];
   }
   save();renderTest();
  };
 });
 document.querySelectorAll('[data-jump]').forEach(el=>el.onclick=()=>{state.qIndex=Number(el.dataset.jump);save();renderTest()});
 const prev=document.getElementById('prevBtn');if(prev)prev.onclick=()=>{if(state.qIndex>0){state.qIndex--;save();renderTest()}};
 document.getElementById('flagBtn').onclick=()=>{state.flags[sec][item.num]=!state.flags[sec][item.num];save();renderTest()};
 document.getElementById('reviewBtn').onclick=()=>{state.screen='sectionReview';save();render()};
 document.getElementById('nextBtn').onclick=()=>{if(state.qIndex<qs.length-1){state.qIndex++;save();renderTest()}else{state.screen='sectionReview';save();render()}};
 const replay=document.getElementById('replayAudio');if(replay)replay.onclick=playAudio;
}

function sectionReview(){
 stopTimer(); const sec=currentSection(),qs=currentQuestions(); const missing=qs.filter(x=>!state.answers[sec]?.[x.num]); const flagged=qs.filter(x=>state.flags[sec]?.[x.num]);
 document.getElementById('app').innerHTML=`${topbar(sec)}<main class="container"><section class="card section-intro"><h1>Review ${labels[sec]}</h1><div class="review-grid"><div class="score-box"><span>Answered</span><b>${qs.length-missing.length}/${qs.length}</b></div><div class="score-box"><span>Not answered</span><b>${missing.length}</b></div><div class="score-box"><span>Flagged</span><b>${flagged.length}</b></div></div>
 ${missing.length?`<div class="note"><b>Not answered:</b> ${missing.map(x=>x.num).join(', ')}</div>`:'<div class="success-note">Every question has an answer.</div>'}
 ${flagged.length?`<p><b>Flagged for review:</b> ${flagged.map(x=>x.num).join(', ')}</p>`:''}
 <div class="q-palette" style="max-width:520px">${qs.map((x,i)=>`<button class="q-dot ${state.answers[sec]?.[x.num]?'answered':''} ${state.flags[sec]?.[x.num]?'flagged':''}" data-jump="${i}">${x.num}</button>`).join('')}</div>
 <div style="margin-top:24px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-secondary" id="returnQuestions">Return to questions</button><button class="btn btn-primary" id="submitSection">Submit section</button></div></section></main>`;
 document.querySelectorAll('[data-jump]').forEach(el=>el.onclick=()=>{state.qIndex=Number(el.dataset.jump);state.screen='test';save();render()});
 document.getElementById('returnQuestions').onclick=()=>{state.screen='test';save();render()};
 document.getElementById('submitSection').onclick=()=>{if(missing.length&&!confirm(`There are ${missing.length} unanswered questions. Submit anyway?`))return;state.sectionSubmitted[sec]=true;finishSection(false)};
}
function finishSection(fromTimer){
 stopAudio(); stopTimer(); const sec=currentSection();
 if(state.sectionPractice){state.completed=true;state.screen='results';save();render();return;}
 if(state.sectionIndex<2){state.sectionIndex++;state.qIndex=0;state.screen='intro';save();render()}else{state.completed=true;state.screen='results';save();render()}
}
function results(){
 stopTimer();stopAudio();
 const completedSecs=state.sectionPractice?[state.sectionPractice]:sections;
 const scores=completedSecs.map(sec=>({sec,score:sectionScore(sec),total:sectionQuestions(sec).length}));
 const total=scores.reduce((n,x)=>n+x.score,0),max=scores.reduce((n,x)=>n+x.total,0);
 const percent=Math.round(total/max*100);
 const fullTest=!state.sectionPractice&&completedSecs.length===3&&max===48;
 const practiceStanine=fullTest?estimatedPracticeStanine(percent):null;
 let review='';
 for(const sec of completedSecs){
  for(const item of sectionQuestions(sec)){
   const ua=state.answers[sec]?.[item.num]||'—';
   const ok=ua===item.answer;
   review+=`<article class="review-item ${ok?'correct':'incorrect'}"><h3>${labels[sec]} ${item.num}: ${escapeHtml(item.prompt)}</h3><div class="answer-line ${ok?'good':'bad'}">Your answer: ${ua}${ok?' ✓':' ✗'}</div>${!ok?`<div class="answer-line good">Correct answer: ${item.answer}</div>`:''}<p>${escapeHtml(item.explanation)}</p></article>`;
  }
 }
 const stanineCard=fullTest?`<div class="score-box"><span>Estimated Practice Stanine</span><b>${practiceStanine}</b><small>${stanineMessage(practiceStanine)}</small></div>`:'';
 const stanineNote=fullTest?`<div class="success-note" style="margin:18px 0">
  <b>About this stanine estimate:</b> This is a practice-only estimate based on the percentage correct on this custom 48-question workbook. It is not an official ISEE stanine. Official ISEE stanines are norm-referenced by grade and are calculated from scaled scores using ERB's test-taking population.
  <details style="margin-top:10px"><summary><b>Show practice stanine score bands</b></summary>
   <div style="margin-top:10px;line-height:1.7">
    Stanine 1: below 35% &nbsp;•&nbsp; 2: 35–44% &nbsp;•&nbsp; 3: 45–54% &nbsp;•&nbsp; 4: 55–64%<br>
    Stanine 5: 65–74% &nbsp;•&nbsp; 6: 75–82% &nbsp;•&nbsp; 7: 83–89% &nbsp;•&nbsp; 8: 90–95% &nbsp;•&nbsp; 9: 96–100%
   </div>
  </details>
 </div>`:'';
 document.getElementById('app').innerHTML=`<button class="home-floating" onclick="goHome()">⌂ Home</button><main class="container"><section class="card"><span class="badge">Completed</span><h1>${escapeHtml(state.student)}’s Results</h1>
 <div class="review-grid">${scores.map(x=>`<div class="score-box"><span>${labels[x.sec]}</span><b>${x.score}/${x.total}</b><small>${Math.round(x.score/x.total*100)}%</small></div>`).join('')}<div class="score-box"><span>Total</span><b>${total}/${max}</b><small>${percent}%</small></div>${stanineCard}</div>
 ${stanineNote}
 <div class="result-actions" style="display:flex;gap:10px;flex-wrap:wrap;margin:18px 0"><button class="btn btn-primary" onclick="window.print()">Print results</button><button class="btn btn-secondary" id="retakeBtn">Retake test</button><button class="btn btn-secondary" id="homeBtn">Back to start</button></div>
 ${completedSecs.includes('auditory')?`<details><summary><b>Show auditory passage transcript</b></summary><div class="transcript">${escapeHtml(TEST.auditory.passage)}</div></details>`:''}
 <h2 style="margin-top:28px">Answer review</h2>${review}</section></main>`;
 document.getElementById('retakeBtn').onclick=()=>{const student=state.student||'Student';localStorage.removeItem(STORAGE_KEY);state=freshState(student);home()};
 document.getElementById('homeBtn').onclick=goHome;
}
function render(){
 if(state.screen==='home')home(); else if(state.screen==='intro')intro(); else if(state.screen==='audio')audioScreen(); else if(state.screen==='test')renderTest(); else if(state.screen==='sectionReview')sectionReview(); else if(state.screen==='results')results(); else home();
}
window.addEventListener('beforeunload',save);
state.screen='home';home();
</script>
</body></html>
