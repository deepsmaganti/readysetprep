ria-label=\"Top half of a design above a horizontal line\"><line x1=\"20\" y1=\"105\" x2=\"400\" y2=\"105\" stroke=\"#667085\" stroke-width=\"3\" stroke-dasharray=\"7 7\"/><path d=\"M120 95 Q145 35 170 95 Q195 35 220 95 Q245 35 270 95\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/><circle cx=\"155\" cy=\"63\" r=\"6\" fill=\"#344054\"/><circle cx=\"235\" cy=\"63\" r=\"6\" fill=\"#344054\"/><text x=\"25\" y=\"96\" font-size=\"14\">top half</text></svg></div>"},{"num":20,"prompt":"Lila arranged 9 buttons in a square. Omar arranged 12 buttons in a rectangle. Omar gives away 4 buttons. Which number sentence shows how many buttons they have left altogether?","choices":[{"label":"A","text":"9 + 12 = 21"},{"label":"B","text":"12 − 9 − 4 = −1"},{"label":"C","text":"9 + 12 − 4 = 17"},{"label":"D","text":"9 + 12 + 4 = 25"}],"answer":"C","explanation":"Start with all 9 + 12 buttons, then subtract the 4 Omar gives away.","visual":"<div class=\"array-pair\"><div><div class=\"array square3\"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><b>Lila: 9</b></div><div><div class=\"array rect4\"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><b>Omar: 12, then gives away 4</b></div></div>"},{"num":21,"prompt":"A blue gem is worth $4. A pink gem is worth $2. Which group is worth the most?","choices":[{"label":"A","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem blue\">◆</span><span class=\"gem pink\">◆</span></div>"},{"label":"B","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem blue\">◆</span><span class=\"gem blue\">◆</span></div>"},{"label":"C","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span></div>"},{"label":"D","html":"<div class=\"gem-row\"><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span></div>"}],"answer":"B","explanation":"Three blue gems are worth 3 × $4 = $12. The other groups are worth $10.","visual":null},{"num":22,"prompt":"Four books have different numbers of pages. Blue: 74 pages. Orange: 59 pages. Black: 86 pages. Green: 68 pages. Which list orders the books from fewest pages to most pages?","choices":[{"label":"A","text":"black, blue, green, orange"},{"label":"B","text":"green, orange, blue, black"},{"label":"C","text":"orange, blue, green, black"},{"label":"D","text":"orange, green, blue, black"}],"answer":"D","explanation":"The page counts in order are 59, 68, 74, and 86.","visual":null},{"num":23,"prompt":"A bag contains 3 green marbles and 7 red marbles. If Henry closes his eyes and pulls out one marble, which statement is true?","choices":[{"label":"A","text":"It is certain that Henry will pull a green marble."},{"label":"B","text":"It is impossible for Henry to pull a red marble."},{"label":"C","text":"It is possible for Henry to pull a yellow marble."},{"label":"D","text":"It is more likely that Henry will pull a red marble than a green marble."}],"answer":"D","explanation":"There are more red marbles than green marbles, so red is more likely.","visual":"<div class=\"marble-bag\"><div class=\"bag-label\">Bag of marbles</div><div class=\"marbles\"><span class=\"green\"></span><span class=\"green\"></span><span class=\"green\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span></div></div>"},{"num":24,"prompt":"The pencil begins at 2 inches and ends at 8 inches on the ruler. How long is the pencil?","choices":[{"label":"A","text":"5 inches"},{"label":"B","text":"6 inches"},{"label":"C","text":"8 inches"},{"label":"D","text":"10 inches"}],"answer":"B","explanation":"The pencil length is 8 − 2 = 6 inches.","visual":"<div class=\"ruler\"><div class=\"pencil-line\"><span></span></div><div class=\"ticks\"><div class=\"tick\"><i></i><b>0</b></div><div class=\"tick\"><i></i><b>1</b></div><div class=\"tick\"><i></i><b>2</b></div><div class=\"tick\"><i></i><b>3</b></div><div class=\"tick\"><i></i><b>4</b></div><div class=\"tick\"><i></i><b>5</b></div><div class=\"tick\"><i></i><b>6</b></div><div class=\"tick\"><i></i><b>7</b></div><div class=\"tick\"><i></i><b>8</b></div><div class=\"tick\"><i></i><b>9</b></div><div class=\"tick\"><i></i><b>10</b></div></div></div>"}],"minutes":26}},"primary2-test3":{"title":"ISEE Primary 2 Practice Test #3","auditory":{"title":"The Traveling Art Box","passage":"On Monday, Mrs. Rivera placed a large art-supply box beside the classroom door. “The kindergarten class needs these supplies for its family project tomorrow,” she said. “I need someone who can deliver the box safely and explain what is inside.”\n\nPriya raised her hand. She enjoyed helping younger students and had used many of the supplies before. Mrs. Rivera smiled, but she explained that the box held jars of paint, scissors, brushes, and small beads. If the box tipped, the materials could spill or break. The volunteer also needed to remember which supplies belonged at each table.\n\nThat afternoon, Priya made a plan. She counted every item and wrote the totals on a checklist. She placed the paint jars in a smaller tray so they could not roll. She put labels on three paper bags: “cutting,” “painting,” and “decorating.” Then she practiced describing the supplies to her older brother.\n\nThe next morning, Priya showed Mrs. Rivera the organized box. She lifted it from the bottom with both hands and explained how she would place each bag at the correct table. Mrs. Rivera nodded. “You have prepared for both the delivery and the directions,” she said.\n\nPriya carried the box carefully to the kindergarten room. Nothing spilled, and the younger students quickly found what they needed. When their teacher thanked Priya, she beamed. Priya had learned that being helpful meant more than volunteering—it meant making a careful plan and following it.","questions":[{"num":1,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"Priya prepares carefully to deliver and organize art supplies."},{"label":"B","text":"Priya teaches kindergarten students how to paint a picture."},{"label":"C","text":"Mrs. Rivera buys new supplies for Priya’s classroom."},{"label":"D","text":"Priya decides that the art box is too heavy to carry."}],"answer":"A","explanation":"The passage focuses on Priya planning, organizing, and safely delivering the supplies.","visual":null},{"num":2,"prompt":"Which is true about Priya?","choices":[{"label":"A","text":"She does not enjoy helping younger children."},{"label":"B","text":"She volunteers and then prepares carefully for the job."},{"label":"C","text":"She forgets which supplies belong at each table."},{"label":"D","text":"She asks her brother to deliver the supplies for her."}],"answer":"B","explanation":"Priya volunteers, makes a checklist, labels the bags, and practices her explanation.","visual":null},{"num":3,"prompt":"Why did Mrs. Rivera not choose Priya immediately?","choices":[{"label":"A","text":"The kindergarten room was closed."},{"label":"B","text":"Priya had never used art supplies."},{"label":"C","text":"The box contained items that could spill or break."},{"label":"D","text":"Another student had already delivered the box."}],"answer":"C","explanation":"Mrs. Rivera explains that the supplies need to be carried and organized responsibly.","visual":null},{"num":4,"prompt":"Why did Priya label the three paper bags?","choices":[{"label":"A","text":"To help the kindergarten students find the correct materials."},{"label":"B","text":"To hide the supplies from her older brother."},{"label":"C","text":"To count how many students were in the class."},{"label":"D","text":"To decide which colors of paint to use."}],"answer":"A","explanation":"The labels separated the supplies by activity and made them easy to place.","visual":null},{"num":5,"prompt":"The passage says Priya “beamed.” What does that mean?","choices":[{"label":"A","text":"She looked confused."},{"label":"B","text":"She smiled with happiness and pride."},{"label":"C","text":"She spoke in a very quiet voice."},{"label":"D","text":"She hurried out of the room."}],"answer":"B","explanation":"To beam means to smile brightly because one is happy or proud.","visual":null},{"num":6,"prompt":"Based on the passage, which is true about Mrs. Rivera?","choices":[{"label":"A","text":"She trusted Priya after seeing her organized plan."},{"label":"B","text":"She wanted the art supplies returned immediately."},{"label":"C","text":"She thought labels would confuse the students."},{"label":"D","text":"She did not want any student to help."}],"answer":"A","explanation":"Mrs. Rivera approves the plan after Priya demonstrates how she will carry and organize the box.","visual":null}],"minutes":7},"reading":{"passages":[{"title":"Monarch Butterflies on the Move","text":"Monarch butterflies are famous for their long journeys. Each fall, millions of monarchs leave cooler parts of the United States and Canada. They fly south to warmer places where they can rest during winter. Some monarchs travel more than two thousand miles.\n\nOne unusual part of the journey is that a single butterfly does not make the entire round trip. Several generations complete the trip together. A generation is a group of living things born around the same time. Some monarchs fly south, while later generations begin the trip north in spring.\n\nMonarchs have bright orange-and-black wings. The colors help warn birds that monarchs do not taste good. Their wings are also strong enough for long flights. Scientists believe monarchs use the position of the sun and clues from the wind to help guide them.\n\nResearchers place tiny tags on some monarchs before releasing them. When another person finds a tagged butterfly, the information helps scientists learn where the monarch traveled. Scientists also study milkweed, the plant monarch caterpillars need for food. Protecting milkweed and resting places can help monarchs complete their remarkable migration.","questions":[{"num":1,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Monarchs are the only butterflies with orange wings."},{"label":"B","text":"Monarchs make a long migration using special features, and scientists study their journey."},{"label":"C","text":"Every monarch butterfly completes the same round trip alone."},{"label":"D","text":"Monarch caterpillars can eat many different garden plants."}],"answer":"B","explanation":"The passage describes the migration, the butterflies’ features, and how scientists study and protect them.","visual":null},{"num":2,"prompt":"Why do monarchs have bright orange-and-black wings?","choices":[{"label":"A","text":"The colors help warn birds that monarchs taste bad."},{"label":"B","text":"The colors help monarchs stay warm in winter."},{"label":"C","text":"The colors show scientists where to place a tag."},{"label":"D","text":"The colors help caterpillars find milkweed."}],"answer":"A","explanation":"The passage says the bright colors warn birds that monarchs do not taste good.","visual":null},{"num":3,"prompt":"According to the passage, what may help monarchs find their way?","choices":[{"label":"A","text":"The sound of other butterflies."},{"label":"B","text":"The position of the sun and clues from the wind."},{"label":"C","text":"The color of nearby flowers."},{"label":"D","text":"Tiny tags placed on their wings."}],"answer":"B","explanation":"Scientists believe monarchs use the sun and wind as guides.","visual":null},{"num":4,"prompt":"In the passage, what does “generation” mean?","choices":[{"label":"A","text":"A place where butterflies rest."},{"label":"B","text":"A group born around the same time."},{"label":"C","text":"A pattern on a butterfly wing."},{"label":"D","text":"A very long flight."}],"answer":"B","explanation":"The passage directly defines a generation as a group born around the same time.","visual":null},{"num":5,"prompt":"What is the purpose of the last paragraph?","choices":[{"label":"A","text":"To explain how researchers learn about and protect monarch migration."},{"label":"B","text":"To tell readers how to keep monarchs as pets."},{"label":"C","text":"To compare monarchs with birds."},{"label":"D","text":"To explain why monarchs cannot fly in spring."}],"answer":"A","explanation":"The last paragraph discusses tagging, milkweed, and habitat protection.","visual":null},{"num":6,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To tell a funny story about a lost butterfly."},{"label":"B","text":"To give information about monarch migration and survival."},{"label":"C","text":"To persuade readers to travel south for winter."},{"label":"D","text":"To teach readers how to draw a monarch."}],"answer":"B","explanation":"The passage is informational and explains how monarchs travel and what helps them survive.","visual":null}]},{"title":"The Wobbly Bird Feeder","text":"Eli wanted to build a bird feeder for the tree outside his window. He cut a wide opening in an empty milk carton, filled the bottom with seeds, and tied one string to the top. When he hung it outside, the carton leaned sideways and most of the seeds slid out.\n\nEli felt discouraged, but his grandmother asked, “What did the feeder show you?” Eli looked closely. The single string pulled from only one spot. He added a second string on the opposite side. The feeder hung straight, but a strong breeze made it twist in circles.\n\nNext, Eli tied the two strings together above the carton so the feeder would stay steady. That change worked until it rained. Water entered through the opening and soaked the seeds. Eli cut a small roof from a plastic lid and attached it above the opening.\n\nThe following morning, two sparrows landed on the dry feeder. Eli watched them eat while the carton stayed level. His first plan had not worked, but each problem had pointed toward the next improvement.","questions":[{"num":7,"prompt":"What is this passage mostly about?","choices":[{"label":"A","text":"Eli improves a bird feeder by learning from each problem."},{"label":"B","text":"Eli’s grandmother builds a feeder for him."},{"label":"C","text":"Two sparrows carry seeds away from Eli’s window."},{"label":"D","text":"A milk carton cannot be used outdoors."}],"answer":"A","explanation":"Eli tests the feeder and makes a new improvement after each problem.","visual":null},{"num":8,"prompt":"Which happened first?","choices":[{"label":"A","text":"Eli added a plastic roof."},{"label":"B","text":"The feeder twisted in the wind."},{"label":"C","text":"The single string made the feeder lean."},{"label":"D","text":"Two sparrows landed on the feeder."}],"answer":"C","explanation":"The first problem was that the feeder leaned and spilled seeds.","visual":null},{"num":9,"prompt":"Why did Eli add a second string?","choices":[{"label":"A","text":"To make the opening wider."},{"label":"B","text":"To help the feeder hang straight."},{"label":"C","text":"To keep the seeds dry."},{"label":"D","text":"To attract more birds."}],"answer":"B","explanation":"The second string balanced the pull on the carton.","visual":null},{"num":10,"prompt":"In the passage, what does “steady” most nearly mean?","choices":[{"label":"A","text":"Not moving or shaking much."},{"label":"B","text":"Brightly colored."},{"label":"C","text":"Filled to the top."},{"label":"D","text":"Easy to open."}],"answer":"A","explanation":"Eli wanted the feeder to remain stable instead of twisting.","visual":null},{"num":11,"prompt":"Why does the author say each problem “pointed toward” an improvement?","choices":[{"label":"A","text":"Each problem showed Eli what needed to be fixed."},{"label":"B","text":"The birds pointed their wings at the feeder."},{"label":"C","text":"Eli drew arrows on the carton."},{"label":"D","text":"The feeder always faced the same direction."}],"answer":"A","explanation":"Each failed test gave Eli useful information about the next change.","visual":null},{"num":12,"prompt":"What is the most likely lesson of the story?","choices":[{"label":"A","text":"Outdoor projects should always be made from wood."},{"label":"B","text":"Stopping after the first mistake saves time."},{"label":"C","text":"Testing and revising can make a design better."},{"label":"D","text":"Bird feeders should be used only on sunny days."}],"answer":"C","explanation":"Eli succeeds because he studies each problem and revises his design.","visual":null}]},{"title":"Watch a Bean Seed Grow","text":"A seed can begin growing before it is planted in a garden. You can watch this happen by making a simple seed viewer. Ask an adult to help you gather a clear plastic cup, a paper towel, three bean seeds, water, and tape.\n\nFold the paper towel into a strip and place it around the inside wall of the cup. Add a small amount of water so the towel becomes moist, but not dripping wet. Slide the bean seeds between the towel and the side of the cup. Space the seeds apart so each one is easy to see.\n\nTape a label with the date onto the outside of the cup. Place the cup near a bright window, but do not leave it in strong, hot sunlight. Check the towel each day. Add a few drops of water if it begins to dry.\n\nWithin several days, the seed coat may split. A tiny root usually grows downward first. Later, a stem begins growing upward. Because the cup is clear, you can observe these changes without digging up the seed. When the plant has a few leaves, an adult can help move it into a pot of soil.","questions":[{"num":13,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"How to make a viewer that lets you observe a bean seed growing."},{"label":"B","text":"Why bean plants should grow only outside."},{"label":"C","text":"How to cook dried beans."},{"label":"D","text":"Why paper towels are stronger than soil."}],"answer":"A","explanation":"The passage gives materials and steps for observing a germinating bean seed.","visual":null},{"num":14,"prompt":"According to the passage, what should be placed around the inside wall of the cup?","choices":[{"label":"A","text":"A strip of paper towel."},{"label":"B","text":"A layer of garden soil."},{"label":"C","text":"Several pieces of tape."},{"label":"D","text":"A plastic lid."}],"answer":"A","explanation":"The folded paper towel is placed against the cup wall.","visual":null},{"num":15,"prompt":"Why is a clear cup useful for this project?","choices":[{"label":"A","text":"It keeps the seed warmer than any other cup."},{"label":"B","text":"It allows the changes in the seed and roots to be seen."},{"label":"C","text":"It prevents the towel from becoming wet."},{"label":"D","text":"It makes the plant grow without light."}],"answer":"B","explanation":"The clear cup lets the observer see growth without digging up the seed.","visual":null},{"num":16,"prompt":"What should be done after the paper towel begins to dry?","choices":[{"label":"A","text":"Move the cup into a dark closet."},{"label":"B","text":"Add a few drops of water."},{"label":"C","text":"Remove the seed coat."},{"label":"D","text":"Fill the entire cup with water."}],"answer":"B","explanation":"The instructions say to add a few drops when the towel starts to dry.","visual":null},{"num":17,"prompt":"In the passage, what does “moist” most nearly mean?","choices":[{"label":"A","text":"Slightly wet."},{"label":"B","text":"Completely frozen."},{"label":"C","text":"Very hot."},{"label":"D","text":"Hard and dry."}],"answer":"A","explanation":"Moist means damp or slightly wet, not dripping.","visual":null},{"num":18,"prompt":"What is the purpose of the final paragraph?","choices":[{"label":"A","text":"To describe what changes to watch for as the seed grows."},{"label":"B","text":"To list the materials needed for the project."},{"label":"C","text":"To explain why beans are healthy to eat."},{"label":"D","text":"To compare bean seeds with flower seeds."}],"answer":"A","explanation":"The final paragraph describes the root, stem, leaves, and eventual move to soil.","visual":null}]}],"minutes":20},"math":{"questions":[{"num":1,"prompt":"The table shows the number of shells found on five days. Which two days combined have a total of 13 shells?","choices":[{"label":"A","text":"Monday and Tuesday"},{"label":"B","text":"Tuesday and Thursday"},{"label":"C","text":"Wednesday and Friday"},{"label":"D","text":"Monday and Thursday"}],"answer":"B","explanation":"Tuesday has 7 shells and Thursday has 6. 7 + 6 = 13.","visual":"<div class=\"mini-table\"><div class=\"head\">Day</div><div>Monday</div><div>Tuesday</div><div>Wednesday</div><div>Thursday</div><div>Friday</div><div class=\"head\">Shells</div><div>4</div><div>7</div><div>9</div><div>6</div><div>8</div></div>"},{"num":2,"prompt":"The numbers follow a pattern. What number belongs in the box with the question mark?","choices":[{"label":"A","text":"35"},{"label":"B","text":"38"},{"label":"C","text":"40"},{"label":"D","text":"42"}],"answer":"C","explanation":"The pattern increases by 5: 35, 40, 45.","visual":"<div class=\"number-grid\"><span>5</span><span>10</span><span>15</span><span>20</span><span>25</span><span>30</span><span>35</span><span class=\"mystery\">?</span><span>45</span><span>50</span><span>55</span><span>60</span></div>"},{"num":3,"prompt":"A gray coin is worth 10. A white coin is worth 1. Which group has a value of 52?","choices":[{"label":"A","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</ pan style=\"background:#f5cf4a\"></span></div></div>"},{"num":24,"prompt":"A ribbon begins at 3 inches and ends at 9 inches on a ruler. How long is the ribbon?","choices":[{"label":"A","text":"5 inches"},{"label":"B","text":"6 inches"},{"label":"C","text":"9 inches"},{"label":"D","text":"12 inches"}],"answer":"B","explanation":"9 - 3 = 6 inches.","visual":"<div class=\"ruler\"><div class=\"pencil-line\" style=\"margin-left:30%;width:60%\"><span></span></div><div class=\"ticks\"><div class=\"tick\"><i></i><b>0</b></div><div class=\"tick\"><i></i><b>1</b></div><div class=\"tick\"><i></i><b>2</b></div><div class=\"tick\"><i></i><b>3</b></div><div class=\"tick\"><i></i><b>4</b></div><div class=\"tick\"><i></i><b>5</b></div><div class=\"tick\"><i></i><b>6</b></div><div class=\"tick\"><i></i><b>7</b></div><div class=\"tick\"><i></i><b>8</b></div><div class=\"tick\"><i></i><b>9</b></div><div class=\"tick\"><i></i><b>10</b></div></div></div>"}],"minutes":26}},"primary2-test4":{"title":"ISEE Primary 2 Practice Test #4","auditory":{"title":"The Morning Announcements","passage":"Mr. Howard needed a student to read the morning announcements on Friday. “The reader must arrive early, speak clearly, and pronounce every name correctly,” he told the class.\n\nMateo volunteered right away. He liked speaking into the classroom microphone, but Mr. Howard did not choose him immediately. The announcements included the names of students receiving awards and the times of several after-school clubs. A mistake could confuse many people.\n\nThat evening, Mateo copied the announcements onto large note cards. He circled difficult names and asked his mother to listen while he practiced them. He drew a short line wherever he should pause, and he set an alarm so he would arrive ten minutes early. Before school, he read through the cards one final time.\n\nMateo showed Mr. Howard the marked note cards and explained his plan. Mr. Howard asked him to read the first announcement. Mateo spoke slowly and clearly. “You have prepared carefully,” Mr. Howard said. “You are ready.”\n\nThe announcements went smoothly. Mateo pronounced every name correctly and gave students time to understand each message. When he finished, he felt a warm burst of pride. He had learned that confidence becomes stronger when it is supported by practice.","questions":[{"num":1,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"Mateo prepares carefully to read the morning announcements."},{"label":"B","text":"Mr. Howard teaches the class how to use a microphone."},{"label":"C","text":"Mateo forgets to arrive at school early."},{"label":"D","text":"Students create new after-school clubs."}],"answer":"A","explanation":"The passage focuses on Mateo practicing and planning so he can read the announcements well.","visual":null},{"num":2,"prompt":"Which is true about Mateo?","choices":[{"label":"A","text":"He dislikes speaking in front of people."},{"label":"B","text":"He is confident but also willing to practice."},{"label":"C","text":"He wants another student to read the names."},{"label":"D","text":"He arrives after the announcements begin."}],"answer":"B","explanation":"Mateo volunteers confidently and then prepares by practicing names, pauses, and timing.","visual":null},{"num":3,"prompt":"Why did Mr. Howard not choose Mateo immediately?","choices":[{"label":"A","text":"The microphone was broken."},{"label":"B","text":"Mateo had never arrived early before."},{"label":"C","text":"Mistakes in the announcements could confuse many people."},{"label":"D","text":"The award names had not been chosen."}],"answer":"C","explanation":"The announcements contained important names and times that needed to be read accurately.","visual":null},{"num":4,"prompt":"Why did Mateo draw short lines on his note cards?","choices":[{"label":"A","text":"To mark places where he should pause."},{"label":"B","text":"To count the number of announcements."},{"label":"C","text":"To cross out the difficult names."},{"label":"D","text":"To decorate the cards."}],"answer":"A","explanation":"The lines reminded Mateo where to pause while speaking.","visual":null},{"num":5,"prompt":"Mateo felt “a warm burst of pride.” What does that mean?","choices":[{"label":"A","text":"He suddenly felt pleased with what he had done."},{"label":"B","text":"He became too warm near the microphone."},{"label":"C","text":"He was worried that he had made a mistake."},{"label":"D","text":"He wanted to leave school immediately."}],"answer":"A","explanation":"The phrase describes a strong, happy feeling of pride.","visual":null},{"num":6,"prompt":"Based on the passage, which is true about Mr. Howard?","choices":[{"label":"A","text":"He trusted Mateo after hearing him practice."},{"label":"B","text":"He thought the announcements were unimportant."},{"label":"C","text":"He wanted Mateo to read as quickly as possible."},{"label":"D","text":"He did not allow students to use note cards."}],"answer":"A","explanation":"Mr. Howard chooses Mateo after seeing his preparation and hearing a clear practice reading.","visual":null}],"minutes":7},"reading":{"passages":[{"title":"Turtles and Tortoises","text":"Turtles and tortoises are both reptiles with hard shells. Their shells protect their bodies, and both animals can pull in their heads when they sense danger. Even though turtles and tortoises look similar, they are adapted for different kinds of places.\n\nMost turtles spend much of their time in water. Their feet may be webbed, which helps them swim. Sea turtles have flippers instead of ordinary feet. Turtles usually have flatter, lighter shells that move easily through water.\n\nTortoises live on land. They have thick, sturdy legs and round feet that help them walk over rough ground. Their shells are often high and dome-shaped. Many tortoises eat grasses, leaves, and flowers.\n\nBoth turtles and tortoises can live for many years. Some species are threatened because they lose safe places to live or become trapped in trash. Wildlife groups protect nesting areas and teach people how to keep beaches and parks clean. These efforts help both kinds of shelled reptiles survive.","questions":[{"num":1,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Turtles and tortoises are similar reptiles with different features for water and land."},{"label":"B","text":"Every turtle lives in the ocean."},{"label":"C","text":"Tortoises are the only reptiles with shells."},{"label":"D","text":"Turtles and tortoises eat exactly the same foods."}],"answer":"A","explanation":"The passage compares their shared traits and their different adaptations.","visual":null},{"num":2,"prompt":"Which feature helps many turtles swim?","choices":[{"label":"A","text":"Dome-shaped shells."},{"label":"B","text":"Webbed feet or flippers."},{"label":"C","text":"Thick, round land feet."},{"label":"D","text":"Long fur."}],"answer":"B","explanation":"The passage explains that webbed feet and flippers help turtles move in water.","visual":null},{"num":3,"prompt":"Why do tortoises have thick, sturdy legs?","choices":[{"label":"A","text":"To help them walk over land."},{"label":"B","text":"To help them breathe underwater."},{"label":"C","text":"To make their shells lighter."},{"label":"D","text":"To help them catch fish."}],"answer":"A","explanation":"Their legs and round feet are suited to walking on rough ground.","visual":null},{"num":4,"prompt":"In the passage, what does “adapted” most nearly mean?","choices":[{"label":"A","text":"Suited for a particular way of living."},{"label":"B","text":"Hidden from all other animals."},{"label":"C","text":"Taught to follow people."},{"label":"D","text":"Changed into a different species."}],"answer":"A","explanation":"Adapted means having features that fit a habitat or way of life.","visual":null},{"num":5,"prompt":"What is the purpose of the last paragraph?","choices":[{"label":"A","text":"To explain threats and ways people help protect these animals."},{"label":"B","text":"To list every food turtles and tortoises eat."},{"label":"C","text":"To explain how to keep a tortoise as a pet."},{"label":"D","text":"To prove that all reptiles live for the same number of years."}],"answer":"A","explanation":"The final paragraph discusses habitat loss, trash, and protection efforts.","visual":null},{"num":6,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To compare turtles and tortoises and give information about them."},{"label":"B","text":"To tell a story about a race between two animals."},{"label":"C","text":"To persuade readers to swim with sea turtles."},{"label":"D","text":"To explain how to draw a shell."}],"answer":"A","explanation":"The passage is informational and compares the two kinds of reptiles.","visual":null}]},{"title":"The Missing Recipe Card","text":"Lani planned to bake blueberry muffins for her family. She placed flour, sugar, milk, eggs, and blueberries on the counter. Then she reached for her grandmother’s recipe card, but the card was not in its usual box.\n\nAt first, Lani searched quickly. She looked under the mixing bowls, inside the cookbook, and beside the refrigerator. When she still could not find it, she stopped and made a list of where she had used the card the day before.\n\nLani remembered reading the recipe at the kitchen table while making a shopping list. She checked the table, but the card was not there. Then she noticed a stack of grocery coupons. The recipe card had slipped underneath them.\n\nLani felt relieved. She arranged the ingredients in the order they would be used and followed the directions one step at a time. The muffins rose perfectly. Lani realized that slowing down and thinking carefully had solved the problem faster than searching everywhere at once.","questions":[{"num":7,"prompt":"What is this passage mostly about?","choices":[{"label":"A","text":"Lani solves a problem by slowing down and thinking carefully."},{"label":"B","text":"Lani decides not to bake muffins."},{"label":"C","text":"Lani’s grandmother buys a new recipe box."},{"label":"D","text":"Blueberries spill across the kitchen."}],"answer":"A","explanation":"Lani uses an organized approach to remember where the missing card might be.","visual":null},{"num":8,"prompt":"Which happened first?","choices":[{"label":"A","text":"Lani found the recipe beneath the coupons."},{"label":"B","text":"Lani arranged the ingredients in order."},{"label":"C","text":"Lani searched under the mixing bowls."},{"label":"D","text":"The muffins rose perfectly."}],"answer":"C","explanation":"Her first quick search included looking under the bowls.","visual":null},{"num":9,"prompt":"Why did Lani make a list of places where she had used the card?","choices":[{"label":"A","text":"To help her remember and search in a logical way."},{"label":"B","text":"To decide which muffins to bake."},{"label":"C","text":"To count the grocery coupons."},{"label":"D","text":"To write a new recipe."}],"answer":"A","explanation":"The list helped Lani focus on likely places instead of searching randomly.","visual":null},{"num":10,"prompt":"In the passage, what does “relieved” most nearly mean?","choices":[{"label":"A","text":"Glad that a worry or problem is over."},{"label":"B","text":"Angry about a mistake."},{"label":"C","text":"Ready to fall asleep."},{"label":"D","text":"Unsure what to do next."}],"answer":"A","explanation":"Lani felt relieved because she had found the missing card.","visual":null},{"num":11,"prompt":"What can the reader infer about Lani?","choices":[{"label":"A","text":"She can change her approach when the first plan does not work."},{"label":"B","text":"She does not enjoy baking with her family."},{"label":"C","text":"She often throws recipe cards away."},{"label":"D","text":"She prefers searching quickly to thinking."}],"answer":"A","explanation":"She stops the rushed search and switches to a careful memory-based plan.","visual":null},{"num":12,"prompt":"What is the most likely lesson of the story?","choices":[{"label":"A","text":"Thinking calmly can help solve a problem."},{"label":"B","text":"Recipes should never be stored in boxes."},{"label":"C","text":"Coupons are more useful than recipes."},{"label":"D","text":"Muffins should be made without directions."}],"answer":"A","explanation":"Lani solves the problem when she slows down and reasons through it.","visual":null}]},{"title":"Practice Biography: Arun Patel","text":"Arun Patel enjoyed drawing maps when he was a child. He sketched the path from his house to school and marked trees, stores, and crosswalks. When relatives visited, Arun made simple maps so they could find nearby parks.\n\nAs Arun grew older, he studied geography and design. He learned that a useful map must be clear, accurate, and easy to read. He practiced choosing symbols and colors that helped people understand important information quickly.\n\nA children’s museum once asked Arun to create a map for a large outdoor garden. The museum wanted young visitors to find a pond, a butterfly area, and a maze. Arun walked every path, measured distances, and asked children which symbols made sense to them. He added raised shapes so visitors with limited vision could feel parts of the map.\n\nThe garden map became popular with families. Arun later designed maps for trails, zoos, and city parks. His recognizable style combined careful measurements with simple pictures. Arun showed that maps can do more than show directions—they can help many different people explore with confidence.","questions":[{"num":13,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Arun became a map designer known for clear and accessible maps."},{"label":"B","text":"Arun wanted every park to have a maze."},{"label":"C","text":"A museum taught Arun how to draw for the first time."},{"label":"D","text":"Arun stopped drawing maps after childhood."}],"answer":"A","explanation":"The passage follows Arun’s interest in maps and his career designing helpful maps.","visual":null},{"num":14,"prompt":"What did Arun do when relatives visited his family?","choices":[{"label":"A","text":"He made simple maps to nearby parks."},{"label":"B","text":"He asked them to measure every street."},{"label":"C","text":"He drew pictures of their houses."},{"label":"D","text":"He took them to the children’s museum."}],"answer":"A","explanation":"The first paragraph says Arun made maps so relatives could find parks.","visual":null},{"num":15,"prompt":"Why did the museum ask children which symbols made sense to them?","choices":[{"label":"A","text":"The map was meant to be easy for young visitors to understand."},{"label":"B","text":"The children needed to choose the garden plants."},{"label":"C","text":"Arun did not know where the paths were."},{"label":"D","text":"The museum wanted the children to measure distances."}],"answer":"A","explanation":"Arun tested the symbols with the people who would use the map.","visual":null},{"num":16,"prompt":"What is the purpose of the second paragraph?","choices":[{"label":"A","text":"To explain what Arun learned about making useful maps."},{"label":"B","text":"To list every city Arun visited."},{"label":"C","text":"To describe the garden maze."},{"label":"D","text":"To persuade readers to study geography."}],"answer":"A","explanation":"It gives background about the skills Arun developed in geography and design.","visual":null},{"num":17,"prompt":"In the passage, what does “recognizable” most nearly mean?","choices":[{"label":"A","text":"Easy to identify."},{"label":"B","text":"Impossible to copy."},{"label":"C","text":"Made only for adults."},{"label":"D","text":"Very old."}],"answer":"A","explanation":"Recognizable means having a style people can identify.","visual":null},{"num":18,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To explain how Arun’s interest and skills led to a career making useful maps."},{"label":"B","text":"To teach the exact steps for measuring every park."},{"label":"C","text":"To compare zoos with gardens."},{"label":"D","text":"To warn people not to use digital maps."}],"answer":"A","explanation":"The biography explains Arun’s development and the special qualities of his work.","visual":null}]}],"minutes":20},"math":{"questions":[{"num":1,"prompt":"Four friends want to share stickers equally. Which group can be divided so each friend gets the same number?","choices":[{"label":"A","html":"<div class=\"icon-row\" style=\"font-size:25px\"><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span></div><div class=\"visual-caption\">8 stickers</div>"},{"label":"B","html":"<div class=\"icon-row\" style=\"font-size:25px\"><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span></div><div class=\"visual-caption\">10 stickers</div>"},{"label":"C","html":"<div class=\"icon-row\" style=\"font-size:25px\"><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span></div><div class=\"visual-caption\">12 stickers</div>"},{"label":"D","html":"<div class=\"icon-row\" style=\"font-size:25px\"><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span></div><div class=\"visual-caption\">14 stickers</div>"}],"answer":"C","explanation":"12 can be divided equally among 4 friends. Each friend gets 3.","visual":null},{"num":2,"prompt":"A piece of string begins at 1 inch and ends at 8 inches. How long is the string?","choices":[{"label":"A","text":"6 inches"},{"label":"B","text":"7 inches"},{"label":"C","text":"8 inches"},{"label":"D","text":"9 inches"}],"answer":"B","explanation":"8 - 1 = 7 inches.","visual":"<div class=\"ruler\"><div class=\"pencil-line\" style=\"margin-left:10%;width:70%\"><span></span></div><div class=\"ticks\"><div class=\"tick\"><i></i><b>0</b></div><div class=\"tick\"><i></i><b>1</b></div><div class=\"tick\"><i></i><b>2</b></div><div class=\"tick\"><i></i><b>3</b></div><div class=\"tick\"><i></i><b>4</b></div><div class=\"tick\"><i></i><b>5</b></div><div class=\"tick\"><i></i><b>6</b></div><div class=\"tick\"><i></i><b>7</b></div><div class=\"tick\"><i></i><b>8</b></div><div class=\"tick\"><i></i><b>9</b></div><div class=\"tick\"><i></i><b>10</b></div></div></div>"},{"num":3,"prompt":"The graph shows the number of birds seen each day. On which two days were the same number of birds seen?","choices":[{"label":"A","text":"Monday and Wednesday"},{"label":"B","text":"Tuesday and Thursday"},{"label":"C","text":"Wednesday and Friday"},{"label":"D","text":"Monday and Friday"}],"answer":"B","explanation":"Tuesday and Thursday each have 4 birds.","visual":"<div class=\"mini-table\"><div class=\"head\">Day</div><div>Monday</div><div>Tuesday</div><div>Wednesday</div><div>Thursday</div><div>Friday</div><div class=\"head\">Birds</div><div>6</div><div>4</div><div>7</div><div>4</div><div>5</div></div>"},{"num":4,"prompt":"Rosa collected 11 leaves and Kim collected 13 leaves. Then 7 leaves blew away. Which number sentence shows how many leaves remain?","choices":[{"label":"A","text":"11 + 13 - 7 = 17"},{"label":"B","text":"13 - 11 - 7 = -5"},{"label":"C","text":"11 + 13 = 24"},{"label":"D","text":"11 + 13 + 7 = 31"}],"answer":"A","explanation":"Add both collections and subtract the 7 leaves that blew away.","visual":null},{"num":5,"prompt":"Owen has 29 cards. He gives 4 cards to Mia and 8 cards to Leo. How many cards does Owen have left?","choices":[{"label":"A","text":"17"},{"label":"B","text":"21"},{"label":"C","text":"25"},{"label":"D","text":"41"}],"answer":"A","explanation":"29 - 4 - 8 = 17.","visual":null},{"num":6,"prompt":"Which tool is best for measuring the length of a school hallway?","choices":[{"label":"A","text":"measuring tape"},{"label":"B","text":"scale"},{"label":"C","text":"thermometer"},{"label":"D","text":"measuring cup"}],"answer":"A","explanation":"A measuring tape is suited to a long distance.","visual":null},{"num":7,"prompt":"How are a cube and a cylinder alike?","choices":[{"label":"A","text":"They both have flat bases."},{"label":"B","text":"They both have eight corners."},{"label":"C","text":"They both have only flat surfaces."},{"label":"D","text":"They both have six faces."}],"answer":"A","explanation":"Both shapes have at least one flat base.","visual":"<div class=\"shape-pair\"><svg viewBox=\"0 0 360 170\" role=\"img\" aria-label=\"A cube and a cylinder\"><g transform=\"translate(35,30)\"><path d=\"M20 35 L75 10 L125 38 L70 65 Z\" fill=\"#dce8f7\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M20 35 V95 L70 125 V65 Z\" fill=\"#eef3fa\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M70 65 L125 38 V98 L70 125 Z\" fill=\"#c8d8ef\" stroke=\"#344054\" stroke-width=\"3\"/><text x=\"72\" y=\"150\" text-anchor=\"middle\">cube</text></g><g transform=\"translate(215,25)\"><ellipse cx=\"55\" cy=\"30\" rx=\"43\" ry=\"15\" fill=\"#dce8f7\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M12 30 V105 M98 30 V105\" stroke=\"#344054\" stroke-width=\"3\"/><ellipse cx=\"55\" cy=\"105\" rx=\"43\" ry=\"15\" fill=\"#eef3fa\" stroke=\"#344054\" stroke-width=\"3\"/><text x=\"55\" y=\"145\" text-anchor=\"middle\">cylinder</text></g></svg></div>"},{"num":8,"prompt":"Which group of coins shows 5 tens and 3 ones?","choices":[{"label":"A","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"B","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"C","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"},{"label":"D","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span></div>"}],"answer":"A","explanation":"Five tens and three ones make 53.","visual":null},{"num":9,"prompt":"The graph shows glasses of lemonade sold. How many more glasses did Tim sell than Mandy?","choices":[{"label":"A","text":"5"},{"label":"B","text":"6"},{"label":"C","text":"7"},{"label":"D","text":"9"}],"answer":"C","explanation":"Tim sold 13 and Mandy sold 6. 13 - 6 = 7.","visual":"<div class=\"bar-chart\" aria-label=\"Glasses of lemonade sold\"><div class=\"bar-col\"><div class=\"bar\" style=\"height:42%\"><b>6</b></div><span>Mandy</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:62%\"><b>9</b></div><span>Connor</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:90%\"><b>13</b></div><span>Tim</span></div></div>"},{"num":10,"prompt":"A block weighs 2 pounds and a ball weighs 1 pound. Which group weighs the most?","choices":[{"label 2,"prompt":"Four books have 44, 72, 58, and 65 pages. Which list orders them from fewest to most?","choices":[{"label":"A","text":"44, 58, 65, 72"},{"label":"B","text":"72, 65, 58, 44"},{"label":"C","text":"44, 65, 58, 72"},{"label":"D","text":"58, 44, 72, 65"}],"answer":"A","explanation":"The numbers in increasing order are 44, 58, 65, 72.","visual":null},{"num":23,"prompt":"A bag contains 5 green marbles and 5 red marbles. Which statement is true?","choices":[{"label":"A","text":"Green is more likely than red."},{"label":"B","text":"Red is more likely than green."},{"label":"C","text":"Green and red are equally likely."},{"label":"D","text":"It is impossible to pick a red marble."}],"answer":"C","explanation":"The bag has the same number of each color, so the chances are equal.","visual":"<div class=\"marble-bag\"><div class=\"bag-label\">Bag of marbles</div><div class=\"marbles\"><span class=\"green\"></span><span class=\"green\"></span><span class=\"green\"></span><span class=\"green\"></span><span class=\"green\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span></div></div>"},{"num":24,"prompt":"The numbers increase by 4. What number belongs in the missing box?","choices":[{"label":"A","text":"24"},{"label":"B","text":"26"},{"label":"C","text":"28"},{"label":"D","text":"30"}],"answer":"C","explanation":"The pattern is 20, 24, 28, 32.","visual":"<div class=\"number-grid\"><span>4</span><span>8</span><span>12</span><span>16</span><span>20</span><span>24</span><span class=\"mystery\">?</span><span>32</span><span>36</span><span>40</span><span>44</span><span>48</span></div>"}],"minutes":26}},"primary2-test5":{"title":"ISEE Primary 2 Practice Test #5","auditory":{"title":"The Library Cart","passage":"On Tuesday, Ms. Patel placed a stack of library books on the reading table. “These books must be returned before lunch,” she said. “I need a volunteer who can organize them and make sure every book reaches the correct shelf.”\n\nLena raised her hand. She visited the library often. Ms. Patel was pleased, but she explained that the books included biographies, animal books, folktales, and poetry. If the books were mixed together, the librarian would have extra work.\n\nThat evening, Lena made four labels from index cards. She practiced sorting several books from home and made a small map showing where each library section was located. Before school, she checked that the labels and map were in her backpack.\n\nThe next morning, Lena showed Ms. Patel how she would sort the books before carrying them. She placed the heaviest books on the bottom of the cart and kept the labels on top. Ms. Patel nodded. “You have planned for both safety and organization,” she said.\n\nLena returned every book to the correct shelf. The librarian thanked her. Lena felt proud because she had learned that a helpful person does not simply finish a task—she thinks about how to do it well.","questions":[{"num":1,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"Lena prepares carefully to organize and return library books."},{"label":"B","text":"Lena writes a new book."},{"label":"C","text":"Ms. Patel closes the library."},{"label":"D","text":"Lena refuses to move the cart."}],"answer":"A","explanation":"The passage focuses on Lena’s careful plan.","visual":null},{"num":2,"prompt":"Which is true about Lena?","choices":[{"label":"A","text":"She avoids the library."},{"label":"B","text":"She volunteers and creates an organized plan."},{"label":"C","text":"She mixes all the books together."},{"label":"D","text":"She asks someone else to finish."}],"answer":"B","explanation":"She makes labels, a map, and a safe carrying plan.","visual":null},{"num":3,"prompt":"Why did Ms. Patel not choose Lena immediately?","choices":[{"label":"A","text":"The library was closed."},{"label":"B","text":"The task required sorting and safe carrying."},{"label":"C","text":"Lena could not read."},{"label":"D","text":"The books were already returned."}],"answer":"B","explanation":"The job required responsibility.","visual":null},{"num":4,"prompt":"Why did Lena make a map?","choices":[{"label":"A","text":"To show where each library section was."},{"label":"B","text":"To draw book pictures."},{"label":"C","text":"To count tables."},{"label":"D","text":"To choose a favorite book."}],"answer":"A","explanation":"The map helped her find the correct shelves.","visual":null},{"num":5,"prompt":"What does it mean that Lena felt proud?","choices":[{"label":"A","text":"She was pleased with her careful work."},{"label":"B","text":"She was worried."},{"label":"C","text":"She wanted to leave."},{"label":"D","text":"She heard a loud noise."}],"answer":"A","explanation":"She felt happy about completing the task well.","visual":null},{"num":6,"prompt":"Which is true about Ms. Patel?","choices":[{"label":"A","text":"She trusted Lena after seeing her preparation."},{"label":"B","text":"She wanted books on any shelf."},{"label":"C","text":"She disliked labels."},{"label":"D","text":"She did not allow library visits."}],"answer":"A","explanation":"Ms. Patel approved Lena’s careful plan.","visual":null}],"minutes":7},"reading":{"passages":[{"title":"Busy Beavers","text":"Beavers are large rodents that live near rivers, ponds, and streams. They build dams from branches, mud, and stones. A dam slows moving water and creates a pond behind it.\n\nBeavers have wide tails that help them steer and webbed back feet for swimming. Their thick fur keeps them warm. Their strong front teeth continue growing, so chewing wood helps keep the teeth from becoming too long.\n\nA beaver lodge is a home built from sticks and mud. Its entrance is usually underwater. Inside is a dry room where the beavers rest.\n\nBeaver dams can provide homes for fish, frogs, insects, and birds. Dams can also flood roads or fields. Wildlife experts study beaver activity and look for safe ways for people and beavers to share the same areas.","questions":[{"num":1,"prompt":"What is the main idea?","choices":[{"label":"A","text":"Beavers have features and behaviors that help them live and build near water."},{"label":"B","text":"Beavers live only in oceans."},{"label":"C","text":"Every dam is harmful."},{"label":"D","text":"Beavers build with metal."}],"answer":"A","explanation":"The passage explains beaver traits, dams, and lodges.","visual":null},{"num":2,"prompt":"What does a beaver dam do?","choices":[{"label":"A","text":"Speeds water."},{"label":"B","text":"Slows water and can create a pond."},{"label":"C","text":"Dries a river."},{"label":"D","text":"Stops beavers from swimming."}],"answer":"B","explanation":"A dam slows water.","visual":null},{"num":3,"prompt":"Why do beavers chew wood?","choices":[{"label":"A","text":"To wear down growing teeth."},{"label":"B","text":"To change fur color."},{"label":"C","text":"To widen tails."},{"label":"D","text":"To teach swimming."}],"answer":"A","explanation":"Their front teeth keep growing.","visual":null},{"num":4,"prompt":"What does “webbed” most nearly mean?","choices":[{"label":"A","text":"Connected by skin that helps swimming."},{"label":"B","text":"Covered in mud."},{"label":"C","text":"Sharp."},{"label":"D","text":"Heavy."}],"answer":"A","explanation":"Webbing between toes helps swimming.","visual":null},{"num":5,"prompt":"What is the purpose of the last paragraph?","choices":[{"label":"A","text":"To explain benefits and problems caused by dams."},{"label":"B","text":"To explain pet care."},{"label":"C","text":"To list foods."},{"label":"D","text":"To prove all dams should be removed."}],"answer":"A","explanation":"The paragraph presents both effects.","visual":null},{"num":6,"prompt":"Why did the author write this passage?","choices":[{"label":"A","text":"To give information about beavers."},{"label":"B","text":"To tell a fantasy."},{"label":"C","text":"To persuade readers to build a dam."},{"label":"D","text":"To teach drawing."}],"answer":"A","explanation":"It is informational.","visual":null}]},{"title":"The Paper Bridge","text":"Mira wanted to make a paper bridge that could hold ten toy cars. She placed a flat strip of paper between two books. The bridge bent when she set the third car on it.\n\nMira folded a new sheet back and forth like a fan. The folds made ridges. This bridge held six cars, but the ends slipped from the books.\n\nNext, Mira taped the ends to the books. The bridge held eight cars before the middle began to sag. Mira placed a narrow paper support under the center.\n\nOn the final test, all ten cars crossed the bridge. Each test had given Mira information about the next change to make.","questions":[{"num":7,"prompt":"What is this passage mostly about?","choices":[{"label":"A","text":"Mira improves a paper bridge through testing."},{"label":"B","text":"Mira buys a bridge."},{"label":"C","text":"Her brother builds it."},{"label":"D","text":"Paper cannot hold cars."}],"answer":"A","explanation":"Mira revises the design after each test.","visual":null},{"num":8,"prompt":"Which happened first?","choices":[{"label":"A","text":"Mira added a support."},{"label":"B","text":"The flat paper bent."},{"label":"C","text":"She taped the ends."},{"label":"D","text":"Ten cars crossed."}],"answer":"B","explanation":"The first bridge bent.","visual":null},{"num":9,"prompt":"Why did Mira fold the paper like a fan?","choices":[{"label":"A","text":"To create strong ridges."},{"label":"B","text":"To decorate it."},{"label":"C","text":"To shorten it."},{"label":"D","text":"To hide cars."}],"answer":"A","explanation":"The folds made the bridge stronger.","visual":null},{"num":10,"prompt":"What does “sag” mean?","choices":[{"label":"A","text":"Bend downward."},{"label":"B","text":"Slide sideways."},{"label":"C","text":"Become colorful."},{"label":"D","text":"Make noise."}],"answer":"A","explanation":"The middle bent downward.","visual":null},{"num":11,"prompt":"What did Mira learn when the ends slipped?","choices":[{"label":"A","text":"The ends needed to be secured."},{"label":"B","text":"The bridge needed fewer folds."},{"label":"C","text":"The cars were too small."},{"label":"D","text":"The books should be removed."}],"answer":"A","explanation":"She taped the ends.","visual":null},{"num":12,"prompt":"What is the lesson?","choices":[{"label":"A","text":"Testing and changing a design can improve it."},{"label":"B","text":"The first idea is always best."},{"label":"C","text":"Paper bridges should never be used."},{"label":"D","text":"Toy cars should be paper."}],"answer":"A","explanation":"Mira improves through revision.","visual":null}]},{"title":"Make a Wind Direction Station","text":"You can make a tool that shows wind direction. Ask an adult to help you gather a paper plate, a pencil with an eraser, a straw, a straight pin, tape, and a paper arrow.\n\nWrite N, E, S, and W around the plate. Push the pencil through the center so the eraser points upward.\n\nTape the arrow to one end of the straw. Push the pin through the straw and gently into the eraser. The straw should turn freely. Place the station outside.\n\nPoint the N toward north. When wind blows, the arrow turns. Record the direction at the same time each day. After a week, compare your observations.","questions":[{"num":13,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"How to build and use a wind-direction tool."},{"label":"B","text":"Why wind is stronger in winter."},{"label":"C","text":"How to make a plane."},{"label":"D","text":"Why compasses point east."}],"answer":"A","explanation":"It gives materials and steps.","visual":null},{"num":14,"prompt":"What do N, E, S, and W stand for?","choices":[{"label":"A","text":"Four main directions."},{"label":"B","text":"Four weather types."},{"label":"C","text":"Four times."},{"label":"D","text":"Four wind sizes."}],"answer":"A","explanation":"They are north, east, south, west.","visual":null},{" 6":{"title":"ISEE Primary 2 Practice Test #6","auditory":{"title":"The Equipment Checklist","passage":"Coach Ellis needed someone to carry the team’s equipment checklist to Saturday’s soccer game. “The person must arrive early, check every bag, and tell me right away if anything is missing,” he said.\n\nJonah volunteered. Coach Ellis thanked him, but he explained that the bags contained balls, cones, pinnies, a first-aid kit, and water bottles. Forgetting even one bag could delay the game.\n\nOn Friday evening, Jonah copied the checklist onto a clipboard. He grouped the equipment by bag and placed a check box beside each item. He asked his sister to pretend that one item was missing so he could practice checking carefully.\n\nThe next morning, Jonah arrived early. He counted the balls, opened each bag, and compared everything with the checklist. One bag of cones was missing. Jonah told Coach Ellis, and they found it beside the storage-room door.\n\nBecause Jonah had checked carefully, the game began on time. Jonah smiled because his preparation had helped everyone.","questions":[{"num":1,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"Jonah prepares carefully to check soccer equipment."},{"label":"B","text":"Jonah learns a new sport."},{"label":"C","text":"Coach Ellis buys uniforms."},{"label":"D","text":"The game is canceled."}],"answer":"A","explanation":"The passage centers on Jonah’s checklist.","visual":null},{"num":2,"prompt":"Which is true about Jonah?","choices":[{"label":"A","text":"He does not know equipment."},{"label":"B","text":"He volunteers and practices checking."},{"label":"C","text":"He arrives late."},{"label":"D","text":"He hides the missing bag."}],"answer":"B","explanation":"Jonah prepares and arrives early.","visual":null},{"num":3,"prompt":"Why was Coach Ellis careful about choosing a volunteer?","choices":[{"label":"A","text":"Missing equipment could delay the game."},{"label":"B","text":"There were not enough players."},{"label":"C","text":"The room was locked."},{"label":"D","text":"The game was indoors."}],"answer":"A","explanation":"The passage states this.","visual":null},{"num":4,"prompt":"Why did Jonah ask his sister to hide an item?","choices":[{"label":"A","text":"To practice checking carefully."},{"label":"B","text":"To hide equipment."},{"label":"C","text":"To choose a uniform."},{"label":"D","text":"To count players."}],"answer":"A","explanation":"It was practice.","visual":null},{"num":5,"prompt":"Why did Jonah smile?","choices":[{"label":"A","text":"His preparation helped the game start on time."},{"label":"B","text":"He scored a goal."},{"label":"C","text":"He found a new ball."},{"label":"D","text":"He threw away the list."}],"answer":"A","explanation":"He was proud his work helped.","visual":null},{"num":6,"prompt":"Which is true about Coach Ellis?","choices":[{"label":"A","text":"He valued careful preparation."},{"label":"B","text":"He thought equipment did not matter."},{"label":"C","text":"He wanted Jonah to skip the list."},{"label":"D","text":"He preferred delays."}],"answer":"A","explanation":"Coach Ellis stressed careful checking.","visual":null}],"minutes":7},"reading":{"passages":[{"title":"Owls: Quiet Hunters","text":"Owls are birds of prey. Many hunt at night, although some hunt during the day. Their bodies have features that make them successful hunters.\n\nLarge eyes gather light in dim places. Owls cannot move their eyes from side to side, so they turn their heads to look around.\n\nOwls also have excellent hearing. Their ear openings may sit at different heights, helping them tell where a sound comes from. Soft wing feathers reduce noise during flight.\n\nOwls eat mice, insects, fish, and other animals. After eating, an owl may cough up a pellet containing fur or bones. Scientists study pellets to learn what owls have eaten.","questions":[{"num":1,"prompt":"What is the main idea?","choices":[{"label":"A","text":"Owls have features that help them hunt."},{"label":"B","text":"All owls hunt only at night."},{"label":"C","text":"Owls eat only mice."},{"label":"D","text":"Scientists teach owls to fly."}],"answer":"A","explanation":"The passage explains vision, hearing, and feathers.","visual":null},{"num":2,"prompt":"Why do owls turn their heads?","choices":[{"label":"A","text":"Their eyes do not move side to side."},{"label":"B","text":"Their ears are small."},{"label":"C","text":"Their wings block vision."},{"label":"D","text":"Their feathers are heavy."}],"answer":"A","explanation":"Owls turn their heads to look around.","visual":null},{"num":3,"prompt":"How do different ear heights help?","choices":[{"label":"A","text":"They help locate sounds."},{"label":"B","text":"They help vision."},{"label":"C","text":"They keep the owl warm."},{"label":"D","text":"They digest bones."}],"answer":"A","explanation":"They help tell sound direction.","visual":null},{"num":4,"prompt":"What does “dim” mean?","choices":[{"label":"A","text":"Not very bright."},{"label":"B","text":"Very noisy."},{"label":"C","text":"Very warm."},{"label":"D","text":"Empty."}],"answer":"A","explanation":"Dim means low light.","visual":null},{"num":5,"prompt":"What is the purpose of the last paragraph?","choices":[{"label":"A","text":"To explain diet and pellets."},{"label":"B","text":"To explain pet care."},{"label":"C","text":"To compare fish."},{"label":"D","text":"To explain eggs."}],"answer":"A","explanation":"It describes food and pellets.","visual":null},{"num":6,"prompt":"Why did the author write this?","choices":[{"label":"A","text":"To give information about owls."},{"label":"B","text":"To tell a fantasy."},{"label":"C","text":"To persuade night hunting."},{"label":"D","text":"To teach drawing."}],"answer":"A","explanation":"It is informational.","visual":null}]},{"title":"The Marble Path","text":"Sofia taped cardboard tubes in a straight line along a box. When she released a marble, it moved slowly and stopped before the end.\n\nShe raised the first tube so the path sloped downward. The marble rolled farther but jumped out at a gap. Sofia moved the tubes closer and taped the connection.\n\nOn the next test, the marble flew off the final curve. Sofia added a low wall around the curve.\n\nThis time, the marble traveled through every tube and landed in a cup. Sofia had changed one part after each test so she could understand which change solved each problem.","questions":[{"num":7,"prompt":"What is this passage mostly about?","choices":[{"label":"A","text":"Sofia improves a marble path one change at a time."},{"label":"B","text":"Sofia loses tubes."},{"label":"C","text":"A marble breaks the box."},{"label":"D","text":"A friend builds it."}],"answer":"A","explanation":"She tests and revises.","visual":null},{"num":8,"prompt":"Which happened first?","choices":[{"label":"A","text":"She added a wall."},{"label":"B","text":"The marble stopped early."},{"label":"C","text":"The marble landed in a cup."},{"label":"D","text":"She taped the gap."}],"answer":"B","explanation":"The first test stopped early.","visual":null},{"num":9,"prompt":"Why did she raise the first tube?","choices":[{"label":"A","text":"To create a downward slope."},{"label":"B","text":"To shorten the path."},{"label":"C","text":"To stop the marble."},{"label":"D","text":"To decorate."}],"answer":"A","explanation":"The slope helped the marble roll.","visual":null},{"num":10,"prompt":"What does “connection” mean?","choices":[{"label":"A","text":"The place where tubes meet."},{"label":"B","text":"The cup."},{"label":"C","text":"The box top."},{"label":"D","text":"The marble."}],"answer":"A","explanation":"It is the joining point.","visual":null},{"num":11,"prompt":"Why change only one part each time?","choices":[{"label":"A","text":"To know which change solved the problem."},{"label":"B","text":"She had one piece of tape."},{"label":"C","text":"To slow the marble."},{"label":"D","text":"She did not want to finish."}],"answer":"A","explanation":"One change makes results clear.","visual":null},{"num":12,"prompt":"What is the lesson?","choices":[{"label":"A","text":"Careful testing improves a design."},{"label":"B","text":"Tubes should never be taped."},{"label":"C","text":"Flat paths are best."},{"label":"D","text":"The last idea should be tried first."}],"answer":"A","explanation":"Testing and revising worked.","visual":null}]},{"title":"Practice Biography: Leah Okafor","text":"Leah Okafor became interested in plants while helping in her family’s garden. She drew leaves and wrote notes about changes.\n\nIn college, Leah studied plant science. She learned how soil, water, light, and temperature affect growth. Later, she worked at a city garden for children.\n\nLeah noticed that some children could not reach the tall garden beds. She designed lower beds and wide paths. She also created picture signs showing when to water, weed, and harvest.\n\nOther gardens began using Leah’s designs. She wrote books and trained teachers to create accessible gardens. Her work combined science with attention to the people using each space.","questions":[{"num":13,"prompt":"What is the main idea?","choices":[{"label":"A","text":"Leah used science and design to make gardens easier to use."},{"label":"B","text":"Leah wanted every child to grow one plant."},{"label":"C","text":"A garden taught Leah to draw."},{"label":"D","text":"Leah stopped working with plants."}],"answer":"A","explanation":"The passage explains her career and impact.","visual":null},{"num":14,"prompt":"What did Leah do as a child?","choices":[{"label":"A","text":"Drew leaves and recorded changes."},{"label":"B","text":"Designed parks."},{"label":"C","text":"Wrote teacher books."},{"label":"D","text":"Built tall beds."}],"answer":"A","explanation":"This appears in the first paragraph.","visual":null},{"num":15,"prompt":"Why did she design lower beds?","choices":[{"label":"A","text":"So more children could reach them."},{"label":"B","text":"To reduce sunlight."},{"label":"C","text":"To hold less soil."},{"label":"D","text":"To keep adults out."}],"answer":"A","explanation":"The beds were more usable.","visual":null},{"num":16,"prompt":"What is the purpose of paragraph two?","choices":[{"label":"A","text":"To explain Leah’s plant-science learning."},{"label":"B","text":"To list vegetables."},{"label":"C","text":"To persuade college attendance."},{"label":"D","text":"To compare gardens."}],"answer":"A","explanation":"It gives education background.","visual":null},{"num":17,"prompt":"What does “accessible” mean?","choices":[{"label":"A","text":"Easy for many people to use."},{"label":"B","text":"Hidden."},{"label":"C","text":"Only for scientists."},{"label":"D","text":"Far away."}],"answer":"A","explanation":"Accessible means usable by more people.","visual":null},{"num":18,"prompt":"Why did the author write this?","choices":[{"label":"A","text":"To explain Leah’s science-and-design career."},{"label":"B","text":"To teach planting steps."},{"label":"C","text":"To warn children."},{"label":"D","text":"To compare books and signs."}],"answer":"A","explanation":"It is a short biography.","visual":null}]}],"minutes":20},"math":{"questions":[{"num":1,"prompt":"Use the table to answer the question.","choices":[{"label":"A","text":"Monday and Thursday"},{"label":"B","text":"Tuesday and Friday"},{"label":"C","text":"Wednesday and Friday"},{"label":"D","text":"Monday and Wednesday"}],"answer":"A","explanation":"Monday and Thursday each have 6.","visual":"<div class=\"mini-table\"><div class=\"head\">Day</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class=\"head\">Count</div><div>6</div><div>4</div><div>8</div><div>6</div><div>5</div></div>"},{"num":2,"prompt":"The numbers follow a pattern. What number belongs in the box?","choices":[{"label":"A","text":"33"},{"label":"B","text":"34"},{"label":"C","text":"36"},{"label":"D","text":"42"}],"answer":"C","explanation":"The pattern increases by 6.","visu }

function fmtTime(s){s=Math.max(0,s);return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function stopTimer(){if(timerId){clearInterval(timerId);timerId=null;}}

 stopTimer(); if(!state.timed||!['audio','test'].includes(state.screen)) return;

   state.timeLeft[sec]--;
   const el=document.querySelector('.timer'); if(el){el.textContent=fmtTime(state.timeLeft[sec]);el.classList.toggle('warn',state.timeLeft[sec]<=60)}
   if(state.timeLeft[sec]<=0){stopTimer(); state.sectionSubmitted[sec]=true; save(); alert('Time is up for this section. Your saved answers will be submitted.'); finishSection(true);}
   save();
 },1000);
}
function totalAnswered(sec){return Object.keys(state.answers[sec]||{}).length}

function allScores(){return sections.map(sec=>({sec,score:sectionScore(sec),total:sectionQuestions(sec).length}))}

/*
  Practice-only stanine estimate for this custom workbook.
  Official ISEE stanines require grade-level normative data and scaled scores.
*/
function estimatedPracticeStanine(percent){
 if(percent>=96)return 9;
 if(percent>=90)return 8;
 if(percent>=83)return 7;
 if(percent>=75)return 6;
 if(percent>=65)return 5;
 if(percent>=55)return 4;
 if(percent>=45)return 3;
 if(percent>=35)return 2;
 return 1;
}
function stanineMessage(s){
 return {
  1:'Beginning range',
  2:'Developing range',
  3:'Developing toward grade-level skills',
  4:'Approaching the middle practice range',
  5:'Middle practice range',
  6:'Above the middle practice range',
  7:'Strong practice performance',
  8:'Very strong practice performance',
  9:'Exceptional practice performance'
 }[s]||'';
}
