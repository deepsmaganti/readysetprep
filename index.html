<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadySetPrep — ISEE Practice, All Levels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF6;
    --sky:#E8F1F8;
    --sky-deep:#D3E6F2;
    --ink:#1F2D2B;
    --ink-soft:#4B5A57;
    --coral:#FF6B4A;
    --coral-light:#FFE4DB;
    --coral-deep:#E14F30;
    --fern:#3E7C59;
    --fern-light:#DCEEE1;
    --fern-deep:#2C5C42;
    --gold:#F5B942;
    --gold-light:#FCEBC4;
    --radius-lg:26px;
    --radius-md:18px;
    --radius-sm:12px;
    --shadow: 0 10px 30px rgba(31,45,43,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--sky);
    background-image:
      radial-gradient(circle at 8% 12%, var(--sky-deep) 0%, transparent 40%),
      radial-gradient(circle at 92% 85%, var(--fern-light) 0%, transparent 45%);
    color:var(--ink);
    font-family:'Atkinson Hyperlegible', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    margin:0;
  }
  .mono{ font-family:'Space Mono', monospace; }
  button{ font-family:inherit; cursor:pointer; }
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible{
    outline:3px solid var(--fern-deep);
    outline-offset:3px;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }

  #app{ max-width:900px; margin:0 auto; padding:24px 20px 60px; }

  /* ---------- Header ---------- */
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:44px; height:44px; border-radius:50%;
    background:var(--fern); color:var(--paper);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; box-shadow:var(--shadow);
  }
  .brand-text h1{ font-size:22px; color:var(--fern-deep); line-height:1; }
  .brand-text span{ font-size:12px; color:var(--ink-soft); letter-spacing:0.04em; }
  .student-pill{
    background:var(--paper); border-radius:999px; padding:8px 16px;
    font-size:14px; font-weight:700; color:var(--ink); box-shadow:var(--shadow);
    display:flex; align-items:center; gap:8px; border:none;
  }

  /* ---------- Cards ---------- */
  .card{ background:var(--paper); border-radius:var(--radius-lg); box-shadow:var(--shadow); padding:28px; }
  .card + .card{ margin-top:18px; }

  /* ---------- Home / Trailhead ---------- */
  .hero{
    background:linear-gradient(160deg, var(--fern) 0%, var(--fern-deep) 100%);
    color:var(--paper); border-radius:var(--radius-lg);
    padding:32px 28px; box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  .hero::after{
    content:""; position:absolute; right:-40px; top:-40px; width:180px; height:180px;
    border-radius:50%; background:rgba(255,255,255,0.08);
  }
  .hero h2{ font-size:26px; margin-bottom:6px; }
  .hero p{ margin:0 0 20px; opacity:0.92; max-width:50ch; line-height:1.5; }

  .trailmap{ display:flex; align-items:center; gap:0; margin:22px 0 26px; flex-wrap:wrap; }
  .waypoint{ display:flex; flex-direction:column; align-items:center; gap:8px; width:110px; }
  .waypoint .dot{
    width:56px; height:56px; border-radius:50%;
    background:rgba(255,255,255,0.14); border:2px solid rgba(255,255,255,0.5);
    display:flex; align-items:center; justify-content:center; font-size:26px;
  }
  .waypoint .label{ font-size:13px; font-weight:700; text-align:center; }
  .waypoint .sub{ font-size:11px; opacity:0.8; }
  .trail-line{ flex:1; height:0; border-top:3px dashed rgba(255,255,255,0.45); min-width:24px; margin:-30px -6px 0; }

  .btn{
    border:none; border-radius:999px; padding:14px 26px; font-weight:700; font-size:16px;
    display:inline-flex; align-items:center; gap:8px; transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{ background:var(--coral); color:#fff; box-shadow:0 8px 20px rgba(255,107,74,0.35); }
  .btn-primary:hover{ background:var(--coral-deep); }
  .btn-secondary{ background:var(--paper); color:var(--fern-deep); }
  .btn-ghost{ background:transparent; color:var(--fern-deep); border:2px solid var(--fern-light); }
  .btn-ghost:hover{ background:var(--fern-light); }
  .btn[disabled]{ opacity:0.45; cursor:not-allowed; }
  .btn-block{ width:100%; justify-content:center; }
  .btn-lg{ padding:16px 30px; font-size:18px; }
  .btn-sm{ padding:8px 16px; font-size:13px; }

  .section-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:18px; }

  .test-picker{ display:grid; gap:14px; margin-top:16px; }
  .test-card{
    background:var(--paper); border-radius:var(--radius-md); padding:18px 20px;
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
    border:2px solid var(--sky-deep);
  }
  .test-card.active{ border-color:var(--fern); background:var(--fern-light); }
  .test-card h4{ font-size:16px; margin-bottom:4px; }
  .test-card p{ margin:0; font-size:13px; color:var(--ink-soft); }
  .test-card-badge{ font-size:11px; font-weight:700; color:var(--fern-deep); background:var(--fern-light); padding:3px 10px; border-radius:999px; text-transform:uppercase; letter-spacing:0.04em; }
  .test-card.active .test-card-badge{ background:var(--paper); }

  .level-picker{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:16px; }
  .level-card{
    background:var(--paper); border-radius:var(--radius-md); padding:16px 12px; text-align:center;
    border:2px solid var(--sky-deep); cursor:pointer;
  }
  .level-card.active{ border-color:var(--coral); background:var(--coral-light); }
  .level-card .icon{ font-size:26px; }
  .level-card h4{ font-size:14px; margin:6px 0 2px; }
  .level-card p{ margin:0; font-size:11px; color:var(--ink-soft); }
  @media (max-width:600px){ .level-picker{ grid-template-columns:repeat(2,1fr); } }

  .empty-state{ text-align:center; padding:24px 14px; }
  .empty-state .icon{ font-size:36px; margin-bottom:10px; }
  .empty-state p{ color:var(--ink-soft); font-size:14px; max-width:42ch; margin:6px auto 0; line-height:1.6; }

  .mode-toggle{ display:flex; gap:10px; margin:18px 0 14px; }
  .mode-btn{
    flex:1; background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.4); color:var(--paper);
    border-radius:14px; padding:12px; font-weight:700; font-size:14px; text-align:center;
  }
  .mode-btn.active{ background:var(--paper); color:var(--fern-deep); border-color:var(--paper); }
  .mode-btn .sub{ display:block; font-size:11px; font-weight:400; opacity:0.85; margin-top:2px; }

  .section-chips{ display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 18px; }
  .chip{
    background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.4); color:var(--paper);
    border-radius:999px; padding:8px 14px; font-size:13px; font-weight:700;
  }
  .chip.active{ background:var(--coral); border-color:var(--coral); }
  .chip-select-all{ background:transparent; border:2px dashed rgba(255,255,255,0.5); color:var(--paper); border-radius:999px; padding:8px 14px; font-size:12px; font-weight:700; }

  .score-hero-stats{ display:flex; gap:22px; flex-wrap:wrap; margin-top:16px; }
  .score-stat{ }
  .score-stat .big{ font-family:'Space Mono',monospace; font-size:30px; font-weight:700; line-height:1; }
  .score-stat .lbl{ font-size:12px; opacity:0.85; margin-top:4px; }
  .stanine-badge{
    display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%;
    background:var(--gold); color:#5c420e; font-family:'Space Mono',monospace; font-weight:700; font-size:13px; margin-left:6px;
  }
  .disclaimer-small{ font-size:11px; color:var(--ink-soft); margin-top:10px; line-height:1.5; }
  .mode-pill{ font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; background:var(--sky); color:var(--fern-deep); text-transform:uppercase; letter-spacing:0.03em; }
  .retake-row{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:4px; }

  .essay-textarea{
    width:100%; min-height:260px; border-radius:var(--radius-md); border:2px solid var(--sky-deep);
    padding:16px; font-family:'Atkinson Hyperlegible', sans-serif; font-size:16px; line-height:1.6; resize:vertical;
  }
  .essay-meta{ display:flex; justify-content:space-between; align-items:center; margin-top:10px; font-size:13px; color:var(--ink-soft); }
  .essay-tag{ background:var(--gold-light); color:#8a6413; font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; display:inline-block; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.04em; }

  .log-title{ font-size:14px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); margin-bottom:10px; font-weight:700; }
  .log-entry{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border-radius:var(--radius-sm); background:var(--sky);
    margin-bottom:8px; font-size:14px;
  }
  .log-entry .stamp{ font-weight:700; color:var(--fern-deep); }
  .empty-log{ color:var(--ink-soft); font-size:14px; padding:10px 2px; }

  /* ---------- Settings ---------- */
  .settings-row{ display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--sky); gap:12px; }
  .settings-row:last-of-type{ border-bottom:none; }
  .settings-row label{ font-weight:700; font-size:15px; }
  .settings-row .hint{ font-size:12px; color:var(--ink-soft); font-weight:400; display:block; margin-top:2px; }
  .num-input{
    width:76px; padding:8px 10px; border-radius:10px; border:2px solid var(--sky-deep);
    font-family:'Space Mono', monospace; font-size:15px; text-align:center;
  }
  .text-input{ width:100%; padding:10px 12px; border-radius:10px; border:2px solid var(--sky-deep); font-family:inherit; font-size:15px; }

  /* ---------- Section intro ---------- */
  .intro-icon{
    width:74px; height:74px; border-radius:50%; background:var(--gold-light);
    display:flex; align-items:center; justify-content:center; font-size:34px; margin-bottom:14px;
  }
  .intro-list{ margin:16px 0; padding-left:0; list-style:none; }
  .intro-list li{ display:flex; gap:10px; padding:6px 0; font-size:15px; align-items:flex-start; }
  .intro-list li::before{ content:"🐾"; font-size:14px; }

  /* ---------- Test screen ---------- */
  .test-topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:12px; flex-wrap:wrap; }
  .section-chip{ background:var(--fern); color:#fff; padding:8px 16px; border-radius:999px; font-weight:700; font-size:14px; display:flex; align-items:center; gap:8px; }
  .timer-badge{
    font-family:'Space Mono', monospace; font-weight:700; font-size:18px;
    background:var(--paper); padding:8px 18px; border-radius:999px; box-shadow:var(--shadow);
    color:var(--fern-deep); border:2px solid var(--fern-light); transition:color .2s, border-color .2s;
  }
  .timer-badge.warn{ color:var(--gold); border-color:var(--gold-light); background:var(--gold-light); }
  .timer-badge.danger{ color:var(--coral-deep); border-color:var(--coral-light); background:var(--coral-light); animation:pulse 1s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.55;} }

  .trail-progress{ display:flex; align-items:center; margin-bottom:20px; overflow-x:auto; padding:4px 2px; }
  .trail-dot-wrap{ display:flex; align-items:center; flex-shrink:0; }
  .trail-dot{ width:14px; height:14px; border-radius:50%; background:var(--sky-deep); border:2px solid var(--sky-deep); flex-shrink:0; }
  .trail-dot.answered{ background:var(--fern); border-color:var(--fern); }
  .trail-dot.current{ width:18px; height:18px; border-color:var(--coral); background:var(--coral); box-shadow:0 0 0 4px var(--coral-light); }
  .trail-seg{ width:16px; height:0; border-top:2px dashed var(--sky-deep); flex-shrink:0; }

  .passage-box{
    background:var(--sky); border-radius:var(--radius-md); padding:20px; margin-bottom:20px;
    font-size:16px; line-height:1.7; border-left:5px solid var(--fern);
  }
  .passage-box h4{ font-family:'Baloo 2'; font-size:15px; color:var(--fern-deep); margin:0 0 8px; text-transform:uppercase; letter-spacing:0.04em; }

  .listen-box{ background:var(--coral-light); border-radius:var(--radius-md); padding:22px; margin-bottom:20px; text-align:center; }
  .listen-box p.hint{ font-size:13px; color:var(--ink-soft); margin-top:10px; }
  .script-reveal{ margin-top:14px; }
  .script-box{
    margin-top:12px; text-align:left; background:var(--gold-light); border:2px dashed #C99A2E;
    border-radius:var(--radius-sm); padding:16px; font-size:15px; line-height:1.6;
  }
  .script-box h5{ font-family:'Baloo 2'; font-size:13px; color:#8a6413; text-transform:uppercase; margin:0 0 8px; }

  .question-split{ display:flex; gap:28px; align-items:flex-start; }
  .question-split .q-col{ flex:1 1 42%; min-width:0; }
  .question-split .c-col{ flex:1 1 58%; min-width:0; }
  .passage-scroll{ max-height:65vh; overflow-y:auto; padding-right:10px; }
  .passage-scroll .passage-box{ margin-bottom:0; }
  .question-prompt{ font-size:19px; line-height:1.5; font-weight:700; }
  .choices{ display:grid; gap:12px; }
  .choice-btn{
    text-align:left; background:var(--paper); border:2px solid var(--sky-deep);
    border-radius:var(--radius-md); padding:16px 18px; font-size:16px; line-height:1.4;
    display:flex; gap:12px; align-items:center;
  }
  .choice-btn:hover{ border-color:var(--fern); background:var(--fern-light); }
  .choice-letter{
    width:30px; height:30px; border-radius:50%; background:var(--sky);
    display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0;
    font-family:'Space Mono', monospace; font-size:14px;
  }
  .choice-btn.selected{ border-color:var(--fern-deep); background:var(--fern-light); }
  .choice-btn.selected .choice-letter{ background:var(--fern-deep); color:#fff; }
  .choice-btn.triangle-choice{ justify-content:flex-start; }
  .tri-frame{ width:60px; height:60px; display:flex; align-items:center; justify-content:center; background:var(--sky); border-radius:10px; flex-shrink:0; }

  .nav-row{ display:flex; justify-content:space-between; margin-top:26px; gap:12px; }

  /* ---------- Figures ---------- */
  .figure-box{ background:var(--sky); border-radius:var(--radius-md); padding:18px; margin-bottom:20px; }
  .figure-note{ font-size:11px; color:var(--ink-soft); margin-top:8px; text-align:center; }
  .figure-note.flag{ color:#8a6413; font-weight:700; }
  table.fig-table{ border-collapse:collapse; margin:0 auto; background:var(--paper); border-radius:8px; overflow:hidden; }
  table.fig-table th, table.fig-table td{ border:1px solid var(--sky-deep); padding:8px 14px; text-align:center; font-family:'Space Mono',monospace; font-size:14px; }
  table.fig-table th{ background:var(--fern-light); color:var(--fern-deep); font-family:'Baloo 2',sans-serif; }
  td.qmark{ background:var(--gold-light); font-weight:700; color:#8a6413; }
  .bars-wrap{ display:flex; align-items:flex-end; gap:18px; justify-content:center; height:140px; padding-top:20px; }
  .bar-col{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar-val{ font-family:'Space Mono',monospace; font-size:13px; font-weight:700; color:var(--fern-deep); }
  .bar{ width:34px; background:var(--fern); border-radius:6px 6px 0 0; }
  .bar-label{ font-size:12px; color:var(--ink-soft); }
  .baseten-wrap{ display:flex; gap:22px; justify-content:center; flex-wrap:wrap; align-items:flex-end; }
  .baseten-group{ display:flex; gap:4px; flex-wrap:wrap; max-width:160px; align-items:flex-end; }
  .bt-flat{ width:44px; height:44px; background:var(--fern-light); border:2px solid var(--fern); background-image:linear-gradient(var(--fern) 1px, transparent 1px), linear-gradient(90deg, var(--fern) 1px, transparent 1px); background-size:11px 11px; }
  .bt-rod{ width:9px; height:44px; background:var(--fern-light); border:2px solid var(--fern); }
  .bt-cube{ width:11px; height:11px; background:var(--fern); border:1px solid var(--fern-deep); }
  .dotgroups-wrap{ display:flex; gap:20px; justify-content:center; flex-wrap:wrap; }
  .dotgroup{ background:var(--paper); border-radius:12px; padding:10px 14px; text-align:center; }
  .dotgroup .letter{ font-family:'Baloo 2'; font-weight:700; color:var(--fern-deep); font-size:13px; margin-bottom:6px; }
  .dotgroup .dots{ max-width:110px; display:flex; flex-wrap:wrap; gap:2px; justify-content:center; }
  .cone-cyl{ display:flex; justify-content:center; }
  .marbles-wrap{ display:flex; gap:6px; justify-content:center; flex-wrap:wrap; max-width:220px; margin:0 auto; }
  .marble{ width:22px; height:22px; border-radius:50%; }
  .marble.g{ background:var(--fern); }
  .marble.r{ background:var(--coral); }

  /* ---------- Section break / results ---------- */
  .stamp-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin:22px 0; }
  .stamp-card{ background:var(--sky); border-radius:var(--radius-md); padding:18px; text-align:center; border:2px dashed var(--sky-deep); }
  .stamp-card .icon{ width:56px; height:56px; border-radius:50%; background:var(--fern); color:#fff; display:flex; align-items:center; justify-content:center; font-size:24px; margin:0 auto 10px; }
  .stamp-card h4{ font-family:'Baloo 2'; font-size:15px; margin-bottom:4px; }
  .stamp-card .score{ font-family:'Space Mono', monospace; font-size:22px; color:var(--fern-deep); font-weight:700; }
  .stamp-card .score-label{ font-size:12px; color:var(--ink-soft); }

  .review-item{ border-bottom:1px solid var(--sky); padding:16px 0; }
  .review-item:last-child{ border-bottom:none; }
  .review-item .rq{ font-weight:700; margin-bottom:8px; }
  .review-tag{ font-size:12px; font-weight:700; padding:3px 10px; border-radius:999px; display:inline-block; margin-bottom:8px; }
  .review-tag.right{ background:var(--fern-light); color:var(--fern-deep); }
  .review-tag.wrong{ background:var(--coral-light); color:var(--coral-deep); }
  .review-tag.skipped{ background:var(--gold-light); color:#8a6413; }
  .review-explain{ font-size:13px; color:var(--ink-soft); margin-top:6px; font-style:italic; }

  .callout{ background:var(--gold-light); border-radius:var(--radius-sm); padding:14px 16px; font-size:13px; color:#6b4e13; margin-top:16px; line-height:1.5; }
  .footer-note{ text-align:center; font-size:12px; color:var(--ink-soft); margin-top:30px; line-height:1.6; }

  @media (max-width:600px){
    .section-grid{ grid-template-columns:1fr; }
    .trailmap{ flex-direction:column; }
    .trail-line{ display:none; }
    .question-prompt{ font-size:18px; }
    .question-split{ flex-direction:column; gap:16px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
