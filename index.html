<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadySetPrep — ISEE Practice, All Levels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBFAF6;
    --sky:#E8F1F8;
    --sky-deep:#D3E6F2;
    --ink:#1F2D2B;
    --ink-soft:#4B5A57;
    --coral:#FF6B4A;
    --coral-light:#FFE4DB;
    --coral-deep:#E14F30;
    --fern:#3E7C59;
    --fern-light:#DCEEE1;
    --fern-deep:#2C5C42;
    --gold:#F5B942;
    --gold-light:#FCEBC4;
    --radius-lg:26px;
    --radius-md:18px;
    --radius-sm:12px;
    --shadow: 0 10px 30px rgba(31,45,43,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--sky);
    background-image:
      radial-gradient(circle at 8% 12%, var(--sky-deep) 0%, transparent 40%),
      radial-gradient(circle at 92% 85%, var(--fern-light) 0%, transparent 45%);
    color:var(--ink);
    font-family:'Atkinson Hyperlegible', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    margin:0;
  }
  .mono{ font-family:'Space Mono', monospace; }
  button{ font-family:inherit; cursor:pointer; }
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible{
    outline:3px solid var(--fern-deep);
    outline-offset:3px;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }

  #app{ max-width:900px; margin:0 auto; padding:24px 20px 60px; }

  /* ---------- Header ---------- */
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:44px; height:44px; border-radius:50%;
    background:var(--fern); color:var(--paper);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; box-shadow:var(--shadow);
  }
  .brand-text h1{ font-size:22px; color:var(--fern-deep); line-height:1; }
  .brand-text span{ font-size:12px; color:var(--ink-soft); letter-spacing:0.04em; }
  .student-pill{
    background:var(--paper); border-radius:999px; padding:8px 16px;
    font-size:14px; font-weight:700; color:var(--ink); box-shadow:var(--shadow);
    display:flex; align-items:center; gap:8px; border:none;
  }

  /* ---------- Cards ---------- */
  .card{ background:var(--paper); border-radius:var(--radius-lg); box-shadow:var(--shadow); padding:28px; }
  .card + .card{ margin-top:18px; }

  /* ---------- Home / Trailhead ---------- */
  .hero{
    background:linear-gradient(160deg, var(--fern) 0%, var(--fern-deep) 100%);
    color:var(--paper); border-radius:var(--radius-lg);
    padding:32px 28px; box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  .hero::after{
    content:""; position:absolute; right:-40px; top:-40px; width:180px; height:180px;
    border-radius:50%; background:rgba(255,255,255,0.08);
  }
  .hero h2{ font-size:26px; margin-bottom:6px; }
  .hero p{ margin:0 0 20px; opacity:0.92; max-width:50ch; line-height:1.5; }

  .trailmap{ display:flex; align-items:center; gap:0; margin:22px 0 26px; flex-wrap:wrap; }
  .waypoint{ display:flex; flex-direction:column; align-items:center; gap:8px; width:110px; }
  .waypoint .dot{
    width:56px; height:56px; border-radius:50%;
    background:rgba(255,255,255,0.14); border:2px solid rgba(255,255,255,0.5);
    display:flex; align-items:center; justify-content:center; font-size:26px;
  }
  .waypoint .label{ font-size:13px; font-weight:700; text-align:center; }
  .waypoint .sub{ font-size:11px; opacity:0.8; }
  .trail-line{ flex:1; height:0; border-top:3px dashed rgba(255,255,255,0.45); min-width:24px; margin:-30px -6px 0; }

  .btn{
    border:none; border-radius:999px; padding:14px 26px; font-weight:700; font-size:16px;
    display:inline-flex; align-items:center; gap:8px; transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn-primary{ background:var(--coral); color:#fff; box-shadow:0 8px 20px rgba(255,107,74,0.35); }
  .btn-primary:hover{ background:var(--coral-deep); }
  .btn-secondary{ background:var(--paper); color:var(--fern-deep); }
  .btn-ghost{ background:transparent; color:var(--fern-deep); border:2px solid var(--fern-light); }
  .btn-ghost:hover{ background:var(--fern-light); }
  .btn[disabled]{ opacity:0.45; cursor:not-allowed; }
  .btn-block{ width:100%; justify-content:center; }
  .btn-lg{ padding:16px 30px; font-size:18px; }
  .btn-sm{ padding:8px 16px; font-size:13px; }

  .section-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:18px; }

  .test-picker{ display:grid; gap:14px; margin-top:16px; }
  .test-card{
    background:var(--paper); border-radius:var(--radius-md); padding:18px 20px;
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
    border:2px solid var(--sky-deep);
  }
  .test-card.active{ border-color:var(--fern); background:var(--fern-light); }
  .test-card h4{ font-size:16px; margin-bottom:4px; }
  .test-card p{ margin:0; font-size:13px; color:var(--ink-soft); }
  .test-card-badge{ font-size:11px; font-weight:700; color:var(--fern-deep); background:var(--fern-light); padding:3px 10px; border-radius:999px; text-transform:uppercase; letter-spacing:0.04em; }
  .test-card.active .test-card-badge{ background:var(--paper); }

  .level-picker{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:16px; }
  .level-card{
    background:var(--paper); border-radius:var(--radius-md); padding:16px 12px; text-align:center;
    border:2px solid var(--sky-deep); cursor:pointer;
  }
  .level-card.active{ border-color:var(--coral); background:var(--coral-light); }
  .level-card .icon{ font-size:26px; }
  .level-card h4{ font-size:14px; margin:6px 0 2px; }
  .level-card p{ margin:0; font-size:11px; color:var(--ink-soft); }
  @media (max-width:600px){ .level-picker{ grid-template-columns:repeat(2,1fr); } }

  .empty-state{ text-align:center; padding:24px 14px; }
  .empty-state .icon{ font-size:36px; margin-bottom:10px; }
  .empty-state p{ color:var(--ink-soft); font-size:14px; max-width:42ch; margin:6px auto 0; line-height:1.6; }

  .essay-textarea{
    width:100%; min-height:260px; border-radius:var(--radius-md); border:2px solid var(--sky-deep);
    padding:16px; font-family:'Atkinson Hyperlegible', sans-serif; font-size:16px; line-height:1.6; resize:vertical;
  }
  .essay-meta{ display:flex; justify-content:space-between; align-items:center; margin-top:10px; font-size:13px; color:var(--ink-soft); }
  .essay-tag{ background:var(--gold-light); color:#8a6413; font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; display:inline-block; margin-bottom:10px; text-transform:uppercase; letter-spacing:0.04em; }

  .log-title{ font-size:14px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); margin-bottom:10px; font-weight:700; }
  .log-entry{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border-radius:var(--radius-sm); background:var(--sky);
    margin-bottom:8px; font-size:14px;
  }
  .log-entry .stamp{ font-weight:700; color:var(--fern-deep); }
  .empty-log{ color:var(--ink-soft); font-size:14px; padding:10px 2px; }

  /* ---------- Settings ---------- */
  .settings-row{ display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--sky); gap:12px; }
  .settings-row:last-of-type{ border-bottom:none; }
  .settings-row label{ font-weight:700; font-size:15px; }
  .settings-row .hint{ font-size:12px; color:var(--ink-soft); font-weight:400; display:block; margin-top:2px; }
  .num-input{
    width:76px; padding:8px 10px; border-radius:10px; border:2px solid var(--sky-deep);
    font-family:'Space Mono', monospace; font-size:15px; text-align:center;
  }
  .text-input{ width:100%; padding:10px 12px; border-radius:10px; border:2px solid var(--sky-deep); font-family:inherit; font-size:15px; }

  /* ---------- Section intro ---------- */
  .intro-icon{
    width:74px; height:74px; border-radius:50%; background:var(--gold-light);
    display:flex; align-items:center; justify-content:center; font-size:34px; margin-bottom:14px;
  }
  .intro-list{ margin:16px 0; padding-left:0; list-style:none; }
  .intro-list li{ display:flex; gap:10px; padding:6px 0; font-size:15px; align-items:flex-start; }
  .intro-list li::before{ content:"🐾"; font-size:14px; }

  /* ---------- Test screen ---------- */
  .test-topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:12px; flex-wrap:wrap; }
  .section-chip{ background:var(--fern); color:#fff; padding:8px 16px; border-radius:999px; font-weight:700; font-size:14px; display:flex; align-items:center; gap:8px; }
  .timer-badge{
    font-family:'Space Mono', monospace; font-weight:700; font-size:18px;
    background:var(--paper); padding:8px 18px; border-radius:999px; box-shadow:var(--shadow);
    color:var(--fern-deep); border:2px solid var(--fern-light); transition:color .2s, border-color .2s;
  }
  .timer-badge.warn{ color:var(--gold); border-color:var(--gold-light); background:var(--gold-light); }
  .timer-badge.danger{ color:var(--coral-deep); border-color:var(--coral-light); background:var(--coral-light); animation:pulse 1s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.55;} }

  .trail-progress{ display:flex; align-items:center; margin-bottom:20px; overflow-x:auto; padding:4px 2px; }
  .trail-dot-wrap{ display:flex; align-items:center; flex-shrink:0; }
  .trail-dot{ width:14px; height:14px; border-radius:50%; background:var(--sky-deep); border:2px solid var(--sky-deep); flex-shrink:0; }
  .trail-dot.answered{ background:var(--fern); border-color:var(--fern); }
  .trail-dot.current{ width:18px; height:18px; border-color:var(--coral); background:var(--coral); box-shadow:0 0 0 4px var(--coral-light); }
  .trail-seg{ width:16px; height:0; border-top:2px dashed var(--sky-deep); flex-shrink:0; }

  .passage-box{
    background:var(--sky); border-radius:var(--radius-md); padding:20px; margin-bottom:20px;
    font-size:16px; line-height:1.7; border-left:5px solid var(--fern);
  }
  .passage-box h4{ font-family:'Baloo 2'; font-size:15px; color:var(--fern-deep); margin:0 0 8px; text-transform:uppercase; letter-spacing:0.04em; }

  .listen-box{ background:var(--coral-light); border-radius:var(--radius-md); padding:22px; margin-bottom:20px; text-align:center; }
  .listen-box p.hint{ font-size:13px; color:var(--ink-soft); margin-top:10px; }
  .script-reveal{ margin-top:14px; }
  .script-box{
    margin-top:12px; text-align:left; background:var(--gold-light); border:2px dashed #C99A2E;
    border-radius:var(--radius-sm); padding:16px; font-size:15px; line-height:1.6;
  }
  .script-box h5{ font-family:'Baloo 2'; font-size:13px; color:#8a6413; text-transform:uppercase; margin:0 0 8px; }

  .question-prompt{ font-size:19px; line-height:1.5; margin-bottom:18px; font-weight:700; }
  .choices{ display:grid; gap:12px; }
  .choice-btn{
    text-align:left; background:var(--paper); border:2px solid var(--sky-deep);
    border-radius:var(--radius-md); padding:16px 18px; font-size:16px; line-height:1.4;
    display:flex; gap:12px; align-items:center;
  }
  .choice-btn:hover{ border-color:var(--fern); background:var(--fern-light); }
  .choice-letter{
    width:30px; height:30px; border-radius:50%; background:var(--sky);
    display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0;
    font-family:'Space Mono', monospace; font-size:14px;
  }
  .choice-btn.selected{ border-color:var(--fern-deep); background:var(--fern-light); }
  .choice-btn.selected .choice-letter{ background:var(--fern-deep); color:#fff; }
  .choice-btn.triangle-choice{ justify-content:flex-start; }
  .tri-frame{ width:60px; height:60px; display:flex; align-items:center; justify-content:center; background:var(--sky); border-radius:10px; flex-shrink:0; }

  .nav-row{ display:flex; justify-content:space-between; margin-top:26px; gap:12px; }

  /* ---------- Figures ---------- */
  .figure-box{ background:var(--sky); border-radius:var(--radius-md); padding:18px; margin-bottom:20px; }
  .figure-note{ font-size:11px; color:var(--ink-soft); margin-top:8px; text-align:center; }
  .figure-note.flag{ color:#8a6413; font-weight:700; }
  table.fig-table{ border-collapse:collapse; margin:0 auto; background:var(--paper); border-radius:8px; overflow:hidden; }
  table.fig-table th, table.fig-table td{ border:1px solid var(--sky-deep); padding:8px 14px; text-align:center; font-family:'Space Mono',monospace; font-size:14px; }
  table.fig-table th{ background:var(--fern-light); color:var(--fern-deep); font-family:'Baloo 2',sans-serif; }
  td.qmark{ background:var(--gold-light); font-weight:700; color:#8a6413; }
  .bars-wrap{ display:flex; align-items:flex-end; gap:18px; justify-content:center; height:140px; padding-top:20px; }
  .bar-col{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar-val{ font-family:'Space Mono',monospace; font-size:13px; font-weight:700; color:var(--fern-deep); }
  .bar{ width:34px; background:var(--fern); border-radius:6px 6px 0 0; }
  .bar-label{ font-size:12px; color:var(--ink-soft); }
  .baseten-wrap{ display:flex; gap:22px; justify-content:center; flex-wrap:wrap; align-items:flex-end; }
  .baseten-group{ display:flex; gap:4px; flex-wrap:wrap; max-width:160px; align-items:flex-end; }
  .bt-flat{ width:44px; height:44px; background:var(--fern-light); border:2px solid var(--fern); background-image:linear-gradient(var(--fern) 1px, transparent 1px), linear-gradient(90deg, var(--fern) 1px, transparent 1px); background-size:11px 11px; }
  .bt-rod{ width:9px; height:44px; background:var(--fern-light); border:2px solid var(--fern); }
  .bt-cube{ width:11px; height:11px; background:var(--fern); border:1px solid var(--fern-deep); }
  .dotgroups-wrap{ display:flex; gap:20px; justify-content:center; flex-wrap:wrap; }
  .dotgroup{ background:var(--paper); border-radius:12px; padding:10px 14px; text-align:center; }
  .dotgroup .letter{ font-family:'Baloo 2'; font-weight:700; color:var(--fern-deep); font-size:13px; margin-bottom:6px; }
  .dotgroup .dots{ max-width:110px; display:flex; flex-wrap:wrap; gap:2px; justify-content:center; }
  .cone-cyl{ display:flex; justify-content:center; }
  .marbles-wrap{ display:flex; gap:6px; justify-content:center; flex-wrap:wrap; max-width:220px; margin:0 auto; }
  .marble{ width:22px; height:22px; border-radius:50%; }
  .marble.g{ background:var(--fern); }
  .marble.r{ background:var(--coral); }

  /* ---------- Section break / results ---------- */
  .stamp-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin:22px 0; }
  .stamp-card{ background:var(--sky); border-radius:var(--radius-md); padding:18px; text-align:center; border:2px dashed var(--sky-deep); }
  .stamp-card .icon{ width:56px; height:56px; border-radius:50%; background:var(--fern); color:#fff; display:flex; align-items:center; justify-content:center; font-size:24px; margin:0 auto 10px; }
  .stamp-card h4{ font-family:'Baloo 2'; font-size:15px; margin-bottom:4px; }
  .stamp-card .score{ font-family:'Space Mono', monospace; font-size:22px; color:var(--fern-deep); font-weight:700; }
  .stamp-card .score-label{ font-size:12px; color:var(--ink-soft); }

  .review-item{ border-bottom:1px solid var(--sky); padding:16px 0; }
  .review-item:last-child{ border-bottom:none; }
  .review-item .rq{ font-weight:700; margin-bottom:8px; }
  .review-tag{ font-size:12px; font-weight:700; padding:3px 10px; border-radius:999px; display:inline-block; margin-bottom:8px; }
  .review-tag.right{ background:var(--fern-light); color:var(--fern-deep); }
  .review-tag.wrong{ background:var(--coral-light); color:var(--coral-deep); }
  .review-tag.skipped{ background:var(--gold-light); color:#8a6413; }
  .review-explain{ font-size:13px; color:var(--ink-soft); margin-top:6px; font-style:italic; }

  .callout{ background:var(--gold-light); border-radius:var(--radius-sm); padding:14px 16px; font-size:13px; color:#6b4e13; margin-top:16px; line-height:1.5; }
  .footer-note{ text-align:center; font-size:12px; color:var(--ink-soft); margin-top:30px; line-height:1.6; }

  @media (max-width:600px){
    .section-grid{ grid-template-columns:1fr; }
    .trailmap{ flex-direction:column; }
    .trail-line{ display:none; }
    .question-prompt{ font-size:18px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================================================================
   PATHFINDER PREP — ISEE Practice, All Levels
   -------------------------------------------------------------------------
   LEVELS defines the official ISEE section structure/timing for each of the
   four levels (this is the "pattern" every test should follow):

   Primary (applying to Grade 2-4):
     Auditory Comprehension (Grade 2 test only) — ~6 questions / 7 min
     Reading — 18-28 questions / 20-28 min
     Mathematics — 24-28 questions / 26-30 min

   Lower (applying to Grade 5-6):
     Verbal Reasoning — 34 questions / 20 min
     Quantitative Reasoning — 38 questions / 35 min
     Reading Comprehension — 25 questions (5 passages x5) / 25 min
     Mathematics Achievement — 30 questions / 30 min
     Essay — 1 prompt, unscored / 30 min

   Middle & Upper (applying to Grade 7-8 / 9-12) — identical structure/timing,
   only question difficulty differs:
     Verbal Reasoning — 40 questions / 20 min
     Quantitative Reasoning — 37 questions / 35 min
     Reading Comprehension — 36 questions (6 passages x6) / 35 min
     Mathematics Achievement — 47 questions / 40 min
     Essay — 1 prompt, unscored / 30 min

   -------------------------------------------------------------------------
   HOW TO ADD A NEW TEST
   1. Find TESTS below and open the object for the right level (e.g. TESTS.lower).
   2. Add a new entry keyed however you like (e.g. test1), shaped like this:

      test1: {
        label: "Full-Length Practice Test #1",
        sections: {
          verbal: { name:'Verbal Reasoning', shortName:'Verbal', icon:'🔤', defaultMinutes:20,
            instructions:[ '...' ],
            questions:[ { id:'v1', prompt:'...', choices:['...','...','...','...'], correct:0, explanation:'...' }, ... ]
          },
          quantitative: { name:'Quantitative Reasoning', shortName:'Quant', icon:'➗', defaultMinutes:35,
            instructions:[ '...' ], questions:[ ... ] },
          reading: { name:'Reading Comprehension', shortName:'Reading', icon:'📖', defaultMinutes:25,
            instructions:[ '...' ],
            passages:[ { id:'p1', title:'...', text:'...', questions:[ {id,prompt,choices,correct,explanation}, ... ] }, ... ]
          },
          mathAch: { name:'Mathematics Achievement', shortName:'Math', icon:'🧮', defaultMinutes:30,
            instructions:[ '...' ], questions:[ ... ] },
          essay: { name:'Essay', shortName:'Essay', icon:'✍️', defaultMinutes:30,
            instructions:[ 'Unscored — sent to schools as a writing sample.' ],
            prompt: 'Write about a time you...' }
        }
      }

   3. For Primary-level tests, use section keys `auditory`, `reading`, `math`
      instead (see TESTS.primary.test2 for a fully worked example, including
      figure types for math diagrams: table, grid, bars, baseten, conecyl,
      dotgroups, marbles, ruler, puzzlesquare, reflect-v, reflect-h).
   4. Section order and which section keys are expected for each level come
      from LEVELS[levelId].sectionOrder — keep new tests consistent with it.
   ========================================================================= */

const LEVELS = {
  primary: { id:'primary', label:'Primary', subtitle:'Applying to Grade 2\u20134', icon:'🌱',
    sectionOrder:['auditory','reading','math'] },
  lower: { id:'lower', label:'Lower', subtitle:'Applying to Grade 5\u20136', icon:'🥾',
    sectionOrder:['verbal','quantitative','reading','mathAch','essay'] },
  middle: { id:'middle', label:'Middle', subtitle:'Applying to Grade 7\u20138', icon:'⛰️',
    sectionOrder:['verbal','quantitative','reading','mathAch','essay'] },
  upper: { id:'upper', label:'Upper', subtitle:'Applying to Grade 9\u201312', icon:'🏔️',
    sectionOrder:['verbal','quantitative','reading','mathAch','essay'] },
};
const LEVEL_IDS = ['primary','lower','middle','upper'];

const TESTS = {
  primary: {
    test2: {
      label: "Full-Length Practice Test #2",
      sections: {
        auditory: {
          id:'auditory', name:'Auditory Comprehension', shortName:'Listening', icon:'🧭',
          defaultMinutes: 7,
          instructions: [
            "An adult will read one passage aloud, one time only.",
            "Listen carefully — you won't see the passage text, and it can only be read twice for practice.",
            "Then choose the best answer for each of the 6 questions."
          ],
          passages: [
            {
              id:'a1',
              title: 'The Class Garden',

/* ---------------- Flatten helpers ---------------- */
function isEssaySection(sec){ return !!sec.prompt && !sec.questions && !sec.passages; }
function flattenSection(sec){
  if(isEssaySection(sec)) return null;
  if(sec.questions){ return sec.questions.map(q => ({...q, passage:null})); }
  const out = [];
  (sec.passages||[]).forEach(p=>{ p.questions.forEach(q=> out.push({...q, passage:p})); });
  return out;
}
const FLAT_BY_TEST = {};
LEVEL_IDS.forEach(lid=>{
  FLAT_BY_TEST[lid] = {};
  Object.keys(TESTS[lid]).forEach(tid=>{
    FLAT_BY_TEST[lid][tid] = {};
    LEVELS[lid].sectionOrder.forEach(sid=>{
      const sec = TESTS[lid][tid].sections[sid];
      FLAT_BY_TEST[lid][tid][sid] = sec ? flattenSection(sec) : null;
    });
  });
});

/* ---------------- Persistent storage (optional) ---------------- */
async function storageSafeSet(key, value){
  try{ if(window.storage){ await window.storage.set(key, JSON.stringify(value), false); } }catch(e){}
}
async function storageSafeGet(key){
  try{ if(window.storage){ const r = await window.storage.get(key, false); return r ? JSON.parse(r.value) : null; } }catch(e){ return null; }
  return null;
}

/* ---------------- App state ---------------- */
function firstTestId(levelId){ const ids = Object.keys(TESTS[levelId]); return ids.length ? ids[0] : null; }

const state = {
  screen:'home', studentName:'',
  levelId: 'primary',
  testId: firstTestId('primary'),
  minutes:{}, // minutes[levelId][testId][sectionId]
  sectionIdx:0, qIdx:0, answers:{}, timeRemaining:0, timerId:null, audioPlays:{}, scriptShown:{}, history:[],
  essayText:''
};
function ensureMinutesFor(levelId, testId){
  if(!testId) return;
  state.minutes[levelId] = state.minutes[levelId] || {};
  if(state.minutes[levelId][testId]) return;
  const m = {};
  LEVELS[levelId].sectionOrder.forEach(sid=>{
    const sec = TESTS[levelId][testId].sections[sid];
    if(sec) m[sid] = sec.defaultMinutes;
  });
  state.minutes[levelId][testId] = m;
}
ensureMinutesFor(state.levelId, state.testId);

function currentLevel(){ return LEVELS[state.levelId]; }
function currentTest(){ return state.testId ? TESTS[state.levelId][state.testId] : null; }
function currentFlat(){ return state.testId ? FLAT_BY_TEST[state.levelId][state.testId] : null; }
function currentMinutes(){ return (state.minutes[state.levelId] && state.minutes[state.levelId][state.testId]) || {}; }
function sectionOrder(){ return currentLevel().sectionOrder; }
function levelHasTests(levelId){ return Object.keys(TESTS[levelId]).length > 0; }

async function loadSaved(){
  const name = await storageSafeGet('trailhead:studentName'); if(name) state.studentName = name;
  const mins = await storageSafeGet('trailhead:minutes'); if(mins) state.minutes = mins;
  const hist = await storageSafeGet('trailhead:history'); if(hist) state.history = hist;
  ensureMinutesFor(state.levelId, state.testId);
  render();
}

/* ---------------- Navigation / flow ---------------- */
function goHome(){ stopTimer(); state.screen='home'; render(); }
function goSettings(){ state.screen='settings'; render(); }
function chooseLevel(levelId){
  state.levelId = levelId;
  state.testId = firstTestId(levelId);
  ensureMinutesFor(state.levelId, state.testId);
  render();
}
function chooseTest(testId){ state.testId = testId; ensureMinutesFor(state.levelId, state.testId); render(); }
function startExpedition(){
  if(!state.testId) return;
  state.sectionIdx=0; state.answers={}; state.audioPlays={}; state.scriptShown={}; state.essayText='';
  enterSectionIntro(0);
}
function enterSectionIntro(idx){ state.sectionIdx=idx; state.screen='sectionIntro'; render(); }
function beginSection(){
  const secId = sectionOrder()[state.sectionIdx];
  const sec = currentTest().sections[secId];
  state.qIdx=0; state.timeRemaining=currentMinutes()[secId]*60; state.essayText='';
  state.screen = isEssaySection(sec) ? 'essay' : 'question';
  startTimer(); render();
}
function startTimer(){ stopTimer(); state.timerId=setInterval(()=>{ state.timeRemaining--; updateTimerBadge(); if(state.timeRemaining<=0){ stopTimer(); finishSection(); } },1000); }
function stopTimer(){ if(state.timerId){ clearInterval(state.timerId); state.timerId=null; } }
function currentSectionFlat(){ return currentFlat()[sectionOrder()[state.sectionIdx]]; }
function selectChoice(choiceIdx){ const q = currentSectionFlat()[state.qIdx]; state.answers[q.id]=choiceIdx; render(); }
function nextQuestion(){ const flat=currentSectionFlat(); if(state.qIdx<flat.length-1){ state.qIdx++; render(); } else { stopTimer(); finishSection(); } }
function prevQuestion(){ if(state.qIdx>0){ state.qIdx--; render(); } }
function finishEssay(){ stopTimer(); finishSection(); }
function finishSection(){ state.screen='sectionBreak'; render(); }
function nextSectionOrResults(){ if(state.sectionIdx<sectionOrder().length-1){ enterSectionIntro(state.sectionIdx+1); } else { finishExpedition(); } }
async function finishExpedition(){
  const summary = computeSummary();
  state.history.unshift({ date:new Date().toISOString(), name: state.studentName||'Explorer', levelLabel: currentLevel().label, testLabel: currentTest().label, ...summary });
  state.history = state.history.slice(0,10);
  await storageSafeSet('trailhead:history', state.history);
  state.screen='results'; render();
}
function computeSummary(){
  const perSection={}; let totalCorrect=0, totalQ=0;
  sectionOrder().forEach(id=>{
    const sec = currentTest().sections[id];
    if(!sec) return;
    if(isEssaySection(sec)){
      const words = state.essayText.trim() ? state.essayText.trim().split(/\s+/).length : 0;
      perSection[id] = { isEssay:true, words };
      return;
    }
    const flat=currentFlat()[id]; let correct=0;
    flat.forEach(q=>{ if(state.answers[q.id]===q.correct) correct++; });
    perSection[id]={ correct, total:flat.length }; totalCorrect+=correct; totalQ+=flat.length;
  });
  return { perSection, totalCorrect, totalQ };
}
function playPassage(passageId, text){
  state.audioPlays[passageId]=(state.audioPlays[passageId]||0)+1;
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate=0.92; utter.pitch=1.05;
    window.speechSynthesis.speak(utter);
  }
  render();
}
function toggleScript(passageId){ state.scriptShown[passageId] = !state.scriptShown[passageId]; render(); }
function updateSetting(section, minutes){ currentMinutes()[section]=Math.max(1, Math.min(90, parseInt(minutes)||1)); }
async function saveSettingsAndHome(){ await storageSafeSet('trailhead:minutes', state.minutes); await storageSafeSet('trailhead:studentName', state.studentName); goHome(); }
function fmtTime(sec){ const m=Math.floor(sec/60), s=sec%60; return `${m}:${s.toString().padStart(2,'0')}`; }
function updateTimerBadge(){
  const el=document.getElementById('timerBadge'); if(!el) return;
  el.textContent=fmtTime(Math.max(0,state.timeRemaining));
  el.classList.remove('warn','danger');
  if(state.timeRemaining<=15) el.classList.add('danger'); else if(state.timeRemaining<=60) el.classList.add('warn');
}

/* ---------------- Figure rendering ---------------- */
function renderFigure(fig){
  if(!fig) return '';
  let inner='';
  if(fig.type==='table'){
    inner = `<table class="fig-table"><tr>${fig.headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr><tr>${fig.values.map(v=>`<td>${v}</td>`).join('')}</tr></table>`;
  } else if(fig.type==='grid'){
    inner = `<table class="fig-table">${fig.rows.map(r=>`<tr>${r.map(c=>`<td class="${c==='?'?'qmark':''}">${c}</td>`).join('')}</tr>`).join('')}</table>`;
  } else if(fig.type==='bars'){
    const maxV = Math.max(...fig.values);
    inner = `<div class="bars-wrap">${fig.labels.map((l,i)=>`
      <div class="bar-col">
        <div class="bar-val">${fig.values[i]}</div>
        <div class="bar" style="height:${(fig.values[i]/maxV)*90+10}px;"></div>
        <div class="bar-label">${esc(l)}</div>
      </div>`).join('')}</div>`;
  } else if(fig.type==='baseten'){
    inner = `<div class="baseten-wrap">
      <div class="baseten-group">${Array(fig.hundreds).fill('<div class="bt-flat"></div>').join('')}</div>
      <div class="baseten-group">${Array(fig.tens).fill('<div class="bt-rod"></div>').join('')}</div>
      <div class="baseten-group">${Array(fig.ones).fill('<div class="bt-cube"></div>').join('')}</div>
    </div>`;
  } else if(fig.type==='conecyl'){
    inner = `<div class="cone-cyl"><svg width="180" height="90" viewBox="0 0 180 90">
      <ellipse cx="35" cy="72" rx="25" ry="7" fill="none" stroke="var(--fern)" stroke-width="2.5"/>
      <polygon points="35,10 10,72 60,72" fill="var(--fern-light)" stroke="var(--fern)" stroke-width="2.5"/>
      <rect x="100" y="18" width="50" height="54" fill="var(--fern-light)" stroke="var(--fern)" stroke-width="2.5"/>
      <ellipse cx="125" cy="18" rx="25" ry="7" fill="var(--fern-light)" stroke="var(--fern)" stroke-width="2.5"/>
      <ellipse cx="125" cy="72" rx="25" ry="7" fill="none" stroke="var(--fern)" stroke-width="2.5"/>
    </svg></div>`;
  } else if(fig.type==='dotgroups'){
    inner = `<div class="dotgroups-wrap">${fig.groups.map(g=>`
      <div class="dotgroup"><div class="letter">Group ${g.label}</div>
      <div class="dots">${Array(g.count).fill('🍒').join(' ')}</div></div>`).join('')}</div>`;
  } else if(fig.type==='marbles'){
    const arr=[]; for(let i=0;i<fig.green;i++) arr.push('g'); for(let i=0;i<fig.red;i++) arr.push('r');
    inner = `<div class="marbles-wrap">${arr.map(c=>`<div class="marble ${c}"></div>`).join('')}</div>`;
  } else if(fig.type==='ruler'){
    const scale = 280/fig.max;
    const ticks = [];
    for(let i=0;i<=fig.max;i++){ ticks.push(`<line x1="${20+i*scale}" y1="24" x2="${20+i*scale}" y2="32" stroke="var(--ink-soft)" stroke-width="1.5"/><text x="${20+i*scale}" y="46" font-size="10" text-anchor="middle" fill="var(--ink-soft)">${i}</text>`); }
    inner = `<svg width="320" height="55" viewBox="0 0 320 55">
      <line x1="20" y1="28" x2="${20+fig.max*scale}" y2="28" stroke="var(--ink-soft)" stroke-width="1.5"/>
      ${ticks.join('')}
      <line x1="${20+fig.start*scale}" y1="16" x2="${20+fig.end*scale}" y2="16" stroke="var(--coral)" stroke-width="5" stroke-linecap="round"/>
    </svg>`;
  } else if(fig.type==='puzzlesquare'){
    inner = `<svg width="130" height="130" viewBox="0 0 120 120">
      <polygon points="0,0 120,0 60,60" fill="var(--fern-light)" stroke="var(--fern)" stroke-width="2"/>
      <polygon points="0,120 120,120 60,60" fill="var(--fern-light)" stroke="var(--fern)" stroke-width="2"/>
      <polygon points="0,0 0,120 60,60" fill="var(--fern-light)" stroke="var(--fern)" stroke-width="2"/>
      <polygon points="120,0 120,120 60,60" fill="none" stroke="var(--coral)" stroke-width="2.5" stroke-dasharray="5,4"/>
      <text x="92" y="65" font-size="20" text-anchor="middle" fill="var(--coral-deep)" font-weight="bold">?</text>
    </svg>`;
  } else if(fig.type==='reflect-v'){
    inner = `<div style="display:flex; align-items:center; justify-content:center; gap:0;">
      <div class="tri-frame">${triangleHTML('right',48,'var(--fern)')}</div>
      <div style="width:2px; height:70px; background:repeating-linear-gradient(to bottom, var(--coral) 0 6px, transparent 6px 12px); margin:0 14px;"></div>
      <div class="tri-frame" style="border:2px dashed var(--sky-deep); background:transparent;"><span style="font-size:22px; color:var(--ink-soft);">?</span></div>
    </div>`;
  } else if(fig.type==='reflect-h'){
    inner = `<div style="display:flex; flex-direction:column; align-items:center; gap:0;">
      <div class="tri-frame">${triangleHTML('up',48,'var(--fern)')}</div>
      <div style="height:2px; width:70px; background:repeating-linear-gradient(to right, var(--coral) 0 6px, transparent 6px 12px); margin:14px 0;"></div>
      <div class="tri-frame" style="border:2px dashed var(--sky-deep); background:transparent;"><span style="font-size:22px; color:var(--ink-soft);">?</span></div>
    </div>`;
  }
  const centered = (fig.type==='puzzlesquare' || fig.type==='conecyl');
  return `<div class="figure-box"><div style="${centered?'display:flex;justify-content:center;':''}">${inner}</div></div>`;
}

function triangleHTML(direction, size, color){
  size = size||50; color = color||'var(--fern)';
  const half = size/2;
  let style = `display:inline-block;width:0;height:0;`;
  if(direction==='up') style += `border-left:${half}px solid transparent;border-right:${half}px solid transparent;border-bottom:${size}px solid ${color};`;
  if(direction==='down') style += `border-left:${half}px solid transparent;border-right:${half}px solid transparent;border-top:${size}px solid ${color};`;
  if(direction==='left') style += `border-top:${half}px solid transparent;border-bottom:${half}px solid transparent;border-right:${size}px solid ${color};`;
  if(direction==='right') style += `border-top:${half}px solid transparent;border-bottom:${half}px solid transparent;border-left:${size}px solid ${color};`;
  return `<span style="${style}"></span>`;
}

/* ---------------- Rendering ---------------- */
function render(){
  const app=document.getElementById('app');
  app.innerHTML = header() + body();
  if(state.screen==='question' || state.screen==='essay') updateTimerBadge();
  window.scrollTo({top:0, behavior:'auto'});
}
function header(){
  return `<div class="topbar">
    <div class="brand"><div class="brand-mark">🧭</div>
      <div class="brand-text"><h1>ReadySetPrep</h1><span>ISEE PRACTICE · ALL LEVELS</span></div>
    </div>
    ${state.screen==='home' ? `<button class="student-pill" onclick="goSettings()">⚙️ ${state.studentName ? esc(state.studentName) : 'Set up'}</button>` : ''}
  </div>`;
}
function esc(s){ const d=document.createElement('div'); d.innerText=String(s); return d.innerHTML; }

function body(){
  switch(state.screen){
    case 'home': return homeScreen();
    case 'settings': return settingsScreen();
    case 'sectionIntro': return sectionIntroScreen();
    case 'question': return questionScreen();
    case 'essay': return essayScreen();
    case 'sectionBreak': return sectionBreakScreen();
    case 'results': return resultsScreen();
    case 'review': return reviewScreen();
    default: return '';
  }
}

function homeScreen(){
  const level = currentLevel();
  const test = currentTest();
  const flat = currentFlat();
  const mins = currentMinutes();

  let heroHtml;
  if(test){
    const totalMin = sectionOrder().reduce((a,id)=> a + (mins[id]||0), 0);
    const totalQ = sectionOrder().reduce((a,id)=>{ const f=flat[id]; return a + (f ? f.length : 0); }, 0);
    heroHtml = `
    <div class="hero">
      <h2>${state.studentName ? esc(state.studentName)+"'s" : 'Ready for an'} expedition?</h2>
      <p>${esc(level.label)} Level · ${esc(test.label)} — ${totalQ} scored questions, about ${totalMin} minutes${sectionOrder().some(id=>test.sections[id] && isEssaySection(test.sections[id])) ? ' plus an essay' : ''}.</p>
      <div class="trailmap">
        ${sectionOrder().map((id,i)=>{
          const sec = test.sections[id]; if(!sec) return '';
          const f = flat[id];
          return `<div class="waypoint"><div class="dot">${sec.icon}</div><div class="label">${sec.shortName}</div><div class="sub">${mins[id]} min${f?` · ${f.length}q`:''}</div></div>
          ${i<sectionOrder().length-1?'<div class="trail-line"></div>':''}`;
        }).join('')}
      </div>
      <button class="btn btn-primary btn-lg" onclick="startExpedition()">Start today's expedition →</button>
    </div>`;
  } else {
    heroHtml = `
    <div class="hero">
      <h2>${esc(level.label)} Level</h2>
      <p>${esc(level.subtitle)} — no practice tests loaded yet for this level.</p>
      <div class="empty-state" style="color:var(--paper);">
        <div class="icon">🗺️</div>
        <p style="color:rgba(255,255,255,0.85);">Send over a ${esc(level.label)} Level workbook in the same pattern as the Primary test, and it'll show up here as a new expedition. Expected sections: ${level.sectionOrder.map(id=>sectionLabelGuess(id)).join(', ')}.</p>
      </div>
    </div>`;
  }

  return `
  ${heroHtml}

  <div class="card">
    <div class="log-title">Choose a level</div>
    <div class="level-picker">
      ${LEVEL_IDS.map(lid=>{
        const l = LEVELS[lid]; const active = lid===state.levelId; const has = levelHasTests(lid);
        return `<div class="level-card ${active?'active':''}" onclick="chooseLevel('${lid}')">
          <div class="icon">${l.icon}</div><h4>${esc(l.label)}</h4><p>${esc(l.subtitle)}</p>
          <p style="margin-top:4px; ${has?'color:var(--fern-deep);font-weight:700;':''}">${has ? Object.keys(TESTS[lid]).length+' test'+(Object.keys(TESTS[lid]).length>1?'s':'') : 'No tests yet'}</p>
        </div>`;
      }).join('')}
    </div>
  </div>

  ${levelHasTests(state.levelId) ? `
  <div class="card">
    <div class="log-title">${esc(level.label)} Level practice tests</div>
    <div class="test-picker">
      ${Object.keys(TESTS[state.levelId]).map(tid=>{
        const tt = TESTS[state.levelId][tid]; const f = FLAT_BY_TEST[state.levelId][tid];
        const q = sectionOrder().reduce((a,id)=> a + (f[id] ? f[id].length : 0), 0);
        const active = tid===state.testId;
        return `<div class="test-card ${active?'active':''}">
          <div><h4>${esc(tt.label)}</h4><p>${q} scored questions${sectionOrder().some(id=>tt.sections[id] && isEssaySection(tt.sections[id]))?' + essay':''}</p></div>
          ${active ? `<span class="test-card-badge">Selected</span>` : `<button class="btn btn-ghost btn-sm" onclick="chooseTest('${tid}')">Select</button>`}
        </div>`;
      }).join('')}
    </div>
  </div>` : ''}

  <div class="card">
    <div class="log-title">Past expeditions</div>
    ${state.history.length===0 ? `<div class="empty-log">No expeditions yet — your first one will show up here as a journal stamp.</div>` :
      state.history.map(h=>`<div class="log-entry"><span>${new Date(h.date).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})} — ${esc(h.name)} · ${esc(h.levelLabel||'')} ${esc(h.testLabel||'')}</span><span class="stamp">${h.totalCorrect}/${h.totalQ} correct</span></div>`).join('')}
  </div>
  ${state.levelId==='primary' && test ? `<div class="callout">📌 A heads-up: 4 math questions in Test #2 (the cherry-sharing group, the missing puzzle piece, and the two reflection/symmetry questions) use original diagrams rebuilt to match the workbook's answer key, since their source images weren't available as text. Worth double-checking those four against the printed workbook.</div>` : ''}
  `;
}
function sectionLabelGuess(id){
  const names = { auditory:'Auditory Comprehension', reading: (LEVELS[state.levelId] && LEVELS[state.levelId].id==='primary') ? 'Reading' : 'Reading Comprehension', math:'Mathematics', verbal:'Verbal Reasoning', quantitative:'Quantitative Reasoning', mathAch:'Mathematics Achievement', essay:'Essay' };
  return names[id] || id;
}

function sectionIntroScreen(){

    <div class="intro-icon">${sec.icon}</div>

}

function questionScreen(){
  const secId = sectionOrder()[state.sectionIdx];
  const flat = currentSectionFlat();
  const q = flat[state.qIdx];
  const selected = state.answers[q.id];
  const letters = ['A','B','C','D'];
  const secMeta = currentTest().sections[secId];

  let passageHtml = '';
  if(q.passage){
    if(secId==='auditory'){
      const plays = state.audioPlays[q.passage.id]||0;
      const shown = state.scriptShown[q.passage.id];
      passageHtml = `<div class="listen-box">
        <button class="btn btn-primary" ${plays>=2?'disabled':''} onclick="playPassage('${q.passage.id}', \`${q.passage.text.replace(/`/g,"'")}\`)">🔊 ${plays===0?'Play the story':'Play again'}</button>
        <p class="hint">${plays>=2 ? "You've used both plays for this story." : `Plays remaining: ${2-plays}`}</p>
        <div class="script-reveal"><button class="btn btn-ghost btn-sm" onclick="toggleScript('${q.passage.id}')">${shown?'Hide':'Or, have an adult read it instead →'}</button></div>
        ${shown ? `<div class="script-box"><h5>Parent / teacher script — don't let the student read this</h5>${esc(q.passage.text)}</div>` : ''}
      </div>`;
    } else {
      passageHtml = `<div class="passage-box"><h4>${esc(q.passage.title)}</h4>${esc(q.passage.text).split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>`;
    }
  }

  const figureHtml = q.figure ? renderFigure(q.figure) : '';
  const approxNote = q.approximated ? `<div class="figure-note flag">⚠️ Recreated diagram — verify against the printed workbook.</div>` : '';

  let choicesHtml;
  if(q.choiceRender==='triangle'){
    choicesHtml = q.choices.map((dir,i)=>`
      <button class="choice-btn triangle-choice ${selected===i?'selected':''}" onclick="selectChoice(${i})">
        <span class="choice-letter">${letters[i]}</span><span class="tri-frame">${triangleHTML(dir,40)}</span>
      </button>`).join('');
  } else {
    choicesHtml = q.choices.map((c,i)=>`
      <button class="choice-btn ${selected===i?'selected':''}" onclick="selectChoice(${i})">
        <span class="choice-letter">${letters[i]}</span><span>${esc(c)}</span>
      </button>`).join('');
  }

  return `
  <div class="test-topbar">
    <div class="section-chip">${secMeta.icon} ${secMeta.name} — Q${state.qIdx+1} of ${flat.length}</div>
    <div class="timer-badge mono" id="timerBadge">${fmtTime(state.timeRemaining)}</div>
  </div>
  <div class="trail-progress">
    ${flat.map((qq,i)=>`${i>0?'<div class="trail-seg"></div>':''}<div class="trail-dot-wrap"><div class="trail-dot ${i===state.qIdx?'current':(state.answers[qq.id]!==undefined?'answered':'')}"></div></div>`).join('')}
  </div>
  <div class="card">
    ${passageHtml}
    ${figureHtml}${approxNote}
    <div class="question-prompt">${esc(q.prompt)}</div>
    <div class="choices">${choicesHtml}</div>
    <div class="nav-row">
      <button class="btn btn-ghost" ${state.qIdx===0?'disabled':''} onclick="prevQuestion()">← Back</button>
      <button class="btn btn-primary" onclick="nextQuestion()">${state.qIdx===flat.length-1?'Finish section':'Next'} →</button>
    </div>
  </div>`;
}

  <div class="test-topbar">
    <div class="section-chip">${sec.icon} ${sec.name}</div>
    <div class="timer-badge mono" id="timerBadge">${fmtTime(state.timeRemaining)}</div>

  <div class="card">
    <span class="essay-tag">Not scored — sent to schools as a writing sample</span>
    <div class="passage-box"><h4>Prompt</h4><p>${esc(sec.prompt)}</p></div>
    <textarea class="essay-textarea" placeholder="Start writing here..." oninput="state.essayText=this.value; document.getElementById('wordCount').textContent=(this.value.trim()?this.value.trim().split(/\\s+/).length:0)+' words';">${esc(state.essayText)}</textarea>
    <div class="essay-meta"><span id="wordCount">${wordCount} words</span><span>Aim for a clear beginning, middle, and end.</span></div>
    <div class="nav-row"><button class="btn btn-primary btn-block" onclick="finishEssay()">Finish essay →</button></div>
  </div>`;

function sectionBreakScreen(){
  const secId = sectionOrder()[state.sectionIdx];
  const sec = currentTest().sections[secId];
  const isLast = state.sectionIdx===sectionOrder().length-1;
  let progressLine;
  if(isEssaySection(sec)){
    const words = state.essayText.trim() ? state.essayText.trim().split(/\s+/).length : 0;
    progressLine = `You wrote ${words} words. Nice work — this section isn't scored.`;
  } else {
    const flat = currentFlat()[secId];
    let correct=0; flat.forEach(q=>{ if(state.answers[q.id]===q.correct) correct++; });
    progressLine = `You got ${correct} out of ${flat.length} correct.`;
  }
  return `<div class="card" style="text-align:center;">
    <div class="intro-icon" style="margin:0 auto 14px;">🏕️</div>
    <h2>${sec.name} complete!</h2>
    <p style="color:var(--ink-soft); margin:8px 0 0;">${progressLine}</p>
    ${!isLast ? `<p style="margin-top:4px;">Take a short break, then continue to <strong>${currentTest().sections[sectionOrder()[state.sectionIdx+1]].name}</strong>.</p>` : `<p style="margin-top:4px;">That's the whole expedition — nice work!</p>`}
    <button class="btn btn-primary btn-lg" style="margin-top:18px;" onclick="nextSectionOrResults()">${isLast?'See my basecamp report →':'Continue →'}</button>
  </div>`;
}

function resultsScreen(){
  const s = computeSummary();
  const pct = s.totalQ ? Math.round((s.totalCorrect/s.totalQ)*100) : 0;
  const test = currentTest();
  const level = currentLevel();
  return `
  <div class="hero"><h2>Basecamp report</h2>
    <p>${state.studentName ? esc(state.studentName) : 'Explorer'} finished ${esc(level.label)} · ${esc(test.label)} with ${s.totalCorrect} out of ${s.totalQ} correct (${pct}%).</p></div>
  <div class="stamp-grid">${sectionOrder().map(id=>{
    const sec = test.sections[id]; if(!sec) return '';
    const p = s.perSection[id];
    if(p.isEssay){
      return `<div class="stamp-card"><div class="icon">${sec.icon}</div><h4>${sec.name}</h4><div class="score">${p.words}</div><div class="score-label">words · not scored</div></div>`;
    }
    return `<div class="stamp-card"><div class="icon">${sec.icon}</div><h4>${sec.name}</h4><div class="score">${p.correct}/${p.total}</div><div class="score-label">correct</div></div>`;
  }).join('')}
  </div>
  <div class="card" style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
    <button class="btn btn-secondary" onclick="state.screen='review'; render();">📋 Review answers &amp; explanations</button>
    <button class="btn btn-primary" onclick="goHome()">🏠 Back to trailhead</button>
  </div>`;
}

function reviewScreen(){
  const test = currentTest();
  const flat = currentFlat();
  return `<div class="card">
    <h2 style="margin-bottom:6px;">Review answers</h2>
    <p style="color:var(--ink-soft); margin-top:0;">Green means correct, coral means it needs another look. Explanations are from the workbook's answer key.</p>
    ${sectionOrder().map(id=>{
      const sec = test.sections[id]; if(!sec) return '';
      if(isEssaySection(sec)){
        return `<h3 style="margin:22px 0 6px; color:var(--fern-deep); font-size:17px;">${sec.icon} ${sec.name}</h3>
        <div class="review-item"><span class="review-tag skipped">Not scored</span>
        <div class="rq">Prompt: ${esc(sec.prompt)}</div>
        <div style="font-size:14px; color:var(--ink-soft); white-space:pre-wrap;">${esc(state.essayText) || '<em>Nothing written this time.</em>'}</div></div>`;
      }
      return `<h3 style="margin:22px 0 6px; color:var(--fern-deep); font-size:17px;">${sec.icon} ${sec.name}</h3>
      ${flat[id].map((q,i)=>{
        const given = state.answers[q.id];
        const tag = given===undefined ? '<span class="review-tag skipped">Skipped</span>' : given===q.correct ? '<span class="review-tag right">Correct</span>' : '<span class="review-tag wrong">Try again</span>';
        const correctLabel = q.choiceRender==='triangle' ? `the ${q.choices[q.correct]}-pointing option` : esc(q.choices[q.correct]);
        const givenLabel = q.choiceRender==='triangle' ? (given!==undefined?`the ${q.choices[given]}-pointing option`:'') : (given!==undefined?esc(q.choices[given]):'');
        return `<div class="review-item">
          ${tag}${q.approximated?' <span class="review-tag skipped">Recreated diagram</span>':''}
          <div class="rq">${i+1}. ${esc(q.prompt)}</div>
          <div style="font-size:14px; color:var(--ink-soft);">Correct answer: <strong>${correctLabel}</strong>${given!==undefined && given!==q.correct ? ` · Your answer: ${givenLabel}` : ''}</div>
          ${q.explanation ? `<div class="review-explain">${esc(q.explanation)}</div>` : ''}
        </div>`;
      }).join('')}`;
    }).join('')}
    <div class="nav-row"><button class="btn btn-primary btn-block" onclick="state.screen='results'; render();">← Back to report</button></div>
  </div>`;
}

loadSaved();
</script>
</body>
</html>
