anation":"The numbers in increasing order are 47, 55, 61, 69.","visual":null},{"num":23,"prompt":"A bag contains 8 blue marbles, 2 yellow marbles, and 1 red marble. Which statement is true?","choices":[{"label":"A","text":"A red marble is the most likely color."},{"label":"B","text":"Yellow and blue are equally likely."},{"label":"C","text":"It is impossible to choose a yellow marble."},{"label":"D","text":"A blue marble is more likely than either of the other colors."}],"answer":"D","explanation":"Blue has the greatest number of marbles.","visual":null},{"num":24,"prompt":"A ribbon begins at 3 inches and ends at 9 inches on a ruler. How long is the ribbon?","choices":[{"label":"A","text":"5 inches"},{"label":"B","text":"6 inches"},{"label":"C","text":"9 inches"},{"label":"D","text":"12 inches"}],"answer":"B","explanation":"9 - 3 = 6 inches.","visual":"<div class=\"ruler\"><div class=\"pencil-line\" style=\"margin-left:30%;width:60%\"><span></span></div><div class=\"ticks\"><div class=\"tick\"><i></i><b>0</b></div><div class=\"tick\"><i></i><b>1</b></div><div class=\"tick\"><i></i><b>2</b></div><div class=\"tick\"><i></i><b>3</b></div><div class=\"tick\"><i></i><b>4</b></div><div class=\"tick\"><i></i><b>5</b></div><div class=\"tick\"><i></i><b>6</b></div><div class=\"tick\"><i></i><b>7</b></div><div class=\"tick\"><i></i><b>8</b></div><div class=\"tick\"><i></i><b>9</b></div><div class=\"tick\"><i></i><b>10</b></div></div></div>"}],"minutes":26}},"primary2-test4":{"title":"ISEE Primary 2 Practice Test #4","auditory":{"title":"The Morning Announcements","passage":"Mr. Howard needed a student to read the morning announcements on Friday. “The reader must arrive early, speak clearly, and pronounce every name correctly,” he told the class.\n\nMateo volunteered right away. He liked speaking into the classroom microphone, but Mr. Howard did not choose him immediately. The announcements included the names of students receiving awards and the times of several after-school clubs. A mistake could confuse many people.\n\nThat evening, Mateo copied the announcements onto large note cards. He circled difficult names and asked his mother to listen while he practiced them. He drew a short line wherever he should pause, and he set an alarm so he would arrive ten minutes early. Before school, he read through the cards one final time.\n\nMateo showed Mr. Howard the marked note cards and explained his plan. Mr. Howard asked him to read the first announcement. Mateo spoke slowly and clearly. “You have prepared carefully,” Mr. Howard said. “You are ready.”\n\nThe announcements went smoothly. Mateo pronounced every name correctly and gave students time to understand each message. When he finished, he felt a warm burst of pride. He had learned that confidence becomes stronger when it is supported by practice.\n\nMateo also asked the office secretary how close he should stand to the microphone. He practiced once too softly and once too loudly before finding a clear speaking voice. This small rehearsal helped him understand that accurate words were important, but listeners also needed to hear them at a comfortable speed and volume.","questions":[{"num":1,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"Mr. Howard teaches the class how to use a microphone."},{"label":"B","text":"Mateo forgets to arrive at school early."},{"label":"C","text":"Mateo prepares carefully to read the morning announcements."},{"label":"D","text":"Students create new after-school clubs."}],"answer":"C","explanation":"The passage focuses on Mateo practicing and planning so he can read the announcements well.","visual":null},{"num":2,"prompt":"Which detail best shows that Mateo was responsible?","choices":[{"label":"A","text":"He practiced difficult names and set an alarm so he would arrive early."},{"label":"B","text":"He liked speaking into the classroom microphone."},{"label":"C","text":"He knew that many students would be listening."},{"label":"D","text":"He volunteered before anyone else."}],"answer":"A","explanation":"Practicing and planning his arrival directly show responsibility.","visual":null},{"num":3,"prompt":"Why did Mr. Howard not choose Mateo immediately?","choices":[{"label":"A","text":"The microphone was broken."},{"label":"B","text":"Mateo had never arrived early before."},{"label":"C","text":"The award names had not been chosen."},{"label":"D","text":"Mistakes in the announcements could confuse many people."}],"answer":"D","explanation":"The announcements contained important names and times that needed to be read accurately.","visual":null},{"num":4,"prompt":"Why did Mateo underline certain words on his note cards?","choices":[{"label":"A","text":"To show which words should be skipped."},{"label":"B","text":"To remind himself which words needed extra emphasis."},{"label":"C","text":"To separate the award names from the bus schedule."},{"label":"D","text":"To count how many announcements he had."}],"answer":"B","explanation":"The passage states that he underlined words needing emphasis.","visual":null},{"num":5,"prompt":"Mateo felt “a warm burst of pride.” What does that mean?","choices":[{"label":"A","text":"He became too warm near the microphone."},{"label":"B","text":"He was worried that he had made a mistake."},{"label":"C","text":"He suddenly felt pleased with what he had done."},{"label":"D","text":"He wanted to leave school immediately."}],"answer":"C","explanation":"The phrase describes a strong, happy feeling of pride.","visual":null},{"num":6,"prompt":"Which statement best expresses the lesson of the passage?","choices":[{"label":"A","text":"Practice can turn confidence into dependable performance."},{"label":"B","text":"Speaking quickly is the best way to hold attention."},{"label":"C","text":"Only adults should read important announcements."},{"label":"D","text":"A microphone makes every speaker sound prepared."}],"answer":"A","explanation":"Mateo is already confident, but practice helps him perform accurately.","visual":null}],"minutes":7},"reading":{"passages":[{"title":"Turtles and Tortoises","text":"Turtles and tortoises are both reptiles with hard shells. Their shells protect their bodies, and both animals can pull in their heads when they sense danger. Even though turtles and tortoises look similar, they are adapted for different kinds of places.\n\nMost turtles spend much of their time in water. Their feet may be webbed, which helps them swim. Sea turtles have flippers instead of ordinary feet. Turtles usually have flatter, lighter shells that move easily through water.\n\nTortoises live on land. They have thick, sturdy legs and round feet that help them walk over rough ground. Their shells are often high and dome-shaped. Many tortoises eat grasses, leaves, and flowers.\n\nBoth turtles and tortoises can live for many years. Some species are threatened because they lose safe places to live or become trapped in trash. Wildlife groups protect nesting areas and teach people how to keep beaches and parks clean. These efforts help both kinds of shelled reptiles survive.\n\nA turtle's or tortoise's body temperature changes with the temperature around it. On cool mornings, these reptiles may rest in sunlight to warm themselves. When the day becomes very hot, a tortoise may move into shade or a burrow, while a turtle may slip into cooler water.","questions":[{"num":1,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Every turtle lives in the ocean."},{"label":"B","text":"Turtles and tortoises are similar reptiles with different features for water and land."},{"label":"C","text":"Tortoises are the only reptiles with shells."},{"label":"D","text":"Turtles and tortoises eat exactly the same foods."}],"answer":"B","explanation":"The passage compares their shared traits and their different adaptations.","visual":null},{"num":2,"prompt":"Which feature helps many turtles swim?","choices":[{"label":"A","text":"Webbed feet or flippers."},{"label":"B","text":"Dome-shaped shells."},{"label":"C","text":"Thick, round land feet."},{"label":"D","text":"Long fur."}],"answer":"A","explanation":"The passage explains that webbed feet and flippers help turtles move in water.","visual":null},{"num":3,"prompt":"Which comparison between turtles and tortoises is supported by the passage?","choices":[{"label":"A","text":"Turtles have shells, but tortoises do not."},{"label":"B","text":"Tortoises are usually faster swimmers than turtles."},{"label":"C","text":"Turtles are generally better suited to water, while tortoises are better suited to land."},{"label":"D","text":"Turtles eat only plants, while tortoises eat only fish."}],"answer":"C","explanation":"Their feet, legs, and shell shapes are described as adaptations to different habitats.","visual":null},{"num":4,"prompt":"In the passage, what does “adapted” most nearly mean?","choices":[{"label":"A","text":"Hidden from all other animals."},{"label":"B","text":"Taught to follow people."},{"label":"C","text":"Changed into a different species."},{"label":"D","text":"Suited for a particular way of living."}],"answer":"D","explanation":"Adapted means having features that fit a habitat or way of life.","visual":null},{"num":5,"prompt":"Why does the author include examples such as roads, plastic trash, and lost nesting areas?","choices":[{"label":"A","text":"To show several ways human activity can threaten shelled reptiles."},{"label":"B","text":"To explain why reptiles should live in houses."},{"label":"C","text":"To compare different foods eaten by reptiles."},{"label":"D","text":"To prove that tortoises are safer than turtles."}],"answer":"A","explanation":"The examples support the paragraph's explanation of threats.","visual":null},{"num":6,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To tell a story about a race between two animals."},{"label":"B","text":"To compare turtles and tortoises and give information about them."},{"label":"C","text":"To persuade readers to swim with sea turtles."},{"label":"D","text":"To explain how to draw a shell."}],"answer":"B","explanation":"The passage is informational and compares the two kinds of reptiles.","visual":null}]},{"title":"The Missing Recipe Card","text":"Lani planned to bake blueberry muffins for her family. She placed flour, sugar, milk, eggs, and blueberries on the counter. Then she reached for her grandmother’s recipe card, but the card was not in its usual box.\n\nAt first, Lani searched quickly. She looked under the mixing bowls, inside the cookbook, and beside the refrigerator. When she still could not find it, she stopped and made a list of where she had used the card the day before.\n\nLani remembered reading the recipe at the kitchen table while making a shopping list. She checked the table, but the card was not there. Then she noticed a stack of grocery coupons. The recipe card had slipped underneath them.\n\nLani felt relieved. She arranged the ingredients in the order they would be used and followed the directions one step at a time. The muffins rose perfectly. Lani realized that slowing down and thinking carefully had solved the problem faster than searching everywhere at once.\n\nBefore mixing the batter, Lani read the entire recipe from beginning to end. She checked the oven temperature and placed the muffin pan beside the bowl. Organizing the work first prevented another rushed search later. Her family enjoyed the muffins, but Lani was even more pleased with the calm method she had used.","questions":[{"num":7,"prompt":"What is this passage mostly about?","choices":[{"label":"A","text":"Lani decides not to bake muffins."},{"label":"B","text":"Lani’s grandmother buys a new recipe box."},{"label":"C","text":"Lani solves a problem by slowing down and thinking carefully."},{"label":"D","text":"Blueberries spill across the kitchen."}],"answer":"C","explanation":"Lani uses an organized approach to remember where the missing card might be.","visual":null},{"num":8,"prompt":"Which happened first?","choices":[{"label":"A","text":"Lani found the recipe beneath the coupons."},{"label":"B","text":"Lani arranged the ingredients in order."},{"label":"C","text":"The muffins rose perfectly."},{"label":"D","text":"Lani searched under the mixing bowls."}],"answer":"D","explanation":"Her first quick search included looking under the bowls.","visual":null},{"num":9,"prompt":"Why did Lani make a list instead of continuing to search quickly?","choices":[{"label":"A","text":"The list helped her use memory and search the most likely places."},{"label":"B","text":"The list contained a different muffin recipe."},{"label":"C","text":"Her father asked her to count the ingredients."},{"label":"D","text":"The coupons could not be moved without a list."}],"answer":"A","explanation":"The organized approach narrowed the search.","visual":null},{"num":10,"prompt":"In the passage, what does “relieved” most nearly mean?","choices":[{"label":"A","text":"Angry about a mistake."},{"label":"B","text":"Glad that a worry or problem is over."},{"label":"C","text":"Ready to fall asleep."},{"label":"D","text":"Unsure what to do next."}],"answer":"B","explanation":"Lani felt relieved because she had found the missing card.","visual":null},{"num":11,"prompt":"What can the reader infer about Lani?","choices":[{"label":"A","text":"She dislikes following written directions."},{"label":"B","text":"She often loses ingredients while baking."},{"label":"C","text":"She is able to change strategies when her first approach does not work."},{"label":"D","text":"She would rather buy muffins than make them."}],"answer":"C","explanation":"She stops searching randomly and switches to a thoughtful plan.","visual":null},{"num":12,"prompt":"What is the most likely lesson of the story?","choices":[{"label":"A","text":"Recipes should never be stored in boxes."},{"label":"B","text":"Coupons are more useful than recipes."},{"label":"C","text":"Muffins should be made without directions."},{"label":"D","text":"Thinking calmly can help solve a problem."}],"answer":"D","explanation":"Lani solves the problem when she slows down and reasons through it.","visual":null}]},{"title":"Practice Biography: Arun Patel","text":"Arun Patel enjoyed drawing maps when he was a child. He sketched the path from his house to school and marked trees, stores, and crosswalks. When relatives visited, Arun made simple maps so they could find nearby parks.\n\nAs Arun grew older, he studied geography and design. He learned that a useful map must be clear, accurate, and easy to read. He practiced choosing symbols and colors that helped people understand important information quickly.\n\nA children’s museum once asked Arun to create a map for a large outdoor garden. The museum wanted young visitors to find a pond, a butterfly area, and a maze. Arun walked every path, measured distances, and asked children which symbols made sense to them. He added raised shapes so visitors with limited vision could feel parts of the map.\n\nThe garden map became popular with families. Arun later designed maps for trails, zoos, and city parks. His recognizable style combined careful measurements with simple pictures. Arun showed that maps can do more than show directions—they can help many different people explore with confidence.\n\nArun often tested a map by giving it to someone who had never visited the place. He watched where the person paused or became confused. Then he changed a symbol, moved a label, or removed an unnecessary detail. This testing helped him make maps that looked simple even though they contained careful planning.","questions":[{"num":13,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Arun became a map designer known for clear and accessible maps."},{"label":"B","text":"Arun wanted every park to have a maze."},{"label":"C","text":"A museum taught Arun how to draw for the first time."},{"label":"D","text":"Arun stopped drawing maps after childhood."}],"answer":"A","explanation":"The passage follows Arun’s interest in maps and his career designing helpful maps.","visual":null},{"num":14,"prompt":"What did Arun do when relatives visited his family?","choices":[{"label":"A","text":"He asked them to measure every street."},{"label":"B","text":"He made simple maps to nearby parks."},{"label":"C","text":"He drew pictures of their houses."},{"label":"D","text":"He took them to the children’s museum."}],"answer":"B","explanation":"The first paragraph says Arun made maps so relatives could find parks.","visual":null},{"num":15,"prompt":"Why did Arun ask children which map symbols made sense to them?","choices":[{"label":"A","text":"He wanted children to measure the garden paths."},{"label":"B","text":"He did not know the names of the garden areas."},{"label":"C","text":"He wanted the map to be clear to the people who would use it."},{"label":"D","text":"He needed children to choose the map's size."}],"answer":"C","explanation":"Testing the symbols with young visitors made the design more usable.","visual":null},{"num":16,"prompt":"What is the purpose of the second paragraph?","choices":[{"label":"A","text":"To list every city Arun visited."},{"label":"B","text":"To describe the garden maze."},{"label":"C","text":"To persuade readers to study geography."},{"label":"D","text":"To explain what Arun learned about making useful maps."}],"answer":"D","explanation":"It gives background about the skills Arun developed in geography and design.","visual":null},{"num":17,"prompt":"In the passage, what does “recognizable” most nearly mean?","choices":[{"label":"A","text":"Easy to identify."},{"label":"B","text":"Impossible to copy."},{"label":"C","text":"Made only for adults."},{"label":"D","text":"Very old."}],"answer":"A","explanation":"Recognizable means having a style people can identify.","visual":null},{"num":18,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To teach the exact steps for measuring every park."},{"label":"B","text":"To explain how Arun’s interest and skills led to a career making useful maps."},{"label":"C","text":"To compare zoos with gardens."},{"label":"D","text":"To warn people not to use digital maps."}],"answer":"B","explanation":"The biography explains Arun’s development and the special qualities of his work.","visual":null}]}],"minutes":20},"math":{"questions":[{"num":1,"prompt":"Monday and Wednesday have 17 kites altogether. Monday has 8 kites. How many kites are shown for Wednesday?","choices":[{"label":"A","text":"7"},{"label":"B","text":"8"},{"label":"C","text":"10"},{"label":"D","text":"9"}],"answer":"D","explanation":"17 - 8 = 9.","visual":"<div class=\"mini-table\"><div class=\"head\">Day</div><div>Monday</div><div>Wednesday</div><div class=\"head\">Kites</div><div>8</div><div>?</div></div>"},{"num":2,"prompt":"The pattern adds 2, then adds 5, and repeats. What number belongs in the box?","choices":[{"label":"A","text":"19"},{"label":"B","text":"22"},{"label":"C","text":"20"},{"label":"D","text":"24"}],"answer":"B","explanation":"The pattern is 8, 10, 15, 17, 22: add 2, then add 5.","visual":"<div class=\"number-grid\"><span>8</span><span>10</span><span>15</span><span>17</span><span class=\"mystery\">?</span><span>24</span><span>29</span><span>31</span></div>"},{"num":3,"prompt":"Which number has 4 hundreds, 0 tens, and 6 ones?","choices":[{"label":"A","text":"46"},{"label":"B","text":"460"},{"label":"C","text":"416"},{"label":"D","text":"406"}],"answer":"D","explanation":"Four hundreds and six ones make 406.","visual":null},{"num":4,"prompt":"What number makes the equation true? □ + 7 = 19","choices":[{"label":"A","text":"10"},{"label":"B","text":"11"},{"label":"C","text":"12"},{"label":"D","text":"13"}],"answer":"C","explanation":"19 - 7 = 12.","visual":null},{"num":5,"prompt":"The picture shows 16 children. One-fourth go to the swings. The rest go to the slide. How many go to the slide?","choices":[{"label":"A","text":"4"},{"label":"B","text":"12"},{"label":"C","text":"8"},{"label":"D","text":"16"}],"answer":"B","explanation":"One-fourth of 16 is 4. 16 - 4 = 12.","visual":"<div class=\"icon-row kids\"><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span><span>●</span></div><div class=\"visual-caption\">16 children</div>"},{"num":6,"prompt":"Which tool is best for measuring the length of a school hallway?","choices":[{"label":"A","text":"measuring tape"},{"label":"B","text":"scale"},{"label":"C","text":"thermometer"},{"label":"D","text":"measuring cup"}],"answer":"A","explanation":"A measuring tape is suited to a long distance.","visual":null},{"num":7,"prompt":"The graph shows tomatoes grown. How many more tomatoes did Group D grow than Group A and Group B combined?","choices":[{"label":"A","text":"2"},{"label":"B","text":"3"},{"label":"C","text":"1"},{"label":"D","text":"5"}],"answer":"C","explanation":"Group A and B grew 2 + 5 = 7. Group D grew 8, so the difference is 1.","visual":"<div class=\"bar-chart\" aria-label=\"Tomatoes grown\"><div class=\"bar-col\"><div class=\"bar\" style=\"height:22%\"><b>2</b></div><span>A</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:56%\"><b>5</b></div><span>B</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:68%\"><b>6</b></div><span>C</span></div><div class=\"bar-col\"><div class=\"bar\" style=\"height:90%\"><b>8</b></div><span>D</span></div></div>"},{"num":8,"prompt":"How are a cube and a cylinder alike?","choices":[{"label":"A","text":"They both have flat bases."},{"label":"B","text":"They both have eight corners."},{"label":"C","text":"They both have only flat surfaces."},{"label":"D","text":"They both have six faces."}],"answer":"A","explanation":"Both shapes have at least one flat base.","visual":"<div class=\"shape-pair\"><svg viewBox=\"0 0 360 170\" role=\"img\" aria-label=\"A cube and a cylinder\"><g transform=\"translate(35,30)\"><path d=\"M20 35 L75 10 L125 38 L70 65 Z\" fill=\"#dce8f7\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M20 35 V95 L70 125 V65 Z\" fill=\"#eef3fa\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M70 65 L125 38 V98 L70 125 Z\" fill=\"#c8d8ef\" stroke=\"#344054\" stroke-width=\"3\"/><text x=\"72\" y=\"150\" text-anchor=\"middle\">cube</text></g><g transform=\"translate(215,25)\"><ellipse cx=\"55\" cy=\"30\" rx=\"43\" ry=\"15\" fill=\"#dce8f7\" stroke=\"#344054\" stroke-width=\"3\"/><path d=\"M12 30 V105 M98 30 V105\" stroke=\"#344054\" stroke-width=\"3\"/><ellipse cx=\"55\" cy=\"105\" rx=\"43\" ry=\"15\" fill=\"#eef3fa\" stroke=\"#344054\" stroke-width=\"3\"/><text x=\"55\" y=\"145\" text-anchor=\"middle\">cylinder</text></g></svg></div>"},{"num":9,"prompt":"Four friends want to share stickers equally. Which group can be divided so each friend gets the same number?","choices":[{"label":"A","html":"<div class=\"icon-row\" style=\"font-size:25px\"><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span></div><div class=\"visual-caption\">8 stickers</div>"},{"label":"B","html":"<div class=\"icon-row\" style=\"font-size:25px\"><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span></div><div class=\"visual-caption\">10 stickers</div>"},{"label":"C","html":"<div class=\"icon-row\" style=\"font-size:25px\"><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span></div><div class=\"visual-caption\">14 stickers</div>"},{"label":"D","html":"<div class=\"icon-row\" style=\"font-size:25px\"><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span></div><div class=\"visual-caption\">12 stickers</div>"}],"answer":"D","explanation":"12 can be divided equally among 4 friends. Each friend gets 3.","visual":null},{"num":10,"prompt":"How many legs do a horse, a duck, and a worm have altogether?","choices":[{"label":"A","text":"4"},{"label":"B","text":"8"},{"label":"C","text":"6"},{"label":"D","text":"10"}],"answer":"C","explanation":"A horse has 4, a duck has 2, and a worm has 0.","visual":null},{"num":11,"prompt":"Which list shows an ABBA pattern?","choices":[{"label":"A","text":"3, 7, 3, 7, 3, 7, 3, 7"},{"label":"B","text":"1, 2, 3, 1, 2, 3, 1, 2"},{"label":"C","text":"8, 6, 4, 8, 6, 4, 8, 6"},{"label":"D","text":"3, 7, 7, 3, 3, 7, 7, 3"}],"answer":"D","explanation":"ABBA repeats first, second, second, first.","visual":null},{"num":12,"prompt":"Mandy sold 6 cups, Connor sold 9, and Tim sold 13. How many cups did Connor and Tim sell altogether?","choices":[{"label":"A","text":"16"},{"label":"B","text":"19"},{"label":"C","text":"28"},{"label":"D","text":"22"}],"answer":"D","explanation":"9 + 13 = 22.","visual":null},{"num":13,"prompt":"Which tool should be used to measure milk for a recipe?","choices":[{"label":"A","html":"<div class=\"tool-choice\"><span>⚖️</span><b>scale</b></div>"},{"label":"B","html":"<div class=\"tool-choice\"><span>📏</span><b>ruler</b></div>"},{"label":"C","html":"<div class=\"tool-choice\"><span>🌡️</span><b>thermometer</b></div>"},{"label":"D","html":"<div class=\"tool-choice\"><span>🥛</span><b>measuring cup</b></div>"}],"answer":"D","explanation":"A measuring cup measures liquid amounts.","visual":null},{"num":14,"prompt":"Four fruit bags contain 3 apples, 4 pears, 5 oranges, and 6 bananas. Which two bags contain 7 pieces of fruit altogether?","choices":[{"label":"A","text":"pears and oranges"},{"label":"B","text":"apples and pears"},{"label":"C","text":"bananas and pears"},{"label":"D","text":"oranges and apples"}],"answer":"B","explanation":"3 apples + 4 pears = 7 pieces of fruit.","visual":null},{"num":15,"prompt":"What number is shown by 1 hundred, 4 tens, and 0 ones?","choices":[{"label":"A","text":"104"},{"label":"B","text":"140"},{"label":"C","text":"1,040"},{"label":"D","text":"14"}],"answer":"B","explanation":"1 hundred + 4 tens = 140.","visual":"<div class=\"base-ten\" aria-label=\"1 hundreds, 4 tens, and 0 ones\"><div class=\"hundreds\"><span class=\"hundred\"></span></div><div class=\"tens\"><span class=\"ten\"></span><span class=\"ten\"></span><span class=\"ten\"></span><span class=\"ten\"></span></div><div class=\"ones\"></div></div>"},{"num":16,"prompt":"Which piece is missing from the square puzzle?","choices":[{"label":"A","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M15 10 L75 10 L45 50 Z\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"B","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M15 50 L45 10 L75 50 Z\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"C","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><circle cx=\"45\" cy=\"30\" r=\"22\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"D","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><rect x=\"18\" y=\"15\" width=\"54\" height=\"30\" fill=\"#d9e3f6\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"}],"answer":"A","explanation":"The missing top region is the downward-pointing triangle.","visual":"<div class=\"svg-wrap\"><svg viewBox=\"0 0 260 190\" role=\"img\" aria-label=\"Square puzzle with the top triangular piece missing\"><rect x=\"35\" y=\"15\" width=\"160\" height=\"160\" fill=\"white\" stroke=\"#344054\" stroke-width=\"4\"/><path d=\"M35 15 L115 95 L35 175 Z\" fill=\"#dbe5f5\" stroke=\"#344054\" stroke-width=\"2\"/><path d=\"M35 175 L115 95 L195 175 Z\" fill=\"#b8c9e8\" stroke=\"#344054\" stroke-width=\"2\"/><path d=\"M195 15 L195 175 L115 95 Z\" fill=\"#e7edf8\" stroke=\"#344054\" stroke-width=\"2\"/><path d=\"M35 15 L195 15 L115 95 Z\" fill=\"white\" stroke=\"#d92d20\" stroke-width=\"3\" stroke-dasharray=\"7 5\"/><text x=\"95\" y=\"8\" font-size=\"14\" fill=\"#d92d20\">missing</text></svg></div>"},{"num":17,"prompt":"Sara had 42 beads. She used 15 red beads and 9 blue beads. Then she received 6 new beads. How many beads does she have now?","choices":[{"label":"A","text":"18"},{"label":"B","text":"27"},{"label":"C","text":"24"},{"label":"D","text":"33"}],"answer":"C","explanation":"42 - 15 - 9 + 6 = 24.","visual":null},{"num":18,"prompt":"The flag is flipped across the dotted vertical line. Which option shows the reflection?","choices":[{"label":"A","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M72 55 V7 H18 L38 22 L18 37 H72\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"B","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M18 55 V7 H72 L52 22 L72 37 H18\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"C","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M18 5 H72 V53 L52 38 L72 23 H18\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"},{"label":"D","html":"<div class=\"shape-choice\"><svg viewBox=\"0 0 90 60\"><path d=\"M72 5 H18 V53 L38 38 L18 23 H72\" fill=\"#c6d5ef\" stroke=\"#344054\" stroke-width=\"3\"/></svg></div>"}],"answer":"A","explanation":"The reflected flagpole moves to the right and the flag points left.","visual":"<div class=\"svg-wrap\"><svg viewBox=\"0 0 420 180\" role=\"img\" aria-label=\"Flag shape reflected across a vertical line\"><line x1=\"210\" y1=\"10\" x2=\"210\" y2=\"170\" stroke=\"#667085\" stroke-width=\"3\" stroke-dasharray=\"7 7\"/><path d=\"M80 145 V35 H165 L138 62 L165 89 H80\" fill=\"#cbdaf1\" stroke=\"#344054\" stroke-width=\"4\"/><text x=\"100\" y=\"165\" font-size=\"14\">original</text></svg></div>"},{"num":19,"prompt":"Which option shows the bottom half after the design is flipped over the dotted line?","choices":[{"label":"A","html":"<div class=\"shape-choice wide\"><svg viewBox=\"0 0 180 75\"><path d=\"M10 15 L45 55 L80 15 L115 55 L150 15\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/></svg></div>"},{"label":"B","html":"<div class=\"shape-choice wide\"><svg viewBox=\"0 0 180 75\"><path d=\"M10 60 L45 10 L80 60 L115 10 L150 60\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/></svg></div>"},{"label":"C","html":"<div class=\"shape-choice wide\"><svg viewBox=\"0 0 180 75\"><path d=\"M10 10 Q40 70 70 10 Q100 70 130 10\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/></svg></div>"},{"label":"D","html":"<div class=\"shape-choice wide\"><svg viewBox=\"0 0 180 75\"><path d=\"M30 60 L65 10 L100 60 L135 10\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/></svg></div>"}],"answer":"A","explanation":"The reflection reverses the vertical direction of the original zigzag.","visual":"<div class=\"svg-wrap\"><svg viewBox=\"0 0 420 190\" role=\"img\" aria-label=\"Top half of a zigzag design above a horizontal line\"><line x1=\"20\" y1=\"105\" x2=\"400\" y2=\"105\" stroke=\"#667085\" stroke-width=\"3\" stroke-dasharray=\"7 7\"/><path d=\"M105 90 L145 40 L185 90 L225 40 L265 90 L305 40\" fill=\"none\" stroke=\"#344054\" stroke-width=\"6\"/><text x=\"25\" y=\"96\" font-size=\"14\">top half</text></svg></div>"},{"num":20,"prompt":"Nia arranged 8 counters and Omar arranged 16 counters. Omar gives away 5. Which number sentence shows how many counters remain altogether?","choices":[{"label":"A","text":"8 + 16 = 24"},{"label":"B","text":"16 - 8 - 5 = 3"},{"label":"C","text":"8 + 16 - 5 = 19"},{"label":"D","text":"8 + 16 + 5 = 29"}],"answer":"C","explanation":"Add both groups and subtract the 5 counters given away.","visual":"<div class=\"array-pair\"><div><div class=\"array\" style=\"grid-template-columns:repeat(4,22px)\"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><b>Nia: 8</b></div><div><div class=\"array\" style=\"grid-template-columns:repeat(4,22px)\"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div><b>Omar: 16, then gives away 5</b></div></div>"},{"num":21,"prompt":"A blue diamond is worth 4 points and a pink diamond is worth 2 points. Which group is worth the most?","choices":[{"label":"A","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem blue\">◆</span><span class=\"gem pink\">◆</span></div>"},{"label":"B","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span></div>"},{"label":"C","html":"<div class=\"gem-row\"><span class=\"gem blue\">◆</span><span class=\"gem blue\">◆</span><span class=\"gem blue\">◆</span></div>"},{"label":"D","html":"<div class=\"gem-row\"><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span><span class=\"gem pink\">◆</span></div>"}],"answer":"C","explanation":"Three blue diamonds are worth 12 points; the other groups are worth 10.","visual":null},{"num":22,"prompt":"Four books have 44, 72, 58, and 65 pages. Which list orders them from fewest to most?","choices":[{"label":"A","text":"44, 58, 65, 72"},{"label":"B","text":"72, 65, 58, 44"},{"label":"C","text":"44, 65, 58, 72"},{"label":"D","text":"58, 44, 72, 65"}],"answer":"A","explanation":"The numbers in increasing order are 44, 58, 65, 72.","visual":null},{"num":23,"prompt":"A bag contains 5 green marbles and 5 red marbles. Which statement is true?","choices":[{"label":"A","text":"Green is more likely than red."},{"label":"B","text":"Green and red are equally likely."},{"label":"C","text":"Red is more likely than green."},{"label":"D","text":"It is impossible to pick a red marble."}],"answer":"B","explanation":"The bag has the same number of each color, so the chances are equal.","visual":"<div class=\"marble-bag\"><div class=\"bag-label\">Bag of marbles</div><div class=\"marbles\"><span class=\"green\"></span><span class=\"green\"></span><span class=\"green\"></span><span class=\"green\"></span><span class=\"green\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span><span class=\"red\"></span></div></div>"},{"num":24,"prompt":"A piece of string begins at 1 inch and ends at 8 inches. How long is the string?","choices":[{"label":"A","text":"6 inches"},{"label":"B","text":"7 inches"},{"label":"C","text":"8 inches"},{"label":"D","text":"9 inches"}],"answer":"B","explanation":"8 - 1 = 7 inches.","visual":"<div class=\"ruler\"><div class=\"pencil-line\" style=\"margin-left:10%;width:70%\"><span></span></div><div class=\"ticks\"><div class=\"tick\"><i></i><b>0</b></div><div class=\"tick\"><i></i><b>1</b></div><div class=\"tick\"><i></i><b>2</b></div><div class=\"tick\"><i></i><b>3</b></div><div class=\"tick\"><i></i><b>4</b></div><div class=\"tick\"><i></i><b>5</b></div><div class=\"tick\"><i></i><b>6</b></div><div class=\"tick\"><i></i><b>7</b></div><div class=\"tick\"><i></i><b>8</b></div><div class=\"tick\"><i></i><b>9</b></div><div class=\"tick\"><i></i><b>10</b></div></div></div>"}],"minutes":26}},"primary2-test5":{"title":"ISEE Primary 2 Practice Test #5","auditory":{"title":"The Library Cart","passage":"On Tuesday, Ms. Patel placed a stack of library books on the reading table. “These books must be returned before lunch,” she said. “I need a volunteer who can organize them and make sure every book reaches the correct shelf.”\n\nLena raised her hand. She visited the library often. Ms. Patel was pleased, but she explained that the books included biographies, animal books, folktales, and poetry. If the books were mixed together, the librarian would have extra work.\n\nThat evening, Lena made four labels from index cards. She practiced sorting several books from home and made a small map showing where each library section was located. Before school, she checked that the labels and map were in her backpack.\n\nThe next morning, Lena showed Ms. Patel how she would sort the books before carrying them. She placed the heaviest books on the bottom of the cart and kept the labels on top. Ms. Patel nodded. “You have planned for both safety and organization,” she said.\n\nLena returned every book to the correct shelf. The librarian thanked her. Lena felt proud because she had learned that a helpful person does not simply finish a task—she thinks about how to do it well.\n\nLena also checked the library's return cart before leaving the classroom. She noticed that one wheel squeaked, so she told Ms. Patel and used a different cart. By checking the tools as well as the books, Lena prevented a small problem from becoming a larger one in the hallway.","questions":[{"num":1,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"Lena writes a new book."},{"label":"B","text":"Ms. Patel closes the library."},{"label":"C","text":"Lena refuses to move the cart."},{"label":"D","text":"Lena prepares carefully to organize and return library books."}],"answer":"D","explanation":"The passage focuses on Lena’s careful plan.","visual":null},{"num":2,"prompt":"What can the listener infer about Lena?","choices":[{"label":"A","text":"She prefers poetry to every other kind of book."},{"label":"B","text":"She understands that organizing the books is as important as carrying them."},{"label":"C","text":"She expects the librarian to sort the books again."},{"label":"D","text":"She has never visited the school library."}],"answer":"B","explanation":"Her labels, map, and sorting practice show that she values correct organization.","visual":null},{"num":3,"prompt":"Why did Ms. Patel not choose Lena immediately?","choices":[{"label":"A","text":"The task required sorting and safe carrying."},{"label":"B","text":"The library was closed."},{"label":"C","text":"Lena could not read."},{"label":"D","text":"The books were already returned."}],"answer":"A","explanation":"The job required responsibility.","visual":null},{"num":4,"prompt":"Which did Lena do after making labels but before returning the books?","choices":[{"label":"A","text":"She placed every book on a shelf."},{"label":"B","text":"She asked the librarian to move the cart."},{"label":"C","text":"She practiced sorting books and made a map of the library sections."},{"label":"D","text":"She removed the heaviest books from the stack."}],"answer":"C","explanation":"Those planning steps occurred the evening before the task.","visual":null},{"num":5,"prompt":"Why would mixed-up books create “extra work” for the librarian?","choices":[{"label":"A","text":"The librarian would need to rewrite each book."},{"label":"B","text":"The library would need to close for the day."},{"label":"C","text":"The students would need to buy new books."},{"label":"D","text":"The librarian would need to sort and move the books again."}],"answer":"D","explanation":"Books placed in the wrong sections would have to be reorganized.","visual":null},{"num":6,"prompt":"Which idea is best supported by the passage?","choices":[{"label":"A","text":"The fastest worker is always the most responsible."},{"label":"B","text":"A task is more helpful when the worker considers how it affects other people."},{"label":"C","text":"Maps are more useful than labels."},{"label":"D","text":"Heavy books should never be moved on a cart."}],"answer":"B","explanation":"Lena plans the task in a way that makes the librarian's work easier.","visual":null}],"minutes":7},"reading":{"passages":[{"title":"Busy Beavers","text":"Beavers are large rodents that live near rivers, ponds, and streams. They build dams from branches, mud, and stones. A dam slows moving water and creates a pond behind it.\n\nBeavers have wide tails that help them steer and webbed back feet for swimming. Their thick fur keeps them warm. Their strong front teeth continue growing, so chewing wood helps keep the teeth from becoming too long.\n\nA beaver lodge is a home built from sticks and mud. Its entrance is usually underwater. Inside is a dry room where the beavers rest.\n\nBeaver dams can provide homes for fish, frogs, insects, and birds. Dams can also flood roads or fields. Wildlife experts study beaver activity and look for safe ways for people and beavers to share the same areas.\n\nBeavers are busiest in the evening and at night. They can close their ears and nostrils while swimming, and a clear inner eyelid helps protect their eyes underwater. In autumn, they often repair their dams and gather extra branches before cold weather arrives.\n\nThe ponds created by beavers may remain long after the animals move away. Over time, these wet areas can collect rich soil and support many plants. For this reason, beavers are sometimes called habitat builders, even though they are simply creating a safe home for themselves.","questions":[{"num":1,"prompt":"What is the main idea?","choices":[{"label":"A","text":"Beavers live only in oceans."},{"label":"B","text":"Every dam is harmful."},{"label":"C","text":"Beavers have features and behaviors that help them live and build near water."},{"label":"D","text":"Beavers build with metal."}],"answer":"C","explanation":"The passage explains beaver traits, dams, and lodges.","visual":null},{"num":2,"prompt":"What does a beaver dam do?","choices":[{"label":"A","text":"Speeds water."},{"label":"B","text":"Dries a river."},{"label":"C","text":"Stops beavers from swimming."},{"label":"D","text":"Slows water and can create a pond."}],"answer":"D","explanation":"A dam slows water.","visual":null},{"num":3,"prompt":"How are a beaver's teeth and its building behavior connected?","choices":[{"label":"A","text":"Chewing building material also keeps the beaver's growing teeth worn down."},{"label":"B","text":"The teeth change color whenever a dam is complete."},{"label":"C","text":"The teeth are used only for carrying stones."},{"label":"D","text":"Building a lodge causes the teeth to stop growing."}],"answer":"A","explanation":"The passage connects lifelong tooth growth with chewing wood.","visual":null},{"num":4,"prompt":"What does “webbed” most nearly mean?","choices":[{"label":"A","text":"Covered in mud."},{"label":"B","text":"Connected by skin that helps swimming."},{"label":"C","text":"Sharp."},{"label":"D","text":"Heavy."}],"answer":"B","explanation":"Webbing between toes helps swimming.","visual":null},{"num":5,"prompt":"Why does the author discuss both new wildlife habitats and flooded roads?","choices":[{"label":"A","text":"To prove that beavers choose where roads are built."},{"label":"B","text":"To explain why fish build dams."},{"label":"C","text":"To show that beaver dams can have helpful and harmful effects."},{"label":"D","text":"To show that every beaver pond should be drained."}],"answer":"C","explanation":"The paragraph presents two sides of the habitat change.","visual":null},{"num":6,"prompt":"Why did the author write this passage?","choices":[{"label":"A","text":"To tell a fantasy."},{"label":"B","text":"To persuade readers to build a dam."},{"label":"C","text":"To teach drawing."},{"label":"D","text":"To give information about beavers."}],"answer":"D","explanation":"It is informational.","visual":null}]},{"title":"The Paper Bridge","text":"Mira wanted to make a paper bridge that could hold ten toy cars. She placed a flat strip of paper between two books. The bridge bent when she set the third car on it.\n\nMira folded a new sheet back and forth like a fan. The folds made ridges. This bridge held six cars, but the ends slipped from the books.\n\nNext, Mira taped the ends to the books. The bridge held eight cars before the middle began to sag. Mira placed a narrow paper support under the center.\n\nOn the final test, all ten cars crossed the bridge. Each test had given Mira information about the next change to make.\n\nMira decided to test the finished bridge again with cars placed in a different order. The bridge still held. She measured the folds and wrote down where the center support was located so she could build another bridge later.\n\nHer brother pointed out that Mira had acted like an engineer. She had observed a problem, made one change, and tested again. The final bridge looked simple, but each part had a reason: folds for strength, tape for stability, a center support for weight, and rails for safety.","questions":[{"num":7,"prompt":"What is this passage mostly about?","choices":[{"label":"A","text":"Mira improves a paper bridge through testing."},{"label":"B","text":"Mira buys a bridge."},{"label":"C","text":"Her brother builds it."},{"label":"D","text":"Paper cannot hold cars."}],"answer":"A","explanation":"Mira revises the design after each test.","visual":null},{"num":8,"prompt":"Which happened first?","choices":[{"label":"A","text":"Mira added a support."},{"label":"B","text":"The flat paper bent."},{"label":"C","text":"She taped the ends."},{"label":"D","text":"Ten cars crossed."}],"answer":"B","explanation":"The first bridge bent.","visual":null},{"num":9,"prompt":"Why did the fan-folded bridge hold more cars than the flat bridge?","choices":[{"label":"A","text":"The folds made each toy car lighter."},{"label":"B","text":"The folded bridge was shorter than the books."},{"label":"C","text":"The ridges gave the paper more structure and strength."},{"label":"D","text":"The tape changed the weight of the paper."}],"answer":"C","explanation":"The ridges prevented the paper from bending as easily.","visual":null},{"num":10,"prompt":"What does “sag” mean?","choices":[{"label":"A","text":"Slide sideways."},{"label":"B","text":"Become colorful."},{"label":"C","text":"Make noise."},{"label":"D","text":"Bend downward."}],"answer":"D","explanation":"The middle bent downward.","visual":null},{"num":11,"prompt":"Which statement best describes Mira's problem-solving method?","choices":[{"label":"A","text":"She changes every part at the same time."},{"label":"B","text":"She identifies one weakness, changes that part, and tests again."},{"label":"C","text":"She chooses a new goal after each failure."},{"label":"D","text":"She stops testing as soon as one car crosses."}],"answer":"B","explanation":"Each test targets the problem revealed by the previous test.","visual":null},{"num":12,"prompt":"What is the lesson?","choices":[{"label":"A","text":"Testing and changing a design can improve it."},{"label":"B","text":"The first idea is always best."},{"label":"C","text":"Paper bridges should never be used."},{"label":"D","text":"Toy cars should be paper."}],"answer":"A","explanation":"Mira improves through revision.","visual":null}]},{"title":"Practice Biography: Imani Cole","text":"Imani Cole became interested in weather when a summer storm knocked out the electricity in her neighborhood. She wondered why the wind changed direction and how forecasters knew a storm was coming. Imani began keeping a notebook of cloud shapes, rainfall, and daily temperatures.\n\nAt school, Imani built a wind-direction tool from a paper plate, a straw, and a paper arrow. She recorded the direction of the wind at the same time each afternoon. After several weeks, she compared her notes with the weather report and noticed that some patterns repeated.\n\nImani later studied weather science in college. She learned to use rain gauges, thermometers, radar pictures, and computer maps. After graduation, she worked at a children's science center. Imani wanted visitors to collect real information instead of only looking at displays.\n\nShe designed an outdoor weather station with tools placed low enough for children to reach. Each tool had a picture label and a simple instruction card. Imani also created a large map where visitors could add their observations.\n\nOther science centers began using Imani's ideas. Her distinctive approach combined accurate weather tools with activities children could operate themselves. Through her work, young visitors learned that careful daily observations can help reveal patterns in the sky.","questions":[{"num":13,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Imani wanted every child to become a television forecaster."},{"label":"B","text":"Imani studied only summer storms."},{"label":"C","text":"Imani turned her interest in weather into a career creating hands-on weather exhibits."},{"label":"D","text":"Imani stopped keeping weather records after school."}],"answer":"C","explanation":"The passage follows Imani from childhood to her career.","visual":null},{"num":14,"prompt":"What did Imani do after building a wind-direction tool?","choices":[{"label":"A","text":"She threw the tool away."},{"label":"B","text":"She moved to another city."},{"label":"C","text":"She used it to measure rainfall."},{"label":"D","text":"She recorded the wind direction at the same time each afternoon."}],"answer":"D","explanation":"The second paragraph states this.","visual":null},{"num":15,"prompt":"Why were Imani's tools placed low and marked with picture labels?","choices":[{"label":"A","text":"The design allowed more children to understand and operate the station."},{"label":"B","text":"Low tools measure stronger winds."},{"label":"C","text":"Picture labels prevent tools from getting wet."},{"label":"D","text":"The science center did not allow written words."}],"answer":"A","explanation":"Both choices make the exhibit easier for young visitors to use.","visual":null},{"num":16,"prompt":"What is the purpose of the third paragraph?","choices":[{"label":"A","text":"To list all possible types of severe weather."},{"label":"B","text":"To connect Imani's education with the hands-on work she later created."},{"label":"C","text":"To explain how to repair a broken weather tool."},{"label":"D","text":"To compare weather centers in several cities."}],"answer":"B","explanation":"The paragraph explains what she learned and how she applied it.","visual":null},{"num":17,"prompt":"In the passage, what does “distinctive” most nearly mean?","choices":[{"label":"A","text":"Hidden and difficult to find."},{"label":"B","text":"Old and no longer useful."},{"label":"C","text":"Special and easy to recognize."},{"label":"D","text":"Quickly made without planning."}],"answer":"C","explanation":"Her approach was recognizable.","visual":null},{"num":18,"prompt":"What is the most likely reason the author wrote this passage?","choices":[{"label":"A","text":"To teach readers how to predict every storm."},{"label":"B","text":"To persuade readers to avoid outdoor exhibits."},{"label":"C","text":"To explain why summer is the best season."},{"label":"D","text":"To explain how Imani developed her interest and became a weather educator."}],"answer":"D","explanation":"The passage is a biography.","visual":null}]}],"minutes":20},"math":{"questions":[{"num":1,"prompt":"The table shows flowers picked. How many more flowers were picked on Wednesday and Friday together than on Monday and Thursday together?","choices":[{"label":"A","text":"3"},{"label":"B","text":"4"},{"label":"C","text":"8"},{"label":"D","text":"6"}],"answer":"D","explanation":"Wednesday and Friday: 8 + 7 = 15. Monday and Thursday: 5 + 4 = 9. Difference: 6.","visual":"<div class=\"mini-table\"><div class=\"head\">Day</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class=\"head\">Flowers</div><div>5</div><div>6</div><div>8</div><div>4</div><div>7</div></div>"},{"num":2,"prompt":"The pattern adds 4, then adds 6, and repeats. What number belongs in the box?","choices":[{"label":"A","text":"27"},{"label":"B","text":"30"},{"la x=\"25\" y=\"96\" font-size=\"14\">top half</text></svg></div>"},{"num":20,"prompt":"Ada has 9 counters and Luis has 17 counters. Luis gives away 6. How many counters do they have altogether now?","choices":[{"label":"A","text":"11"},{"label":"B","text":"26"},{"label":"C","text":"20"},{"label":"D","text":"32"}],"answer":"C","explanation":"9 + 17 - 6 = 20.","visual":null},{"num":21,"prompt":"A dark token is worth 5 points and a light token is worth 2 points. Which group is worth the most?","choices":[{"label":"A","html":"<div class=\"gem-row\"><span class=\"gem blue\">●</span><span class=\"gem blue\">●</span></div>"},{"label":"B","html":"<div class=\"gem-row\"><span class=\"gem blue\">●</span><span class=\"gem pink\">●</span><span class=\"gem pink\">●</span><span class=\"gem pink\">●</span></div>"},{"label":"C","html":"<div class=\"gem-row\"><span class=\"gem pink\">●</span><span class=\"gem pink\">●</span><span class=\"gem pink\">●</span><span class=\"gem pink\">●</span><span class=\"gem pink\">●</span><span class=\"gem pink\">●</span></div>"},{"label":"D","html":"<div class=\"gem-row\"><span class=\"gem blue\">●</span><span class=\"gem blue\">●</span><span class=\"gem pink\">●</span></div>"}],"answer":"D","explanation":"Multiply each token count by its value and compare totals.","visual":null},{"num":22,"prompt":"Which number is greater than 55 but less than 62?","choices":[{"label":"A","text":"47"},{"label":"B","text":"58"},{"label":"C","text":"64"},{"label":"D","text":"73"}],"answer":"B","explanation":"58 lies between 55 and 62.","visual":null},{"num":23,"prompt":"A bag contains 6 green marbles and 4 orange marbles. Which statement is true?","choices":[{"label":"A","text":"Orange is more likely."},{"label":"B","text":"Green is more likely."},{"label":"C","text":"Both colors are impossible."},{"label":"D","text":"Orange is certain."}],"answer":"B","explanation":"Compare how many marbles of each color are in the bag.","visual":"<div class=\"marble-bag\"><div class=\"bag-label\">Bag of marbles</div><div class=\"marbles\"><span class=\"green\"></span><span class=\"green\"></span><span class=\"green\"></span><span class=\"green\"></span><span class=\"green\"></span><span class=\"green\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span><span style=\"background:#f59e42\"></span></div></div>"},{"num":24,"prompt":"An object begins at 2 inches and ends at 9 inches. How long is it?","choices":[{"label":"A","text":"6 inches"},{"label":"B","text":"9 inches"},{"label":"C","text":"11 inches"},{"label":"D","text":"7 inches"}],"answer":"D","explanation":"9 - 2 = 7 inches.","visual":"<div class=\"ruler\"><div class=\"pencil-line\" style=\"margin-left:20%;width:70%\"><span></span></div><div class=\"ticks\"><div class=\"tick\"><i></i><b>0</b></div><div class=\"tick\"><i></i><b>1</b></div><div class=\"tick\"><i></i><b>2</b></div><div class=\"tick\"><i></i><b>3</b></div><div class=\"tick\"><i></i><b>4</b></div><div class=\"tick\"><i></i><b>5</b></div><div class=\"tick\"><i></i><b>6</b></div><div class=\"tick\"><i></i><b>7</b></div><div class=\"tick\"><i></i><b>8</b></div><div class=\"tick\"><i></i><b>9</b></div><div class=\"tick\"><i></i><b>10</b></div></div></div>"}],"minutes":26}},"primary2-test6":{"title":"ISEE Primary 2 Practice Test #6","auditory":{"title":"The Equipment Checklist","passage":"Coach Ellis needed someone to carry the team’s equipment checklist to Saturday’s soccer game. “The person must arrive early, check every bag, and tell me right away if anything is missing,” he said.\n\nJonah volunteered. Coach Ellis thanked him, but he explained that the bags contained balls, cones, pinnies, a first-aid kit, and water bottles. Forgetting even one bag could delay the game.\n\nOn Friday evening, Jonah copied the checklist onto a clipboard. He grouped the equipment by bag and placed a check box beside each item. He asked his sister to pretend that one item was missing so he could practice checking carefully.\n\nThe next morning, Jonah arrived early. He counted the balls, opened each bag, and compared everything with the checklist. One bag of cones was missing. Jonah told Coach Ellis, and they found it beside the storage-room door.\n\nBecause Jonah had checked carefully, the game began on time. Jonah smiled because his preparation had helped everyone.\n\nJonah also checked the first-aid kit without opening any sealed packages. He made sure the kit was present and told Coach Ellis that only an adult should decide whether it needed new supplies. Then he counted the water bottles and separated the goalkeeper's gloves from the practice pinnies so they could be found quickly.\n\nCoach Ellis explained that a checklist was useful only when the checker looked at every item instead of making a quick guess. Jonah understood why his practice with his sister had mattered. It trained him to notice what was absent, not only what was present.","questions":[{"num":1,"prompt":"What is the passage mostly about?","choices":[{"label":"A","text":"Jonah prepares carefully to check soccer equipment."},{"label":"B","text":"Jonah learns a new sport."},{"label":"C","text":"Coach Ellis buys uniforms."},{"label":"D","text":"The game is canceled."}],"answer":"A","explanation":"The passage centers on Jonah’s checklist.","visual":null},{"num":2,"prompt":"Why did Jonah write the number of balls and cones beside their names?","choices":[{"label":"A","text":"He wanted to practice writing larger numbers."},{"label":"B","text":"Coach Ellis did not know what balls and cones looked like."},{"label":"C","text":"Seeing a bag did not prove that it contained the correct number of items."},{"label":"D","text":"The equipment bags did not have enough space."}],"answer":"C","explanation":"Jonah needed to verify quantities, not merely the presence of each bag.","visual":null},{"num":3,"prompt":"What happened immediately after Jonah discovered that the cones were missing?","choices":[{"label":"A","text":"He began the soccer game without them."},{"label":"B","text":"He told Coach Ellis about the missing bag."},{"label":"C","text":"He asked his sister to bring new cones."},{"label":"D","text":"He erased the cones from the checklist."}],"answer":"B","explanation":"The passage says Jonah reported the missing bag right away.","visual":null},{"num":4,"prompt":"Which trait does Jonah show most clearly?","choices":[{"label":"A","text":"He is impatient because he wants the game to end."},{"label":"B","text":"He is secretive because he hides the checklist."},{"label":"C","text":"He is careless because he leaves his uniform at home."},{"label":"D","text":"He is thorough because he checks both the bags and the number of items."}],"answer":"D","explanation":"Jonah checks every bag and verifies the quantities.","visual":null},{"num":5,"prompt":"Why was Jonah's preparation especially useful?","choices":[{"label":"A","text":"It allowed the missing bag to be found before it delayed the game."},{"label":"B","text":"It helped Jonah become the team captain."},{"label":"C","text":"It allowed the team to use fewer players."},{"label":"D","text":"It made the storage room larger."}],"answer":"A","explanation":"The early check gave the team time to locate the cones.","visual":null},{"num":6,"prompt":"Which lesson is best supported by the passage?","choices":[{"label":"A","text":"Equipment should be counted only after a game."},{"label":"B","text":"A volunteer should never ask another person for help."},{"label":"C","text":"A careful check can prevent a small problem from becoming a larger one."},{"label":"D","text":"Arriving early matters more than checking accurately."}],"answer":"C","explanation":"Jonah catches the missing equipment before it causes a delay.","visual":null}],"minutes":7},"reading":{"passages":[{"title":"Owls: Quiet Hunters","text":"Owls are birds of prey. Many hunt at night, although some hunt during the day. Their bodies have features that make them successful hunters.\n\nLarge eyes gather light in dim places. Owls cannot move their eyes from side to side, so they turn their heads to look around.\n\nOwls also have excellent hearing. Their ear openings may sit at different heights, helping them tell where a sound comes from. Soft wing feathers reduce noise during flight.\n\nOwls eat mice, insects, fish, and other animals. After eating, an owl may cough up a pellet containing fur or bones. Scientists study pellets to learn what owls have eaten.\n\nDifferent owl species hunt in different ways. A barn owl may glide over a field while listening for a mouse beneath tall grass. A small screech owl may wait on a branch for an insect to move. Strong feet and curved claws help an owl grasp its food.\n\nOwls also communicate with hoots, whistles, screeches, and other sounds. Each species has its own calls. A call may warn another owl away from a nesting area or help family members locate one another in darkness.","questions":[{"num":1,"prompt":"What is the main idea?","choices":[{"label":"A","text":"Owls have features that help them hunt."},{"label":"B","text":"All owls hunt only at night."},{"label":"C","text":"Owls eat only mice."},{"label":"D","text":"Scientists teach owls to fly."}],"answer":"A","explanation":"The passage explains vision, hearing, and feathers.","visual":null},{"num":2,"prompt":"Why do owls turn their heads?","choices":[{"label":"A","text":"Their ears are small."},{"label":"B","text":"Their eyes do not move side to side."},{"label":"C","text":"Their wings block vision."},{"label":"D","text":"Their feathers are heavy."}],"answer":"B","explanation":"Owls turn their heads to look around.","visual":null},{"num":3,"prompt":"Which two features help an owl find and quietly approach prey?","choices":[{"label":"A","text":"Large eyes and pellets help it fly faster."},{"label":"B","text":"A turning head and bones make it silent."},{"label":"C","text":"Strong hearing helps it find prey, and soft wing feathers help it fly quietly."},{"label":"D","text":"Bright feathers and uneven feet warn prey."}],"answer":"C","explanation":"The passage connects strong hearing with quiet wing feathers.","visual":null},{"num":4,"prompt":"What does “dim” mean?","choices":[{"label":"A","text":"Very noisy."},{"label":"B","text":"Very warm."},{"label":"C","text":"Empty."},{"label":"D","text":"Not very bright."}],"answer":"D","explanation":"Dim means low light.","visual":null},{"num":5,"prompt":"Why might scientists study pellets from several owls living in the same area?","choices":[{"label":"A","text":"The pellets can reveal which prey animals are common nearby."},{"label":"B","text":"The pellets show how far each owl can turn its head."},{"label":"C","text":"The pellets make owl feathers softer."},{"label":"D","text":"The pellets explain why some owls hunt during the day."}],"answer":"A","explanation":"Undigested remains provide evidence about the owls' food and local animals.","visual":null},{"num":6,"prompt":"Why did the author write this?","choices":[{"label":"A","text":"To tell a fantasy."},{"label":"B","text":"To give information about owls."},{"label":"C","text":"To persuade night hunting."},{"label":"D","text":"To teach drawing."}],"answer":"B","explanation":"It is informational.","visual":null}]},{"title":"The Marble Path","text":"Sofia taped cardboard tubes in a straight line along a box. When she released a marble, it moved slowly and stopped before the end.\n\nShe raised the first tube so the path sloped downward. The marble rolled farther but jumped out at a gap. Sofia moved the tubes closer and taped the connection.\n\nOn the next test, the marble flew off the final curve. Sofia added a low wall around the curve.\n\nThis time, the marble traveled through every tube and landed in a cup. Sofia had changed one part after each test so she could understand which change solved each problem.\n\nSofia drew a simple diagram after every test. She marked the height of the first tube, the taped gap, the wall around the curve, and the raised final section. The drawings helped her remember which change solved each problem.\n\nWhen a friend tried the path, the marble also reached the cup. Sofia knew the result was not an accident. A successful design should work more than once, even when another person uses it.\n\nShe also asked her friend to release the marble from the marked starting line. The marble still reached the cup, showing that the path worked even when another person tested it in the same way.","questions":[{"num":7,"prompt":"What is this passage mostly about?","choices":[{"label":"A","text":"Sofia loses tubes."},{"label":"B","text":"A marble breaks the box."},{"label":"C","text":"A friend builds it."},{"label":"D","text":"Sofia improves a marble path one change at a time."}],"answer":"D","explanation":"She tests and revises.","visual":null},{"num":8,"prompt":"Which happened first?","choices":[{"label":"A","text":"She added a wall."},{"label":"B","text":"The marble landed in a cup."},{"label":"C","text":"The marble stopped early."},{"label":"D","text":"She taped the gap."}],"answer":"C","explanation":"The first test stopped early.","visual":null},{"num":9,"prompt":"How did raising the first tube affect the marble path?","choices":[{"label":"A","text":"It made the marble stop sooner and removed the gap."},{"label":"B","text":"It gave the marble more speed, but a new problem appeared at the gap."},{"label":"C","text":"It caused the cardboard wall to become lower."},{"label":"D","text":"It allowed the marble to land in the cup immediately."}],"answer":"B","explanation":"The slope solved one problem while revealing another.","visual":null},{"num":10,"prompt":"What does “connection” mean?","choices":[{"label":"A","text":"The place where tubes meet."},{"label":"B","text":"The cup."},{"label":"C","text":"The box top."},{"label":"D","text":"The marble."}],"answer":"A","explanation":"It is the joining point.","visual":null},{"num":11,"prompt":"Why did Sofia change only one part of the marble path after each test?","choices":[{"label":"A","text":"It guaranteed that every change would work."},{"label":"B","text":"It kept the marble from moving."},{"label":"C","text":"It allowed her to skip the final test."},{"label":"D","text":"It helped her tell which change fixed the problem."}],"answer":"D","explanation":"Changing one part at a time makes cause and effect easier to understand.","visual":null},{"num":12,"prompt":"What is the lesson?","choices":[{"label":"A","text":"Tubes should never be taped."},{"label":"B","text":"Flat paths are best."},{"label":"C","text":"Careful testing improves a design."},{"label":"D","text":"The last idea should be tried first."}],"answer":"C","explanation":"Testing and revising worked.","visual":null}]},{"title":"Practice Biography: Leah Okafor","text":"Leah Okafor became interested in plants while helping in her family’s garden. She drew leaves and wrote notes about changes.\n\nIn college, Leah studied plant science. She learned how soil, water, light, and temperature affect growth. Later, she worked at a city garden for children.\n\nLeah noticed that some children could not reach the tall garden beds. She designed lower beds and wide paths. She also created picture signs showing when to water, weed, and harvest.\n\nOther gardens began using Leah’s designs. She wrote books and trained teachers to create accessible gardens. Her work combined science with attention to the people using each space.\n\nLeah invited children, teachers, and gardeners to try the new space before it opened. One child suggested using pictures of watering cans and baskets on the signs. A teacher asked for a shaded resting place. Leah added both ideas because useful design begins with listening to the people who will use it.\n\nThe garden later became a model for other schools. Visitors could smell herbs, compare leaf shapes, and harvest vegetables from beds they could reach. Leah's science knowledge helped the plants grow, while her careful design helped the community take part.","questions":[{"num":13,"prompt":"What is the main idea?","choices":[{"label":"A","text":"Leah used science and design to make gardens easier to use."},{"label":"B","text":"Leah wanted every child to grow one plant."},{"label":"C","text":"A garden taught Leah to draw."},{"label":"D","text":"Leah stopped working with plants."}],"answer":"A","explanation":"The passage explains her career and impact.","visual":null},{"num":14,"prompt":"What did Leah do as a child?","choices":[{"label":"A","text":"Designed parks."},{"label":"B","text":"Drew leaves and recorded changes."},{"label":"C","text":"Wrote teacher books."},{"label":"D","text":"Built tall beds."}],"answer":"B","explanation":"This appears in the first paragraph.","visual":null},{"num":15,"prompt":"Why did Leah add lower beds, wider paths, and picture signs?","choices":[{"label":"A","text":"She wanted the plants to receive less sunlight."},{"label":"B","text":"She needed the garden to hold fewer plants."},{"label":"C","text":"She wanted more visitors to reach, move through, and understand the garden."},{"label":"D","text":"She wanted teachers to stop visiting."}],"answer":"C","explanation":"Each change removed a barrier for garden visitors.","visual":null},{"num":16,"prompt":"What is the purpose of paragraph two?","choices":[{"label":"A","text":"To list vegetables."},{"label":"B","text":"To persuade college attendance."},{"label":"C","text":"To compare gardens."},{"label":"D","text":"To explain Leah’s plant-science learning."}],"answer":"D","explanation":"It gives education background.","visual":null},{"num":17,"prompt":"What does “accessible” mean?","choices":[{"label":"A","text":"Easy for many people to use."},{"label":"B","text":"Hidden."},{"label":"C","text":"Only for scientists."},{"label":"D","text":"Far away."}],"answer":"A","explanation":"Accessible means usable by more people.","visual":null},{"num":18,"prompt":"Which statement best summarizes Leah's approach to her work?","choices":[{"label":"A","text":"She chooses plant varieties only by their color."},{"label":"B","text":"She applies plant science while also considering the needs of the people using a garden."},{"label":"C","text":"She designs gardens mainly to make them look larger."},{"label":"D","text":"She believes written books are more useful than real gardens."}],"answer":"B","explanation":"The final paragraph directly connects science with attention to users.","visual":null}]}],"minutes":20},"math":{"questions":[{"num":1,"prompt":"The table shows books returned. How many books were returned on Monday, Wednesday, and Friday altogether?","choices":[{"label":"A","text":"14"},{"label":"B","text":"17"},{"label":"C","text":"21"},{"label":"D","text":"19"}],"answer":"D","explanation":"6 + 8 + 5 = 19.","visual":"<div class=\"mini-table\"><div class=\"head\">Day</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div class=\"head\">Books</div><div>6</div><div>4</div><div>8</div><div>6</div><div>5</div></div>"},{"num":2,"prompt":"The pattern adds 5, then adds 2, and repeats. What number belongs in the box?","choices":[{"label":"A","text":"24"},{"label":"B","text":"27"},{"label":"C","text":"26"},{"label":"D","text":"29"}],"answer":"C","explanation":"The pattern is 7, 12, 14, 19, 21, 26: add 5, then add 2.","visual":"<div class=\"number-grid\"><span>7</span><span>12</span><span>14</span><span>19</span><span>21</span><span class=\"mystery\">?</span><span>28</span><span>33</span></div>"},{"num":3,"prompt":"Which group of coins has a value of 46?","choices":[{"label":"A","html":"<div class=\"coin-row\"><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin ten-coin\">10</span><span class=\"coin one-coin\">1</span><span class=\"coin one-coin\">1</span><span cl
