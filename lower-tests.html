notebooks cost $4.75 each. What is the total cost?","choices":[{"label":"A","text":"$8.75"},{"label":"B","text":"$12.25"},{"label":"C","text":"$14.25"},{"label":"D","text":"$15.75"}],"answer":"C","explanation":"3 × 4.75 = 14.25."},{"num":23,"prompt":"A theater has 18 rows with 24 seats each. Seven seats are broken, and the curtains are red. How many usable seats are there?","choices":[{"label":"A","text":"35"},{"label":"B","text":"432"},{"label":"C","text":"439"},{"label":"D","text":"425"}],"answer":"D","explanation":"Curtain color is irrelevant. 18 × 24 = 432; 432 - 7 = 425."},{"num":24,"prompt":"Which equation matches: Priya had p cards, bought 18 more, then gave away 9 and had 42 left?","choices":[{"label":"A","text":"p + 18 - 9 = 42"},{"label":"B","text":"p - 18 + 9 = 42"},{"label":"C","text":"p + 18 + 9 = 42"},{"label":"D","text":"p - 18 - 9 = 42"}],"answer":"A","explanation":"Buying adds and giving away subtracts."},{"num":25,"prompt":"If 12 × 5 = 60, which equation is NOT in the same fact family?","choices":[{"label":"A","text":"60 ÷ 12 = 5"},{"label":"B","text":"60 ÷ 5 = 10"},{"label":"C","text":"5 × 12 = 60"},{"label":"D","text":"60 ÷ 5 = 12"}],"answer":"B","explanation":"The quotient should be 12, not 10."},{"num":26,"prompt":"In a Venn diagram, region S lies in “Art” but outside “Music.” What does S represent?","choices":[{"label":"A","text":"Students in music but not art"},{"label":"B","text":"Students in both groups"},{"label":"C","text":"Students in art but not music"},{"label":"D","text":"Students in neither group"}],"answer":"C","explanation":"The region is inside only the Art circle.","visual":"<div class=\"venn\"><div>Art</div><div>Music</div><b style=\"left:30%\">S</b></div>"},{"num":27,"prompt":"Which point lies on the y-axis?","choices":[{"label":"A","text":"(6, 0)"},{"label":"B","text":"(2, 6)"},{"label":"C","text":"(-3, 4)"},{"label":"D","text":"(0, 6)"}],"answer":"D","explanation":"Points on the y-axis have x-coordinate 0."},{"num":28,"prompt":"Which transformation always preserves size and shape?","choices":[{"label":"A","text":"A reflection"},{"label":"B","text":"A stretch"},{"label":"C","text":"An enlargement"},{"label":"D","text":"A compression"}],"answer":"A","explanation":"A reflection is a rigid motion."},{"num":29,"prompt":"Which net could fold into a cube?","choices":[{"label":"A","text":"Four connected triangles"},{"label":"B","text":"Six squares arranged as four in a row with one above and one below a middle square"},{"label":"C","text":"One rectangle and two circles"},{"label":"D","text":"Three squares in a row only"}],"answer":"B","explanation":"A cube net must contain six squares in a foldable arrangement.","visual":"<div class=\"net-grid\"><span></span><span></span><span></span><span></span><i></i><i></i><span></span><i></i><i></i><i></i><span></span></div><div class=\"lower-visual-caption\">Six equal squares joined edge to edge</div>"},{"num":30,"prompt":"The pattern follows ×2, -3, ×2, -3. What comes after 5, 10, 7, 14, 11?","choices":[{"label":"A","text":"8"},{"label":"B","text":"18"},{"label":"C","text":"22"},{"label":"D","text":"25"}],"answer":"C","explanation":"After subtracting 3 to reach 11, multiply by 2."},{"num":31,"prompt":"A scale drawing uses 1 centimeter for 4 meters. A wall is 7.5 centimeters long in the drawing. What is the actual length?","choices":[{"label":"A","text":"11.5 meters"},{"label":"B","text":"26 meters"},{"label":"C","text":"32 meters"},{"label":"D","text":"30 meters"}],"answer":"D","explanation":"7.5 × 4 = 30."},{"num":32,"prompt":"A ferry leaves every 35 minutes. It leaves at 1:10, 1:45, and 2:20. When is the next departure?","choices":[{"label":"A","text":"2:55"},{"label":"B","text":"2:45"},{"label":"C","text":"3:05"},{"label":"D","text":"3:20"}],"answer":"A","explanation":"Add 35 minutes to 2:20."},{"num":33,"prompt":"A plant was 12 cm, then 16 cm, then 21 cm, then 27 cm tall. If the increases continue as +4, +5, +6, what is next?","choices":[{"label":"A","text":"32 cm"},{"label":"B","text":"34 cm"},{"label":"C","text":"33 cm"},{"label":"D","text":"35 cm"}],"answer":"B","explanation":"The next increase is +7."},{"num":34,"prompt":"Four students each shake hands with every other student once. How many handshakes occur?","choices":[{"label":"A","text":"4"},{"label":"B","text":"8"},{"label":"C","text":"6"},{"label":"D","text":"12"}],"answer":"C","explanation":"The pairs are AB, AC, AD, BC, BD, CD."},{"num":35,"prompt":"A store packs 95 oranges into bags of 8. How many bags are needed to hold all oranges?","choices":[{"label":"A","text":"11"},{"label":"B","text":"13"},{"label":"C","text":"87"},{"label":"D","text":"12"}],"answer":"D","explanation":"Eleven bags hold 88; a twelfth bag is needed for the rest."},{"num":36,"prompt":"Which value is smallest?","choices":[{"label":"A","text":"7/12"},{"label":"B","text":"3/5"},{"label":"C","text":"5/8"},{"label":"D","text":"2/3"}],"answer":"A","explanation":"7/12≈0.583, smaller than 0.6, 0.625, and 0.667."},{"num":37,"prompt":"A price rises from $50 to $60. What is the percent increase?","choices":[{"label":"A","text":"10%"},{"label":"B","text":"20%"},{"label":"C","text":"16%"},{"label":"D","text":"25%"}],"answer":"B","explanation":"The increase is 10; 10/50 = 20%."},{"num":38,"prompt":"A camp has 7 cabins with 6 beds each. Five beds are empty. Which expression gives the number of campers?","choices":[{"label":"A","text":"7 + 6 - 5"},{"label":"B","text":"7 × (6 - 5)"},{"label":"C","text":"7 × 6 - 5"},{"label":"D","text":"7 × 6 + 5"}],"answer":"C","explanation":"Find total beds, then subtract empty beds."}],"minutes":35},"reading":{"passages":[{"title":"Forests Beneath the Waves","text":"Along cool coastlines, giant brown algae called kelp can grow into underwater forests. Kelp is not a plant, but it uses sunlight in a similar way to make food. Some kinds can grow more than a foot in a single day when water, light, and nutrients are favorable.\n\nA kelp forest has layers, much like a forest on land. Rootlike structures called holdfasts anchor kelp to rocks, but they do not absorb water from soil. Long flexible stems rise toward the surface. At the top, leaflike blades spread into a floating canopy. Small gas-filled bulbs help lift the blades toward sunlight.\n\nMany animals depend on this habitat. Tiny snails and crabs crawl among the holdfasts. Fish hide between the stems. Sea otters rest in the canopy and sometimes wrap themselves in kelp so currents do not carry them away while they sleep. Kelp forests also soften waves and absorb carbon dioxide from the water.\n\nThe forest is held together by relationships among species. Sea urchins eat kelp. When too many urchins gather, they can chew through an entire forest and leave a nearly bare area called an urchin barren. Sea otters eat urchins, so healthy otter populations can prevent the grazers from becoming too numerous. In places without enough otters, large fish and sea stars may also help control urchins.\n\nKelp forests can recover after storms, but repeated heat waves or changes in animal populations may make recovery difficult. Scientists survey kelp from boats, underwater, and even from satellites. They also test ways to restore damaged forests by removing extra urchins or growing young kelp in nurseries. Protecting a kelp forest means understanding not just one species, but the web of relationships that allows the whole habitat to thrive. The floating canopy also slows waves near shore and creates calmer spaces where young fish can hide. For that reason, researchers examine both the kelp itself and the many animals that depend on different layers of the forest.","questions":[{"num":1,"prompt":"What is the main idea?","choices":[{"label":"A","text":"Kelp is a tree that grows in deep tropical water."},{"label":"B","text":"Kelp forests are productive habitats supported by physical features and relationships among species."},{"label":"C","text":"Sea urchins are the only animals in kelp forests."},{"label":"D","text":"Scientists have stopped studying coastal habitats."}],"answer":"B","explanation":"The passage explains kelp structure, ecological relationships, threats, and restoration.","strand":"Main Idea"},{"num":2,"prompt":"What is the function of a holdfast?","choices":[{"label":"A","text":"It carries soil into the water."},{"label":"B","text":"It produces gas for sea otters."},{"label":"C","text":"It anchors kelp to rock."},{"label":"D","text":"It measures the temperature."}],"answer":"C","explanation":"The second paragraph defines holdfasts as anchors.","strand":"Supporting Ideas"},{"num":3,"prompt":"In the passage, “barren” most nearly means—","choices":[{"label":"A","text":"filled with young kelp"},{"label":"B","text":"protected from waves"},{"label":"C","text":"too deep for sunlight"},{"label":"D","text":"nearly empty of living growth"}],"answer":"D","explanation":"An urchin barren is described as nearly bare.","strand":"Vocabulary"},{"num":4,"prompt":"Why can sea otters help a kelp forest remain healthy?","choices":[{"label":"A","text":"They eat sea urchins that might otherwise destroy too much kelp."},{"label":"B","text":"They plant kelp seeds in the rock."},{"label":"C","text":"They bring warmer water into the forest."},{"label":"D","text":"They prevent all storms from reaching the coast."}],"answer":"A","explanation":"Otter predation can keep urchin numbers under control.","strand":"Inference"},{"num":5,"prompt":"What does the final sentence emphasize?","choices":[{"label":"A","text":"Only kelp itself matters in a forest."},{"label":"B","text":"Restoration requires attention to connections throughout the habitat."},{"label":"C","text":"Satellite surveys can replace all underwater work."},{"label":"D","text":"Urchins should be removed from every coastline."}],"answer":"B","explanation":"The “web of relationships” is the key idea.","strand":"Organization/Logic"}]},{"title":"A Room for Every Reader","text":"For much of history, books were costly and difficult to copy. Private collections belonged mainly to rulers, religious institutions, universities, or wealthy families. A person who wanted to read a particular book might have no way to reach it.\n\nSubscription libraries offered one solution. Members paid a fee that allowed them to borrow from a shared collection. These libraries increased access, but the fee still excluded many people. During the nineteenth century, reformers in several countries began supporting public libraries funded by communities and open to all residents.\n\nEarly public libraries were not all alike. Some allowed visitors to browse shelves, while others required readers to request a title from a librarian. Many created separate rooms for newspapers, reference books, or children. Librarians developed catalog systems so a book could be located even as collections grew.\n\nSupporters argued that libraries helped workers continue learning after their school years. Critics worried that communities would spend money on books few people used, or that popular stories would distract readers from serious study. Libraries responded by tracking circulation, offering lectures, and choosing collections that mixed practical information, literature, history, and entertainment.\n\nOver time, public libraries expanded their role. They delivered books to rural areas, taught reading classes, and created children’s programs. Today, many lend digital materials and provide internet access, meeting rooms, or tools. Yet the central idea remains similar to the one promoted by early reformers: useful information should not belong only to people who can afford a private collection. A public library turns a community’s resources into a room—physical or digital—where every reader is invited. Some early libraries carried boxes of books to distant neighborhoods or used traveling book wagons. These services showed that access depended not only on owning books, but also on finding practical ways to bring them to readers.","questions":[{"num":1,"prompt":"Which statement best expresses the central idea?","choices":[{"label":"A","text":"Private libraries were always open to everyone."},{"label":"B","text":"Popular stories caused most libraries to close."},{"label":"C","text":"Public libraries developed to make shared information available to a wider community."},{"label":"D","text":"Catalog systems made books more expensive."}],"answer":"C","explanation":"The passage traces expanding public access to books and information.","strand":"Main Idea"},{"num":2,"prompt":"How did subscription libraries differ from later public libraries?","choices":[{"label":"A","text":"They contained only newspapers."},{"label":"B","text":"They never allowed borrowing."},{"label":"C","text":"They were funded by all residents."},{"label":"D","text":"They required members to pay a fee."}],"answer":"D","explanation":"The second paragraph states that subscription members paid.","strand":"Supporting Ideas"},{"num":3,"prompt":"The word “circulation” most nearly refers to—","choices":[{"label":"A","text":"the borrowing and return of materials"},{"label":"B","text":"the movement of air in a room"},{"label":"C","text":"the printing of new books"},{"label":"D","text":"the order of a lecture program"}],"answer":"A","explanation":"Libraries tracked how their materials were used and borrowed.","strand":"Vocabulary"},{"num":4,"prompt":"Why does the author mention critics’ concerns?","choices":[{"label":"A","text":"To prove communities refused to buy books"},{"label":"B","text":"To show that early public libraries had to explain and demonstrate their value"},{"label":"C","text":"To argue that fiction should be removed"},{"label":"D","text":"To describe how catalogs were invented"}],"answer":"B","explanation":"The concerns are followed by library responses.","strand":"Organization/Logic"},{"num":5,"prompt":"What can be inferred about the author’s view of modern library services?","choices":[{"label":"A","text":"Digital materials have replaced reading."},{"label":"B","text":"Meeting rooms are unrelated to library purposes."},{"label":"C","text":"New services continue the original goal of widening access to useful resources."},{"label":"D","text":"Only wealthy communities need internet access."}],"answer":"C","explanation":"The final paragraph connects modern services with the same central principle.","strand":"Inference"}]},{"title":"Mapping the Sound of a Neighborhood","text":"When students at Harbor School began studying sound, they first measured obvious noises: a ringing bell, a passing bus, and music from a speaker. Then their teacher asked a harder question. Which parts of the neighborhood were quiet, and which were noisy throughout the day?\n\nThe class divided a map into small sections. Teams visited each location at the same three times—morning, midday, and late afternoon. A sound meter recorded volume in decibels. Students also wrote down the source of each sound, such as traffic, construction, birds, conversation, or wind.\n\nThe first map was confusing. One team had stood beside a wall that reflected sound, while another had measured from inside a doorway. The class created a clearer procedure: hold the meter at the same height, stand away from large surfaces, and record for exactly one minute. They repeated the survey.\n\nPatterns appeared. Streets near the highway stayed loud all day. The playground was noisy at midday but quiet after school. A small park was usually calm, except when landscaping equipment operated on Thursday morning. Students learned that a single measurement could be misleading.\n\nThe class shared the map with a neighborhood planning group. The students did not claim that every loud place was harmful. A busy market, for example, was noisy because people gathered there. Instead, they suggested planting shrubs near one apartment building and changing the time when delivery trucks used a narrow street. Their project showed how careful data collection can turn an everyday experience into useful evidence for community decisions. The students also recorded wind and weather because rain or strong gusts could change a reading. By repeating measurements on several days, they could separate a lasting sound pattern from a brief event that happened only once. They then marked uncertain results for another visit before sharing the map.","questions":[{"num":1,"prompt":"What was the main goal of the class project?","choices":[{"label":"A","text":"To prove that all neighborhood noise was harmful"},{"label":"B","text":"To compare three brands of sound meters"},{"label":"C","text":"To eliminate sound from the school playground"},{"label":"D","text":"To identify sound patterns across locations and times in the neighborhood"}],"answer":"D","explanation":"The students mapped how sound changed by place and time.","strand":"Main Idea"},{"num":2,"prompt":"Why did the class repeat its first survey?","choices":[{"label":"A","text":"Different measuring methods made the original results difficult to compare."},{"label":"B","text":"The first map had been lost."},{"label":"C","text":"The neighborhood group demanded louder results."},{"label":"D","text":"Students forgot to record any sound sources."}],"answer":"A","explanation":"They standardized height, location, and time after noticing inconsistency.","strand":"Supporting Ideas"},{"num":3,"prompt":"The word “misleading” most nearly means—","choices":[{"label":"A","text":"extremely precise"},{"label":"B","text":"likely to create a wrong impression"},{"label":"C","text":"easy to repeat"},{"label":"D","text":"too quiet to measure"}],"answer":"B","explanation":"One measurement could give an inaccurate impression of typical conditions.","strand":"Vocabulary"},{"num":4,"prompt":"What can be inferred about the Thursday park measurement?","choices":[{"label":"A","text":"The park was always the loudest location."},{"label":"B","text":"Landscaping occurred every afternoon."},{"label":"C","text":"It represented a temporary event rather than the park’s usual sound level."},{"label":"D","text":"The meter could not record machinery."}],"answer":"C","explanation":"The passage says the park was usually calm except during landscaping.","strand":"Inference"},{"num":5,"prompt":"Why does the author mention the noisy market?","choices":[{"label":"A","text":"To prove markets should be moved beside highways"},{"label":"B","text":"To explain why the survey ignored people"},{"label":"C","text":"To show that noise meters cannot measure voices"},{"label":"D","text":"To show that data should be interpreted in context rather than treated as automatically good or bad"}],"answer":"D","explanation":"The class avoids assuming every loud place is harmful.","strand":"Tone/Style/Figurative Language"}]},{"title":"Pictures Built from Pieces","text":"A mosaic is an image made from many small pieces fitted together. The pieces, called tesserae, may be stone, glass, shell, ceramic, or other materials. From nearby, a mosaic can look like a collection of separate shapes. From farther away, colors and lines combine into figures, patterns, or entire scenes.\n\nMosaic artists plan carefully before attaching any pieces. They may draw the design at full size and divide it into sections. Large areas of background can be filled with fairly regular pieces, while faces, hands, and curved objects require smaller or specially shaped tesserae. The direction of the pieces can suggest movement. Rows that bend around a fish, for example, can make the water appear to flow.\n\nAncient mosaics have survived on floors and walls in many regions. Roman artists created scenes of animals, food, theater, and daily life. Byzantine artists often used colored glass and gold-backed pieces on walls and ceilings. Because the pieces reflected light from slightly different angles, figures seemed to shimmer as a viewer moved.\n\nMaking a durable mosaic requires more than arranging color. The surface beneath it must be stable. Mortar holds the pieces, and grout fills the narrow spaces between them. Outdoor mosaics must also withstand rain, heat, and freezing temperatures.\n\nContemporary artists use mosaics in parks, transit stations, schools, and community murals. Some projects invite hundreds of people to create individual tiles that become part of one image. This method suits the art especially well. A mosaic depends on differences: each piece keeps its own shape and color, yet also contributes to a larger design that no single piece could create alone. Artists often test several color arrangements before setting the pieces in mortar. A shade that looks too bright by itself may blend perfectly when surrounded by neighboring pieces and viewed from across a large room.","questions":[{"num":1,"prompt":"What is the passage mainly about?","choices":[{"label":"A","text":"How mosaic artists combine materials, planning, and technique to create images"},{"label":"B","text":"Why mosaics can be made only from glass"},{"label":"C","text":"How to remove old floors from buildings"},{"label":"D","text":"Why paintings last longer than mosaics"}],"answer":"A","explanation":"The passage explains design, materials, history, construction, and modern uses.","strand":"Main Idea"},{"num":2,"prompt":"How can the direction of tesserae affect an image?","choices":[{"label":"A","text":"It determines whether mortar will dry."},{"label":"B","text":"It can create an impression of motion or flow."},{"label":"C","text":"It makes every piece the same size."},{"label":"D","text":"It prevents viewers from seeing color."}],"answer":"B","explanation":"The fish example shows rows suggesting flowing water.","strand":"Supporting Ideas"},{"num":3,"prompt":"In the passage, “durable” most nearly means—","choices":[{"label":"A","text":"easy to carry"},{"label":"B","text":"quick to finish"},{"label":"C","text":"able to last despite wear or weather"},{"label":"D","text":"soft enough to bend"}],"answer":"C","explanation":"A durable mosaic withstands outdoor conditions.","strand":"Vocabulary"},{"num":4,"prompt":"Why did Byzantine mosaics seem to shimmer?","choices":[{"label":"A","text":"They were placed under moving water."},{"label":"B","text":"Artists repainted them every day."},{"label":"C","text":"The grout changed color when viewers moved."},{"label":"D","text":"Glass and gold-backed pieces reflected light at different angles."}],"answer":"D","explanation":"The third paragraph describes the changing reflections.","strand":"Supporting Ideas"},{"num":5,"prompt":"What does the final comparison between each piece and the larger image suggest?","choices":[{"label":"A","text":"Individual differences can contribute to a stronger shared creation."},{"label":"B","text":"Every piece should be identical."},{"label":"C","text":"A mosaic can be understood only from close range."},{"label":"D","text":"Community projects require one artist to do all the work."}],"answer":"A","explanation":"The ending uses the mosaic as a figurative idea about contribution.","strand":"Tone/Style/Figurative Language"}]},{"title":"The Long Way Around","text":"When the robotics club’s cart stopped in front of the auditorium, Jamal immediately blamed the left wheel. The cart had turned in circles during its final test, and the left wheel squeaked each time it moved.\n\n“We only have twenty minutes before the demonstration,” said Priya. “Let’s replace it.”\n\nJamal reached for the toolbox, but Elena knelt beside the cart. “A squeak tells us something is rubbing,” she said. “It doesn’t prove the wheel is causing the turning.” She placed two strips of tape on the floor and asked Jamal to push the cart forward without using its motor. It rolled nearly straight.\n\nNext, they lifted the cart so the wheels could spin freely. Priya switched on the motor. The left wheel turned quickly; the right one moved in short jerks. Jamal checked the wires and found them firmly connected. Elena noticed that a loop of ribbon from a decoration had slipped around the right axle.\n\nThey cut away the ribbon. Both wheels spun smoothly, but the cart still drifted slightly. The club adjusted the speed setting for the right motor, then tested the cart along the taped lines. This time it traveled straight to the auditorium doors.\n\nAfter the demonstration, Jamal admitted that replacing the squeaky wheel would have used most of their remaining time without solving the real problem. Elena pointed out that the squeak had not been useless; it had simply drawn their attention to the wrong side. “The quickest solution,” she said, “is not always the first idea. Sometimes the quickest route is the one that checks the evidence.”\n\nJamal laughed. “So the long way around was actually shorter.” The club wrote the cause and the successful fix in its project notebook. At the next meeting, members used the record to create a checklist for testing movement, wiring, decorations, and motor speed before future demonstrations.","questions":[{"num":1,"prompt":"What is the central conflict in the story?","choices":[{"label":"A","text":"The club has forgotten where the auditorium is."},{"label":"B","text":"The club must determine why the cart turns in circles before the demonstration."},{"label":"C","text":"Jamal refuses to attend the demonstration."},{"label":"D","text":"Elena wants to remove all decorations."}],"answer":"B","explanation":"The time-limited troubleshooting drives the story.","strand":"Main Idea"},{"num":2,"prompt":"What evidence showed that the left wheel was probably not the main cause?","choices":[{"label":"A","text":"The left wheel made a squeak."},{"label":"B","text":"Priya wanted to replace it."},{"label":"C","text":"The cart rolled nearly straight when pushed without the motor."},{"label":"D","text":"The auditorium doors were open."}],"answer":"C","explanation":"The manual test separated the wheels from the motor problem.","strand":"Supporting Ideas"},{"num":3,"prompt":"The word “drifted” most nearly means—","choices":[{"label":"A","text":"stopped without warning"},{"label":"B","text":"made a loud sound"},{"label":"C","text":"rolled backward rapidly"},{"label":"D","text":"moved gradually away from a straight course"}],"answer":"D","explanation":"After the ribbon was removed, the cart still moved slightly off course.","strand":"Vocabulary"},{"num":4,"prompt":"Why was the squeak “not useless”?","choices":[{"label":"A","text":"It encouraged investigation, even though it pointed attention toward the wrong wheel."},{"label":"B","text":"It caused the ribbon to wrap around the axle."},{"label":"C","text":"It proved the left wheel needed replacement."},{"label":"D","text":"It made the demonstration more entertaining."}],"answer":"A","explanation":"The clue mattered but was interpreted too quickly.","strand":"Inference"},{"num":5,"prompt":"What does Jamal mean when he says “the long way around was actually shorter”?","choices":[{"label":"A","text":"The cart traveled around the entire school."},{"label":"B","text":"Careful testing saved time by avoiding an unnecessary repair."},{"label":"C","text":"The demonstration route was shortened."},{"label":"D","text":"The students replaced both wheels at once."}],"answer":"B","explanation":"A systematic approach reached the solution faster overall.","strand":"Inference"}]}],"minutes":25},"math":{"questions":[{"num":1,"prompt":"Which number is written as 600,000 + 20,000 + 400 + 9?","choices":[{"label":"A","text":"602,409"},{"label":"B","text":"620,409"},{"label":"C","text":"620,049"},{"label":"D","text":"620,490"}],"answer":"B","explanation":"Combine each place value."},{"num":2,"prompt":"What is 47,826 + 9,975?","choices":[{"label":"A","text":"56,701"},{"label":"B","text":"57,701"},{"label":"C","text":"57,801"},{"label":"D","text":"58,801"}],"answer":"C","explanation":"Add by place value."},{"num":3,"prompt":"What is 30,000 - 18,746?","choices":[{"label":"A","text":"11,154"},{"label":"B","text":"12,254"},{"label":"C","text":"1 function normalizeHighlightRanges(ranges,textLength){
 const cleaned=(Array.isArray(ranges)?ranges:[]).map(range=>({
  start:Math.max(0,Math.min(textLength,Number(range.start)||0)),
  end:Math.max(0,Math.min(textLength,Number(range.end)||0))
 })).filter(range=>range.end>range.start).sort((a,b)=>a.start-b.start||a.end-b.end);
 const merged=[];
 for(const range of cleaned){
  const last=merged[merged.length-1];
  if(last&&range.start<=last.end)last.end=Math.max(last.end,range.end);
  else merged.push({...range});
 }
 return merged.slice(0,60);
}

function renderLowerHighlightedPassage(text,key){

  html+=esc(text.slice(cursor,range.start));
  html+=`<mark class="reading-highlight" data-highlight-start="${range.start}" data-highlight-end="${range.end}" title="Click to remove highlight">${esc(text.slice(range.start,range.end))}</mark>`;
  cursor=range.end;
 }
 html+=esc(text.slice(cursor));
 return html;
}
function passageSelectionOffsets(container){
 const selection=window.getSelection();
 if(!selection||selection.rangeCount===0||selection.isCollapsed)return null;
 const range=selection.getRangeAt(0);
 if(!container.contains(range.startContainer)||!container.contains(range.endContainer))return null;
 const before=range.cloneRange();
 before.selectNodeContents(container);
 before.setEnd(range.startContainer,range.startOffset);
 let start=before.toString().length;
 let end=start+range.toString().length;
 const text=container.textContent||'';
 while(start<end&&/\s/.test(text[start]||''))start++;
 while(end>start&&/\s/.test(text[end-1]||''))end--;
 if(end<=start)return null;
 return {start,end};
}
function bindLowerReadingHighlighter(item){

  add.onmousedown=event=>event.preventDefault();
  add.onclick=()=>{
   const offsets=passageSelectionOffsets(container);
   if(!offsets){alert('Select words in the reading passage first.');return}
   state.highlights=state.highlights||{};
   const current=normalizeHighlightRanges(state.highlights[key],item.passageText.length);
   const matchingIndex=current.findIndex(range=>
    (offsets.start===range.start&&offsets.end===range.end)||
    (offsets.start>=range.start&&offsets.end<=range.end)
   );
   if(matchingIndex>=0){
    state.highlights[key]=current.filter((_,index)=>index!==matchingIndex);
   }else{
    state.highlights[key]=normalizeHighlightRanges([...current,offsets],item.passageText.length);
   }
   window.getSelection()?.removeAllRanges();
   save();renderQuestion();
  };
 }
 const clear=document.getElementById('clearReadingHighlights');
 if(clear)clear.onclick=()=>{

  if(!totalHighlights)return;
  if(confirm('Remove all reading highlights from this test?')){
   state.highlights={};
   save();renderQuestion();
  }
 };
 document.querySelectorAll('[data-highlight-start]').forEach(mark=>mark.onclick=()=>{
  const start=Number(mark.dataset.highlightStart),end=Number(mark.dataset.highlightEnd);
  state.highlights[key]=normalizeHighlightRanges(state.highlights?.[key],item.passageText.length).filter(range=>range.start!==start||range.end!==end);
  save();renderQuestion();
 });
}

function lowerConcept(sec,item){
 const text=`${item.prompt||''} ${item.explanation||''}`.toLowerCase();
 if(sec==='verbal')return item.part==='Synonyms'?'Synonyms':'Sentence Completion';
 if(sec==='reading'){
  if(/main idea|mostly about|best title|summar/.test(text))return 'Main Idea';
  if(/word .* mean|phrase .* mean|meaning|context/.test(text))return 'Vocabulary in Context';
  if(/organized|paragraph|structure|purpose|function/.test(text))return 'Organization & Logic';
  if(/tone|attitude|figurative|comparison|metaphor|simile/.test(text))return 'Tone, Style & Figurative Language';
  if(/infer|most likely|suggest|imply|why/.test(text))return 'Inference';
  return 'Supporting Ideas';
 }
 if(/probability|chance|median|mean|mode|graph|table|data|survey/.test(text))return 'Data & Probability';
 if(/area|perimeter|volume|angle|triangle|rectangle|square|circle|solid|coordinate|shape/.test(text))return 'Geometry';
 if(/meter|liter|gram|inch|foot|yard|time|minute|hour|convert|measurement/.test(text))return 'Measurement';
 if(/fraction|decimal|percent|ratio|mixed number/.test(text))return 'Fractions, Decimals & Percents';
 if(/factor|multiple|divisible|prime|composite|remainder/.test(text))return 'Number Properties';
 if(/equation|expression|variable|unknown|value of [a-z]|rule|input|output/.test(text))return 'Algebraic Concepts';
 if(/pattern|sequence|comes next|prediction/.test(text))return 'Patterns & Relationships';
 if(/estimate|approximately|reasonable/.test(text))return 'Estimation';
 return sec==='quantitative'?'Problem Solving & Number Relationships':'Whole-Number Operations';
}

  const flaggedQuestions=questions.filter(item=>state.flags?.[sec]?.[item.num]).map(item=>item.num);
  const percent=total?Math.round(correct/total*100):0;
  const allotted=TEST[sec].minutes*60;
  const timeUsed=state.timed?Math.max(0,allotted-(state.timeLeft[sec]??allotted)):null;
  return {sec,label:LABELS[sec],correct,total,answered:answeredCount,unanswered:total-answeredCount,flagged:flaggedQuestions.length,flaggedQuestions,percent,stanine:estStanine(percent),timeUsed};
 });
 const conceptMap={};
 for(const sec of scored){
  for(const item of sectionQuestions(sec)){
   const name=lowerConcept(sec,item),key=`${sec}:${name}`;
   if(!conceptMap[key])conceptMap[key]={name,section:LABELS[sec],correct:0,total:0};
   conceptMap[key].total++;
   if(state.answers[sec]?.[item.num]===item.answer)conceptMap[key].correct++;
  }
 }
 const concepts=Object.values(conceptMap).map(x=>({...x,percent:x.total?Math.round(x.correct/x.total*100):0,status:conceptStatus(x.total?Math.round(x.correct/x.total*100):0)})).sort((a,b)=>b.percent-a.percent||b.total-a.total);

 const overallPercent=max?Math.round(total/max*100):0;
 const strengths=concepts.filter(x=>x.percent>=70).slice(0,3);
 const focus=concepts.slice().sort((a,b)=>a.percent-b.percent||b.total-a.total).filter(x=>x.percent<85).slice(0,3);
 const fallbackStrengths=strengths.length?strengths:concepts.slice(0,Math.min(2,concepts.length));
 const fallbackFocus=focus.length?focus:concepts.slice(-1);
 const unanswered=sectionResults.reduce((n,x)=>n+x.unanswered,0);
 const flagged=sectionResults.reduce((n,x)=>n+x.flagged,0);

 const sec=currentSec(),qs=currentQs(),unanswered=qs.filter(x=>!state.answers[sec]?.[x.num]).length;
 const flagged=qs.filter(x=>state.flags[sec]?.[x.num]).length;
 document.getElementById('app').innerHTML=`${topbar(sec)}<main class="container"><section class="card review-card"><span class="badge">Section review</span><h1>${LABELS[sec]}</h1><p><b>${answered(sec)} of ${qs.length}</b> answered · ${unanswered} unanswered · ${flagged} flagged</p><div class="review-grid">${qs.map((x,i)=>`<button class="review-dot ${state.answers[sec]?.[x.num]?'answered':'unanswered'} ${state.flags[sec]?.[x.num]?'flagged':''}" data-jump="${i}">${x.num}</button>`).join('')}</div><div style="display:flex;gap:9px;flex-wrap:wrap;margin-top:18px"><button class="btn btn-primary" id="submit">Submit section</button><button class="btn btn-secondary" id="return">Return to questions</button></div></section></main>`;
 document.querySelectorAll('[data-jump]').forEach(x=>x.onclick=()=>{state.qIndex=Number(x.dataset.jump);state.screen='question';save();render()});
 document.getElementById('return').onclick=()=>{state.screen='question';save();render()};
 document.getElementById('submit').onclick=()=>{if(unanswered&&!confirm(`${unanswered} questions are unanswered. Submit anyway?`))return;state.submitted[sec]=true;finishSection(false)};
}
function essay(){const sec='essay';document.getElementById('app').innerHTML=`${topbar(sec)}<main class="container"><section class="card essay-card"><span class="badge">Unscored writing sample</span><h1>Essay</h1><div class="essay-prompt">${esc(TEST.essay.prompt)}</div><p>${esc(TEST.essay.guidance)}</p><textarea class="essay-area" id="essayText" placeholder="Write your essay here...">${esc(state.essayText||'')}</textarea><div class="essay-tools"><span id="wordCount">0 words</span><div><button class="btn btn-secondary" id="essayReview">Review / submit</button></div></div></section></main>`;const area=document.getElementById('essayText');const update=()=>{state.essayText=area.value;document.getElementById('wordCount').textContent=`${(area.value.trim().match(/\S+/g)||[]).length} words`;save()};area.oninput=update;update();document.getElementById('essayReview').onclick=()=>{state.submitted.essay=true;finishSection(false)};startTimer()}
function finishSection(){stopTimer();const sec=currentSec();if(state.sectionPractice){state.completed=true;state.completedAt=state.completedAt||new Date().toISOString();state.screen='results';save();render();return}if(state.sectionIndex<SECTIONS.length-1){state.sectionIndex++;state.qIndex=0;state.screen='intro';save();render()}else{state.completed=true;state.completedAt=state.completedAt||new Date().toISOString();state.screen='results';save();render()}}
function results(){
 stopTimer();
 const completed=state.sectionPractice?[state.sectionPractice]:SECTIONS;
 const scored=completed.filter(x=>x!=='essay');
 const scores=scored.map(sec=>{const s=score(sec),t=sectionQuestions(sec).length,p=Math.round(s/t*100);return{sec,s,t,p,stanine:estStanine(p)}});
 const total=scores.reduce((a,x)=>a+x.s,0),max=scores.reduce((a,x)=>a+x.t,0),pct=max?Math.round(total/max*100):0;
 const assessment=captureLowerAssessment();
 let reviewHtml='';
 for(const sec of scored){
  for(const item of sectionQuestions(sec)){
   const ua=state.answers[sec]?.[item.num]||'—',ok=ua===item.answer;
   const wasFlagged=!!state.flags?.[sec]?.[item.num];
   reviewHtml+=`<article class="review-item"><h3>${LABELS[sec]} ${item.num}: ${esc(item.prompt)}</h3><div class="${ok?'answer-good':'answer-bad'}">Your answer: ${ua}${ok?' ✓':' ✗'}</div>${ok?'':`<div class="answer-good">Correct answer: ${item.answer}</div>`}${wasFlagged?'<span class="flag-result-tag">★ Flagged for review</span>':''}<p>${esc(item.explanation)}</p></article>`;
  }
 }
 document.getElementById('app').innerHTML=`<main class="container"><section class="card hero"><span class="badge">Completed</span><h1>${esc(state.student||'Student')}’s Results</h1>
  <div class="result-grid">${scores.map(x=>`<div class="score-box"><span>${LABELS[x.sec]}</span><b>${x.s}/${x.t}</b><small>${x.p}% · Est. stanine ${x.stanine}</small></div>`).join('')}</div>
  ${scored.length>1?`<div class="success-note"><b>Total scored sections:</b> ${total}/${max} (${pct}%). No overall stanine is calculated.</div>`:''}
  <div class="success-note" style="margin-top:10px"><b>Practice estimates only:</b> Official ISEE stanines use scaled scores and grade-specific norms.</div>
  ${lowerAssessmentHtml(assessment)}
  ${completed.includes('essay')?`<details style="margin-top:16px"><summary><b>Show essay response</b></summary><div class="essay-prompt" style="margin-top:12px">${esc(TEST.essay.prompt)}</div><div class="passage-text" style="margin-top:12px">${esc(state.essayText||'No essay response saved.')}</div></details>`:''}
  <div style="display:flex;gap:9px;flex-wrap:wrap;margin:18px 0"><button class="btn btn-primary" onclick="window.print()">Print results & assessment</button><button class="btn btn-secondary" id="assessmentHistoryResults">Assessment history</button><button class="btn btn-secondary" id="retake">Retake</button><button class="btn btn-secondary" id="home">Back to tests</button><button class="btn btn-secondary" id="main">⌂ Home</button></div>
  ${reviewHtml?`<h2>Answer review</h2>${reviewHtml}`:''}
 </section></main>`;
 document.getElementById('assessmentHistoryResults').onclick=showLowerAssessmentHistory;
 document.getElementById('retake').onclick=()=>{const st=state.student;localStorage.removeItem(key());state=freshState(st);home()};
 document.getElementById('home').onclick=home;
 document.getElementById('main').onclick=goMain;
}
function render(){if(state.screen==='home')home();else if(state.screen==='intro')intro();else if(state.screen==='question')renderQuestion();else if(state.screen==='review')review();else if(state.screen==='essay')essay();else if(state.screen==='results')results();else home()}
window.addEventListener('beforeunload',save);
const initialView=new URLSearchParams(location.search).get('view');
if(initialView==='history')showLowerAssessmentHistory();else home();
</script></body></html>
