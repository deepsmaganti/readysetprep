/* Unified Primary 2 / Lower Level interface */
:root{
 --brand:#3056a3;
 --brand2:#e9effb;
 --teal:#0f8a83;
 --green:#2f8f62;
 --green-soft:#eaf7ef;
}
body{background:#f3f6fb;color:#182230}
.container{width:min(1180px,calc(100% - 28px));margin:auto;padding:16px 10px 50px}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 30px rgba(16,24,40,.10);padding:22px}
.hero.home-hero{max-width:940px;margin:24px auto}
.site-brand-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.site-mark{
 width:48px;height:48px;border-radius:14px;display:grid;place-items:center;
 background:linear-gradient(145deg,var(--teal),var(--green));color:#fff;font-weight:900;
 font-size:22px;box-shadow:0 8px 20px rgba(15,138,131,.22)
}
.site-name{font-size:24px;font-weight:900;color:var(--brand);line-height:1}
.site-tagline{font-size:13px;color:var(--muted);margin-top:4px}
.test-heading{margin:2px 0 8px;font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.test-picker{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 18px}
.test-option{
 position:relative;min-width:78px;width:auto;min-height:38px;padding:8px 13px;
 border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);
 text-align:center;display:inline-flex;align-items:center;justify-content:center;
 cursor:pointer;transition:.14s
}
.test-option:hover{border-color:var(--teal);background:#f3fbfa}
.test-option.active{border:2px solid var(--teal);background:#e7f7f5;box-shadow:0 0 0 2px rgba(15,138,131,.08)}
.test-option strong{display:block;margin:0;font-size:14px;line-height:1.1;white-space:nowrap}
.test-check{
 position:absolute;right:5px;top:4px;width:16px;height:16px;border-radius:50%;
 display:grid;place-items:center;background:var(--teal);color:#fff;font-size:9px
}
.practice-mode-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
.mode-grid{display:grid;gap:12px;margin:20px 0}
.mode-card{
 position:relative;overflow:hidden;border:2px solid var(--line);border-radius:16px;
 padding:18px;background:#fff;text-align:left;cursor:pointer;transition:.15s;color:var(--ink)
}
.mode-card:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(16,24,40,.08)}
.mode-card.selected{border-color:var(--teal);background:#eefaf8}
.mode-card h3{margin:8px 0 5px;font-size:18px}.mode-card p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
.timed-card{background:linear-gradient(180deg,#fff 0%,#e9effb 170%)}
.untimed-card{background:linear-gradient(180deg,#fff 0%,var(--green-soft) 170%)}
.timed-section-card{background:linear-gradient(180deg,#fff 0%,var(--gold-soft) 170%)}
.section-card{background:linear-gradient(180deg,#fff 0%,var(--purple-soft) 170%)}
.section-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:9px;margin:12px 0 20px}
.section-choice{
 border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;
 cursor:pointer;text-align:left;color:var(--ink)
}
.section-choice:hover,.section-choice.selected{border-color:var(--teal);background:#eefaf8}
.section-choice b{display:block;font-size:14px}.section-choice span{display:block;color:var(--muted);font-size:12px;margin-top:4px}
.input-row{margin:18px 0}.input-row input{border-radius:11px;border:1px solid var(--line);padding:11px 12px}
.home-actions{display:flex;gap:9px;flex-wrap:wrap}
.btn{border:0;border-radius:11px;padding:12px 18px;font-weight:800;cursor:pointer}
.btn-primary{background:var(--brand);color:#fff}.btn-secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn-danger{background:#fef3f2;color:#b42318;border:1px solid #fecdca}
.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
.topbar-inner{max-width:1180px;margin:auto;padding:12px 20px;display:flex;align-items:center;gap:16px;min-height:auto;width:auto}
.topbar-home{
 border:1px solid var(--line);background:#fff;color:var(--brand);border-radius:999px;
 padding:6px 12px;font-weight:800;cursor:pointer;white-space:nowrap
}
.brand{font-weight:800;color:var(--brand);font-size:18px;white-space:nowrap}
.section-title{font-weight:700;flex:1;text-align:center}
.timer{font-variant-numeric:tabular-nums;font-weight:800;border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 12px;min-width:84px;text-align:center}
.question-card,.intro-card,.review-card,.essay-card,.results-card{border-radius:18px}
.choice{border-radius:12px}.choice.selected{border-color:var(--brand);background:var(--brand2)}
.review-dot.answered{border-color:var(--brand);background:var(--brand2);color:var(--brand)}
@media(max-width:1100px){
 .practice-mode-grid{grid-template-columns:repeat(2,1fr)}
 .section-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:650px){
 .practice-mode-grid,.section-grid{grid-template-columns:1fr}
 .site-name{font-size:21px}
 .test-option{min-width:70px;padding:7px 10px}
 .test-option strong{font-size:13px}
 .topbar-inner{padding:10px}
 .brand{display:none}
 .section-title{text-align:left;font-size:15px}
}


/* Saved assessment reports */
.assessment-home-btn{display:inline-flex;align-items:center;gap:6px}
.assessment-report{
  margin:20px 0;padding:20px;border:1px solid #b8d8d1;border-radius:16px;
  background:linear-gradient(145deg,#f3fbf8,#ffffff)
}
.assessment-report h2{margin:4px 0 4px}
.assessment-report>p{margin:0;color:var(--muted)}
.assessment-band{
  display:inline-flex;padding:6px 11px;border-radius:999px;font-weight:900;
  font-size:12px;margin-bottom:8px;background:#e8f3ff;color:#175cd3
}
.assessment-band.excellent{background:#ecfdf3;color:#067647}
.assessment-band.strong{background:#eff8ff;color:#175cd3}
.assessment-band.on-track{background:#f4f3ff;color:#5925dc}
.assessment-band.developing{background:#fff7ed;color:#b54708}
.assessment-band.foundation{background:#fef3f2;color:#b42318}
.assessment-overview{
  display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:16px 0
}
.assessment-metric{
  padding:13px;border:1px solid var(--line);border-radius:12px;background:#fff
}
.assessment-metric span{display:block;color:var(--muted);font-size:12px}
.assessment-metric b{display:block;font-size:22px;margin-top:3px}
.assessment-columns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.assessment-column{
  border:1px solid var(--line);border-radius:13px;background:#fff;padding:15px
}
.assessment-column h3{margin:0 0 8px;font-size:17px}
.assessment-column ul{margin:0;padding-left:20px}
.assessment-column li{margin:6px 0;line-height:1.4}
.assessment-concepts{margin-top:16px}
.assessment-concept{
  display:grid;grid-template-columns:minmax(160px,1fr) 92px 70px;gap:10px;
  align-items:center;padding:9px 0;border-bottom:1px solid var(--line)
}
.assessment-concept:last-child{border-bottom:0}
.assessment-concept-name b{display:block}.assessment-concept-name span{font-size:12px;color:var(--muted)}
.assessment-bar{height:8px;border-radius:999px;background:#eaecf0;overflow:hidden}
.assessment-bar>span{display:block;height:100%;background:var(--brand);border-radius:999px}
.assessment-concept-score{text-align:right;font-weight:800}
.assessment-next-steps{margin-top:16px;padding:14px 16px;border-radius:12px;background:#fff8e8;border:1px solid #f5d27a}
.assessment-disclaimer{font-size:12px;color:var(--muted);margin-top:14px}
.assessment-history{max-width:980px;margin:22px auto}
.assessment-history-header{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.assessment-list{display:grid;gap:12px;margin-top:18px}
.assessment-card{
  border:1px solid var(--line);border-left:5px solid var(--brand);
  border-radius:14px;padding:16px;background:#fff
}
.assessment-card-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.assessment-card h3{margin:0 0 3px}.assessment-card p{margin:0;color:var(--muted)}
.assessment-card-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:13px 0}
.assessment-card-stat{background:#f8fafc;border-radius:10px;padding:9px}
.assessment-card-stat span{display:block;color:var(--muted);font-size:11px}
.assessment-card-stat b{display:block;margin-top:2px}
.assessment-card-actions{display:flex;gap:8px;flex-wrap:wrap}
.assessment-empty{text-align:center;padding:34px 20px;border:1px dashed var(--line);border-radius:14px;color:var(--muted)}
.assessment-section-table{width:100%;border-collapse:collapse;margin:14px 0}
.assessment-section-table th,.assessment-section-table td{padding:9px 8px;border-bottom:1px solid var(--line);text-align:left}
.assessment-section-table th{font-size:12px;color:var(--muted)}
.assessment-writing{padding:14px;border-radius:12px;background:#f8fafc;border:1px solid var(--line);margin-top:14px}
@media(max-width:760px){
  .assessment-overview,.assessment-card-grid{grid-template-columns:repeat(2,1fr)}
  .assessment-columns{grid-template-columns:1fr}
  .assessment-concept{grid-template-columns:1fr 70px}
  .assessment-bar{display:none}
  .assessment-history-header,.assessment-card-head{flex-direction:column}
}
@media print{
  .assessment-history .btn,.assessment-card-actions,.home-floating{display:none!important}
  .assessment-report{break-inside:avoid}
}


/* ================================================================
   READYSETPREP SHARED TEST-LEVEL UI
   This exact block is used by every full-test level page.
   ================================================================ */
:root{
  --rsp-brand:#2f5aaa;
  --rsp-accent:#118f86;
  --rsp-ink:#182230;
  --rsp-muted:#667085;
  --rsp-line:#d0d5dd;
  --rsp-page:#f3f6fb;
  --rsp-card:#ffffff;
  --rsp-green:#248a5b;
  --rsp-green-soft:#eaf7ef;
  --rsp-gold:#ad6d0c;
  --rsp-gold-soft:#fff5dc;
  --rsp-purple:#6941c6;
  --rsp-purple-soft:#f2edff;
}
html,body{min-height:100%}
body{
  margin:0;
  background:var(--rsp-page)!important;
  color:var(--rsp-ink)!important;
}
.container{
  width:min(1180px,calc(100% - 32px))!important;
  margin:0 auto!important;
  padding:18px 0 52px!important;
}
.card{

"D","explanation":"Vacant means empty or unoccupied.","part":"Synonyms"},{"num":17,"prompt":"WEARY:","choices":[{"label":"A","text":"tired"},{"label":"B","text":"curious"},{"label":"C","text":"proud"},{"label":"D","text":"wealthy"}],"answer":"A","explanation":"Weary means very tired.","part":"Synonyms"},{"num":18,"prompt":"Because the hikers had studied the map, they were able to _____ the correct trail at the fork.","choices":[{"label":"A","text":"ignore"},{"label":"B","text":"identify"},{"label":"C","text":"remove"},{"label":"D","text":"replace"}],"answer":"B","explanation":"Studying the map helped them identify the correct trail.","part":"Sentence Completion"},{"num":19,"prompt":"The museum placed a rope around the ancient vase to _____ visitors from touching it.","choices":[{"label":"A","text":"invite"},{"label":"B","text":"reward"},{"label":"C","text":"prevent"},{"label":"D","text":"teach"}],"answer":"C","explanation":"The rope was meant to prevent touching.","part":"Sentence Completion"},{"num":20,"prompt":"After weeks without rain, the soil became so _____ that it cracked.","choices":[{"label":"A","text":"fertile"},{"label":"B","text":"smooth"},{"label":"C","text":"thick"},{"label":"D","text":"dry"}],"answer":"D","explanation":"The lack of rain made the soil dry.","part":"Sentence Completion"},{"num":21,"prompt":"The coach praised Lena for being _____ and arriving before every practice.","choices":[{"label":"A","text":"punctual"},{"label":"B","text":"careless"},{"label":"C","text":"jealous"},{"label":"D","text":"secretive"}],"answer":"A","explanation":"Arriving on time is punctual behavior.","part":"Sentence Completion"},{"num":22,"prompt":"Since the instructions were unclear, the students asked the teacher to _____ them.","choices":[{"label":"A","text":"cancel"},{"label":"B","text":"clarify"},{"label":"C","text":"hide"},{"label":"D","text":"memorize"}],"answer":"B","explanation":"Clarify means make easier to understand.","part":"Sentence Completion"},{"num":23,"prompt":"The blanket was thick enough to _____ the campers from the cold ground.","choices":[{"label":"A","text":"decorate"},{"label":"B","text":"separate"},{"label":"C","text":"insulate"},{"label":"D","text":"weaken"}],"answer":"C","explanation":"Insulate means protect from heat or cold.","part":"Sentence Completion"},{"num":24,"prompt":"The crowd became _____ when the final score was announced.","choices":[{"label":"A","text":"drowsy"},{"label":"B","text":"hostile"},{"label":"C","text":"motionless"},{"label":"D","text":"jubilant"}],"answer":"D","explanation":"A winning crowd may become jubilant, or joyful.","part":"Sentence Completion"},{"num":25,"prompt":"Mina used a ruler so that each strip of paper would be _____ in width.","choices":[{"label":"A","text":"uniform"},{"label":"B","text":"crooked"},{"label":"C","text":"fragile"},{"label":"D","text":"random"}],"answer":"A","explanation":"Uniform means consistent or the same.","part":"Sentence Completion"},{"num":26,"prompt":"Although the puppy barked loudly, it was actually quite _____ and hid behind the chair.","choices":[{"label":"A","text":"fierce"},{"label":"B","text":"timid"},{"label":"C","text":"obedient"},{"label":"D","text":"playful"}],"answer":"B","explanation":"Hiding despite barking shows timidity.","part":"Sentence Completion"},{"num":27,"prompt":"The science club decided to _____ the results in a chart so everyone could compare them.","choices":[{"label":"A","text":"erase"},{"label":"B","text":"predict"},{"label":"C","text":"display"},{"label":"D","text":"repeat"}],"answer":"C","explanation":"A chart displays information.","part":"Sentence Completion"},{"num":28,"prompt":"The old path was barely _____ because weeds had covered most of it.","choices":[{"label":"A","text":"dangerous"},{"label":"B","text":"level"},{"label":"C","text":"valuable"},{"label":"D","text":"visible"}],"answer":"D","explanation":"If weeds cover it, the path is hard to see.","part":"Sentence Completion"},{"num":29,"prompt":"Although the first model collapsed, the team _____.","choices":[{"label":"A","text":"decided that bridges could not be built"},{"label":"B","text":"hid the broken model from the teacher"},{"label":"C","text":"used the failure to improve its next design"},{"label":"D","text":"repeated the same steps without changes"}],"answer":"C","explanation":"Although signals a contrast; the team responds constructively.","part":"Sentence Completion"},{"num":30,"prompt":"Because the library would close in ten minutes, Arun _____.","choices":[{"label":"A","text":"began a long conversation in the hallway"},{"label":"B","text":"placed every book on a different shelf"},{"label":"C","text":"waited outside for his friends to arrive"},{"label":"D","text":"quickly selected his books and went to the checkout desk"}],"answer":"D","explanation":"The closing time requires a quick, relevant response.","part":"Sentence Completion"},{"num":31,"prompt":"While many students expected the new class pet to be noisy, _____.","choices":[{"label":"A","text":"the small turtle spent most of the day quietly beneath its lamp"},{"label":"B","text":"the classroom had recently been painted"},{"label":"C","text":"the teacher purchased a larger aquarium"},{"label":"D","text":"several students preferred dogs"}],"answer":"A","explanation":"While sets up a contrast between expectation and reality.","part":"Sentence Completion"},{"num":32,"prompt":"Since Bea had promised to water the seedlings, _____.","choices":[{"label":"A","text":"she forgot where the garden was"},{"label":"B","text":"she checked the soil each afternoon"},{"label":"C","text":"the seeds were never planted"},{"label":"D","text":"her brother completed a math worksheet"}],"answer":"B","explanation":"Checking the soil fulfills Bea’s promise.","part":"Sentence Completion"},{"num":33,"prompt":"The trail was longer than Omar had expected; nevertheless, _____.","choices":[{"label":"A","text":"he returned home before starting"},{"label":"B","text":"the map showed three different lakes"},{"label":"C","text":"he continued until he reached the overlook"},{"label":"D","text":"his shoes were stored in the car"}],"answer":"C","explanation":"Nevertheless introduces persistence despite difficulty.","part":"Sentence Completion"},{"num":34,"prompt":"Unlike the crowded city street below, the rooftop garden _____.","choices":[{"label":"A","text":"contained several tall buildings"},{"label":"B","text":"was reached by an elevator"},{"label":"C","text":"received sunlight in the afternoon"},{"label":"D","text":"felt quiet and sheltered"}],"answer":"D","explanation":"Unlike calls for a contrasting description.","part":"Sentence Completion"}],"minutes":20},"quantitative":{"questions":[{"num":1,"prompt":"The pattern is 6, 11, 16, 21, ___. What number comes next?","choices":[{"label":"A","text":"26"},{"label":"B","text":"24"},{"label":"C","text":"25"},{"label":"D","text":"27"}],"answer":"A","explanation":"The rule adds 5 each time."},{"num":2,"prompt":"The second number in a pattern is 14, the third is 20, and the fourth is 26. What is the first number?","choices":[{"label":"A","text":"6"},{"label":"B","text":"8"},{"label":"C","text":"10"},{"label":"D","text":"12"}],"answer":"B","explanation":"The pattern adds 6, so the first number is 14 - 6."},{"num":3,"prompt":"A number machine changes 12 to 17, 25 to 30, and 41 to 46. Which rule describes the machine?","choices":[{"label":"A","text":"Subtract 5"},{"label":"B","text":"Multiply by 5"},{"label":"C","text":"Add 5"},{"label":"D","text":"Add the digits"}],"answer":"C","explanation":"Each output is 5 greater than its input.","visual":"<div class=\"lower-table-wrap\"><table class=\"lower-data-table\"><thead><tr><th>Input</th><th>Output</th></tr></thead><tbody><tr><td>12</td><td>17</td></tr><tr><td>25</td><td>30</td></tr><tr><td>41</td><td>46</td></tr></tbody></table><div class=\"lower-visual-caption\">Number machine</div></div>"},{"num":4,"prompt":"If ★ + ★ = 18 and ★ + ▲ = 14, what is the value of ▲?","choices":[{"label":"A","text":"4"},{"label":"B","text":"7"},{"label":"C","text":"9"},{"label":"D","text":"5"}],"answer":"D","explanation":"★ = 9, so ▲ = 14 - 9 = 5."},{"num":5,"prompt":"A school orders 39 boxes with 21 pencils in each box. Which is the best estimate of the total number of pencils?","choices":[{"label":"A","text":"800"},{"label":"B","text":"400"},{"label":"C","text":"600"},{"label":"D","text":"1,200"}],"answer":"A","explanation":"Round 39 to 40 and 21 to 20: 40 × 20 = 800."},{"num":6,"prompt":"Which number is divisible by both 3 and 4?","choices":[{"label":"A","text":"18"},{"label":"B","text":"36"},{"label":"C","text":"28"},{"label":"D","text":"42"}],"answer":"B","explanation":"36 is divisible by 3 and by 4."},{"num":7,"prompt":"Point K is halfway between 1/2 and 1 on the number line. Which value is K?","choices":[{"label":"A","text":"2/3"},{"label":"B","text":"4/5"},{"label":"C","text":"3/4"},{"label":"D","text":"5/6"}],"answer":"C","explanation":"Halfway between 2/4 and 4/4 is 3/4.","visual":"<div class=\"number-line\"><div class=\"nl-point\" style=\"left:50.0%\">K</div><div class=\"nl-line\"></div><div class=\"nl-ticks\"><div class=\"nl-tick\"><i></i><span>1/2</span></div><div class=\"nl-tick\"><i></i><span></span></div><div class=\"nl-tick\"><i></i><span>1</span></div></div></div>"},{"num":8,"prompt":"Which fraction is equivalent to 6/8?","choices":[{"label":"A","text":"2/3"},{"label":"B","text":"4/5"},{"label":"C","text":"6/10"},{"label":"D","text":"3/4"}],"answer":"D","explanation":"Divide numerator and denominator by 2."},{"num":9,"prompt":"There are 24 students. Three-eighths bring lunch from home. How many students bring lunch?","choices":[{"label":"A","text":"9"},{"label":"B","text":"6"},{"label":"C","text":"8"},{"label":"D","text":"12"}],"answer":"A","explanation":"24 ÷ 8 = 3, and 3 × 3 = 9."},{"num":10,"prompt":"Which digit is in the hundredths place in 7.284?","choices":[{"label":"A","text":"2"},{"label":"B","text":"8"},{"labe =\"simple-svg\" viewBox=\"0 0 250 140\"><line x1=\"45\" y1=\"110\" x2=\"115\" y2=\"45\" stroke=\"#344054\" stroke-width=\"5\"/><line x1=\"45\" y1=\"110\" x2=\"215\" y2=\"110\" stroke=\"#344054\" stroke-width=\"5\"/><path d=\"M85 110 A40 40 0 0 1 72 80\" fill=\"none\" stroke=\"#0f8a83\" stroke-width=\"4\"/></svg>"},{"num":20,"prompt":"A play begins at 6:35 and ends at 8:05. How long does it last?","choices":[{"label":"A","text":"1 hour 20 minutes"},{"label":"B","text":"1 hour 40 minutes"},{"label":"C","text":"2 hours 30 minutes"},{"label":"D","text":"1 hour 30 minutes"}],"answer":"D","explanation":"6:35 to 7:35 is one hour, then 30 minutes."},{"num":21,"prompt":"A hiking trail is 3 kilometers long. About how many meters is that?","choices":[{"label":"A","text":"3,000 meters"},{"label":"B","text":"30 meters"},{"label":"C","text":"300 meters"},{"label":"D","text":"30,000 meters"}],"answer":"A","explanation":"One kilometer equals 1,000 meters."},{"num":22,"prompt":"Four tickets cost $7 each, and a program costs $5. What is the total cost?","choices":[{"label":"A","text":"$28"},{"label":"B","text":"$33"},{"label":"C","text":"$35"},{"label":"D","text":"$48"}],"answer":"B","explanation":"4 × 7 + 5 = 33."},{"num":23,"prompt":"A baker made 72 rolls, placed 8 rolls on each tray, and used blue napkins. How many trays were needed?","choices":[{"label":"A","text":"8"},{"label":"B","text":"10"},{"label":"C","text":"9"},{"label":"D","text":"64"}],"answer":"C","explanation":"The napkin color is irrelevant. 72 ÷ 8 = 9."},{"num":24,"prompt":"Which equation matches this situation? A shelf had 45 books. Twelve were borrowed, and 7 were returned.","choices":[{"label":"A","text":"45 + 12 + 7 = b"},{"label":"B","text":"45 - 12 - 7 = b"},{"label":"C","text":"45 + 12 - 7 = b"},{"label":"D","text":"45 - 12 + 7 = b"}],"answer":"D","explanation":"Borrowed means subtract; returned means add."},{"num":25,"prompt":"If 9 × 7 = 63, which equation is in the same fact family?","choices":[{"label":"A","text":"63 ÷ 9 = 7"},{"label":"B","text":"63 + 9 = 72"},{"label":"C","text":"9 ÷ 7 = 63"},{"label":"D","text":"63 - 7 = 56"}],"answer":"A","explanation":"Multiplication and division form an inverse fact family."},{"num":26,"prompt":"In a Venn diagram, region R is inside both “Soccer” and “Music.” What does R represent?","choices":[{"label":"A","text":"Students in soccer only"},{"label":"B","text":"Students in both soccer and music"},{"label":"C","text":"Students in music only"},{"label":"D","text":"Students in neither group"}],"answer":"B","explanation":"The overlap represents members of both sets.","visual":"<div class=\"venn\"><div>Soccer</div><div>Music</div><b>R</b></div>"},{"num":27,"prompt":"Point P is at (4, 2). Which statement is true?","choices":[{"label":"A","text":"It is 2 units right and 4 units up."},{"label":"B","text":"It is 4 units left and 2 units down."},{"label":"C","text":"It is 4 units right and 2 units up from the origin."},{"label":"D","text":"It lies on the y-axis."}],"answer":"C","explanation":"Coordinates are read x first, then y."},{"num":28,"prompt":"Which figure must have at least one line of symmetry?","choices":[{"label":"A","text":"A scalene triangle"},{"label":"B","text":"An irregular pentagon"},{"label":"C","text":"A slanted parallelogram"},{"label":"D","text":"A square"}],"answer":"D","explanation":"Every square has lines of symmetry.","visual":"<svg class=\"simple-svg\" viewBox=\"0 0 260 120\" aria-label=\"shape with dotted vertical line\"><path d=\"M35 95 L95 25 L130 65 L165 25 L225 95 Z\" fill=\"#dfe9f6\" stroke=\"#344054\" stroke-width=\"3\"/><line x1=\"130\" y1=\"10\" x2=\"130\" y2=\"110\" stroke=\"#d92d20\" stroke-width=\"3\" stroke-dasharray=\"7 6\"/></svg>"},{"num":29,"prompt":"A solid has six equal square faces. Which solid can it form?","choices":[{"label":"A","text":"Cube"},{"label":"B","text":"Cone"},{"label":"C","text":"Cylinder"},{"label":"D","text":"Triangular prism"}],"answer":"A","explanation":"Six equal squares form a cube.","visual":"<div class=\"net-grid\"><span></span><span></span><span></span><span></span><i></i><i></i><span></span><i></i><i></i><i></i><span></span></div><div class=\"lower-visual-caption\">Six equal squares joined edge to edge</div>"},{"num":30,"prompt":"The pattern follows +3, +7, +3, +7. What comes after 5, 8, 15, 18, 25?","choices":[{"label":"A","text":"27"},{"label":"B","text":"28"},{"label":"C","text":"30"},{"label":"D","text":"32"}],"answer":"B","explanation":"After adding 7 to reach 25, add 3."},{"num":31,"prompt":"On a map, 1 inch represents 15 miles. Two towns are 4 inches apart. What is the actual distance?","choices":[{"label":"A","text":"19 miles"},{"label":"B","text":"45 miles"},{"label":"C","text":"60 miles"},{"label":"D","text":"75 miles"}],"answer":"C","explanation":"4 × 15 = 60."},{"num":32,"prompt":"A bus leaves at 8:20, 9:05, 9:50, and 10:35. If the pattern continues, when is the next bus?","choices":[{"label":"A","text":"11:05"},{"label":"B","text":"11:15"},{"label":"C","text":"11:35"},{"label":"D","text":"11:20"}],"answer":"D","explanation":"The buses are 45 minutes apart."},{"num":33,"prompt":"A store sold 12, 16, 20, and 24 plants in four weeks. What is a reasonable prediction for week 5?","choices":[{"label":"A","text":"28"},{"label":"B","text":"25"},{"label":"C","text":"30"},{"label":"D","text":"36"}],"answer":"A","explanation":"The pattern increases by 4."},{"num":34,"prompt":"How many different two-letter arrangements can be made using A, B, and C without repeating a letter?","choices":[{"label":"A","text":"3"},{"label":"B","text":"6"},{"label":"C","text":"4"},{"label":"D","text":"9"}],"answer":"B","explanation":"AB, AC, BA, BC, CA, and CB."},{"num":35,"prompt":"A teacher has 53 markers and puts 6 in each box. How many full boxes can be made?","choices":[{"label":"A","text":"7"},{"label":"B","text":"9"},{"label":"C","text":"8"},{"label":"D","text":"47"}],"answer":"C","explanation":"Eight boxes use 48 markers, with 5 left."},{"num":36,"prompt":"Which fraction is greatest?","choices":[{"label":"A","text":"3/4"},{"label":"B","text":"7/10"},{"label":"C","text":"4/5"},{"label":"D","text":"5/6"}],"answer":"D","explanation":"5/6 is about 0.833, greater than 0.8, 0.75, and 0.7."},{"num":37,"prompt":"A $60 jacket is discounted by 20%. What is the sale price?","choices":[{"label":"A","text":"$48"},{"label":"B","text":"$12"},{"label":"C","text":"$40"},{"label":"D","text":"$52"}],"answer":"A","explanation":"20% of 60 is 12; 60 - 12 = 48."},{"num":38,"prompt":"A garden has 5 rows of 8 plants. Six plants do not grow. Which expression gives the number that grow?","choices":[{"label":"A","text":"5 + 8 - 6"},{"label":"B","text":"5 × 8 - 6"},{"label":"C","text":"5 × (8 - 6)"},{"label":"D","text":"5 × 8 + 6"}],"answer":"B","explanation":"First find 5 groups of 8, then subtract 6."}],"minutes":35},"reading":{"passages":[{"title":"Living Paint on Desert Rocks","text":"In dry regions of the American Southwest, many cliffs and boulders appear to be coated with a dark, shiny paint. This coating is called desert varnish, but no person applies it. It forms naturally, one extremely thin layer at a time. Some patches are only as thick as a sheet of paper even though they may be thousands of years old.\n\nDesert varnish is made mostly of clay particles mixed with the minerals manganese and iron. Wind carries fine clay dust through the air. When the dust lands on rock, tiny amounts stick to the surface. Moisture from rare rainstorms or morning dew helps the particles remain in place. Certain microscopic organisms may also help collect manganese from the environment, although scientists are still studying exactly how much these organisms contribute.\n\nThe color of varnish depends partly on its minerals. Manganese produces dark brown or black tones, while iron can add reddish or orange shades. The coating forms slowly because deserts receive little water. A surface may gain only a very small amount in a century.\n\nDesert varnish is useful to scientists and archaeologists. Scratches in the coating reveal the lighter stone beneath. Long ago, Indigenous artists made images by pecking or scraping through the dark layer. These rock pictures are called petroglyphs. Researchers study the varnish that later began forming inside the carved lines. Its growth can provide clues about how long the lines have been exposed, though it cannot give a perfectly exact date.\n\nThe varnish also records changes in the environment. Dust trapped in different layers may have come from different places or periods. By studying those layers, scientists can learn about past winds and climate. What looks like simple dark paint is actually a slow-growing record written across the desert. Because different rocks and locations collect dust at different rates, researchers compare varnish with nearby soil, weather records, and other evidence before drawing conclusions. This careful approach helps them avoid treating the dark coating as a simple clock.","questions":[{"num":1,"prompt":"What is the main idea of the passage?","choices":[{"label":"A","text":"Desert varnish forms slowly and can preserve information about rocks, people, and past environments."},{"label":"B","text":"Desert rocks are painted by modern artists."},{"label":"C","text":"All desert varnish forms at exactly the same speed."},{"label":"D","text":"Petroglyphs are made by adding black minerals to stone."}],"answer":"A","explanation":"The passage explains how varnish forms and why it is useful.","strand":"Main Idea"},{"num":2,"prompt":"According to the passage, what helps clay particles remain on rock?","choices":[{"label":"A","text":"Bright sunlight"},{"label":"B","text":"Rare rain or dew"},{"label":"C","text":"Cold winter snow"},{"label":"D","text":"Roots from desert plants"}],"answer":"B","explanation":"The second paragraph says moisture helps particles stay in place.","strand":"Supporting Ideas"},{"num":3,"prompt":"In the passage, “contribute” most nearly means—","choices":[{"label":"A","text":"argue against"},{"label":"B","text":"carry away"},{"label":"C","text":"help cause"},{"label":"D","text":"measure exactly"}],"answer":"C","explanation":"The organisms may help cause manganese to collect.","strand":"Vocabulary"},{"num":4,"prompt":"Why can desert varnish not provide a perfectly exact date for a petroglyph?","choices":[{"label":"A","text":"The carved lines contain no minerals."},{"label":"B","text":"Every petroglyph was made in the same year."},{"label":"C","text":"Scientists cannot see the lighter stone beneath."},{"label":"D","text":"The coating grows extremely slowly and not always at a perfectly known rate."}],"answer":"D","explanation":"The passage describes varnish as a slow clue rather than an exact clock.","strand":"Inference"},{"num":5,"prompt":"How is the passage mainly organized?","choices":[{"label":"A","text":"It explains formation first and then describes ways varnish is studied."},{"label":"B","text":"It compares two artists and then chooses the better one."},{"label":"C","text":"It lists steps for making artificial paint."},{"label":"D","text":"It tells events in the life of one scientist."}],"answer":"A","explanation":"The structure moves from how varnish forms to what it reveals.","strand":"Organization/Logic"}]},{"title":"Messages on Horseback","text":"In the middle of the nineteenth century, news could travel only as fast as a person, ship, train, or telegraph line could carry it. Communities in the eastern United States were connected by railroads and wires, but settlements in California were separated from them by mountains, plains, and deserts. A letter sent across the country might take weeks to arrive.\n\nIn 1860, a private company created the Pony Express to speed up mail between Missouri and California. Riders carried small leather pouches filled with letters. Stations were built along a route nearly two thousand miles long. At most stations, a rider changed to a fresh horse. After riding a much longer section, the rider handed the mail to another person. This relay system kept the mail moving day and night.\n\nPony Express riders had to travel quickly through difficult country. They faced snow, heat, river crossings, and long stretches without towns. Horses were selected for speed and endurance, and riders carried little extra weight. Advertisements asked for young, lightweight riders who were willing to risk danger.\n\nThe service became famous, but it lasted only about eighteen months. It was expensive to operate, and customers paid a high price to send even a small letter. More importantly, workers were extending a telegraph line across the continent. A telegraph message could travel through wires in minutes rather than days. When the coast-to-coast line was completed in 1861, the Pony Express could no longer compete.\n\nAlthough it was brief, the Pony Express showed how strongly people wanted faster communication. It also demonstrated that a carefully organized relay could cross a huge distance. Its riders became symbols of speed and courage, even though a new technology quickly replaced their service. The company also had to keep stations supplied and horses fed across remote country. That difficult organization added greatly to the cost, but it allowed riders to hand off the pouch without waiting for a tired horse to recover.","questions":[{"num":1,"prompt":"What is the passage mainly about?","choices":[{"label":"A","text":"How railroads were built in California"},{"label":"B","text":"Why the Pony Express was created, how it worked, and why it ended"},{"label":"C","text":"Why horses were replaced by ships"},{"label":"D","text":"The childhood of a famous rider"}],"answer":"B","explanation":"The passage covers the purpose, relay system, challenges, and end of the service.","strand":"Main Idea"},{"num":2,"prompt":"Why did riders change horses frequently?","choices":[{"label":"A","text":"Riders were not allowed to own horses."},{"label":"B","text":"Each station used a different kind of saddle."},{"label":"C","text":"Fresh horses helped keep the mail moving quickly."},{"label":"D","text":"The mail pouch was too large for one horse."}],"answer":"C","explanation":"The relay relied on fresh horses for speed and endurance.","strand":"Supporting Ideas"},{"num":3,"prompt":"The word “relay” most nearly refers to—","choices":[{"label":"A","text":"a race around a circular track"},{"label":"B","text":"a message written in secret code"},{"label":"C","text":"a building that stores letters"},{"label":"D","text":"a system in which one carrier passes something to the next"}],"answer":"D","explanation":"The mail was handed from rider to rider.","strand":"Vocabulary"},{"num":4,"prompt":"Which development most directly caused the Pony Express to close?","choices":[{"label":"A","text":"Completion of the coast-to-coast telegraph line"},{"label":"B","text":"The discovery of gold in California"},{"label":"C","text":"A shortage of leather mail pouches"},{"label":"D","text":"The construction of more horse stations"}],"answer":"A","explanation":"The telegraph sent messages much faster and made the service unable to compete.","strand":"Supporting Ideas"},{"num":5,"prompt":"What can be inferred from the final paragraph?","choices":[{"label":"A","text":"Every new technology is less expensive at first."},{"label":"B","text":"A service may remain historically important even if it operates for only a short time."},{"label":"C","text":"The Pony Express carried more mail than the telegraph."},{"label":"D","text":"People stopped wanting fast communication after 1861."}],"answer":"B","explanation":"The passage emphasizes the service’s lasting symbolic importance despite its brief life.","strand":"Inference"}]},{"title":"The Repair Table","text":"At the Oak Street Community Center, Saturday mornings used to be quiet. Now the largest room fills with lamps that will not turn on, jackets with broken zippers, wooden stools with loose legs, and small appliances that have stopped working. Their owners have brought them to the neighborhood “repair table.”\n\nThe program began when two residents noticed how many usable objects were being thrown away. They invited volunteers who knew how to sew, work with wood, or repair simple electrical devices. Instead of accepting items and returning them later, the volunteers ask owners to stay and help. A visitor might hold a flashlight, thread a needle, or learn how to tighten a screw safely.\n\nThe repair table does not fix everything. Volunteers refuse jobs involving dangerous wiring, damaged batteries, or equipment that requires a licensed expert. Sometimes replacement parts cost more than a new object. Even then, a volunteer may explain why the item failed and how a better-designed product could last longer.\n\nSupporters say the program reduces waste and teaches practical skills. A repaired toaster or backpack does not need to be replaced, and owners often become more confident about caring for their belongings. The room also brings together neighbors of different ages. A retired carpenter may work beside a middle-school student who understands a digital device.\n\nSome people argue that community centers should focus only on sports or classes. Yet the repair table serves many of the same goals. It teaches, creates cooperation, and gives people a reason to gather. Its success suggests that a broken object can be more than a problem. It can become an invitation to learn from someone else. Visitors often leave with written notes about the repair, including the tool that was used and warning signs to watch for next time. In this way, one successful repair can prevent another object from being discarded later.","questions":[{"num":1,"prompt":"Which statement best expresses the central idea?","choices":[{"label":"A","text":"Community centers should stop offering sports."},{"label":"B","text":"Most broken objects are dangerous to repair."},{"label":"C","text":"A community repair program reduces waste while helping neighbors teach and learn from one another."},{"label":"D","text":"New objects always cost less than repairs."}],"answer":"C","explanation":"The passage repeatedly emphasizes waste reduction, learning, and community.","strand":"Main Idea"},{"num":2,"prompt":"Why do volunteers ask owners to stay during repairs?","choices":[{"label":"A","text":"They need owners to pay an entrance fee."},{"label":"B","text":"They are not allowed to touch the objects."},{"label":"C","text":"They want to finish fewer repairs."},{"label":"D","text":"They want owners to participate and learn."}],"answer":"D","explanation":"The second paragraph says owners help and learn practical steps.","strand":"Supporting Ideas"},{"num":3,"prompt":"The word “licensed” most nearly means—","choices":[{"label":"A","text":"officially qualified"},{"label":"B","text":"carefully hidden"},{"label":"C","text":"newly invented"},{"label":"D","text":"widely advertised"}],"answer":"A","explanation":"A licensed expert has official permission or qualification.","strand":"Vocabulary"},{"num":4,"prompt":"Why does the author mention the retired carpenter and middle-school student?","choices":[{"label":"A","text":"To prove digital devices are harder to repair than furniture"},{"label":"B","text":"To illustrate how the program connects people with different knowledge and ages"},{"label":"C","text":"To explain why only retired people should volunteer"},{"label":"D","text":"To show that students cannot learn from adults"}],"answer":"B","explanation":"The example supports the idea of neighbors sharing different skills.","strand":"Inference"},{"num":5,"prompt":"What is the author’s attitude toward the repair table?","choices":[{"label":"A","text":"Doubtful"},{"label":"B","text":"Mocking"},{"label":"C","text":"Supportive"},{"label":"D","text":"Uninterested"}],"answer":"C","explanation":"The author presents benefits and ends by describing broken objects as invitations to learn.","strand":"Tone/Style/Figurative Language"}]},{"title":"Stories Made of Shadow","text":"Before movies and television, audiences in many parts of the world watched stories performed with light and shadow. In a shadow-puppet show, flat figures move between a lamp and a pale screen. The audience sees the dark outlines of the figures but usually cannot see the puppeteers behind them.\n\nShadow puppets can be made from paper, thin wood, or carefully prepared animal hide. Some are simple shapes with no moving parts. Others have hinged arms, legs, or jaws controlled by slender rods. Tiny holes cut into a puppet allow points of light to shine through, creating patterns on clothing or feathers.\n\nThe screen changes how the puppets appear. A figure held close to the screen looks sharp and nearly its actual size. When it moves closer to the lamp, its shadow grows larger and softer. Skilled puppeteers use this effect to make a character seem to approach, disappear, or transform. Musicians and narrators may perform beside the screen, giving the shadows voices and rhythm.\n\nDifferent cultures developed their own traditions. In Indonesia, wayang kulit performances can last for many hours and include stories, music, humor, and advice about life. In China, brightly colored translucent puppets sometimes create shadows with visible color. In Turkey, comic characters became popular for their lively arguments and misunderstandings.\n\nModern artists continue to use shadow puppetry. Some combine handmade figures with projectors or digital animation. Others teach children to create a show using cardboard, sticks, and a desk lamp. The tools may be simple, but the art depends on precise movement, timing, sound, and imagination. A blank screen can become a forest, a palace, or an ocean as soon as the light comes on. Because the figures are flat, every small hand movement matters. A slight shift can change a character’s expression, make one puppet appear to chase another, or turn a quiet scene into a sudden surprise for the audience.","questions":[{"num":1,"prompt":"What is the main purpose of the passage?","choices":[{"label":"A","text":"To argue that shadow puppets should replace movies"},{"label":"B","text":"To give directions for building a theater"},{"label":"C","text":"To tell a legend about one puppet"},{"label":"D","text":"To explain how shadow puppetry works and how different traditions use it"}],"answer":"D","explanation":"The passage is an informative overview of materials, effects, traditions, and modern use.","strand":"Main Idea"},{"num":2,"prompt":"What happens when a puppet moves closer to the lamp?","choices":[{"label":"A","text":"Its shadow becomes larger and softer."},{"label":"B","text":"Its shadow becomes smaller and sharper."},{"label":"C","text":"The screen becomes darker."},{"label":"D","text":"The puppet’s joints stop moving."}],"answer":"A","explanation":"The third paragraph directly explains this effect.","strand":"Supporting Ideas"},{"num":3,"prompt":"In the last paragraph, “precise” most nearly means—","choices":[{"label":"A","text":"colorful and bright"},{"label":"B","text":"exact and controlled"},{"label":"C","text":"old and traditional"},{"label":"D","text":"simple and inexpensive"}],"answer":"B","explanation":"Precise movement and timing must be exact.","strand":"Vocabulary"},{"num":4,"prompt":"Why does the author describe traditions from Indonesia, China, and Turkey?","choices":[{"label":"A","text":"To prove one country invented every puppet style"},{"label":"B","text":"To explain why the performances use no music"},{"label":"C","text":"To show that shadow puppetry developed in varied forms across cultures"},{"label":"D","text":"To rank the traditions from oldest to newest"}],"answer":"C","explanation":"The examples demonstrate cultural variety.","strand":"Organization/Logic"},{"num":5,"prompt":"What can be inferred about a successful shadow-puppet performance?","choices":[{"label":"A","text":"The audience must see every puppeteer."},{"label":"B","text":"Digital animation is required for modern shows."},{"label":"C","text":"The puppets must always be made of animal hide."},{"label":"D","text":"Simple materials can create a complex effect when performers use skill and imagination."}],"answer":"D","explanation":"The final paragraph contrasts simple tools with demanding artistic skill.","strand":"Inference"}]},{"title":"The Unmarked Trail","text":"Maya stopped where the trail divided. The left path curved downhill beneath tall pines. The right path climbed toward a rocky ridge. According to the map, both paths eventually reached Willow Lake, where her class was meeting for lunch. Unfortunately, the wooden sign that should have named the trails had fallen face down in the mud.\n\n“We should take the downhill path,” said Theo. “Lakes are low.”\n\nMaya was not convinced. She remembered crossing a stream earlier that morning. The map showed the stream touching only the ridge trail. She unfolded the damp paper and turned it until the north arrow matched the compass hanging from her backpack.\n\nTheo shifted impatiently. “Everyone else is getting farther ahead.”\n\nMaya studied the shapes on the map. A small triangle marked the ridge overlook. Beyond it, the trail bent sharply and descended to the lake. The left path seemed to lead to a campground with a similar name: Willow Glen.\n\nBefore choosing, Maya looked for another clue. On the right path, she found a faded blue paint mark on a tree. Their teacher had said that the lake trail was marked in blue. Maya and Theo began climbing.\n\nThe hill was steeper than Theo expected. Twice he asked whether they should turn around. Then the trees opened, revealing the valley. Far below, sunlight flashed on Willow Lake. Maya pointed to the path zigzagging down from the ridge.\n\nAt lunch, Theo admitted that his quick guess would have led them to the wrong place. Maya said her own first idea might also have been wrong if she had not checked the compass, stream, map symbol, and paint mark. Their teacher smiled. “A map is not a set of magic instructions,” she said. “It is a collection of clues. The more clues you connect, the better your decision becomes.” The group later added the corrected route to its shared map and wrote a note explaining the confusing junction. Their record would help the next hikers make a careful decision before reaching the same spot.","questions":[{"num":1,"prompt":"What is the main problem in the story?","choices":[{"label":"A","text":"Maya and Theo must decide which unmarked path leads to Willow Lake."},{"label":"B","text":"Their class has forgotten to bring lunch."},{"label":"C","text":"Maya has lost her compass."},{"label":"D","text":"The lake trail is closed by a storm."}],"answer":"A","explanation":"The fallen sign makes the correct route uncertain.","strand":"Main Idea"},{"num":2,"prompt":"Which clue first made Maya question Theo’s choice?","choices":[{"label":"A","text":"She saw the lake from the overlook."},{"label":"B","text":"She remembered that the stream appeared only beside the ridge trail on the map."},{"label":"C","text":"She found the blue paint mark."},{"label":"D","text":"The teacher told her to turn right."}],"answer":"B","explanation":"The stream-map connection appears before the other confirming clues.","strand":"Supporting Ideas"},{"num":3,"prompt":"The word “zigzagging” suggests that the path—","choices":[{"label":"A","text":"ended suddenly"},{"label":"B","text":"was covered in water"},{"label":"C","text":"turned back and forth"},{"label":"D","text":"continued in a straight line"}],"answer":"C","explanation":"A zigzag changes direction repeatedly.","strand":"Vocabulary"},{"num":4,"prompt":"What can be inferred about Theo by the end?","choices":[{"label":"A","text":"He still believes the downhill path was correct."},{"label":"B","text":"He refuses to use maps in the future."},{"label":"C","text":"He had secretly known the correct route all along."},{"label":"D","text":"He recognizes that evidence was more reliable than his quick guess."}],"answer":"D","explanation":"Theo admits his guess would have led to the wrong place.","strand":"Inference"},{"num":5,"prompt":"What does the teacher mean by calling a map “a collection of clues”?","choices":[{"label":"A","text":"A reader must connect several pieces of information to make a sound decision."},{"label":"B","text":"Maps are puzzles with deliberately missing answers."},{"label":"C","text":"Only teachers can understand map symbols."},{"label":"D","text":"A compass is unnecessary when a map is available."}],"answer":"A","explanation":"The story shows Maya combining multiple clues rather than following one sign.","strand":"Tone/Style/Figurative Language"}]}],"minutes":25},"math":{"questions":[{"num":1,"prompt":"What is the value of the 7 in 472,615?","choices":[{"label":"A","text":"70,000"},{"label":"B","text":"7,000"},{"label":"C","text":"700"},{"label":"D","text":"700,000"}],"answer":"A","explanation":"The 7 is in the ten-thousands place."},{"num":2,"prompt":"What is 8,405 + 2,796?","choices":[{"label":"A","text":"10,101"},{"label":"B","text":"11,201"},{"label":"C","text":"11,101"},{"label":"D","text":"11,211"}],"answer":"B","explanation":"Add by place value."},{"num":3,"prompt":"What is 9,000 - 3,487?","choices":[{"label":"A","text":"5,413"},{"label":"B","text":"6,513"},{"label":"C","text":"5,513"},{"label":"D","text":"6,587"}],"answer":"C","explanation":"Subtract 3,487 from 9,000."},{"num":4,"prompt":"What is 36 × 24?","choices":[{"label":"A","text":"720"},{"label":"B","text":"824"},{"label":"C","text":"1,464"},{"label":"D","text":"864"}],"answer":"D","explanation":"36 × 20 + 36 × 4 = 720 + 144."},{"num":5,"prompt":"What is 936 ÷ 12?","choices":[{"label":"A","text":"78"},{"label":"B","text":"68"},{"label":"C","text":"76"},{"label":"D","text":"88"}],"answer":"A","explanation":"12 × 78 = 936."},{"num":6,"prompt":"Which fraction is equal to 0.45?","choices":[{"label":"A","text":"4/5"},{"label":"B","text":"45/100"},{"label":"C","text":"45/10"},{"label":"D","text":"5/45"}],"answer":"B","explanation":"0.45 is forty-five hundredths."},{"num":7,"prompt":"What is 3/8 + 2/8?","choices":[{"label":"A","text":"5/16"},{"label":"B","text":"1/8"},{"label":"C","text":"5/8"},{"label":"D","text":"6/8"}],"answer":"C","explanation":"Add numerators when denominators match."},{"num":8,"prompt":"What is 5/6 - 1/3?","choices":[{"label":"A","text":"2/3"},{"label":"B","text":"4/3"},{"label":"C","text":"4/6"},{"label":"D","text":"1/2"}],"answer":"D","explanation":"1/3=2/6; 5/6-2/6=3/6=1/2."},{"num":9,"prompt":"What is 2.75 + 1.6?","choices":[{"label":"A","text":"4.35"},{"label":"B","text":"3.35"},{"label":"C","text":"4.15"},{"label":"D","text":"4.75"}],"answer":"A","explanation":"Align decimal points and add."},{"num":10,"prompt":"What is 25% of 64?","choices":[{"label":"A","text":"8"},{"label":"B","text":"16"},{"label":"C","text":"25"},{"label":"D","text":"39"}],"answer":"B","explanation":"One-fourth of 64 is 16."},{"num":11,"prompt":"Evaluate 6 + 3 × 4.","choices":[{"label":"A","text":"24"},{"label":"B","text":"36"},{"label":"C","text":"18"},{"label":"D","text":"48"}],"answer":"C","explanation":"Multiply before adding: 6+12."},{"num":12,"prompt":"If n + 27 = 65, what is n?","choices":[{"label":"A","text":"32"},{"label":"B","text":"42"},{"label":"C","text":"92"},{"label":"D","text":"38"}],"answer":"D","explanation":"65-27=38."},{"num":13,"prompt":"Which expression is equivalent to 5 × (8 + 2)?","choices":[{"label":"A","text":"5 × 8 + 5 × 2"},{"label":"B","text":"5 × 8 + 2"},{"label":"C","text":"5 + 8 × 2"},{"label":"D","text":"10 × 8 + 2"}],"answer":"A","explanation":"Use the distributive property."},{"num":14,"prompt":"The table follows y = 3x + 1. What is y when x = 6?","choices":[{"label":"A","text":"18"},{"label":"B","text":"19"},{"label":"C","text":"20"},{"label":"D","text":"22"}],"answer":"B","explanation":"3(6)+1=19.","visual":"<div class=\"lower-table-wrap\"><table class=\"lower-data-table\"><thead><tr><th>x</th><th>y</th></tr></thead><tbody><tr><td>1</td><td>4</td></tr><tr><td>2</td><td>7</td></tr><tr><td>3</td><td>10</td></tr><tr><td>6</td><td>?</td></tr></tbody></table></div>"},{"num":15,"prompt":"Which value makes 4m = 52 true?","choices":[{"label":"A","text":"12"},{"label":"B","text":"14"},{"label":"C","text":"13"},{"label":"D","text":"48"}],"answer":"C","explanation":"52 ÷ 4 = 13."},{"num":16,"prompt":"What is the area of a triangle with base 12 cm and height 7 cm?","choices":[{"label":"A","text":"19 cm²"},{"label":"B","text":"84 cm²"},{"label":"C","text":"168 cm²"},{"label":"D","text":"42 cm²"}],"answer":"D","explanation":"Area=1/2 × 12 × 7."},{"num":17,"prompt":"What is the perimeter of a regular pentagon with side length 9 cm?","choices":[{"label":"A","text":"45 cm"},{"label":"B","text":"18 cm"},{"label":"C","text":"36 cm"},{"label":"D","text":"81 cm"}],"answer":"A","explanation":"Five equal sides: 5 × 9."},{"num":18,"prompt":"Which solid has two circular bases and one curved surface?","choices":[{"label":"A","text":"Cone"},{"label":"B","text":"Cylinder"},{"label":"C","text":"Cube"},{"label":"D","text":"Sphere"}],"answer":"B","explanation":"A cylinder has two circular bases."},{"num":19,"prompt":"Two angles in a triangle are 50° and 65°. What is the third angle?","choices":[{"label":"A","text":"55°"},{"label":"B","text":"75°"},{"label":"C","text":"65°"},{"label":"D","text":"115°"}],"answer":"C","explanation":"Triangle angles total 180°."},{"num":20,"prompt":"How many lines of symmetry does a rectangle that is not a square have?","choices":[{"label":"A","text":"1"},{"label":"B","text":"3"},{"label":"C","text":"4"},{"label":"D","text":"2"}],"answer":"D","explanation":"It has horizontal and vertical symmetry."},{"num":21,"prompt":"How many centimeters are in 2.4 meters?","choices":[{"label":"A","text":"240 cm"},{"label":"B","text":"24 cm"},{"label":"C","text":"204 cm"},{"label":"D","text":"2,400 cm"}],"ans
